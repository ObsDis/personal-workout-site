function mpEditor(pl) {
  const isEdit = !!pl;
  const body = document.getElementById('nut-body'); if (!body) return;
  let draft = {
    id: pl?.id || null,
    name: pl?.name || '',
    description: pl?.description || '',
    kcal_target: pl?.kcal_target || (state.profile?.kcal_target || ''),
    protein_target_g: pl?.protein_target_g || (state.profile?.protein_target_g || ''),
    carbs_target_g:   pl?.carbs_target_g   || (state.profile?.carbs_target_g   || ''),
    fat_target_g:     pl?.fat_target_g     || (state.profile?.fat_target_g     || ''),
    is_active: !!pl?.is_active,
    items: (pl?.meal_plan_items || []).map(it => ({ ...it, day_index: it.day_index || 1 })),
  };
  if (draft.items.length === 0) draft.items.push({ day_index:1, meal_slot:'breakfast', food_name:'', calories:null, protein_g:null, carbs_g:null, fat_g:null });
  const slots = ['breakfast','lunch','dinner','snack'];

  const dayCount = () => Math.max(1, ...draft.items.map(i => i.day_index || 1));

  const totalsForDay = (day) => {
    const its = draft.items.filter(i => (i.day_index||1) === day);
    return its.reduce((a, i) => ({
      kcal: a.kcal + Number(i.calories||0),
      p: a.p + Number(i.protein_g||0),
      c: a.c + Number(i.carbs_g||0),
      f: a.f + Number(i.fat_g||0),
    }), { kcal:0, p:0, c:0, f:0 });
  };

  const paint = () => {
    const days = Array.from({length: dayCount()}, (_, i) => i + 1);
    body.innerHTML = `
      <div class="card" style="margin-bottom:1rem;">
        <label class="label">Plan name</label>
        <input id="mp_name" class="input" value="${esc(draft.name)}" placeholder="e.g. Cut · 2200 kcal · 5 days" style="margin-bottom:.5rem;" />
        <label class="label">Description</label>
        <input id="mp_desc" class="input" value="${esc(draft.description)}" placeholder="optional" style="margin-bottom:.5rem;" />
        <div class="form-grid cols-2-on-desktop" style="margin-bottom:.5rem;">
          <div><label class="label">kcal/day target</label><input id="mp_k" class="input" type="number" value="${esc(draft.kcal_target)}" /></div>
          <div><label class="label">Protein g</label><input id="mp_p" class="input" type="number" value="${esc(draft.protein_target_g)}" /></div>
        </div>
        <div class="form-grid cols-2-on-desktop">
          <div><label class="label">Carbs g</label><input id="mp_c" class="input" type="number" value="${esc(draft.carbs_target_g)}" /></div>
          <div><label class="label">Fat g</label><input id="mp_f" class="input" type="number" value="${esc(draft.fat_target_g)}" /></div>
        </div>
        <label style="display:flex;align-items:center;gap:.5rem;margin-top:.625rem;font-size:.875rem;">
          <input id="mp_active" type="checkbox" ${draft.is_active?'checked':''} />
          <span>Make this the active plan</span>
        </label>
      </div>

      ${days.map(day => {
        const dayItems = draft.items.filter(i => (i.day_index||1) === day);
        const t = totalsForDay(day);
        return `<div class="card" style="margin-bottom:.75rem;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem;">
            <div class="section-label" style="margin:0;">Day ${day}</div>
            <div style="display:flex;align-items:center;gap:.625rem;">
              <span style="font-size:.7rem;color:var(--text-muted);font-variant-numeric:tabular-nums;">${fmtWt(t.kcal)} kcal · P${fmtWt(t.p)}/C${fmtWt(t.c)}/F${fmtWt(t.f)}</span>
              ${days.length > 1 ? `<button data-day="${day}" class="mp-rm-day" style="background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:.875rem;padding:.25rem .375rem;">remove day</button>` : ''}
            </div>
          </div>
          ${dayItems.map((it) => {
            const i = draft.items.indexOf(it);
            return `<div style="display:grid;grid-template-columns:90px 1fr 70px 56px 36px;gap:.375rem;align-items:start;padding:.5rem 0;border-bottom:1px solid rgba(39,39,42,.5);">
              <select data-i="${i}" class="mp-slot input">
                ${slots.map(sl => `<option value="${sl}" ${it.meal_slot===sl?'selected':''}>${sl[0].toUpperCase()+sl.slice(1)}</option>`).join('')}
              </select>
              <input data-i="${i}" data-k="food_name" class="mp-fld input" value="${esc(it.food_name||'')}" placeholder="Food" />
              <input data-i="${i}" data-k="calories"  class="mp-fld input" style="text-align:center;" type="number" value="${esc(it.calories ?? '')}" placeholder="kcal" />
              <input data-i="${i}" data-k="protein_g" class="mp-fld input" style="text-align:center;" type="number" value="${esc(it.protein_g ?? '')}" placeholder="P" />
              <button data-i="${i}" class="mp-del-item" style="background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.125rem;height:44px;">×</button>
            </div>`;
          }).join('')}
          <button data-day="${day}" class="mp-add-meal sub-split-add">+ Add meal to Day ${day}</button>
        </div>`;
      }).join('')}

      <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
        <button id="mp_add_day" class="btn btn-ghost" style="flex:1;">+ Add another day</button>
      </div>

      <div style="display:flex;gap:.5rem;">
        <a href="#/nutrition/meals" class="btn btn-ghost">Cancel</a>
        <button id="mp_save" class="btn btn-primary" style="flex:1;">${isEdit?'Update plan':'Create plan'}</button>
      </div>
    `;

    const get = (id) => document.getElementById(id);
    get('mp_name').addEventListener('input', e => draft.name = e.target.value);
    get('mp_desc').addEventListener('input', e => draft.description = e.target.value);
    get('mp_k').addEventListener('input', e => draft.kcal_target = e.target.value);
    get('mp_p').addEventListener('input', e => draft.protein_target_g = e.target.value);
    get('mp_c').addEventListener('input', e => draft.carbs_target_g = e.target.value);
    get('mp_f').addEventListener('input', e => draft.fat_target_g = e.target.value);
    get('mp_active').addEventListener('change', e => draft.is_active = e.target.checked);
    document.querySelectorAll('.mp-slot').forEach(el => el.addEventListener('change', e => {
      draft.items[Number(el.dataset.i)].meal_slot = e.target.value;
    }));
    document.querySelectorAll('.mp-fld').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.i), k = el.dataset.k;
      const v = e.target.value;
      draft.items[i][k] = (k === 'food_name') ? v : (v === '' ? null : Number(v));
    }));
    document.querySelectorAll('.mp-del-item').forEach(el => el.addEventListener('click', () => {
      draft.items.splice(Number(el.dataset.i), 1); paint();
    }));
    document.querySelectorAll('.mp-add-meal').forEach(el => el.addEventListener('click', () => {
      const day = Number(el.dataset.day);
      draft.items.push({ day_index: day, meal_slot:'breakfast', food_name:'', calories:null, protein_g:null, carbs_g:null, fat_g:null });
      paint();
    }));
    document.querySelectorAll('.mp-rm-day').forEach(el => el.addEventListener('click', () => {
      const day = Number(el.dataset.day);
      if (!confirm(`Remove Day ${day} and all its meals?`)) return;
      draft.items = draft.items.filter(i => (i.day_index||1) !== day);
      // re-number subsequent days
      draft.items.forEach(i => { if (i.day_index > day) i.day_index--; });
      if (draft.items.length === 0) draft.items.push({ day_index:1, meal_slot:'breakfast', food_name:'', calories:null });
      paint();
    }));
    get('mp_add_day').addEventListener('click', () => {
      const next = dayCount() + 1;
      draft.items.push({ day_index: next, meal_slot:'breakfast', food_name:'', calories:null });
      paint();
    });
    get('mp_save').addEventListener('click', async () => {
      const btn = get('mp_save'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await qSaveMealPlan({
          id: draft.id, name: draft.name, description: draft.description,
          kcal_target: Number(draft.kcal_target) || null,
          protein_target_g: Number(draft.protein_target_g) || null,
          carbs_target_g: Number(draft.carbs_target_g) || null,
          fat_target_g: Number(draft.fat_target_g) || null,
          is_active: draft.is_active,
          items: draft.items.filter(it => it.food_name).map(it => ({
            day_index: it.day_index || 1,
            meal_slot: it.meal_slot,
            food_name: it.food_name,
            serving_size_g: it.serving_size_g ?? null,
            calories: it.calories,
            protein_g: it.protein_g, carbs_g: it.carbs_g ?? null, fat_g: it.fat_g ?? null, fiber_g: it.fiber_g ?? null,
            notes: it.notes || null,
          })),
        });
        toast('Plan saved.');
        location.hash = '#/nutrition/meals'; renderNutrition();
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        btn.disabled = false; btn.textContent = isEdit ? 'Update plan' : 'Create plan';
      }
    });
  };
  paint();
}

/* =========================================================
   ROUTER
   ========================================================= */
const ROUTES = {
  '#/login':    renderLogin,
  '#/onboard':  renderOnboard,
  '#/':         renderDashboard,
  '':           renderDashboard,
  '#/plan':     renderPlanEditor,
  '#/log':      renderLog,
  '#/history':  renderHistory,
  '#/profile':  renderProfile,
  '#/progress':         renderProgress,
  '#/progress/prs':     renderProgress,
  '#/progress/volume':  renderProgress,
  '#/progress/weight':  renderProgress,
  '#/progress/photos':  renderProgress,
  '#/chat':             renderChat,
  '#/nutrition':            renderNutrition,
  '#/nutrition/add':        renderNutrition,
  '#/nutrition/targets':    renderNutrition,
  '#/nutrition/meals':      renderNutrition,
};

function route() {
  if (!CONFIG_OK) return renderNotConfigured();
  const hash = location.hash || '#/';
  if (!state.session && hash !== '#/login') { location.hash = '#/login'; return; }
  if (state.session && !state.profile && hash !== '#/onboard') { location.hash = '#/onboard'; return; }
  const fn = ROUTES[hash] || renderDashboard;
  fn();
  updateChatBubble();
}

window.addEventListener('hashchange', route);

/* =========================================================
   BOOT
   ========================================================= */
async function boot() {
  if (!CONFIG_OK) return renderNotConfigured();
  try {
    const { data } = await sb.auth.getSession();
    state.session = data.session;
    if (state.session) {
      state.profile = await qProfile();
      // Sync chat API keys from profile down to localStorage so the chat works on every device
      // the user logs in on, without re-pasting the key.
      try {
        if (state.profile?.groq_api_key && !localStorage.getItem('GROQ_API_KEY')) {
          localStorage.setItem('GROQ_API_KEY', state.profile.groq_api_key);
        }
        if (state.profile?.hf_api_key && !localStorage.getItem('HF_API_KEY')) {
          localStorage.setItem('HF_API_KEY', state.profile.hf_api_key);
        }
      } catch (e) { console.warn('chat key sync failed', e); }
      if (state.profile) state.plan = await qActivePlan();
    }
  } catch (e) {
    console.error('Boot error', e);
  }
  sb.auth.onAuthStateChange((evt, sess) => {
    if ((evt === 'SIGNED_IN' || evt === 'TOKEN_REFRESHED') && sess) {
      if (!state.session) {
        state.session = sess;
        location.hash = '#/';
        location.reload();
      } else {
        state.session = sess;
      }
    }
    if (evt === 'SIGNED_OUT') {
      state.session = null; state.profile = null; state.plan = null;
      location.hash = '#/login'; route();
    }
  });
  route();
}
boot();
