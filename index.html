/* =========================================================
   PROGRESS — queries, charts, and views
   ========================================================= */

async function qBodyWeights(limit = 1000) {
  const { data, error } = await sb.from('body_weights').select('*').order('recorded_at', { ascending: true }).limit(limit);
  if (error) { console.error(error); return []; }
  return data || [];
}
async function qSaveBodyWeight({ weight_lbs, source = 'manual', notes = null, recorded_at = null }) {
  const uid = state.session.user.id;
  const row = { user_id: uid, weight_lbs, source, notes };
  if (recorded_at) row.recorded_at = recorded_at;
  const { data, error } = await sb.from('body_weights').insert(row).select().single();
  if (error) throw error;
  // Only sync profile.weight_lbs if this is the most recent entry the user has.
  const recordedTs = recorded_at ? new Date(recorded_at).getTime() : Date.now();
  const { data: latest } = await sb.from('body_weights').select('recorded_at').order('recorded_at', { ascending: false }).limit(1).maybeSingle();
  if (!latest || new Date(latest.recorded_at).getTime() <= recordedTs) {
    await sb.from('profiles').update({ weight_lbs, updated_at: new Date().toISOString() }).eq('id', uid);
  }
  return data;
}
async function qDeleteBodyWeight(id) {
  const { error } = await sb.from('body_weights').delete().eq('id', id);
  if (error) throw error;
}

async function qAllSetLogs() {
  const { data, error } = await sb.from('set_logs')
    .select('exercise_name, set_number, reps, weight_lbs, sessions!inner(session_date, slot_type)')
    .order('created_at', { ascending: true })
    .limit(5000);
  if (error) { console.error(error); return []; }
  return data || [];
}

async function qPhotos() {
  const { data, error } = await sb.from('progress_photos').select('*').order('taken_at', { ascending: true });
  if (error) { console.error(error); return []; }
  return data || [];
}
async function qUploadPhoto(file, { weight_lbs = null, notes = null, taken_at = null, angle = 'front' } = {}) {
  const uid = state.session.user.id;
  const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const path = `${uid}/${stamp}.${ext}`;
  const up = await sb.storage.from('progress-photos').upload(path, file, { contentType: file.type, upsert: false });
  if (up.error) throw up.error;
  const row = { user_id: uid, storage_path: path, weight_lbs, notes, angle };
  if (taken_at) row.taken_at = taken_at;
  const { data, error } = await sb.from('progress_photos').insert(row).select().single();
  if (error) throw error;
  return data;
}
async function qDeletePhoto(photo) {
  await sb.storage.from('progress-photos').remove([photo.storage_path]);
  await sb.from('progress_photos').delete().eq('id', photo.id);
}
async function qPhotoSignedUrl(path, expiresIn = 3600) {
  const { data, error } = await sb.storage.from('progress-photos').createSignedUrl(path, expiresIn);
  if (error) { console.error(error); return null; }
  return data?.signedUrl || null;
}

function computePRs(sets) {
  const pr = {};
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const w = Number(s.weight_lbs), r = Number(s.reps);
    const epley = w * (1 + r / 30);
    const date = s.sessions?.session_date;
    const cur = pr[s.exercise_name] || { exercise_name: s.exercise_name, max_weight: 0, max_reps_at_max: 0, max_weight_date: null, est_1rm: 0, est_1rm_date: null, total_sets: 0, total_volume: 0, _slotCounts: {} };
    if (w > cur.max_weight || (w === cur.max_weight && r > cur.max_reps_at_max)) {
      cur.max_weight = w; cur.max_reps_at_max = r; cur.max_weight_date = date;
    }
    if (epley > cur.est_1rm) {
      cur.est_1rm = epley; cur.est_1rm_date = date;
    }
    cur.total_sets += 1;
    cur.total_volume += w * r;
    const slot = s.sessions?.slot_type || 'custom';
    cur._slotCounts[slot] = (cur._slotCounts[slot] || 0) + 1;
    pr[s.exercise_name] = cur;
  });
  Object.values(pr).forEach(p => {
    p.dominant_slot = Object.entries(p._slotCounts || {}).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'custom';
    delete p._slotCounts;
  });
  return Object.values(pr).sort((a,b) => b.max_weight - a.max_weight);
}

function startOfWeek(d) { const x = new Date(d); const day = x.getDay(); x.setDate(x.getDate() - day); x.setHours(0,0,0,0); return x; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }

function fmtNum(n) { return Math.round(n).toLocaleString(); }
function fmtWt(n) {
  if (n == null || n === '') return '';
  const v = Number(n);
  if (!isFinite(v)) return '';
  // strip trailing .0 so 185.0 → 185, but 185.5 stays 185.5
  return v.toFixed(1).replace(/\.0$/, '');
}
function fmtDateShort(s) {
  if (!s) return '';
  const d = (s instanceof Date) ? s : new Date(typeof s === 'string' && s.length === 10 ? s + 'T00:00:00' : s);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'2-digit' });
}

async function readExifDate(file) {
  // Reads JPEG/HEIC EXIF DateTimeOriginal from the first ~256 KB of the file.
  // Returns "YYYY-MM-DD" or null if not found / not JPEG.
  try {
    const slice = file.slice(0, Math.min(file.size, 262144));
    const buf = await slice.arrayBuffer();
    const dv = new DataView(buf);
    if (dv.byteLength < 4) return null;
    if (dv.getUint16(0, false) !== 0xFFD8) return null;  // not JPEG
    let off = 2;
    while (off + 4 < dv.byteLength) {
      const marker = dv.getUint16(off, false); off += 2;
      const segLen = dv.getUint16(off, false);
      if (marker === 0xFFE1 && segLen >= 14) {
        // Check "Exif␀␀" header
        const exifHeader = String.fromCharCode(dv.getUint8(off+2), dv.getUint8(off+3), dv.getUint8(off+4), dv.getUint8(off+5));
        if (exifHeader === 'Exif') {
          const tiffStart = off + 8;
          const little = dv.getUint16(tiffStart, false) === 0x4949;
          const ifd0Off = dv.getUint32(tiffStart + 4, little);
          const readIFD = (ifdOff) => {
            const entries = dv.getUint16(tiffStart + ifdOff, little);
            const out = {};
            for (let i = 0; i < entries; i++) {
              const eOff = tiffStart + ifdOff + 2 + i * 12;
              const tag = dv.getUint16(eOff, little);
              const type = dv.getUint16(eOff + 2, little);
              const count = dv.getUint32(eOff + 4, little);
              const valOff = dv.getUint32(eOff + 8, little);
              out[tag] = { type, count, valOff };
            }
            return out;
          };
          const ifd0 = readIFD(ifd0Off);
          // ExifIFDPointer = 0x8769
          const exifIFDOff = ifd0[0x8769]?.valOff;
          if (!exifIFDOff) return null;
          const exifIFD = readIFD(exifIFDOff);
          // DateTimeOriginal = 0x9003
          const dto = exifIFD[0x9003];
          if (!dto || dto.type !== 2) return null;
          const strOff = tiffStart + dto.valOff;
          let str = '';
          for (let i = 0; i < dto.count - 1; i++) {
            const c = dv.getUint8(strOff + i);
            if (c === 0) break;
            str += String.fromCharCode(c);
          }
          // EXIF format: "YYYY:MM:DD HH:MM:SS"
          const m = str.match(/^(\d{4}):(\d{2}):(\d{2})/);
          if (m) return `${m[1]}-${m[2]}-${m[3]}`;
          return null;
        }
      }
      off += segLen;
    }
  } catch (e) {
    console.warn('EXIF read failed', e);
  }
  return null;
}

function lineChart(points, opts = {}) {
  const W = 600, H = 220, padL = 40, padR = 12, padT = 16, padB = 56;
  if (!points || points.length === 0) return `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No data yet.</div>`;
  if (points.length === 1) {
    const p = points[0];
    return `<div style="color:var(--text-secondary);font-size:.875rem;padding:1rem 0;">Only one entry: ${esc(fmtDateShort(p.x))} · ${fmtWt(p.y)} ${esc(opts.unit || '')}</div>`;
  }
  const fmtMD = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  const fmtFull = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return dt.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); };
  const xs = points.map(p => +p.x), ys = points.map(p => +p.y);
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const ypad = Math.max((ymax - ymin) * 0.12, 1);
  const ya = ymin - ypad, yb = ymax + ypad;
  const sx = x => padL + ((x - xmin) / Math.max(xmax - xmin, 1)) * (W - padL - padR);
  const sy = y => H - padB - ((y - ya) / Math.max(yb - ya, 0.0001)) * (H - padT - padB);
  const path = points.map((p, i) => `${i?'L':'M'}${sx(+p.x).toFixed(1)},${sy(+p.y).toFixed(1)}`).join(' ');
  const unit = opts.unit || '';

  // Decide label spacing so MM/DD doesn't crash into neighbors.
  const minSpacing = 26;
  const interval = Math.max(1, Math.ceil((points.length * minSpacing) / (W - padL - padR)));

  const dots = points.map((p, i) => {
    const cx = sx(+p.x).toFixed(1), cy = sy(+p.y).toFixed(1);
    const title = `${fmtFull(p.x)} · ${fmtWt(p.y)} ${unit}`.trim();
    return `<g class="lc-pt" data-x="${cx}" data-y="${cy}" data-label="${esc(title)}">
      <title>${esc(title)}</title>
      <circle cx="${cx}" cy="${cy}" r="9" fill="transparent"/>
      <circle cx="${cx}" cy="${cy}" r="3" fill="#10b981"/>
    </g>`;
  }).join('');

  const dateLabels = points.map((p, i) => {
    if (i % interval !== 0 && i !== points.length - 1) return '';
    const cx = sx(+p.x).toFixed(1);
    return `<text x="${cx}" y="${H - padB + 14}" fill="#71717a" font-size="9" text-anchor="middle" font-family="ui-sans-serif">${esc(fmtMD(p.x))}</text>`;
  }).join('');

  const yTicks = 4, ticks = [];
  for (let i = 0; i <= yTicks; i++) {
    const v = ya + (i/yTicks) * (yb - ya);
    const yPx = sy(v);
    ticks.push(`<line x1="${padL}" y1="${yPx.toFixed(1)}" x2="${W-padR}" y2="${yPx.toFixed(1)}" stroke="#27272a" stroke-width="0.5"/><text x="${padL-6}" y="${yPx.toFixed(1)}" fill="#71717a" font-size="10" text-anchor="end" dominant-baseline="middle">${fmtWt(v)}</text>`);
  }

  const id = 'lc_' + Math.random().toString(36).slice(2, 8);
  const svg = `<svg id="${id}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;">
    ${ticks.join('')}
    <path d="${path}" fill="none" stroke="#10b981" stroke-width="2"/>
    ${dots}
    ${dateLabels}
  </svg>`;
  return `<div class="lc-wrap" data-chart-id="${id}" style="position:relative;">
    ${svg}
    <div class="lc-tooltip" style="position:absolute;pointer-events:none;background:#0a0a0a;color:#fafafa;border:1px solid #27272a;border-radius:.5rem;padding:.375rem .625rem;font-size:.75rem;font-weight:500;white-space:nowrap;display:none;transform:translate(-50%, -120%);box-shadow:0 4px 12px rgba(0,0,0,.6);z-index:5;"></div>
  </div>
  <script>(function(){
    const root = document.querySelector('[data-chart-id="${id}"]');
    if (!root || root.dataset.wired) return; root.dataset.wired = '1';
    const svg = root.querySelector('svg');
    const tip = root.querySelector('.lc-tooltip');
    const pts = root.querySelectorAll('.lc-pt');
    const show = (cx, cy, label) => {
      const rect = svg.getBoundingClientRect();
      const wRatio = rect.width / ${W};
      const hRatio = rect.height / ${H};
      tip.textContent = label;
      tip.style.left = (Number(cx) * wRatio) + 'px';
      tip.style.top  = (Number(cy) * hRatio) + 'px';
      tip.style.display = 'block';
    };
    const hide = () => { tip.style.display = 'none'; };
    pts.forEach(g => {
      g.addEventListener('mouseenter', () => show(g.dataset.x, g.dataset.y, g.dataset.label));
      g.addEventListener('mouseleave', hide);
      g.addEventListener('touchstart', () => show(g.dataset.x, g.dataset.y, g.dataset.label), { passive:true });
    });
    document.addEventListener('touchend', hide, { passive:true });
  })();<\/script>`;
}

function barChart(items, opts = {}) {
  const W = 600, H = 180, padL = 40, padR = 12, padT = 12, padB = 36;
  if (!items || items.length === 0) return `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No data yet.</div>`;
  const ymax = Math.max(...items.map(x => x.value), 1);
  const barW = (W - padL - padR) / items.length;
  const bars = items.map((x, i) => {
    const xPos = padL + i * barW + barW * 0.15;
    const w = barW * 0.7;
    const h = ((x.value / ymax) * (H - padT - padB)) || 0;
    const y = H - padB - h;
    const showLabel = items.length <= 8 || i === 0 || i === items.length - 1 || i === Math.floor(items.length/2);
    return `<rect x="${xPos.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="#10b981" opacity="${i === items.length-1 ? 1 : 0.7}"/>${showLabel?`<text x="${(xPos + w/2).toFixed(1)}" y="${H-12}" fill="#71717a" font-size="10" text-anchor="middle">${esc(x.label)}</text>`:''}`;
  }).join('');
  const yTicks = 3, ticks = [];
  for (let i = 1; i <= yTicks; i++) {
    const v = (i/yTicks) * ymax;
    const yPx = H - padB - ((v / ymax) * (H - padT - padB));
    ticks.push(`<line x1="${padL}" y1="${yPx.toFixed(1)}" x2="${W-padR}" y2="${yPx.toFixed(1)}" stroke="#27272a" stroke-width="0.5"/><text x="${padL-6}" y="${yPx.toFixed(1)}" fill="#71717a" font-size="10" text-anchor="end" dominant-baseline="middle">${fmtWt(v)}</text>`);
  }
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;">${ticks.join('')}${bars}</svg>`;
}

async function bluetoothReadWeight() {
  if (!navigator.bluetooth) {
    throw new Error('Web Bluetooth not available. Use Chrome on desktop or Android.');
  }
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: ['weight_scale'] }],
    optionalServices: ['weight_scale']
  });
  const server = await device.gatt.connect();
  const service = await server.getPrimaryService('weight_scale');
  const ch = await service.getCharacteristic('weight_measurement');
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => { try { ch.stopNotifications(); } catch {} reject(new Error('Timed out — step on the scale.')); }, 30000);
    ch.addEventListener('characteristicvaluechanged', (e) => {
      try {
        const v = e.target.value;
        const flags = v.getUint8(0);
        const isImperial = (flags & 0x01) === 1;
        const raw = v.getUint16(1, true);
        let lbs;
        if (isImperial) lbs = raw * 0.01;
        else lbs = (raw * 0.005) * 2.2046226218;
        clearTimeout(t);
        try { ch.stopNotifications(); server.disconnect(); } catch {}
        resolve({ weight_lbs: Math.round(lbs * 10) / 10, source: 'bluetooth' });
      } catch (err) { clearTimeout(t); reject(err); }
    });
    ch.startNotifications().catch(reject);
  });
}

async function progressVolumeView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div class="card">Loading…</div>`;
  const sets = await qAllSetLogs();
  if (sets.length === 0) { body.innerHTML = `<div class="card" style="color:var(--text-muted);">No logged sets yet.</div>`; return; }
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const w0 = startOfWeek(today0), m0 = startOfMonth(today0), y0 = startOfYear(today0);
  let total = 0, totalDay = 0, totalWeek = 0, totalMonth = 0, totalYear = 0;
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const v = Number(s.weight_lbs) * Number(s.reps);
    total += v;
    const d = s.sessions?.session_date ? new Date(s.sessions.session_date + 'T00:00:00') : null;
    if (!d) return;
    if (d.getTime() === today0.getTime()) totalDay += v;
    if (d >= w0) totalWeek += v;
    if (d >= m0) totalMonth += v;
    if (d >= y0) totalYear += v;
  });
  const weekly = new Map();
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const date = s.sessions?.session_date; if (!date) return;
    const w = startOfWeek(new Date(date + 'T00:00:00')).getTime();
    weekly.set(w, (weekly.get(w) || 0) + Number(s.weight_lbs) * Number(s.reps));
  });
  const sortedWeeks = [...weekly.entries()].sort((a,b)=>a[0]-b[0]).slice(-12);
  const chart = barChart(sortedWeeks.map(([t,v]) => ({ label: fmtDateShort(new Date(t)), value: v })));
  const cardStat = (label, value) => `<div class="card" style="padding:.875rem 1rem;"><div style="color:var(--text-muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;">${label}</div><div style="font-size:1.375rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:.125rem;">${fmtWt(value)} <span style="color:var(--text-muted);font-size:.75rem;font-weight:500;">lbs</span></div></div>`;
  body.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;margin-bottom:1rem;">
      ${cardStat('Today', totalDay)}
      ${cardStat('This week', totalWeek)}
      ${cardStat('This month', totalMonth)}
      ${cardStat('This year', totalYear)}
      ${cardStat('All-time', total)}
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:.5rem;">Weekly volume · last 12 weeks</div>
      ${chart}
    </div>`;
}

    const optsFor = (excludeDate, defaultId) => filtered.map(p => {

          }

      };
      document.querySelectorAll('.cmpSel').forEach(el => el.addEventListener('change', () => {
        if (el.dataset.side === 'left') refilterRight();
        paintSide(el.dataset.side);
      }));
      refilterRight();
    }
  }

  function wireGallery() {
    document.querySelectorAll('.ph-del').forEach(el => el.addEventListener('click', async () => {
      if (!confirm('Delete this photo?')) return;
      try {
        await qDeletePhoto({ id: el.dataset.id, storage_path: el.dataset.path });
        renderProgress();
      } catch (e) { console.error(e); toast('Delete failed', 'error'); }
    }));
  }

  paintAll();
}

// ---- Fetch user workout data from Supabase for context ----
async function getChatUserContext() {
  if (!sb || !state.session) return '';
  try {
    const [profileData, historyData, planData] = await Promise.all([
      sb.from('profiles').select('*').maybeSingle(),
      sb.from('sessions').select('*, set_logs(*)').neq('is_draft', true)
        .order('session_date', { ascending: false }).limit(30),
      qActivePlan(),
    ]);

    let ctx = '\n\nUSER DATA:\n';

    // Profile
    const p = profileData?.data;
    if (p) {
      ctx += `Profile: name="${p.display_name || 'Unknown'}", goal="${p.goal || 'not set'}", experience="${p.experience || 'not set'}"`;
      if (p.weight_lbs) ctx += `, weight=${p.weight_lbs}lbs`;
      if (p.height_in) ctx += `, height=${Math.floor(p.height_in/12)}'${p.height_in%12}"`;
      ctx += '\n';
    }

    // Active plan
    if (planData) {
      ctx += `Active plan: "${planData.name}" (${planData.split_type})\n`;
      if (planData.days) {
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        ctx += 'Weekly schedule: ' + planData.days.map((d,i) => `${dayNames[i]}=${d.slot_type}`).join(', ') + '\n';
      }
      if (planData.exercises?.length) {
        const bySlot = {};
        planData.exercises.forEach(e => {
          if (!bySlot[e.slot_type]) bySlot[e.slot_type] = [];
          bySlot[e.slot_type].push(`${e.exercise_name} ${e.target_sets}x${e.target_reps}`);
        });
        Object.entries(bySlot).forEach(([slot, exs]) => {
          ctx += `  ${slot}: ${exs.join(', ')}\n`;
        });
      }
    }

    // Recent workout history (last 30 sessions)
    const sessions = historyData?.data || [];
    if (sessions.length > 0) {
      ctx += `\nRecent workouts (last ${sessions.length} sessions):\n`;

      // Summarize by muscle group frequency
      const slotCounts = {};
      const exerciseVolume = {};
      const recentPRs = {};
      let totalSessions = sessions.length;
      const firstDate = sessions[sessions.length - 1]?.session_date;
      const lastDate = sessions[0]?.session_date;

      sessions.forEach(s => {
        slotCounts[s.slot_type] = (slotCounts[s.slot_type] || 0) + 1;
        (s.set_logs || []).forEach(log => {
          const key = log.exercise_name;
          if (!exerciseVolume[key]) exerciseVolume[key] = { totalSets: 0, maxWeight: 0, lastWeight: 0, lastDate: '' };
          exerciseVolume[key].totalSets++;
          if (log.weight_lbs > exerciseVolume[key].maxWeight) {
            exerciseVolume[key].maxWeight = log.weight_lbs;
          }
          if (!exerciseVolume[key].lastDate || s.session_date > exerciseVolume[key].lastDate) {
            exerciseVolume[key].lastWeight = log.weight_lbs || 0;
            exerciseVolume[key].lastDate = s.session_date;
          }
        });
      });

      ctx += `Period: ${firstDate} to ${lastDate} (${totalSessions} workouts)\n`;
      ctx += `Split distribution: ${Object.entries(slotCounts).map(([k,v]) => `${k}=${v}`).join(', ')}\n`;

      // Top exercises by volume
      const topExercises = Object.entries(exerciseVolume)
        .sort((a,b) => b[1].totalSets - a[1].totalSets)
        .slice(0, 15);
      if (topExercises.length) {
        ctx += 'Top exercises:\n';
        topExercises.forEach(([name, v]) => {
          ctx += `  ${name}: ${v.totalSets} sets, max ${v.maxWeight}lbs, last ${v.lastWeight}lbs (${v.lastDate})\n`;
        });
      }

      // Check for potential gaps
      const allSlots = ['push','pull','legs','upper','lower','full'];
      const activeSlots = Object.keys(slotCounts);
      if (planData?.days) {
        const plannedSlots = [...new Set(planData.days.map(d => d.slot_type).filter(s => s !== 'rest'))];
        const missedSlots = plannedSlots.filter(s => !activeSlots.includes(s));
        if (missedSlots.length) {
          ctx += `WARNING: User has not logged any ${missedSlots.join(', ')} sessions in this period!\n`;
        }
      }
    } else {
      ctx += '\nNo workout history found yet. User is likely new.\n';
    }

    return ctx;
  } catch (e) {
    console.error('Error fetching chat context:', e);
    return '\n\n(Could not load user workout data)\n';
  }
}

// ---- Format assistant messages with basic markdown ----
function formatChatMsg(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

// ---- Call Groq API ----
async function callGroq(messages, systemPrompt) {
  const key = getChatKeys().groq;
  if (!key) throw new Error('NO_GROQ_KEY');

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: systemPrompt }, ...messages],
      temperature: 0.7,
      max_tokens: 1024,
      stream: false,
    }),
  });

  if (res.status === 429) throw new Error('RATE_LIMITED');
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`GROQ_ERROR: ${res.status} ${errBody}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'Sorry, I didn\'t get a response. Try again.';
}

async function executeChatTool(name, args) {
  try {
    const today = new Date().toISOString().slice(0, 10);
    if (name === 'log_food') {
      let row = {
        log_date: args.log_date || today,
        meal_slot: args.meal_slot || 'snack',
        food_name: args.food_name,
        brand: args.brand || null,
        serving_size_g: args.serving_size_g ?? null,
        servings: args.servings ?? 1,
        calories: args.calories ?? null,
        protein_g: args.protein_g ?? null,
        carbs_g: args.carbs_g ?? null,
        fat_g: args.fat_g ?? null,
        fiber_g: args.fiber_g ?? null,
        source: 'chat',
      };
      // Fallback: if model omitted all macros, look up via OpenFoodFacts so we never save an empty row.
      const allMacrosMissing = (row.calories == null) && (row.protein_g == null) && (row.carbs_g == null) && (row.fat_g == null);
      let off_used = false;
      if (allMacrosMissing && row.food_name) {
        try {
          const results = await searchFoodOFF(row.food_name, 1);
          if (results && results.length) {
            const r = results[0];
            row.calories = row.calories ?? r.calories ?? null;
            row.protein_g = row.protein_g ?? r.protein_g ?? null;
            row.carbs_g = row.carbs_g ?? r.carbs_g ?? null;
            row.fat_g = row.fat_g ?? r.fat_g ?? null;
            row.fiber_g = row.fiber_g ?? r.fiber_g ?? null;
            row.serving_size_g = row.serving_size_g ?? r.serving_size_g ?? null;
            row.brand = row.brand ?? r.brand ?? null;
            row.source = 'chat+openfoodfacts';
            off_used = true;
          }
        } catch {}
      }
      const saved = await qSaveFoodLog(row);
      try { await qBumpFavorite(row); } catch {}
      const summary = `Logged: ${row.food_name}${row.brand?` (${row.brand})`:''} · ${row.calories??'?'} kcal · P${row.protein_g??'?'}/C${row.carbs_g??'?'}/F${row.fat_g??'?'}` + (off_used ? ' [filled from OpenFoodFacts because model omitted macros]' : '');
      return { ok: true, summary, id: saved.id, off_used };
    }

    if (name === 'log_workout_set') {
      const date = args.session_date || today;
      const slot = args.slot_type || 'custom';
      let sessionId;
      const { data: existing } = await sb.from('sessions').select('id').eq('session_date', date).eq('slot_type', slot).maybeSingle();
      if (existing?.id) sessionId = existing.id;
      else {
        const { data, error } = await sb.from('sessions').insert({ user_id: state.session.user.id, session_date: date, slot_type: slot }).select().single();
        if (error) throw error;
        sessionId = data.id;
      }
      let setNum = args.set_number;
      if (!setNum) {
        const { data: prev } = await sb.from('set_logs').select('set_number').eq('session_id', sessionId).eq('exercise_name', args.exercise_name).order('set_number', { ascending: false }).limit(1);
        setNum = (prev?.[0]?.set_number || 0) + 1;
      }
      const { error } = await sb.from('set_logs').insert({
        session_id: sessionId,
        exercise_name: args.exercise_name,
        set_number: setNum,
        reps: args.reps,
        weight_lbs: args.weight_lbs,
      });
      if (error) throw error;
      return { ok: true, summary: `Logged ${args.exercise_name} set ${setNum}: ${args.weight_lbs} lbs × ${args.reps}` };
    }

    if (name === 'log_body_weight') {
      let recorded_at = args.recorded_at || null;
      if (recorded_at && recorded_at.length === 10) recorded_at = new Date(recorded_at + 'T12:00:00').toISOString();
      await qSaveBodyWeight({
        weight_lbs: args.weight_lbs,
        source: 'chat',
        notes: args.notes || null,
        recorded_at,
      });
      return { ok: true, summary: `Logged body weight: ${args.weight_lbs} lbs` };
    }

    if (name === 'log_cardio') {
      const date = args.session_date || today;
      const { data, error } = await sb.from('sessions').insert({
        user_id: state.session.user.id,
        session_date: date,
        slot_type: 'cardio',
        cardio_type: args.cardio_type || 'Cardio',
        cardio_duration_min: args.duration_min,
        notes: args.notes || null,
      }).select().single();
      if (error) throw error;
      return { ok: true, summary: `Logged cardio: ${args.cardio_type || 'Cardio'} · ${args.duration_min} min`, id: data.id };
    }

    return { ok: false, error: `Unknown tool: ${name}` };
  } catch (e) {
    return { ok: false, error: String(e?.message || e) };
  }
}

async function callGroqWithTools(messages, systemPrompt, maxIterations = 4) {
  const key = getChatKeys().groq;
  if (!key) throw new Error('NO_GROQ_KEY');

  let convo = [{ role: 'system', content: systemPrompt }, ...messages];

  for (let iter = 0; iter < maxIterations; iter++) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: convo,
        tools: CHAT_TOOLS,
        tool_choice: 'auto',
        temperature: 0.5,
        max_tokens: 1024,
      })
    });
    if (res.status === 429) throw new Error('RATE_LIMITED');
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`GROQ_ERROR: ${res.status} ${errBody}`);
    }
    const data = await res.json();
    const msg = data.choices?.[0]?.message;
    if (!msg) return 'No response.';

    convo.push(msg);

    if (!msg.tool_calls || msg.tool_calls.length === 0) {
      return msg.content || '';
    }

    // Execute every tool call, feed results back
    for (const tc of msg.tool_calls) {
      let parsedArgs = {};
      try { parsedArgs = JSON.parse(tc.function.arguments || '{}'); } catch {}
      const toolResult = await executeChatTool(tc.function.name, parsedArgs);
      convo.push({
        role: 'tool',
        tool_call_id: tc.id,
        content: JSON.stringify(toolResult)
      });
    }
  }

  return 'I made several tool calls but couldn\'t finish summarizing — try again or ask more specifically.';
}


// ---- Call HuggingFace Inference API ----
async function callHuggingFace(messages, systemPrompt) {
  const key = getChatKeys().hf;
  if (!key) throw new Error('NO_HF_KEY');

  // Format messages for HF chat format
  const hfMessages = [{ role: 'system', content: systemPrompt }, ...messages];

  const res = await fetch('https://api-inference.huggingface.co/models/meta-llama/Llama-3.1-8B-Instruct/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'meta-llama/Llama-3.1-8B-Instruct',
      messages: hfMessages,
      temperature: 0.7,
      max_tokens: 1024,
      stream: false,
    }),
  });

  if (res.status === 429) throw new Error('RATE_LIMITED');
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`HF_ERROR: ${res.status} ${errBody}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'Sorry, I didn\'t get a response. Try again.';
}

// ---- Send message (Groq primary, HF fallback) ----
async function sendChatMessage(userMsg) {
  chatState.messages.push({ role: 'user', content: userMsg });
  chatState.isLoading = true;
  renderChatMessages();

  // Build system prompt with user data
  const userName = state.profile?.display_name || 'there';
  let systemPrompt = KB_CONTEXT.replace(/\{\{username\}\}/g, userName);
  const userContext = await getChatUserContext();
  systemPrompt += userContext;
  systemPrompt += `\n\nLOGGING TOOLS AVAILABLE — USE PROACTIVELY:
- log_food: when the user describes eating something, call this. ALWAYS provide estimates for calories, protein_g, carbs_g, fat_g, AND fiber_g. NEVER omit these. Use standard nutrition database values when the user doesn't give numbers — for example, 1 medium sweet potato is roughly 115 kcal / 2g protein / 27g carbs / 0g fat / 4g fiber. 100g cooked chicken breast is roughly 165 kcal / 31g protein / 0g carbs / 3.6g fat. 1 cup cooked white rice is roughly 205 kcal / 4g protein / 45g carbs / 0g fat. Pick meal_slot from time of day if unspecified (≤10am breakfast, 11-2 lunch, 5-9 dinner, else snack).
- log_workout_set: when the user says they did a set of an exercise with weight and reps, call this once per set.
- log_body_weight: when the user reports their body weight.
- log_cardio: when the user reports a cardio session.
Always confirm in plain English what you logged, including the macro estimates you used.`;

  // Only send last 20 messages for context window management
  const recentMessages = chatState.messages.slice(-20).map(m => ({
    role: m.role, content: m.content
  }));

  let response = '';
  let usedFallback = false;

  try {
    response = await callGroqWithTools(recentMessages, systemPrompt);
  } catch (groqErr) {
    console.warn('Groq failed:', groqErr.message);
    if (groqErr.message === 'NO_GROQ_KEY') {
      // Try HF directly if no Groq key
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        response = 'I need an API key to work. Go to your profile or tap the gear icon in the chat header to set up your Groq or HuggingFace API key.';
      }
    } else if (groqErr.message === 'RATE_LIMITED' || groqErr.message.includes('429')) {
      // Fall back to HuggingFace
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        if (hfErr.message === 'NO_HF_KEY') {
          response = 'Groq is rate-limited right now and no HuggingFace key is set as backup. Add a HuggingFace API key in settings, or wait a moment and try again.';
        } else {
          response = 'Both Groq and HuggingFace are unavailable right now. Please try again in a moment.';
        }
      }
    } else {
      // Other Groq error — try HF
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        response = 'Sorry, I ran into an issue connecting to the AI service. Check your API keys in settings and try again.';
      }
    }
  }

  chatState.messages.push({ role: 'assistant', content: response });
  chatState.isLoading = false;
  chatState.hasActiveConvo = true;
  renderChatMessages();
}

function wireChatEvents() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  if (!input || !sendBtn) return;

  // Send on button tap/click (works on mobile + desktop)
  sendBtn.addEventListener('click', handleChatSend);
  sendBtn.addEventListener('touchend', function(e) {
    e.preventDefault(); // prevent ghost click / double-fire
    handleChatSend();
  });

  // Auto-resize textarea
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 128) + 'px';
  });

  // Enter to send (desktop + mobile with hardware keyboard)
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleChatSend();
    }
  });

  // Suggested prompt chips (delegated from message container)
  const msgContainer = document.getElementById('chatMessages');
  if (msgContainer) {
    msgContainer.addEventListener('click', function(e) {
      const chip = e.target.closest('.chat-suggest-chip');
      if (chip && chip.dataset.prompt) {
        input.value = chip.dataset.prompt;
        handleChatSend();
      }
    });
  }

  // Focus input after short delay (let mobile keyboard settle)
  setTimeout(() => input.focus(), 150);
}

// ---- Handle send button ----
function handleChatSend() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg || chatState.isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  sendChatMessage(msg);
}

async function qFavorites(limit = 30) {

    .select('*').order('last_used_at', { ascending: false, nullsFirst: false }).limit(limit);
  if (error) { console.error(error); return []; }
  return data || [];
}
async function qBumpFavorite(food) {
  const uid = state.session.user.id;
  if (!food.food_name) return;
  const { data: existing } = await sb.from('food_favorites').select('id, use_count')
    .match({ user_id: uid, food_name: food.food_name, brand: food.brand || null }).maybeSingle();
  if (existing?.id) {
    await sb.from('food_favorites').update({ use_count: (existing.use_count || 0) + 1, last_used_at: new Date().toISOString() }).eq('id', existing.id);
  } else {
    await sb.from('food_favorites').insert({
      user_id: uid,
      food_name: food.food_name, brand: food.brand || null,
      serving_size_g: food.serving_size_g, calories: food.calories,
      protein_g: food.protein_g, carbs_g: food.carbs_g, fat_g: food.fat_g, fiber_g: food.fiber_g,
      barcode: food.barcode || null, use_count: 1, last_used_at: new Date().toISOString(),
    });
  }
}

async function qMealPlans() {
  const { data, error } = await sb.from('meal_plans').select('*, meal_plan_items(*)').order('created_at', { ascending: false });
  if (error) { console.error(error); return []; }
  return data || [];
}
async function qSaveMealPlan({ id, name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, items, is_active }) {
  const uid = state.session.user.id;
  let plan;
  if (id) {
    const { data, error } = await sb.from('meal_plans').update({ name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, is_active }).eq('id', id).select().single();
    if (error) throw error; plan = data;
    await sb.from('meal_plan_items').delete().eq('plan_id', id);
  } else {
    const { data, error } = await sb.from('meal_plans').insert({ user_id: uid, name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, is_active: is_active || false }).select().single();
    if (error) throw error; plan = data;
  }
  if (items?.length) {
    const rows = items.map((it, idx) => ({ plan_id: plan.id, order_idx: idx, ...it }));
    const { error } = await sb.from('meal_plan_items').insert(rows);
    if (error) throw error;
  }
  if (is_active) {
    await sb.from('meal_plans').update({ is_active: false }).neq('id', plan.id).eq('user_id', uid);
  }
  return plan;
}
async function qDeleteMealPlan(id) { const { error } = await sb.from('meal_plans').delete().eq('id', id); if (error) throw error; }

const round1 = (n) => n == null || isNaN(n) ? null : Math.round(Number(n) * 10) / 10;

async function lookupBarcode(barcode) {
  const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('OpenFoodFacts: HTTP ' + r.status);
  const data = await r.json();
  if (data.status !== 1 && !data.product) throw new Error('Product not found in OpenFoodFacts');
  const p = data.product || {};
  const nut = p.nutriments || {};
  const serving = Number(p.serving_quantity) || 100;
  const factor = serving / 100;
  return {
    food_name: p.product_name || p.generic_name || 'Unknown',
    brand: p.brands || null,
    serving_size_g: serving,
    calories: round1(nut['energy-kcal_100g'] * factor || (nut['energy-kcal'] || 0)),
    protein_g: round1((nut['proteins_100g'] || 0) * factor),
    carbs_g:   round1((nut['carbohydrates_100g'] || 0) * factor),
    fat_g:     round1((nut['fat_100g'] || 0) * factor),
    fiber_g:   round1((nut['fiber_100g'] || 0) * factor),
    barcode,
    source: 'openfoodfacts',
  };
}
async function searchFoodOFF(query, limit = 10) {
  const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=${limit}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('OpenFoodFacts search failed');
  const data = await r.json();
  return (data.products || []).map(p => {
    const nut = p.nutriments || {};
    const serving = Number(p.serving_quantity) || 100;
    const factor = serving / 100;
    return {
      food_name: p.product_name || p.generic_name || 'Unknown',
      brand: p.brands || null,
      serving_size_g: serving,
      calories: round1(nut['energy-kcal_100g'] * factor || (nut['energy-kcal'] || 0)),
      protein_g: round1((nut['proteins_100g'] || 0) * factor),
      carbs_g:   round1((nut['carbohydrates_100g'] || 0) * factor),
      fat_g:     round1((nut['fat_100g'] || 0) * factor),
      fiber_g:   round1((nut['fiber_100g'] || 0) * factor),
      barcode: p.code || null,
      source: 'openfoodfacts',
    };
  });
}

async function aiEstimateFoodFromPhoto(file, portionHint = '') {
  const key = localStorage.getItem('GROQ_API_KEY');
  if (!key) throw new Error('No Groq API key. Open chat settings (gear icon) and paste your key first.');
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
  const body = {
    model: 'meta-llama/llama-4-maverick-17b-128e-instruct',
    messages: [{
      role: 'user',
      content: [
        { type: 'text', text: (portionHint ? (portionHint + ' ') : '') + 'Identify each visible food item in this image and estimate macros for the VISIBLE portion. Use the plate, hand, or utensil as scale reference if any are visible. Reply with JSON only, no prose: {"food_name":"...","brand":null,"serving_size_g":<grams>,"calories":<kcal>,"protein_g":<g>,"carbs_g":<g>,"fat_g":<g>,"fiber_g":<g>,"confidence":"low|medium|high","caveat":"<one sentence: what portion you assumed and why; flag unusual ingredients>"}.' },
        { type: 'image_url', image_url: { url: dataUrl } }
      ]
    }],
    response_format: { type: 'json_object' },
    max_tokens: 400,
    temperature: 0.2
  };
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  const text = await r.text();
  if (!r.ok) throw new Error('Vision API error ' + r.status + ': ' + text.slice(0, 200));
  const j = JSON.parse(text);
  let parsed;
  try { parsed = JSON.parse(j.choices[0].message.content); } catch (e) { throw new Error('Vision response not JSON'); }
  return { ...parsed, source: 'ai_photo' };
}


// --- Live camera capture for AI photo scan ---
// Open camera, count down, auto-snap, then run `consume(file)` on the result.
// While consume is running the camera overlay shows "Analyzing…", and only closes when consume resolves/rejects.
async function captureFoodWithCamera(consume) {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.srcObject = stream; video.setAttribute('playsinline','true');
    video.style.cssText = 'width:100%;max-width:560px;aspect-ratio:4/3;object-fit:cover;border-radius:.75rem;background:#000;';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1rem;';
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:.875rem;color:#fafafa;font-weight:600;text-align:center;';
    heading.textContent = 'Frame the food';
    overlay.appendChild(heading);
    const frameWrap = document.createElement('div');
    frameWrap.style.cssText = 'position:relative;width:100%;max-width:560px;';
    frameWrap.appendChild(video);
    const counterEl = document.createElement('div');
    counterEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.65);pointer-events:none;';
    frameWrap.appendChild(counterEl);
    overlay.appendChild(frameWrap);
    const status = document.createElement('div');
    status.style.cssText = 'font-size:.8125rem;color:#a3a3a3;text-align:center;min-height:1.25rem;';
    status.textContent = 'Hold still — auto-capturing in 3…';
    overlay.appendChild(status);
    const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:.5rem;width:100%;max-width:560px;';
    const cancel = document.createElement('button'); cancel.className = 'btn btn-ghost'; cancel.textContent = 'Cancel'; cancel.style.flex = '1';
    const snap = document.createElement('button'); snap.className = 'btn btn-primary'; snap.textContent = 'Capture now'; snap.style.flex = '2';
    row.appendChild(cancel); row.appendChild(snap); overlay.appendChild(row);
    document.body.appendChild(overlay);
    video.play();

    let stopped = false;
    let countdownTimer;
    const stop = () => { stopped = true; clearInterval(countdownTimer); try { stream.getTracks().forEach(t => t.stop()); } catch {} overlay.remove(); };
    cancel.onclick = () => { stop(); reject(new Error('Cancelled')); };

    const captureFrame = async () => {
      if (stopped) return;
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 960;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.85));
      if (!blob) { stop(); reject(new Error('Capture failed')); return; }
      const file = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
      // Switch overlay to "analyzing" mode
      counterEl.textContent = '';
      heading.textContent = 'Analyzing photo';
      status.style.color = '#34d399';
      status.textContent = 'Sending to AI…';
      snap.disabled = true; snap.textContent = 'Working…';
      try {
        const result = await consume(file, (msg) => { status.textContent = msg; });
        stop();
        resolve(result);
      } catch (e) {
        stop();
        reject(e);
      }
    };
    snap.onclick = captureFrame;

    // 3-2-1 countdown then auto-snap
    let n = 3;
    counterEl.textContent = n;
    countdownTimer = setInterval(() => {
      if (stopped) return;
      n--;
      if (n <= 0) {
        clearInterval(countdownTimer);
        counterEl.textContent = '';
        captureFrame();
      } else {
        counterEl.textContent = n;
        status.textContent = `Hold still — auto-capturing in ${n}…`;
      }
    }, 1000);
  });
}

// Backwards-compat alias for the old name (some places still call it).
async function captureFromCamera() {
  return captureFoodWithCamera(async (file) => file);
}

// --- ZXing barcode scanner (fallback for browsers without BarcodeDetector, esp. iOS Safari) ---
let _zxingLoading = null;
async function loadZXing() {
  if (window.ZXingBrowser) return window.ZXingBrowser;
  if (window.ZXing) return window.ZXing;
  if (_zxingLoading) return _zxingLoading;
  _zxingLoading = new Promise((res, rej) => {
    const sc = document.createElement('script');
    sc.src = 'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js';
    sc.onload = () => res(window.ZXingBrowser || window.ZXing);
    sc.onerror = () => rej(new Error('Failed to load ZXing barcode library.'));
    document.head.appendChild(sc);
  });
  return _zxingLoading;
}

async function scanBarcodeWithZXing() {
  const Z = await loadZXing();
  if (!Z) throw new Error('ZXing failed to load.');
  const reader = new Z.BrowserMultiFormatReader();
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.srcObject = stream; video.setAttribute('playsinline','true');
    video.style.cssText = 'width:100%;max-width:560px;aspect-ratio:4/3;object-fit:cover;border-radius:.75rem;background:#000;';
    const overlay = document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1rem;';
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:.875rem;color:#fafafa;font-weight:600;';
    heading.textContent = 'Point camera at barcode';
    overlay.appendChild(heading);
    const frameWrap = document.createElement('div');
    frameWrap.style.cssText='position:relative;width:100%;max-width:560px;';
    frameWrap.appendChild(video);
    const reticle = document.createElement('div');
    reticle.style.cssText='position:absolute;left:10%;right:10%;top:35%;bottom:35%;border:2px solid rgba(16,185,129,.85);border-radius:.5rem;box-shadow:0 0 0 9999px rgba(0,0,0,.35);pointer-events:none;';
    frameWrap.appendChild(reticle);
    overlay.appendChild(frameWrap);
    const status = document.createElement('div');
    status.style.cssText = 'font-size:.8125rem;color:#a3a3a3;text-align:center;min-height:1.25rem;';
    status.textContent = 'Scanning…';
    overlay.appendChild(status);
    const cancel = document.createElement('button'); cancel.className='btn btn-ghost'; cancel.textContent='Cancel'; cancel.style.minWidth='160px';
    overlay.appendChild(cancel);
    document.body.appendChild(overlay);
    video.play();
    let done = false;
    let promptTimer;
    const armPrompt = () => {
      clearTimeout(promptTimer);
      promptTimer = setTimeout(() => {
        if (done) return;
        status.style.color = '#fbbf24';
        status.textContent = 'No barcode detected — try repositioning or better lighting.';
        armPrompt();
      }, 15000);
    };
    armPrompt();
    const stop = () => { done = true; clearTimeout(promptTimer); try { reader.reset(); } catch {} try { stream.getTracks().forEach(t=>t.stop()); } catch {} overlay.remove(); };
    cancel.onclick = () => { stop(); reject(new Error('Cancelled')); };
    reader.decodeFromVideoElementContinuously(video, (result, err, controls) => {
      if (done) { try { controls.stop(); } catch {} return; }
      if (result) {
        status.style.color = '#34d399';
        status.textContent = '✓ Found ' + result.getText();
        stop();
        resolve(result.getText());
      }
    });
  });
}

// Unified scanner: BarcodeDetector if available, else ZXing.
async function scanBarcodeFromVideoUnified() {
  if ('BarcodeDetector' in window) return scanBarcodeFromVideo();
  return scanBarcodeWithZXing();
}

async function scanBarcodeFromVideo() {
  if (!('BarcodeDetector' in window)) throw new Error('BarcodeDetector not supported. Use Chrome on desktop or Android, or type the barcode manually.');
  const formats = ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'];
  const detector = new BarcodeDetector({ formats });
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.srcObject = stream; video.setAttribute('playsinline', 'true');
    video.style.cssText = 'width:100%;max-width:560px;aspect-ratio:4/3;object-fit:cover;border-radius:.75rem;background:#000;';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1rem;';
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:.875rem;color:#fafafa;font-weight:600;';
    heading.textContent = 'Point camera at barcode';
    overlay.appendChild(heading);
    // Reticle frame around the video
    const frameWrap = document.createElement('div');
    frameWrap.style.cssText = 'position:relative;width:100%;max-width:560px;';
    frameWrap.appendChild(video);
    const reticle = document.createElement('div');
    reticle.style.cssText = 'position:absolute;left:10%;right:10%;top:35%;bottom:35%;border:2px solid rgba(16,185,129,.85);border-radius:.5rem;box-shadow:0 0 0 9999px rgba(0,0,0,.35);pointer-events:none;';
    frameWrap.appendChild(reticle);
    overlay.appendChild(frameWrap);
    const status = document.createElement('div');
    status.style.cssText = 'font-size:.8125rem;color:#a3a3a3;text-align:center;min-height:1.25rem;';
    status.textContent = 'Scanning…';
    overlay.appendChild(status);
    const cancel = document.createElement('button'); cancel.className = 'btn btn-ghost'; cancel.textContent = 'Cancel'; cancel.style.minWidth = '160px';
    overlay.appendChild(cancel);
    document.body.appendChild(overlay);
    video.play();

    let stopped = false;
    let startedAt = Date.now();
    const stop = () => { stopped = true; try { stream.getTracks().forEach(t => t.stop()); } catch {} overlay.remove(); };
    cancel.onclick = () => { stop(); reject(new Error('Cancelled')); };

    // 15s reposition prompt that resets each time it triggers
    const RESET_INTERVAL_MS = 15000;
    let promptTimer;
    const armPrompt = () => {
      clearTimeout(promptTimer);
      promptTimer = setTimeout(() => {
        if (stopped) return;
        status.style.color = '#fbbf24';
        status.textContent = 'No barcode detected — try repositioning or better lighting.';
        startedAt = Date.now();
        armPrompt();
      }, RESET_INTERVAL_MS);
    };
    armPrompt();

    const tick = async () => {
      if (stopped) return;
      try {
        const found = await detector.detect(video);
        if (found && found.length) {
          status.style.color = '#34d399';
          status.textContent = '✓ Found ' + found[0].rawValue;
          clearTimeout(promptTimer);
          stop();
          resolve(found[0].rawValue);
          return;
        }
      } catch {}
      requestAnimationFrame(tick);
    };
    setTimeout(tick, 400);
  });
}

function computeTargets({ sex, weight_lbs, height_ft, height_in, age, activity, goal }) {
  const kg = (Number(weight_lbs) || 0) * 0.45359237;
  const cm = ((Number(height_ft) || 0) * 12 + (Number(height_in) || 0)) * 2.54;
  let bmr = 10 * kg + 6.25 * cm - 5 * (Number(age) || 30);
  bmr += sex === 'female' ? -161 : 5;
  const act = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 }[activity || 'moderate'] || 1.55;
  const tdee = bmr * act;
  let kcal = tdee;
  if (goal === 'lose_weight') kcal = tdee - 500;
  else if (goal === 'build_muscle' || goal === 'gain_strength') kcal = tdee + 250;
  let pp = 0.30, cp = 0.40, fp = 0.30;
  if (goal === 'lose_weight') { pp = 0.35; cp = 0.35; fp = 0.30; }
  if (goal === 'maintain' || goal === 'general_fitness') { pp = 0.25; cp = 0.50; fp = 0.25; }
  return {
    kcal: Math.round(kcal),
    protein_g: Math.round((kcal * pp) / 4),
    carbs_g:   Math.round((kcal * cp) / 4),
    fat_g:     Math.round((kcal * fp) / 9),
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
  };
}

    ${logs.length === 0 ? `<div class="card" style="color:var(--text-muted);text-align:center;">No food logged today yet.</div>` : `

      ${slotGroup('lunch','Lunch')}
      ${slotGroup('dinner','Dinner')}
      ${slotGroup('snack','Snacks')}
    `}
  `;
  document.querySelectorAll('.fl-del').forEach(el => el.addEventListener('click', async () => {
    if (!confirm('Remove this entry?')) return;
    try { await qDeleteFoodLog(el.dataset.id); renderNutrition(); }

  }));

        <button id="ph_camera" class="btn btn-primary" style="width:100%;margin-bottom:.5rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:.375rem;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Open camera scanner
        </button>
        <details style="margin-bottom:.5rem;">
          <summary style="cursor:pointer;color:var(--text-muted);font-size:.8125rem;padding:.25rem 0;">Or upload a file</summary>
          <input id="ph_file" type="file" accept="image/*" class="input" style="padding:.5rem;margin-top:.5rem;" />
          <button id="ph_go" class="btn btn-ghost" style="width:100%;margin-top:.5rem;">Identify uploaded photo</button>

        <label class="label" style="margin-top:.25rem;">Portion hint (optional)</label>
        <select id="ph_hint" class="input">
          <option value="">No hint — let AI guess</option>
          <option value="small">Small portion (snack-size, ~100g)</option>
          <option value="medium">Medium portion (regular meal)</option>
          <option value="large">Large portion (heavy meal)</option>
          <option value="custom">I'll type a specific weight</option>
        </select>
        <input id="ph_custom_g" class="input" type="number" placeholder="Specific weight in grams" style="margin-top:.5rem;display:none;" />
        <p style="font-size:.7rem;color:var(--text-muted);margin-top:.5rem;line-height:1.4;">Uses Groq vision (llama-4-maverick). Always review the numbers before saving — portion estimates are best-effort.</p>
        <div id="ph_status" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>
      </div>`;
    }

      <div class="card">
        <div class="section-label" style="margin-bottom:.5rem;">Recent / favorites</div>
        ${favorites.map(f => `
          <div class="exercise-row" style="padding:.5rem 0;">
            <div style="min-width:0;">
              <div class="exercise-name" style="font-size:.9375rem;">${esc(f.food_name)}</div>
              <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;">${f.brand?esc(f.brand)+' · ':''}${f.serving_size_g?fmtWt(f.serving_size_g)+'g · ':''}${fmtWt(f.calories)} kcal · P${fmtWt(f.protein_g)}/C${fmtWt(f.carbs_g)}/F${fmtWt(f.fat_g)}</div>
            </div>
            <button data-id="${f.id}" class="fav-use btn btn-ghost" style="padding:.4rem .75rem;font-size:.8125rem;">+ Add</button>
          </div>`).join('')}
      </div>`;

    body.innerHTML = `
      <div style="display:flex;gap:.375rem;margin-bottom:1rem;">${modeBtns()}</div>
      ${modeUI}
      ${formCard}
      ${favBlock}
    `;
    wireForm();
  };

  function bindDraft() {
    const set = (id, key, num) => { const el = document.getElementById(id); if (el) el.addEventListener('input', e => draft[key] = num ? (e.target.value === '' ? '' : Number(e.target.value)) : e.target.value); };
    set('nf_name', 'food_name'); set('nf_brand', 'brand');
    set('nf_serv', 'serving_size_g', true); set('nf_servings', 'servings', true);
    set('nf_kcal', 'calories', true); set('nf_p', 'protein_g', true); set('nf_c', 'carbs_g', true); set('nf_f', 'fat_g', true);
    const slot = document.getElementById('nf_slot'); if (slot) slot.addEventListener('change', e => draft.meal_slot = e.target.value);
  }

  function wireForm() {
    document.querySelectorAll('.add-mode').forEach(el => el.addEventListener('click', () => {
      mode = el.dataset.mode; renderForm();
    }));
    bindDraft();

    if (mode === 'barcode') {
      const status = document.getElementById('bc_status');
      const lookup = async () => {
        const code = document.getElementById('bc_input').value.trim();
        if (!code) { status.textContent = 'Enter a barcode.'; return; }
        status.textContent = 'Looking up…';
        try { const food = await lookupBarcode(code); Object.assign(draft, food); status.textContent = '✓ Found: ' + (food.food_name || 'Unknown'); renderForm(); }
        catch (e) { status.textContent = '✗ ' + (e.message || 'Lookup failed'); }
      };
      const lookupBtn = document.getElementById('bc_lookup');
      const inputEl = document.getElementById('bc_input');
      if (lookupBtn) lookupBtn.addEventListener('click', lookup);
      if (inputEl) inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
      const scanBtn = document.getElementById('bc_scan');
      if (scanBtn) scanBtn.addEventListener('click', async () => {
        try {
          status.textContent = 'Opening camera…';
          const code = await scanBarcodeFromVideoUnified();
          if (inputEl) inputEl.value = code;
          status.textContent = '✓ Scanned: ' + code + '. Looking up…';
          const food = await lookupBarcode(code);
          Object.assign(draft, food); status.textContent = '✓ Found: ' + food.food_name; renderForm();
        } catch (e) { status.textContent = '✗ ' + e.message; }
      });
    }

    if (mode === 'search') {
      const go = async () => {
        const q = document.getElementById('sr_q').value.trim();
        const out = document.getElementById('sr_results');
        if (!q) { out.innerHTML = ''; return; }
        out.innerHTML = `<div style="color:var(--text-muted);font-size:.875rem;padding:.5rem 0;">Searching…</div>`;
        try {
          searchResults = await searchFoodOFF(q, 8);
          if (searchResults.length === 0) { out.innerHTML = `<div style="color:var(--text-muted);font-size:.875rem;padding:.5rem 0;">No results.</div>`; return; }
          out.innerHTML = searchResults.map((f, i) => `
            <div class="exercise-row" style="padding:.5rem 0;">
              <div style="min-width:0;">
                <div class="exercise-name" style="font-size:.875rem;">${esc(f.food_name)}</div>
                <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;">${f.brand?esc(f.brand)+' · ':''}${f.serving_size_g?fmtWt(f.serving_size_g)+'g · ':''}${fmtWt(f.calories)} kcal</div>
              </div>
              <button data-i="${i}" class="sr-use btn btn-ghost" style="padding:.35rem .65rem;font-size:.8125rem;">Use</button>
            </div>`).join('');
          out.querySelectorAll('.sr-use').forEach(el => el.addEventListener('click', () => {
            Object.assign(draft, searchResults[Number(el.dataset.i)]); renderForm();
          }));
        } catch (e) { out.innerHTML = `<div style="color:var(--danger);font-size:.875rem;">${esc(e.message)}</div>`; }
      };
      document.getElementById('sr_go').addEventListener('click', go);
      document.getElementById('sr_q').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    }

    if (mode === 'photo') {
      const status = document.getElementById('ph_status');
      const hintSel = document.getElementById('ph_hint');
      const customG = document.getElementById('ph_custom_g');
      hintSel?.addEventListener('change', () => {
        customG.style.display = (hintSel.value === 'custom') ? 'block' : 'none';
      });
      const portionHint = () => {
        const v = hintSel?.value || '';
        if (v === 'custom') {
          const g = Number(customG.value);
          return g ? `The portion shown weighs approximately ${g} grams.` : '';
        }
        if (v === 'small') return 'Assume a small/snack-size portion (~100g).';
        if (v === 'medium') return 'Assume a typical meal portion.';
        if (v === 'large') return 'Assume a large/heavy meal portion.';
        return '';
      };
      const runOnFile = async (file) => {
        if (!file) { status.textContent = 'No file.'; return; }
        if (file.size > 4 * 1024 * 1024) { status.textContent = 'Photo too large (4MB max for AI).'; return; }
        status.textContent = 'Analyzing… (10-20s)';
        try {
          const guess = await aiEstimateFoodFromPhoto(file, portionHint());
          Object.assign(draft, guess);
          status.textContent = '✓ Estimated: ' + guess.food_name + ' (edit before saving)';
          renderForm();
        } catch (e) { status.textContent = '✗ ' + (e.message || 'AI failed'); console.error(e); }
      };
      document.getElementById('ph_camera').addEventListener('click', async () => {
        try {
          status.textContent = 'Opening camera…';
          const guess = await captureFoodWithCamera(async (file, setMsg) => {
            if (file.size > 4 * 1024 * 1024) throw new Error('Photo too large (4MB max for AI).');
            setMsg('Identifying food and macros…');
            const g = await aiEstimateFoodFromPhoto(file, portionHint());
            setMsg('✓ ' + (g.food_name || 'Identified'));
            return g;
          });
          Object.assign(draft, guess);
          status.textContent = '✓ Estimated: ' + (guess.food_name || 'Unknown') + ' (review numbers before saving)';
          renderForm();
        } catch (e) { status.textContent = '✗ ' + (e.message || 'Capture failed'); }
      });
      const goBtn = document.getElementById('ph_go');
      if (goBtn) goBtn.addEventListener('click', async () => {
        const file = document.getElementById('ph_file').files?.[0];
        if (!file) { status.textContent = 'Pick a photo first.'; return; }
        await runOnFile(file);
      });
    }

    const saveBtn = document.getElementById('nf_save');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      if (!draft.food_name) { toast('Food name required.', 'error'); return; }
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        const row = {
          log_date: new Date().toISOString().slice(0, 10),
          meal_slot: draft.meal_slot || 'snack',
          food_name: draft.food_name,
          brand: draft.brand || null,
          serving_size_g: numOrNull(draft.serving_size_g),
          servings: numOrNull(draft.servings) || 1,
          calories: numOrNull(draft.calories),
          protein_g: numOrNull(draft.protein_g),
          carbs_g: numOrNull(draft.carbs_g),
          fat_g: numOrNull(draft.fat_g),
          fiber_g: numOrNull(draft.fiber_g),
          source: draft.source || 'manual',
          barcode: draft.barcode || null,
        };
        await qSaveFoodLog(row);
        await qBumpFavorite(row);
        toast('Saved.');
        location.hash = '#/nutrition';
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        saveBtn.disabled = false; saveBtn.textContent = 'Save to today';
      }
    });

    document.querySelectorAll('.fav-use').forEach(el => el.addEventListener('click', async () => {
      const fav = favorites.find(f => f.id === el.dataset.id); if (!fav) return;
      try {
        await qSaveFoodLog({
          log_date: new Date().toISOString().slice(0, 10),
          meal_slot: 'snack',
          food_name: fav.food_name, brand: fav.brand,
          serving_size_g: fav.serving_size_g, servings: 1,
          calories: fav.calories, protein_g: fav.protein_g, carbs_g: fav.carbs_g, fat_g: fav.fat_g, fiber_g: fav.fiber_g,
          source: 'favorite', barcode: fav.barcode,
        });
        await sb.from('food_favorites').update({ use_count: (fav.use_count||0)+1, last_used_at: new Date().toISOString() }).eq('id', fav.id);
        toast('Added.'); location.hash = '#/nutrition';
      } catch (e) { console.error(e); toast('Save failed', 'error'); }
    }));
  }
  renderForm();
}

      draft.height_in = Number(document.getElementById('t_in').value);
      draft.weight_lbs = Number(document.getElementById('t_wt').value);
      draft.activity = document.getElementById('t_act').value;
      draft.goal = document.getElementById('t_goal').value;
      const out = computeTargets(draft);
      draft.kcal_target = out.kcal;
      draft.protein_target_g = out.protein_g;
      draft.carbs_target_g = out.carbs_g;
      draft.fat_target_g = out.fat_g;
      paint();
      document.getElementById('t_msg').textContent = `BMR ${out.bmr} kcal · TDEE ${out.tdee} kcal · Goal-adjusted ${out.kcal} kcal/day. Edit numbers if you want, then Save.`;
    });
    document.getElementById('t_save').addEventListener('click', async () => {
      const btn = document.getElementById('t_save'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await sb.from('profiles').update({
          activity_level: document.getElementById('t_act').value,
          kcal_target: Number(document.getElementById('t_kcal').value) || null,
          protein_target_g: Number(document.getElementById('t_p').value) || null,
          carbs_target_g: Number(document.getElementById('t_c').value) || null,
          fat_target_g: Number(document.getElementById('t_f').value) || null,
          updated_at: new Date().toISOString(),
        }).eq('id', state.session.user.id);
        state.profile = await qProfile();
        toast('Targets saved.');
        location.hash = '#/nutrition';
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        btn.disabled = false; btn.textContent = 'Save targets';
      }
    });
  };
  paint();
}

async function nutMealsView() {
  const body = document.getElementById('nut-body'); if (!body) return;
  const plans = await qMealPlans();
  body.innerHTML = `
    <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
      <button id="mp_new" class="btn btn-primary" style="flex:1;">+ New meal plan</button>
    </div>
    ${plans.length === 0
      ? `<div class="card" style="color:var(--text-muted);text-align:center;">No meal plans yet. Create one based on your targets.</div>`
      : plans.map(pl => `
        <div class="card" style="margin-bottom:.75rem;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem;">
            <div>
              <div style="font-weight:600;">${esc(pl.name)}${pl.is_active?` <span class="chip slot-cardio" style="margin-left:.25rem;">Active</span>`:''}</div>
              <div style="color:var(--text-muted);font-size:.75rem;margin-top:2px;">${pl.kcal_target?fmtWt(pl.kcal_target)+' kcal · ':''}${pl.protein_target_g?'P'+pl.protein_target_g+' ':''}${pl.carbs_target_g?'C'+pl.carbs_target_g+' ':''}${pl.fat_target_g?'F'+pl.fat_target_g:''}</div>
            </div>
            <div style="display:flex;gap:.25rem;">
              <button data-id="${pl.id}" class="mp-edit btn btn-ghost" style="padding:.4rem .75rem;font-size:.8125rem;">Edit</button>
              <button data-id="${pl.id}" class="mp-del" style="background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.125rem;padding:.25rem .5rem;">×</button>
            </div>
          </div>
          ${pl.description ? `<div style="color:var(--text-secondary);font-size:.8125rem;margin-bottom:.5rem;">${esc(pl.description)}</div>` : ''}
          ${(() => {
            const items = pl.meal_plan_items || [];

            return days.map(d => {
              const di = items.filter(i => (i.day_index||1) === d).sort((a,b)=>(a.order_idx||0)-(b.order_idx||0));
              const t = di.reduce((a,i)=>({k:a.k+Number(i.calories||0),p:a.p+Number(i.protein_g||0)}),{k:0,p:0});
              return `<div style="margin-top:.625rem;">
                <div style="font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;margin-bottom:.25rem;">
                  <span>Day ${d}</span>
                  <span style="font-variant-numeric:tabular-nums;color:var(--text-secondary);">${fmtWt(t.k)} kcal · P${fmtWt(t.p)}</span>
                </div>
                ${di.map(it => `
                  <div class="exercise-row" style="padding:.4rem 0;">
                    <div style="min-width:0;">
                      <div class="exercise-name" style="font-size:.875rem;">${esc(it.meal_slot)} · ${esc(it.food_name)}</div>
                      <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;">${it.serving_size_g?fmtWt(it.serving_size_g)+'g · ':''}${it.calories?fmtWt(it.calories)+' kcal':''}${it.protein_g?` · P${fmtWt(it.protein_g)}`:''}${it.carbs_g?` C${fmtWt(it.carbs_g)}`:''}${it.fat_g?` F${fmtWt(it.fat_g)}`:''}</div>

  document.getElementById('mp_new').addEventListener('click', () => mpEditor(null));
