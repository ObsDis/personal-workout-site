function computePRs(sets) {
  const pr = {};
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const w = Number(s.weight_lbs), r = Number(s.reps);
    const epley = w * (1 + r / 30);
    const date = s.sessions?.session_date;
    const cur = pr[s.exercise_name] || { exercise_name: s.exercise_name, max_weight: 0, max_reps_at_max: 0, max_weight_date: null, est_1rm: 0, est_1rm_date: null, total_sets: 0, total_volume: 0, _slotCounts: {} };
    if (w > cur.max_weight || (w === cur.max_weight && r > cur.max_reps_at_max)) {
      cur.max_weight = w; cur.max_reps_at_max = r; cur.max_weight_date = date;
    }
    if (epley > cur.est_1rm) {
      cur.est_1rm = epley; cur.est_1rm_date = date;
    }
    cur.total_sets += 1;
    cur.total_volume += w * r;
    const slot = s.sessions?.slot_type || 'custom';
    cur._slotCounts[slot] = (cur._slotCounts[slot] || 0) + 1;
    pr[s.exercise_name] = cur;
  });
  Object.values(pr).forEach(p => {
    p.dominant_slot = Object.entries(p._slotCounts || {}).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'custom';
    delete p._slotCounts;
  });
  return Object.values(pr).sort((a,b) => b.max_weight - a.max_weight);
}

function startOfWeek(d) { const x = new Date(d); const day = x.getDay(); x.setDate(x.getDate() - day); x.setHours(0,0,0,0); return x; }
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }

function fmtNum(n) { return Math.round(n).toLocaleString(); }
function fmtWt(n) {
  if (n == null || n === '') return '';
  const v = Number(n);
  if (!isFinite(v)) return '';
  // strip trailing .0 so 185.0 → 185, but 185.5 stays 185.5
  return v.toFixed(1).replace(/\.0$/, '');
}
function fmtDateShort(s) {
  if (!s) return '';
  const d = (s instanceof Date) ? s : new Date(typeof s === 'string' && s.length === 10 ? s + 'T00:00:00' : s);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'2-digit' });
}

async function readExifDate(file) {
  // Reads JPEG/HEIC EXIF DateTimeOriginal from the first ~256 KB of the file.
  // Returns "YYYY-MM-DD" or null if not found / not JPEG.
  try {
    const slice = file.slice(0, Math.min(file.size, 262144));
    const buf = await slice.arrayBuffer();
    const dv = new DataView(buf);
    if (dv.byteLength < 4) return null;
    if (dv.getUint16(0, false) !== 0xFFD8) return null;  // not JPEG
    let off = 2;
    while (off + 4 < dv.byteLength) {
      const marker = dv.getUint16(off, false); off += 2;
      const segLen = dv.getUint16(off, false);
      if (marker === 0xFFE1 && segLen >= 14) {
        // Check "Exif␀␀" header
        const exifHeader = String.fromCharCode(dv.getUint8(off+2), dv.getUint8(off+3), dv.getUint8(off+4), dv.getUint8(off+5));
        if (exifHeader === 'Exif') {
          const tiffStart = off + 8;
          const little = dv.getUint16(tiffStart, false) === 0x4949;
          const ifd0Off = dv.getUint32(tiffStart + 4, little);
          const readIFD = (ifdOff) => {
            const entries = dv.getUint16(tiffStart + ifdOff, little);
            const out = {};
            for (let i = 0; i < entries; i++) {
              const eOff = tiffStart + ifdOff + 2 + i * 12;
              const tag = dv.getUint16(eOff, little);
              const type = dv.getUint16(eOff + 2, little);
              const count = dv.getUint32(eOff + 4, little);
              const valOff = dv.getUint32(eOff + 8, little);
              out[tag] = { type, count, valOff };
            }
            return out;
          };
          const ifd0 = readIFD(ifd0Off);
          // ExifIFDPointer = 0x8769
          const exifIFDOff = ifd0[0x8769]?.valOff;
          if (!exifIFDOff) return null;
          const exifIFD = readIFD(exifIFDOff);
          // DateTimeOriginal = 0x9003
          const dto = exifIFD[0x9003];
          if (!dto || dto.type !== 2) return null;
          const strOff = tiffStart + dto.valOff;
          let str = '';
          for (let i = 0; i < dto.count - 1; i++) {
            const c = dv.getUint8(strOff + i);
            if (c === 0) break;
            str += String.fromCharCode(c);
          }
          // EXIF format: "YYYY:MM:DD HH:MM:SS"
          const m = str.match(/^(\d{4}):(\d{2}):(\d{2})/);
          if (m) return `${m[1]}-${m[2]}-${m[3]}`;
          return null;
        }
      }
      off += segLen;
    }
  } catch (e) {
    console.warn('EXIF read failed', e);
  }
  return null;
}

function lineChart(points, opts = {}) {
  const W = 600, H = 220, padL = 40, padR = 12, padT = 16, padB = 56;
  if (!points || points.length === 0) return `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No data yet.</div>`;
  if (points.length === 1) {
    const p = points[0];
    return `<div style="color:var(--text-secondary);font-size:.875rem;padding:1rem 0;">Only one entry: ${esc(fmtDateShort(p.x))} · ${fmtWt(p.y)} ${esc(opts.unit || '')}</div>`;
  }
  const fmtMD = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  const fmtFull = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return dt.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); };
  const xs = points.map(p => +p.x), ys = points.map(p => +p.y);
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const ypad = Math.max((ymax - ymin) * 0.12, 1);
  const ya = ymin - ypad, yb = ymax + ypad;
  const sx = x => padL + ((x - xmin) / Math.max(xmax - xmin, 1)) * (W - padL - padR);
  const sy = y => H - padB - ((y - ya) / Math.max(yb - ya, 0.0001)) * (H - padT - padB);
  const path = points.map((p, i) => `${i?'L':'M'}${sx(+p.x).toFixed(1)},${sy(+p.y).toFixed(1)}`).join(' ');
  const unit = opts.unit || '';

  // Decide label spacing so MM/DD doesn't crash into neighbors.
  const minSpacing = 26;
  const interval = Math.max(1, Math.ceil((points.length * minSpacing) / (W - padL - padR)));

  const dots = points.map((p, i) => {
    const cx = sx(+p.x).toFixed(1), cy = sy(+p.y).toFixed(1);
    const title = `${fmtFull(p.x)} · ${fmtWt(p.y)} ${unit}`.trim();
    return `<g class="lc-pt" data-x="${cx}" data-y="${cy}" data-label="${esc(title)}">
      <title>${esc(title)}</title>
      <circle cx="${cx}" cy="${cy}" r="9" fill="transparent"/>
      <circle cx="${cx}" cy="${cy}" r="3" fill="#10b981"/>
    </g>`;
  }).join('');

  const dateLabels = points.map((p, i) => {
    if (i % interval !== 0 && i !== points.length - 1) return '';
    const cx = sx(+p.x).toFixed(1);
    return `<text x="${cx}" y="${H - padB + 14}" fill="#71717a" font-size="9" text-anchor="middle" font-family="ui-sans-serif">${esc(fmtMD(p.x))}</text>`;
  }).join('');

  const yTicks = 4, ticks = [];
  for (let i = 0; i <= yTicks; i++) {
    const v = ya + (i/yTicks) * (yb - ya);
    const yPx = sy(v);
    ticks.push(`<line x1="${padL}" y1="${yPx.toFixed(1)}" x2="${W-padR}" y2="${yPx.toFixed(1)}" stroke="#27272a" stroke-width="0.5"/><text x="${padL-6}" y="${yPx.toFixed(1)}" fill="#71717a" font-size="10" text-anchor="end" dominant-baseline="middle">${fmtWt(v)}</text>`);
  }

  const id = 'lc_' + Math.random().toString(36).slice(2, 8);
  const svg = `<svg id="${id}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;">
    ${ticks.join('')}
    <path d="${path}" fill="none" stroke="#10b981" stroke-width="2"/>
    ${dots}
    ${dateLabels}
  </svg>`;
  return `<div class="lc-wrap" data-chart-id="${id}" style="position:relative;">
    ${svg}
    <div class="lc-tooltip" style="position:absolute;pointer-events:none;background:#0a0a0a;color:#fafafa;border:1px solid #27272a;border-radius:.5rem;padding:.375rem .625rem;font-size:.75rem;font-weight:500;white-space:nowrap;display:none;transform:translate(-50%, -120%);box-shadow:0 4px 12px rgba(0,0,0,.6);z-index:5;"></div>
  </div>
  <script>(function(){
    const root = document.querySelector('[data-chart-id="${id}"]');
    if (!root || root.dataset.wired) return; root.dataset.wired = '1';
    const svg = root.querySelector('svg');
    const tip = root.querySelector('.lc-tooltip');
    const pts = root.querySelectorAll('.lc-pt');
    const show = (cx, cy, label) => {
      const rect = svg.getBoundingClientRect();
      const wRatio = rect.width / ${W};
      const hRatio = rect.height / ${H};
      tip.textContent = label;
      tip.style.left = (Number(cx) * wRatio) + 'px';
      tip.style.top  = (Number(cy) * hRatio) + 'px';
      tip.style.display = 'block';
    };
    const hide = () => { tip.style.display = 'none'; };
    pts.forEach(g => {
      g.addEventListener('mouseenter', () => show(g.dataset.x, g.dataset.y, g.dataset.label));
      g.addEventListener('mouseleave', hide);
      g.addEventListener('touchstart', () => show(g.dataset.x, g.dataset.y, g.dataset.label), { passive:true });
    });
    document.addEventListener('touchend', hide, { passive:true });
  })();<\/script>`;
}

function barChart(items, opts = {}) {
  const W = 600, H = 180, padL = 40, padR = 12, padT = 12, padB = 36;
  if (!items || items.length === 0) return `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No data yet.</div>`;
  const ymax = Math.max(...items.map(x => x.value), 1);
  const barW = (W - padL - padR) / items.length;
  const bars = items.map((x, i) => {
    const xPos = padL + i * barW + barW * 0.15;
    const w = barW * 0.7;
    const h = ((x.value / ymax) * (H - padT - padB)) || 0;
    const y = H - padB - h;
    const showLabel = items.length <= 8 || i === 0 || i === items.length - 1 || i === Math.floor(items.length/2);
    return `<rect x="${xPos.toFixed(1)}" y="${y.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}" rx="3" fill="#10b981" opacity="${i === items.length-1 ? 1 : 0.7}"/>${showLabel?`<text x="${(xPos + w/2).toFixed(1)}" y="${H-12}" fill="#71717a" font-size="10" text-anchor="middle">${esc(x.label)}</text>`:''}`;
  }).join('');
  const yTicks = 3, ticks = [];
  for (let i = 1; i <= yTicks; i++) {
    const v = (i/yTicks) * ymax;
    const yPx = H - padB - ((v / ymax) * (H - padT - padB));
    ticks.push(`<line x1="${padL}" y1="${yPx.toFixed(1)}" x2="${W-padR}" y2="${yPx.toFixed(1)}" stroke="#27272a" stroke-width="0.5"/><text x="${padL-6}" y="${yPx.toFixed(1)}" fill="#71717a" font-size="10" text-anchor="end" dominant-baseline="middle">${fmtWt(v)}</text>`);
  }
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:auto;display:block;">${ticks.join('')}${bars}</svg>`;
}

async function bluetoothReadWeight() {
  if (!navigator.bluetooth) {
    throw new Error('Web Bluetooth not available. Use Chrome on desktop or Android.');
  }
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: ['weight_scale'] }],
    optionalServices: ['weight_scale']
  });
  const server = await device.gatt.connect();
  const service = await server.getPrimaryService('weight_scale');
  const ch = await service.getCharacteristic('weight_measurement');
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => { try { ch.stopNotifications(); } catch {} reject(new Error('Timed out — step on the scale.')); }, 30000);
    ch.addEventListener('characteristicvaluechanged', (e) => {
      try {
        const v = e.target.value;
        const flags = v.getUint8(0);
        const isImperial = (flags & 0x01) === 1;
        const raw = v.getUint16(1, true);
        let lbs;
        if (isImperial) lbs = raw * 0.01;
        else lbs = (raw * 0.005) * 2.2046226218;
        clearTimeout(t);
        try { ch.stopNotifications(); server.disconnect(); } catch {}
        resolve({ weight_lbs: Math.round(lbs * 10) / 10, source: 'bluetooth' });
      } catch (err) { clearTimeout(t); reject(err); }
    });
    ch.startNotifications().catch(reject);
  });
}

async function progressVolumeView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div class="card">Loading…</div>`;
  const sets = await qAllSetLogs();
  if (sets.length === 0) { body.innerHTML = `<div class="card" style="color:var(--text-muted);">No logged sets yet.</div>`; return; }
  const now = new Date();
  const today0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const w0 = startOfWeek(today0), m0 = startOfMonth(today0), y0 = startOfYear(today0);
  let total = 0, totalDay = 0, totalWeek = 0, totalMonth = 0, totalYear = 0;
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const v = Number(s.weight_lbs) * Number(s.reps);
    total += v;
    const d = s.sessions?.session_date ? new Date(s.sessions.session_date + 'T00:00:00') : null;
    if (!d) return;
    if (d.getTime() === today0.getTime()) totalDay += v;
    if (d >= w0) totalWeek += v;
    if (d >= m0) totalMonth += v;
    if (d >= y0) totalYear += v;
  });
  const weekly = new Map();
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const date = s.sessions?.session_date; if (!date) return;
    const w = startOfWeek(new Date(date + 'T00:00:00')).getTime();
    weekly.set(w, (weekly.get(w) || 0) + Number(s.weight_lbs) * Number(s.reps));
  });
  const sortedWeeks = [...weekly.entries()].sort((a,b)=>a[0]-b[0]).slice(-12);
  const chart = barChart(sortedWeeks.map(([t,v]) => ({ label: fmtDateShort(new Date(t)), value: v })));
  const cardStat = (label, value) => `<div class="card" style="padding:.875rem 1rem;"><div style="color:var(--text-muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600;">${label}</div><div style="font-size:1.375rem;font-weight:700;font-variant-numeric:tabular-nums;margin-top:.125rem;">${fmtWt(value)} <span style="color:var(--text-muted);font-size:.75rem;font-weight:500;">lbs</span></div></div>`;
  body.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:.5rem;margin-bottom:1rem;">
      ${cardStat('Today', totalDay)}
      ${cardStat('This week', totalWeek)}
      ${cardStat('This month', totalMonth)}
      ${cardStat('This year', totalYear)}
      ${cardStat('All-time', total)}
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:.5rem;">Weekly volume · last 12 weeks</div>
      ${chart}
    </div>`;
}

async function progressPhotosView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div class="card">Loading…</div>`;
  const photos = await qPhotos();
  const urls = await Promise.all(photos.map(p => qPhotoSignedUrl(p.storage_path)));
  photos.forEach((p, i) => p._url = urls[i]);

  // Normalize legacy angle values just in case
  photos.forEach(p => { if (p.angle === 'side_left' || p.angle === 'side_right') p.angle = 'side'; });

  const ANGLE_LABEL = { front: 'Head-on', side: 'Side profile' };
  const ANGLES = ['front', 'side'];

  const todayISO = new Date().toISOString().slice(0, 10);
  let selectedAngle = 'front';
  let selectedDate = todayISO;
  let dateLockedByExif = false;

  // Default compare angle: pick the angle that already has >=2 photos; fall back to 'front'
  const angleCount = (a) => photos.filter(p => (p.angle||'front') === a).length;
  let cmpAngle = (angleCount('front') >= 2) ? 'front' : (angleCount('side') >= 2 ? 'side' : 'front');

  const dateOf = (p) => (typeof p.taken_at === 'string' ? p.taken_at.slice(0,10) : new Date(p.taken_at).toISOString().slice(0,10));

  const existingForUpload = () => {
    const d = new Date(selectedDate + 'T12:00:00');
    const ym = d.getFullYear() * 100 + d.getMonth();
    return photos.find(p => {
      const pd = new Date(p.taken_at);
      return (pd.getFullYear() * 100 + pd.getMonth()) === ym && (p.angle || 'front') === selectedAngle;
    });
  };

  const angleBtn = (a, label) => `<button data-angle="${a}" class="ph-angle ${selectedAngle===a?'active':''}" type="button" style="flex:1;padding:.625rem;background:${selectedAngle===a?'var(--accent)':'var(--bg-elevated)'};color:${selectedAngle===a?'#000':'var(--text)'};border:1px solid ${selectedAngle===a?'var(--accent)':'var(--border)'};border-radius:.5rem;font-weight:600;font-size:.875rem;cursor:pointer;">${label}</button>`;

  const renderUploadCard = () => {
    const existing = existingForUpload();
    return `
    <div class="card" style="margin-bottom:1rem;">
      <div class="section-label" style="margin-bottom:.5rem;">Add a progress photo</div>
      <div style="font-size:.8125rem;color:var(--text-secondary);line-height:1.5;margin-bottom:.75rem;">
        Up to 2 per month: one head-on and one side profile. Date is auto-detected from the photo's EXIF data when available.
      </div>

      <label class="label">Angle</label>
      <div style="display:flex;gap:.5rem;margin-bottom:.625rem;">
        ${angleBtn('front', 'Head-on')}
        ${angleBtn('side', 'Side profile')}
      </div>

      <label class="label">Photo</label>
      <input id="phFile" type="file" accept="image/*" class="input" style="padding:.5rem;margin-bottom:.625rem;" />

      <label class="label">Date taken ${dateLockedByExif ? '<span style="color:var(--accent);font-weight:500;">· auto-detected from photo</span>' : ''}</label>
      <input id="phDate" type="date" class="input" value="${selectedDate}" max="${todayISO}" style="margin-bottom:.625rem;" />

      <div class="form-grid cols-2-on-desktop" style="gap:.5rem;">
        <div>
          <label class="label">Weight (lbs)</label>
          <input id="phWt" type="number" inputmode="decimal" step="0.1" min="50" max="800" class="input" placeholder="optional" />
        </div>
        <div>
          <label class="label">Notes</label>
          <input id="phNotes" class="input" placeholder="optional" />
        </div>
      </div>

      ${existing ? `<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.625rem;padding:.5rem .625rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:.5rem;">You already have a <strong>${ANGLE_LABEL[selectedAngle]}</strong> photo for ${new Date(selectedDate+'T12:00:00').toLocaleString(undefined,{month:'long',year:'numeric'})}. Uploading will replace it.</div>` : ''}

      <button id="phUp" class="btn btn-primary" style="margin-top:.75rem;width:100%;">Upload</button>
      <div id="phMsg" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>
    </div>`;
  };

  const renderCompareFilter = () => `
    <select id="cmpAngleFilter" class="input" style="font-size:.75rem;padding:.375rem .5rem;width:auto;">
      <option value="front" ${cmpAngle==='front'?'selected':''}>Head-on</option>
      <option value="side"  ${cmpAngle==='side'?'selected':''}>Side profile</option>
    </select>`;

  const renderCompare = () => {
    const filtered = photos.filter(p => (p.angle||'front') === cmpAngle);
    if (filtered.length < 2) {
      return `<div class="card" style="margin-bottom:1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;flex-wrap:wrap;gap:.5rem;">
          <div class="section-label" style="margin:0;">Compare</div>
          ${renderCompareFilter()}
        </div>
        <div style="font-size:.875rem;color:var(--text-muted);">Need at least 2 ${ANGLE_LABEL[cmpAngle]} photos to compare.</div>
      </div>`;
    }
    const firstId = filtered[0].id;
    const latestId = filtered[filtered.length - 1].id;
    const optsFor = (excludeDate, defaultId) => filtered.map(p => {
      const d = dateOf(p);
      const disabled = (excludeDate && d === excludeDate) ? 'disabled' : '';
      const sel = (p.id === defaultId && !disabled) ? 'selected' : '';
      return `<option value="${p.id}" ${disabled} ${sel}>${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}</option>`;
    }).join('');

    return `<div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;flex-wrap:wrap;gap:.5rem;">
        <div class="section-label" style="margin:0;">Compare</div>
        ${renderCompareFilter()}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
        <div>
          <select class="cmpSel input" data-side="left" style="font-size:.875rem;">${optsFor(null, firstId)}</select>
          <div id="cmp-left" style="margin-top:.5rem;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);overflow:hidden;"></div>
        </div>
        <div>
          <select class="cmpSel input" data-side="right" style="font-size:.875rem;">${optsFor(dateOf(filtered[0]), latestId)}</select>
          <div id="cmp-right" style="margin-top:.5rem;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);overflow:hidden;"></div>
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--text-muted);margin-top:.5rem;">Photos with the same date can't be paired.</div>
    </div>`;
  };

  const renderGallery = () => {
    if (photos.length === 0) return `<div class="card" style="color:var(--text-muted);">No photos yet.</div>`;
    return `<div class="card">
      <div class="section-label" style="margin-bottom:.625rem;">All photos</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.5rem;">
        ${photos.slice().reverse().map(p => `
          <div style="position:relative;">
            ${p._url ? `<img src="${esc(p._url)}" alt="" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:var(--radius-sm);background:var(--bg);" />` : `<div style="width:100%;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.75rem;">no preview</div>`}
            <div style="position:absolute;left:6px;top:6px;background:rgba(0,0,0,.7);color:#fafafa;font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:600;">${ANGLE_LABEL[p.angle||'front']}</div>
            <div style="position:absolute;left:6px;bottom:6px;right:6px;background:rgba(0,0,0,.65);color:#fafafa;font-size:.625rem;padding:2px 6px;border-radius:4px;">${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}</div>
            <button data-id="${esc(p.id)}" data-path="${esc(p.storage_path)}" class="ph-del" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fafafa;border:0;border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:1rem;line-height:1;">&times;</button>
          </div>`).join('')}
      </div>
    </div>`;
  };

  const paintAll = () => {
    body.innerHTML = `${renderUploadCard()}${renderCompare()}${renderGallery()}`;
    wireUpload();
    wireCompare();
    wireGallery();
  };

  const paintSide = (side) => {
    const id = document.querySelector(`.cmpSel[data-side="${side}"]`)?.value;
    const p = photos.find(x => x.id === id);
    const slot = document.getElementById(`cmp-${side}`);
    if (!slot) return;
    if (p && p._url) slot.innerHTML = `<img src="${esc(p._url)}" style="width:100%;height:100%;object-fit:cover;display:block;" />`;
    else slot.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.75rem;">no preview</div>`;
  };

  function wireUpload() {
    document.querySelectorAll('.ph-angle').forEach(el => el.addEventListener('click', () => {
      selectedAngle = el.dataset.angle;
      paintAll();
    }));

    const fileEl = document.getElementById('phFile');
    if (fileEl) fileEl.addEventListener('change', async () => {
      const f = fileEl.files?.[0];
      if (!f) return;
      const exifDate = await readExifDate(f);
      if (exifDate) {
        selectedDate = exifDate;
        dateLockedByExif = true;
      } else {
        dateLockedByExif = false;
      }
      paintAll();
    });

    const dateEl = document.getElementById('phDate');
    if (dateEl) dateEl.addEventListener('change', e => {
      selectedDate = e.target.value || todayISO;
      dateLockedByExif = false;
      paintAll();
    });

    const upBtn = document.getElementById('phUp');
    if (upBtn) upBtn.addEventListener('click', async () => {
      const file = document.getElementById('phFile').files?.[0];
      if (!file) { toast('Pick a photo.', 'error'); return; }
      if (file.size > 10 * 1024 * 1024) { toast('Photo too large (10MB max).', 'error'); return; }
      const wt = Number(document.getElementById('phWt').value) || null;
      const notes = document.getElementById('phNotes').value || null;
      upBtn.disabled = true; upBtn.textContent = 'Uploading…';
      try {
        const existing = existingForUpload();
        if (existing) await qDeletePhoto(existing);
        const taken_at = new Date(selectedDate + 'T12:00:00').toISOString();
        await qUploadPhoto(file, { weight_lbs: wt, notes, taken_at, angle: selectedAngle });
        toast('Photo saved.');
        renderProgress();
      } catch (e) {
        console.error(e); toast(e.message || 'Upload failed', 'error');
        upBtn.disabled = false; upBtn.textContent = 'Upload';
      }
    });
  }

  function wireCompare() {
    const filter = document.getElementById('cmpAngleFilter');
    if (filter) filter.addEventListener('change', e => { cmpAngle = e.target.value; paintAll(); });
    if (document.getElementById('cmp-left')) {
      paintSide('left'); paintSide('right');
      const refilterRight = () => {
        const leftSel = document.querySelector('.cmpSel[data-side="left"]');
        const rightSel = document.querySelector('.cmpSel[data-side="right"]');
        if (!leftSel || !rightSel) return;
        const leftP = photos.find(x => x.id === leftSel.value);
        if (!leftP) return;
        const leftDate = dateOf(leftP);
        const filtered = photos.filter(p => (p.angle||'front') === cmpAngle);
        const currentRight = rightSel.value;
        rightSel.innerHTML = filtered.map(p => {
          const d = dateOf(p);
          const disabled = d === leftDate ? 'disabled' : '';
          const selected = p.id === currentRight && !disabled ? 'selected' : '';
          return `<option value="${p.id}" ${disabled} ${selected}>${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}</option>`;
        }).join('');
        // if currently selected right is now disabled, pick the latest non-disabled
        if (rightSel.value === '' || rightSel.options[rightSel.selectedIndex]?.disabled) {
          for (let i = rightSel.options.length - 1; i >= 0; i--) {
            if (!rightSel.options[i].disabled) { rightSel.selectedIndex = i; break; }
          }
        }
        paintSide('right');
      };
      document.querySelectorAll('.cmpSel').forEach(el => el.addEventListener('change', () => {
        if (el.dataset.side === 'left') refilterRight();
        paintSide(el.dataset.side);
      }));
      refilterRight();
    }
  }

  function wireGallery() {
    document.querySelectorAll('.ph-del').forEach(el => el.addEventListener('click', async () => {
      if (!confirm('Delete this photo?')) return;
      try {
        await qDeletePhoto({ id: el.dataset.id, storage_path: el.dataset.path });
        renderProgress();
      } catch (e) { console.error(e); toast('Delete failed', 'error'); }
    }));
  }

  paintAll();
}

// ---- Knowledge Base (embedded, derived from master) ----

5. Frequency: 2x/week per body part minimum. Better than 1x even at same total volume.

EXERCISE RECOMMENDATIONS:

// ---- Fetch user workout data from Supabase for context ----
async function getChatUserContext() {
  if (!sb || !state.session) return '';
  try {
    const [profileData, historyData, planData] = await Promise.all([
      sb.from('profiles').select('*').maybeSingle(),
      sb.from('sessions').select('*, set_logs(*)').neq('is_draft', true)
        .order('session_date', { ascending: false }).limit(30),
      qActivePlan(),
    ]);

    let ctx = '\n\nUSER DATA:\n';

    // Profile
    const p = profileData?.data;
    if (p) {
      ctx += `Profile: name="${p.display_name || 'Unknown'}", goal="${p.goal || 'not set'}", experience="${p.experience || 'not set'}"`;
      if (p.weight_lbs) ctx += `, weight=${p.weight_lbs}lbs`;
      if (p.height_in) ctx += `, height=${Math.floor(p.height_in/12)}'${p.height_in%12}"`;
      ctx += '\n';
    }

    // Active plan
    if (planData) {
      ctx += `Active plan: "${planData.name}" (${planData.split_type})\n`;
      if (planData.days) {
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        ctx += 'Weekly schedule: ' + planData.days.map((d,i) => `${dayNames[i]}=${d.slot_type}`).join(', ') + '\n';
      }
      if (planData.exercises?.length) {
        const bySlot = {};
        planData.exercises.forEach(e => {
          if (!bySlot[e.slot_type]) bySlot[e.slot_type] = [];
          bySlot[e.slot_type].push(`${e.exercise_name} ${e.target_sets}x${e.target_reps}`);
        });
        Object.entries(bySlot).forEach(([slot, exs]) => {
          ctx += `  ${slot}: ${exs.join(', ')}\n`;
        });
      }
    }

    // Recent workout history (last 30 sessions)
    const sessions = historyData?.data || [];
    if (sessions.length > 0) {
      ctx += `\nRecent workouts (last ${sessions.length} sessions):\n`;

      // Summarize by muscle group frequency
      const slotCounts = {};
      const exerciseVolume = {};
      const recentPRs = {};
      let totalSessions = sessions.length;
      const firstDate = sessions[sessions.length - 1]?.session_date;
      const lastDate = sessions[0]?.session_date;

      sessions.forEach(s => {
        slotCounts[s.slot_type] = (slotCounts[s.slot_type] || 0) + 1;
        (s.set_logs || []).forEach(log => {
          const key = log.exercise_name;
          if (!exerciseVolume[key]) exerciseVolume[key] = { totalSets: 0, maxWeight: 0, lastWeight: 0, lastDate: '' };
          exerciseVolume[key].totalSets++;
          if (log.weight_lbs > exerciseVolume[key].maxWeight) {
            exerciseVolume[key].maxWeight = log.weight_lbs;
          }
          if (!exerciseVolume[key].lastDate || s.session_date > exerciseVolume[key].lastDate) {
            exerciseVolume[key].lastWeight = log.weight_lbs || 0;
            exerciseVolume[key].lastDate = s.session_date;
          }
        });
      });

      ctx += `Period: ${firstDate} to ${lastDate} (${totalSessions} workouts)\n`;
      ctx += `Split distribution: ${Object.entries(slotCounts).map(([k,v]) => `${k}=${v}`).join(', ')}\n`;

      // Top exercises by volume
      const topExercises = Object.entries(exerciseVolume)
        .sort((a,b) => b[1].totalSets - a[1].totalSets)
        .slice(0, 15);
      if (topExercises.length) {
        ctx += 'Top exercises:\n';
        topExercises.forEach(([name, v]) => {
          ctx += `  ${name}: ${v.totalSets} sets, max ${v.maxWeight}lbs, last ${v.lastWeight}lbs (${v.lastDate})\n`;
        });
      }

      // Check for potential gaps
      const allSlots = ['push','pull','legs','upper','lower','full'];
      const activeSlots = Object.keys(slotCounts);
      if (planData?.days) {
        const plannedSlots = [...new Set(planData.days.map(d => d.slot_type).filter(s => s !== 'rest'))];
        const missedSlots = plannedSlots.filter(s => !activeSlots.includes(s));
        if (missedSlots.length) {
          ctx += `WARNING: User has not logged any ${missedSlots.join(', ')} sessions in this period!\n`;
        }
      }
    } else {
      ctx += '\nNo workout history found yet. User is likely new.\n';
    }

    return ctx;
  } catch (e) {
    console.error('Error fetching chat context:', e);
    return '\n\n(Could not load user workout data)\n';
  }
}

// ---- Format assistant messages with basic markdown ----
function formatChatMsg(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

// ---- Call Groq API ----
async function callGroq(messages, systemPrompt) {
  const key = getChatKeys().groq;
  if (!key) throw new Error('NO_GROQ_KEY');

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [{ role: 'system', content: systemPrompt }, ...messages],
      temperature: 0.7,
      max_tokens: 1024,
      stream: false,
    }),
  });

  if (res.status === 429) throw new Error('RATE_LIMITED');
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`GROQ_ERROR: ${res.status} ${errBody}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'Sorry, I didn\'t get a response. Try again.';
}

// ---- Call HuggingFace Inference API ----
async function callHuggingFace(messages, systemPrompt) {
  const key = getChatKeys().hf;
  if (!key) throw new Error('NO_HF_KEY');

  // Format messages for HF chat format
  const hfMessages = [{ role: 'system', content: systemPrompt }, ...messages];

  const res = await fetch('https://api-inference.huggingface.co/models/meta-llama/Llama-3.1-8B-Instruct/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model: 'meta-llama/Llama-3.1-8B-Instruct',
      messages: hfMessages,
      temperature: 0.7,
      max_tokens: 1024,
      stream: false,
    }),
  });

  if (res.status === 429) throw new Error('RATE_LIMITED');
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error(`HF_ERROR: ${res.status} ${errBody}`);
  }

  const data = await res.json();
  return data.choices?.[0]?.message?.content || 'Sorry, I didn\'t get a response. Try again.';
}

// ---- Send message (Groq primary, HF fallback) ----
async function sendChatMessage(userMsg) {
  chatState.messages.push({ role: 'user', content: userMsg });
  chatState.isLoading = true;
  renderChatMessages();

  // Build system prompt with user data
  const userName = state.profile?.display_name || 'there';
  let systemPrompt = KB_CONTEXT.replace(/\{\{username\}\}/g, userName);
  const userContext = await getChatUserContext();
  systemPrompt += userContext;

  // Only send last 20 messages for context window management
  const recentMessages = chatState.messages.slice(-20).map(m => ({
    role: m.role, content: m.content
  }));

  let response = '';
  let usedFallback = false;

  try {
    response = await callGroq(recentMessages, systemPrompt);
  } catch (groqErr) {
    console.warn('Groq failed:', groqErr.message);
    if (groqErr.message === 'NO_GROQ_KEY') {
      // Try HF directly if no Groq key
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        response = 'I need an API key to work. Go to your profile or tap the gear icon in the chat header to set up your Groq or HuggingFace API key.';
      }
    } else if (groqErr.message === 'RATE_LIMITED' || groqErr.message.includes('429')) {
      // Fall back to HuggingFace
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        if (hfErr.message === 'NO_HF_KEY') {
          response = 'Groq is rate-limited right now and no HuggingFace key is set as backup. Add a HuggingFace API key in settings, or wait a moment and try again.';
        } else {
          response = 'Both Groq and HuggingFace are unavailable right now. Please try again in a moment.';
        }
      }
    } else {
      // Other Groq error — try HF
      try {
        response = await callHuggingFace(recentMessages, systemPrompt);
        usedFallback = true;
      } catch (hfErr) {
        response = 'Sorry, I ran into an issue connecting to the AI service. Check your API keys in settings and try again.';
      }
    }
  }

  chatState.messages.push({ role: 'assistant', content: response });
  chatState.isLoading = false;
  chatState.hasActiveConvo = true;
  renderChatMessages();
}

// ---- Render chat messages into the container ----
function renderChatMessages() {
  const container = document.getElementById('chatMessages');
  if (!container) return;

  let html = '';
  if (chatState.messages.length === 0) {
    const name = state.profile?.display_name || 'there';
    html = `<div style="text-align:center;padding:3rem 1rem;color:var(--text-muted);">
      <div style="width:4rem;height:4rem;margin:0 auto 1rem;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <p style="font-size:1.125rem;font-weight:600;color:var(--text);margin-bottom:.5rem;">Hey ${esc(name)}!</p>
      <p style="font-size:.875rem;line-height:1.5;">I'm your personal workout assistant. Ask me anything about training, nutrition, your progress, or your workout plan.</p>
      <div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:1.25rem;">
        ${['How\'s my training volume?','What should I eat today?','Am I progressing on bench?','Suggest a workout change'].map(q =>
          `<button type="button" class="chat-suggest-chip" data-prompt="${q}" style="padding:.5rem .875rem;border-radius:999px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:.8125rem;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;">${q}</button>`
        ).join('')}
      </div>
    </div>`;
  } else {
    chatState.messages.forEach(m => {
      if (m.role === 'user') {
        html += `<div class="chat-msg user">${esc(m.content)}</div>`;
      } else {
        html += `<div class="chat-msg assistant">${formatChatMsg(m.content)}</div>`;
      }
    });
  }

  if (chatState.isLoading) {
    html += `<div class="chat-msg assistant"><div class="chat-typing"><span></span><span></span><span></span></div></div>`;
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// ---- Render settings modal ----
function showChatSettings() {
  const keys = getChatKeys();
  const overlay = document.createElement('div');
  overlay.id = 'chatSettingsOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:70;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:1rem;';
  overlay.innerHTML = `
    <div class="card" style="width:100%;max-width:28rem;padding:1.5rem;">
      <h3 style="font-size:1.125rem;font-weight:600;margin-bottom:1rem;">Chat Assistant Settings</h3>
      <div style="margin-bottom:1rem;">
        <label class="label">Groq API Key (primary)</label>
        <input id="settGroqKey" class="input" type="password" placeholder="gsk_..." value="${esc(keys.groq)}" />
        <p style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem;">Get a free key at <a href="https://console.groq.com" target="_blank" style="color:var(--accent);">console.groq.com</a></p>
      </div>
      <div style="margin-bottom:1.25rem;">
        <label class="label">HuggingFace API Key (backup)</label>
        <input id="settHfKey" class="input" type="password" placeholder="hf_..." value="${esc(keys.hf)}" />
        <p style="font-size:.75rem;color:var(--text-muted);margin-top:.25rem;">Get a free key at <a href="https://huggingface.co/settings/tokens" target="_blank" style="color:var(--accent);">huggingface.co/settings/tokens</a></p>
      </div>
      <div style="display:flex;gap:.75rem;">
        <button class="btn btn-primary" style="flex:1;" onclick="
          localStorage.setItem('GROQ_API_KEY', document.getElementById('settGroqKey').value.trim());
          localStorage.setItem('HF_API_KEY', document.getElementById('settHfKey').value.trim());
          document.getElementById('chatSettingsOverlay').remove();
          toast('API keys saved');
        ">Save</button>
        <button class="btn btn-ghost" onclick="document.getElementById('chatSettingsOverlay').remove();">Cancel</button>
      </div>
      <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
        <button class="btn btn-danger" style="width:100%;font-size:.8125rem;" onclick="
          chatState.messages = [];
          chatState.hasActiveConvo = false;
          document.getElementById('chatSettingsOverlay').remove();
          renderChatMessages();
          toast('Chat history cleared');
        ">Clear Chat History</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ---- Render the full chat page ----
function renderChat() {
  chatState.isOpen = true;

  // Hide the floating bubble when chat is open
  const bubble = document.getElementById('chatBubble');
  if (bubble) bubble.classList.remove('visible');

  const app = appEl();
  app.innerHTML = `
    <div class="chat-page" id="chatPage">
      <div class="chat-header">
        <button onclick="location.hash='#/'" style="background:none;border:0;color:var(--text-muted);cursor:pointer;padding:.25rem;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div style="width:2rem;height:2rem;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <h2>Workout Assistant</h2>
        <button onclick="showChatSettings()" style="background:none;border:0;color:var(--text-muted);cursor:pointer;padding:.25rem;" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea id="chatInput" rows="1" placeholder="Ask me anything..."></textarea>
        <button id="chatSendBtn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>`;

  renderChatMessages();
  wireChatEvents();
}

function wireChatEvents() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  if (!input || !sendBtn) return;

  // Send on button tap/click (works on mobile + desktop)
  sendBtn.addEventListener('click', handleChatSend);
  sendBtn.addEventListener('touchend', function(e) {
    e.preventDefault(); // prevent ghost click / double-fire
    handleChatSend();
  });

  // Auto-resize textarea
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 128) + 'px';
  });

  // Enter to send (desktop + mobile with hardware keyboard)
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleChatSend();
    }
  });

  // Suggested prompt chips (delegated from message container)
  const msgContainer = document.getElementById('chatMessages');
  if (msgContainer) {
    msgContainer.addEventListener('click', function(e) {
      const chip = e.target.closest('.chat-suggest-chip');
      if (chip && chip.dataset.prompt) {
        input.value = chip.dataset.prompt;
        handleChatSend();
      }
    });
  }

  // Focus input after short delay (let mobile keyboard settle)
  setTimeout(() => input.focus(), 150);
}

// ---- Handle send button ----
function handleChatSend() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg || chatState.isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  sendChatMessage(msg);
}

// ---- Floating bubble (shown when navigating away from chat mid-convo) ----
function updateChatBubble() {
  let bubble = document.getElementById('chatBubble');
  if (!bubble) {
    bubble = document.createElement('button');
    bubble.id = 'chatBubble';
    bubble.className = 'chat-bubble';
    bubble.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>`;
    bubble.addEventListener('click', () => { location.hash = '#/chat'; });
    document.body.appendChild(bubble);
  }

  const hash = location.hash || '#/';
  if (chatState.hasActiveConvo && hash !== '#/chat') {
    bubble.classList.add('visible');
    chatState.isOpen = false;
  } else {
    bubble.classList.remove('visible');
  }
}

// Hook into route changes to show/hide bubble
const _origRoute = null; // We'll wrap the hashchange listener below

/* =========================================================
   ROUTER
   ========================================================= */
const ROUTES = {
  '#/login':    renderLogin,
  '#/onboard':  renderOnboard,
  '#/':         renderDashboard,
  '':           renderDashboard,
  '#/plan':     renderPlanEditor,
  '#/log':      renderLog,
  '#/history':  renderHistory,
  '#/profile':  renderProfile,
  '#/progress':         renderProgress,
  '#/progress/prs':     renderProgress,
  '#/progress/volume':  renderProgress,
  '#/progress/weight':  renderProgress,
  '#/progress/photos':  renderProgress,
  '#/chat':             renderChat,
};

function route() {
  if (!CONFIG_OK) return renderNotConfigured();
  const hash = location.hash || '#/';
  if (!state.session && hash !== '#/login') { location.hash = '#/login'; return; }
  if (state.session && !state.profile && hash !== '#/onboard') { location.hash = '#/onboard'; return; }
  const fn = ROUTES[hash] || renderDashboard;
  fn();
  updateChatBubble();
}

window.addEventListener('hashchange', route);

/* =========================================================
   BOOT
   ========================================================= */
async function boot() {
  if (!CONFIG_OK) return renderNotConfigured();
  try {
    const { data } = await sb.auth.getSession();
    state.session = data.session;
    if (state.session) {
      state.profile = await qProfile();
      if (state.profile) state.plan = await qActivePlan();
    }
  } catch (e) {
    console.error('Boot error', e);
  }
  sb.auth.onAuthStateChange((evt, sess) => {
    if ((evt === 'SIGNED_IN' || evt === 'TOKEN_REFRESHED') && sess) {
      if (!state.session) {
        state.session = sess;
        location.hash = '#/';
        location.reload();
      } else {
        state.session = sess;
      }
    }
    if (evt === 'SIGNED_OUT') {
      state.session = null; state.profile = null; state.plan = null;
      location.hash = '#/login'; route();
    }
  });
  route();
}
boot();
</script>
