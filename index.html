<script>
  tailwind.config = { darkMode: 'class', theme: { extend: { colors: { accent: '#10b981' } } } };

<style>
  /* ===== BASE ===== */
  :root {
    --bg: #09090b; --bg-card: #18181b; --bg-elevated: #1c1c20;
    --border: #27272a; --border-light: #3f3f46;
    --text: #fafafa; --text-secondary: #a1a1aa; --text-muted: #71717a;
    --accent: #10b981; --accent-hover: #34d399; --accent-dim: #064e3b;
    --danger: #ef4444; --danger-bg: #7f1d1d;
    --radius: 1rem; --radius-sm: 0.75rem; --radius-xs: 0.5rem;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  input, select, textarea { color-scheme: dark; }

  /* ===== BUTTONS ===== */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.75rem 1.25rem; border-radius:var(--radius-sm); font-weight:600; font-size:.9375rem; transition:all .2s ease; cursor:pointer; border:0; letter-spacing:-0.01em; }
  .btn:active:not(:disabled) { transform:scale(0.97); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-primary { background:var(--accent); color:#000; box-shadow:0 0 20px rgba(16,185,129,.15); }
  .btn-primary:hover:not(:disabled) { background:var(--accent-hover); box-shadow:0 0 30px rgba(16,185,129,.25); }
  .btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background:var(--bg-elevated); border-color:var(--border-light); }
  .btn-danger { background:var(--danger-bg); color:#fecaca; }
  .btn-danger:hover:not(:disabled) { background:#991b1b; }

  /* ===== CARDS ===== */
  .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem; transition:border-color .2s; }

  /* ===== INPUTS ===== */
  .input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-xs); padding:.75rem 1rem; color:var(--text); font-size:1rem; transition:border-color .2s, box-shadow .2s; }
  .input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(16,185,129,.1); }

  /* ===== LABELS ===== */
  .label { font-size:.8125rem; font-weight:500; color:var(--text-secondary); margin-bottom:.375rem; display:block; letter-spacing:0.01em; }

  /* ===== CHIPS ===== */
  .chip { display:inline-flex; align-items:center; padding:.25rem .625rem; border-radius:999px; font-size:.6875rem; font-weight:600; letter-spacing:0.02em; text-transform:uppercase; border:1px solid transparent; }
  .slot-push, .slot-upper   { color:#fca5a5; background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.2); }
  .slot-pull              { color:#93c5fd; background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.2); }
  .slot-legs, .slot-lower   { color:#fcd34d; background:rgba(234,179,8,.12); border-color:rgba(234,179,8,.2); }
  .slot-full              { color:#c4b5fd; background:rgba(139,92,246,.12); border-color:rgba(139,92,246,.2); }
  .slot-cardio            { color:#6ee7b7; background:rgba(16,185,129,.12); border-color:rgba(16,185,129,.2); }
  .slot-rest              { color:#71717a; background:rgba(113,113,122,.08); border-color:rgba(113,113,122,.15); }
  .slot-custom            { color:#e5e5e5; background:rgba(229,229,229,.08); border-color:rgba(229,229,229,.12); }
  .slot-core              { color:#f9a8d4; background:rgba(236,72,153,.12); border-color:rgba(236,72,153,.2); }
  .slot-stretching        { color:#a5f3fc; background:rgba(34,211,238,.12); border-color:rgba(34,211,238,.2); }
  .slot-abs               { color:#fdba74; background:rgba(251,146,60,.12); border-color:rgba(251,146,60,.2); }

  /* ===== SUB-SPLITS ===== */
  .sub-split-row { display:flex; align-items:center; gap:.5rem; padding:.5rem .625rem; margin-top:.375rem; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:var(--radius-xs); }
  .sub-split-section { margin-top:.625rem; padding-left:1rem; border-left:2px solid var(--border); }
  .sub-split-add { font-size:.8125rem; color:var(--accent); cursor:pointer; margin-top:.5rem; padding:.25rem 0; font-weight:500; }
  .sub-split-add:hover { color:var(--accent-hover); }
  .sub-split-remove { color:var(--text-muted); cursor:pointer; font-size:1rem; line-height:1; padding:0 .25rem; }
  .sub-split-remove:hover { color:var(--danger); }

    /* ===== PROGRESS TABS ===== */
  .prog-tabs { display:flex; gap:.25rem; background:var(--bg-card); border:1px solid var(--border); border-radius:.75rem; padding:.25rem; }
  .prog-tab { flex:1; text-align:center; padding:.5rem .5rem; border-radius:.5rem; font-size:.8125rem; font-weight:600; color:var(--text-muted); text-decoration:none; transition:all .15s; }
  .prog-tab.active { background:var(--bg-elevated); color:var(--text); }
  .prog-tab:active { transform:scale(0.97); }

  /* ===== EXERCISE EDIT ROWS (plan editor + onboarding) ===== */
  .ex-edit-row {
    display:grid;
    grid-template-columns: 1fr 64px 90px 36px;
    gap:.5rem;
    align-items:center;
    padding:.5rem 0;
    border-bottom:1px solid rgba(39,39,42,.5);
  }
  .ex-edit-row:last-child { border-bottom:0; }
  .ex-edit-row .exName  { width:100%; }
  .ex-edit-row .exSets, .ex-edit-row .exReps { width:100%; padding:.5rem .5rem; text-align:center; }
  .ex-edit-row .exDel  {
    width:36px; height:36px; border-radius:.5rem; border:0;
    background:transparent; color:var(--text-muted); cursor:pointer;
    font-size:1.125rem; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  .ex-edit-row .exDel:hover { background:rgba(239,68,68,.12); color:var(--danger); }
  @media (max-width: 480px) {
    .ex-edit-row {
      grid-template-columns: 1fr 1fr 36px;
      grid-template-areas:
        "name name name"
        "sets reps del";
      gap:.375rem;
    }
    .ex-edit-row .exName { grid-area:name; }
    .ex-edit-row .exSets { grid-area:sets; }
    .ex-edit-row .exReps { grid-area:reps; }
    .ex-edit-row .exDel  { grid-area:del; min-height:44px; height:44px; }
  }

  /* ===== SUB-TASK NUMERIC GRID ===== */
  .ss-fields { gap:.375rem; }
  @media (max-width: 480px) {
    .ss-fields { grid-template-columns:repeat(2, minmax(0, 1fr)) !important; }
    .ss-fields > input:nth-child(3) { grid-column: span 2; }
  }

  /* ===== SET LOG ROWS ===== */
  .set-log-row {
    display:grid;
    grid-template-columns: 32px 1fr 1fr 36px;
    gap:.5rem;
    align-items:center;
    padding:.375rem 0;
  }
  .set-log-row .set-num { text-align:center; color:var(--text-muted); font-size:.8125rem; font-variant-numeric:tabular-nums; }
  .set-log-row .setWt, .set-log-row .setReps { width:100%; padding:.5rem; text-align:center; }
  .set-log-row .setDel {
    width:36px; height:36px; border-radius:.5rem; border:0;
    background:transparent; color:var(--text-muted); cursor:pointer;
    font-size:1.125rem; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center;
  }

  /* ===== INPUT OVERFLOW GUARDS ===== */
  /* iOS Safari has an intrinsic min-width on input[type=date]/[type=number] etc.
     When these sit in a grid/flex 1fr column on narrow screens, they overflow
     because the wrapping element refuses to shrink below the input's content width.
     min-width:0 on grid items lets them shrink properly. */
  .form-grid { display:grid; gap:.5rem; min-width:0; }
  .form-grid > div, .form-grid > .form-cell { min-width:0; }
  .form-grid input, .form-grid select, .form-grid textarea { min-width:0; max-width:100%; box-sizing:border-box; }
  @media (max-width: 480px) {
    .form-grid.cols-2-on-desktop { grid-template-columns:1fr !important; }
  }
  /* default desktop = 2 cols when class adds .cols-2 */
  @media (min-width: 481px) {
    .form-grid.cols-2-on-desktop { grid-template-columns:1fr 1fr; }
  }
  /* Always-2-cols variant (kept for cases where space allows on small screens too). */
  .form-grid.cols-2-tight { grid-template-columns:1fr 1fr; }
  .form-grid.cols-2-tight > div { min-width:0; }

  /* Date inputs: prevent default Safari styling oddities. */
  input[type=date].input {
    -webkit-appearance:none;
    appearance:none;
    min-width:0;
    width:100%;
    box-sizing:border-box;
  }

  /* ===== UI POLISH ===== */
  /* card hover lift on hoverable cards */
  .card.is-hoverable:hover { border-color:var(--border-light); }
  /* primary button: subtle gradient + hover glow */
  .btn-primary { background:linear-gradient(180deg, #10b981 0%, #059669 100%); box-shadow:0 1px 0 rgba(255,255,255,.15) inset, 0 0 24px rgba(16,185,129,.18); }
  .btn-primary:hover:not(:disabled) { background:linear-gradient(180deg, #34d399 0%, #10b981 100%); box-shadow:0 1px 0 rgba(255,255,255,.2) inset, 0 0 32px rgba(16,185,129,.3); }
  /* polished focus ring for inputs */
  .input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(16,185,129,.18); }
  /* better section header spacing on the body */
  h1.text-3xl { letter-spacing:-0.02em; }
  /* tabular numbers everywhere they make sense */
  .exercise-meta, .ex-edit-row .exSets, .ex-edit-row .exReps, .set-log-row .setWt, .set-log-row .setReps, .set-log-row .set-num { font-variant-numeric:tabular-nums; }

  /* ===== BOTTOM NAV: highlight Chat tab ===== */
  .bottom-nav a[href="#/chat"] {
    position:relative;
    transform:translateY(-12px);
  }
  .bottom-nav a[href="#/chat"] svg {
    background:var(--accent);
    color:#000;
    width:48px; height:48px;
    padding:11px;
    border-radius:50%;
    box-shadow:0 6px 18px rgba(16,185,129,.45), 0 0 0 4px var(--bg);
    transition:transform .15s, box-shadow .15s;
  }
  .bottom-nav a[href="#/chat"]:active svg { transform:scale(0.94); }
  .bottom-nav a[href="#/chat"].active svg {
    box-shadow:0 6px 18px rgba(16,185,129,.55), 0 0 0 4px var(--bg-elevated);
  }
  .bottom-nav a[href="#/chat"] span {
    color:var(--accent);
    margin-top:.125rem;
    font-weight:600;
  }
  /* tighten width slightly to fit 7 tabs on phone */
  @media (max-width: 768px) {
    .bottom-nav a {
      padding:.375rem .125rem;
      min-width:0;
      flex:1;
    }
    .bottom-nav a span {
      font-size:.5625rem;
      letter-spacing:0;
      white-space:nowrap;
    }
  }
  @media (max-width: 380px) {
    .bottom-nav a span { font-size:.5rem; }
    .bottom-nav a:not([href="#/chat"]) svg { width:20px; height:20px; }
  }

/* ===== UTILITIES ===== */
  .hide { display:none !important; }
  .scroll-smooth { scroll-behavior:smooth; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-track { background:transparent; }

  /* ===== BOTTOM NAV (mobile) ===== */
  .bottom-nav { display:none; }

  @media (max-width: 768px) {
    .bottom-nav {
      display:flex; position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:rgba(9,9,11,.92); backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-top:1px solid var(--border);
      padding:.375rem 0 calc(.375rem + var(--safe-bottom));
      justify-content:space-around; align-items:center;
    }
    .bottom-nav a {
      display:flex; flex-direction:column; align-items:center; gap:.1875rem;
      padding:.375rem .25rem; border-radius:.625rem; color:var(--text-muted);
      text-decoration:none; font-size:.625rem; font-weight:500; letter-spacing:0.02em;
      transition:color .2s; flex:1; min-width:0;
    }
    .bottom-nav a.active { color:var(--accent); }
    .bottom-nav a svg { width:22px; height:22px; }
    .bottom-nav a:active { transform:scale(0.92); }
    .top-nav { display:none !important; }
    main.main-content { padding-bottom:calc(5rem + var(--safe-bottom)) !important; }
  }

  /* ===== AI CHAT ===== */
  .chat-page { position:fixed; top:0; left:0; right:0; bottom:0; z-index:60; background:var(--bg); display:flex; flex-direction:column; }
  .chat-header { padding:.75rem 1rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:.75rem; background:rgba(9,9,11,.95); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
  .chat-header h2 { font-size:1rem; font-weight:600; flex:1; }
  .chat-messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.75rem; scroll-behavior:smooth; }
  .chat-msg { max-width:85%; padding:.75rem 1rem; border-radius:var(--radius-sm); font-size:.9375rem; line-height:1.5; word-wrap:break-word; }
  .chat-msg.user { align-self:flex-end; background:var(--accent); color:#000; border-bottom-right-radius:.25rem; }
  .chat-msg.assistant { align-self:flex-start; background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:.25rem; }
  .chat-msg.assistant p { margin:.25rem 0; }
  .chat-msg.assistant ul, .chat-msg.assistant ol { margin:.25rem 0 .25rem 1.25rem; }
  .chat-msg.assistant strong { color:var(--accent); font-weight:600; }
  .chat-msg.assistant code { background:rgba(255,255,255,.06); padding:.125rem .375rem; border-radius:.25rem; font-size:.875rem; }
  .chat-input-area { padding:.75rem 1rem calc(.75rem + var(--safe-bottom)); border-top:1px solid var(--border); background:rgba(9,9,11,.95); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); display:flex; gap:.5rem; align-items:flex-end; }
  .chat-input-area textarea { flex:1; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm); padding:.625rem .875rem; color:var(--text); font-size:.9375rem; font-family:inherit; resize:none; min-height:2.5rem; max-height:8rem; line-height:1.4; }
  .chat-input-area textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(16,185,129,.1); }
  .chat-input-area button { width:2.75rem; height:2.75rem; -webkit-tap-highlight-color:transparent; border-radius:50%; background:var(--accent); border:0; color:#000; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; }
  .chat-input-area button:hover { background:var(--accent-hover); }
  .chat-input-area button:disabled { opacity:.3; cursor:not-allowed; }
  .chat-input-area button svg { pointer-events:none; }
  .chat-typing { display:flex; gap:.3rem; padding:.5rem .75rem; }
  .chat-typing span { width:6px; height:6px; border-radius:50%; background:var(--text-muted); animation:chatBounce .6s infinite alternate; }
  .chat-typing span:nth-child(2) { animation-delay:.2s; }
  .chat-typing span:nth-child(3) { animation-delay:.4s; }
  @keyframes chatBounce { to { opacity:.3; transform:translateY(-4px); } }

  /* Floating chat bubble */
  .chat-bubble { position:fixed; bottom:calc(5rem + var(--safe-bottom)); right:1rem; z-index:55; width:3.25rem; height:3.25rem; border-radius:50%; background:var(--accent); color:#000; border:0; cursor:pointer; display:none; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(16,185,129,.3); transition:all .2s; }
  .chat-bubble:hover { transform:scale(1.08); box-shadow:0 6px 28px rgba(16,185,129,.4); }
  .chat-bubble.visible { display:flex; }
  .chat-bubble .bubble-badge { position:absolute; top:-.125rem; right:-.125rem; width:1rem; height:1rem; border-radius:50%; background:var(--danger); color:#fff; font-size:.625rem; font-weight:700; display:flex; align-items:center; justify-content:center; }

  @media (min-width: 769px) {
    .chat-bubble { bottom:1.5rem; }
  }

  /* ===== TOP NAV (desktop) ===== */
  .top-nav {
    border-bottom:1px solid var(--border); position:sticky; top:0;
    background:rgba(9,9,11,.85); backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%); z-index:30;
  }
  .top-nav a { padding:.5rem .875rem; border-radius:var(--radius-xs); font-size:.875rem; font-weight:500; text-decoration:none; transition:all .15s; }
  .top-nav a.active { background:var(--bg-elevated); color:var(--text); }
  .top-nav a:not(.active) { color:var(--text-muted); }
  .top-nav a:not(.active):hover { color:var(--text); }

  /* ===== EXERCISE LIST ===== */
  .exercise-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:.875rem 0; border-bottom:1px solid rgba(39,39,42,.5);
  }
  .exercise-row:last-child { border-bottom:none; }
  .exercise-name { font-size:.9375rem; font-weight:500; color:var(--text); }
  .exercise-meta { font-size:.8125rem; color:var(--text-muted); font-variant-numeric:tabular-nums; white-space:nowrap; }

  /* ===== WEEK GRID ===== */
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:.375rem; }
  .week-day {
    background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:.625rem .25rem; text-align:center; min-height:4.5rem;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.25rem;
    transition:border-color .2s, box-shadow .2s;
  }
  .week-day.is-today { border-color:var(--accent); box-shadow:0 0 12px rgba(16,185,129,.1); }
  .week-day .day-label { font-size:.6875rem; color:var(--text-muted); font-weight:500; }

  /* ===== SECTION HEADERS ===== */
  .section-label {

async function qProfile() {
  const { data, error } = await sb.from('profiles').select('*').maybeSingle();
  if (error && error.code !== 'PGRST116') console.error(error);
  return data;
}

async function qSaveProfile(p) {
  const uid = state.session.user.id;
  const payload = { id: uid, ...p, updated_at: new Date().toISOString() };
  const { data, error } = await sb.from('profiles').upsert(payload).select().single();
  if (error) throw error;
  return data;
}

async function qActivePlan() {
  const { data: plans, error } = await sb.from('plans').select('*')
    .eq('is_active', true).order('created_at', { ascending: false }).limit(1);
  if (error) { console.error(error); return null; }
  if (!plans || plans.length === 0) return null;
  const plan = plans[0];
  const [dRes, eRes] = await Promise.all([
    sb.from('plan_days').select('*').eq('plan_id', plan.id).order('day_of_week'),
    sb.from('plan_exercises').select('*').eq('plan_id', plan.id).order('order_idx'),
  ]);
  return { ...plan, days: dRes.data || [], exercises: eRes.data || [] };
}

async function qSavePlan({ split_type, name, days, exercises, replaceActive = true }) {
  const uid = state.session.user.id;
  if (replaceActive) {
    await sb.from('plans').update({ is_active: false }).eq('user_id', uid).eq('is_active', true);
  }
  const { data: plan, error } = await sb.from('plans')
    .insert({ user_id: uid, split_type, name: name || SPLITS[split_type]?.name || 'My Plan', is_active: true })
    .select().single();
  if (error) throw error;
  if (days?.length) {
    const rows = days.map((d, i) => ({
      plan_id: plan.id,
      day_of_week: i,
      slot_type: d.slot_type,
      custom_name: d.custom_name || null,
      cardio_type: d.cardio_type || null,
      cardio_duration_min: d.cardio_duration_min || null,
      sub_splits: d.sub_splits && d.sub_splits.length ? d.sub_splits : null,
    }));
    const { error: eD } = await sb.from('plan_days').insert(rows);
    if (eD) throw eD;
  }
  if (exercises?.length) {
    const rows = exercises.map((e, i) => ({
      plan_id: plan.id,
      slot_type: e.slot_type,
      exercise_name: e.exercise_name,
      target_sets: e.target_sets ?? 3,
      target_reps: e.target_reps ?? '8-12',
      order_idx: i,
    }));
    const { error: eE } = await sb.from('plan_exercises').insert(rows);
    if (eE) throw eE;
  }
  return plan.id;
}

async function qLogSession({ slot_type, sets, notes, cardio_type, cardio_duration_min, session_date }) {
  const uid = state.session.user.id;
  const { data: session, error } = await sb.from('sessions').insert({
    user_id: uid, slot_type,
    session_date: session_date || today(),
    notes: notes || null,
    cardio_type: cardio_type || null,
    cardio_duration_min: cardio_duration_min || null,
  }).select().single();
  if (error) throw error;
  if (sets?.length) {
    const rows = sets.map(s => ({
      session_id: session.id,
      exercise_name: s.exercise_name,
      set_number: s.set_number,
      reps: s.reps ?? null,
      weight_lbs: s.weight_lbs ?? null,
    }));
    const { error: eS } = await sb.from('set_logs').insert(rows);
    if (eS) throw eS;
  }
  return session;
}

// Auto-save helpers
let _autoSaveTimer = null;
let _currentSessionId = null;

function debounce(fn, ms = 1500) {
  return (...args) => {
    clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(() => fn(...args), ms);
  };
}

async function qAutoSave(logState) {
  if (!logState || !logState.slot_type) return;
  const uid = state.session.user.id;
  const setsToSave = (logState.rows || [])
    .filter(r => r.weight_lbs !== '' || r.reps !== '')
    .map(r => ({
      exercise_name: r.exercise_name,
      set_number: r.set_number,
      reps: r.reps === '' ? null : Number(r.reps),
      weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
    }));

  try {
    if (_currentSessionId) {
      // Update existing session
      const { error } = await sb.from('sessions').update({
        notes: logState.notes || null,
        cardio_type: logState.cardio_type || null,
        cardio_duration_min: logState.cardio_duration_min || null,
      }).eq('id', _currentSessionId);
      if (error) throw error;
      // Replace set_logs
      await sb.from('set_logs').delete().eq('session_id', _currentSessionId);
      if (setsToSave.length) {
        const rows = setsToSave.map(s => ({ session_id: _currentSessionId, ...s }));
        const { error: eS } = await sb.from('set_logs').insert(rows);
        if (eS) throw eS;
      }
    } else {
      // Create new session (first auto-save)
      const { data: session, error } = await sb.from('sessions').insert({
        user_id: uid,
        slot_type: logState.slot_type,
        session_date: logState.session_date || today(),
        notes: logState.notes || null,
        cardio_type: logState.cardio_type || null,
        cardio_duration_min: logState.cardio_duration_min || null,
        is_draft: true,
      }).select().single();
      if (error) throw error;
      _currentSessionId = session.id;
      if (setsToSave.length) {
        const rows = setsToSave.map(s => ({ session_id: _currentSessionId, ...s }));
        const { error: eS } = await sb.from('set_logs').insert(rows);
        if (eS) throw eS;
      }
    }
    // Show subtle save indicator
    const ind = document.getElementById('autoSaveInd');
    if (ind) { ind.textContent = 'Saved'; ind.style.opacity = '1'; setTimeout(() => { ind.style.opacity = '0'; }, 1200); }
  } catch (e) {
    console.error('Auto-save error:', e);
    const ind = document.getElementById('autoSaveInd');
    if (ind) { ind.textContent = 'Save error'; ind.style.opacity = '1'; }
  }
}

async function qFinishSession(logState) {
  // If we have an auto-saved draft, finalize it
  if (_currentSessionId) {
    const setsToSave = (logState.rows || [])
      .filter(r => r.weight_lbs !== '' || r.reps !== '')
      .map(r => ({
        exercise_name: r.exercise_name,
        set_number: r.set_number,
        reps: r.reps === '' ? null : Number(r.reps),
        weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
      }));
    await sb.from('sessions').update({
      notes: logState.notes || null,
      cardio_type: logState.cardio_type || null,
      cardio_duration_min: logState.cardio_duration_min || null,
      is_draft: false,
    }).eq('id', _currentSessionId);
    await sb.from('set_logs').delete().eq('session_id', _currentSessionId);
    if (setsToSave.length) {
      const rows = setsToSave.map(s => ({ session_id: _currentSessionId, ...s }));
      await sb.from('set_logs').insert(rows);
    }
    _currentSessionId = null;
    return;
  }
  // Otherwise create fresh (fallback)
  await qLogSession({
    slot_type: logState.slot_type,
    sets: (logState.rows || []).filter(r => r.weight_lbs !== '' || r.reps !== '').map(r => ({
      exercise_name: r.exercise_name, set_number: r.set_number,
      reps: r.reps === '' ? null : Number(r.reps),
      weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
    })),
    notes: logState.notes,
    cardio_type: logState.cardio_type,
    cardio_duration_min: logState.cardio_duration_min,
    session_date: logState.session_date,
  });
}

async function qHistory(limit = 50) {

}

function slotChip(slot, customName) {

function subSplitsUI(dayIndex, subSplits, context) {
  if (!subSplits) subSplits = [];

  // Backwards-compat: migrate old fields onto new shape on read
  subSplits.forEach(ss => {
    if (ss.cardio_type && !ss.name) ss.name = ss.cardio_type;
    if (ss.detail && !ss.notes) ss.notes = ss.detail;
    if (ss.type === 'abs') ss.type = 'core';
  });

  const fieldsForRow = (ss) => {
    if (ss.type === 'cardio') {
      if (ss.customMode || (ss.name && !CARDIO_FIELDS[ss.name])) return CUSTOM_CARDIO_FIELDS;
      return CARDIO_FIELDS[ss.name] || [];
    }
    return NON_CARDIO_FIELDS[ss.type] || [];
  };

  const rows = subSplits.map((ss, si) => {
    const typeOpts = SUB_SPLIT_OPTIONS.map(o =>
      `<option value="${o.value}" ${ss.type===o.value?'selected':''}>${o.label}</option>`
    ).join('');

    // --- Name field ---
    let nameField = '';
    if (ss.type === 'cardio') {
      const isFreeName = ss.customMode || (ss.name && !CARDIO_FIELDS[ss.name]);
      const opts = Object.keys(CARDIO_FIELDS).map(c =>
        `<option value="${c}" ${ss.name===c && !isFreeName?'selected':''}>${c}</option>`).join('');
      nameField = `
        <select data-day="${dayIndex}" data-si="${si}" class="ssCardioSel input text-xs" style="flex:1;min-width:130px;padding:.4rem .55rem;">
          <option value="">Pick cardio</option>
          ${opts}
          <option value="${CARDIO_CUSTOM}" ${isFreeName?'selected':''}>Custom…</option>
        </select>
        ${isFreeName ? `<input data-day="${dayIndex}" data-si="${si}" class="ssCustomName input text-xs" style="flex:1;min-width:120px;padding:.4rem .55rem;margin-top:.25rem;" placeholder="Custom cardio name" value="${esc(ss.name||'')}" />` : ''}
      `;
    } else if (ss.type) {
      const placeholder = ss.type==='core' ? 'e.g. Plank' : ss.type==='stretching' ? 'e.g. Hamstring stretch' : 'Name';
      nameField = `<input data-day="${dayIndex}" data-si="${si}" class="ssName input text-xs" style="flex:1;min-width:120px;padding:.4rem .55rem;" placeholder="${placeholder}" value="${esc(ss.name||'')}" />`;
    } else {
      nameField = `<div style="flex:1;color:var(--text-muted);font-size:.75rem;padding:.4rem .25rem;">Pick a type first</div>`;
    }

    // --- Numeric fields, dynamic ---
    const fields = fieldsForRow(ss);
    let numericRow = '';
    if (fields.length > 0) {
      const cols = Math.min(fields.length, 3);
      numericRow = `<div class="ss-fields" style="display:grid;grid-template-columns:repeat(${cols},minmax(0,1fr));gap:.375rem;margin-top:.375rem;">
        ${fields.map(k => {
          const meta = FIELD_META[k];
          if (!meta) return '';
          if (meta.text) {
            return `<input data-day="${dayIndex}" data-si="${si}" data-key="${k}" class="ssField input text-xs" value="${esc(ss[k] ?? '')}" style="padding:.4rem .55rem;" placeholder="${esc(meta.placeholder)}" aria-label="${esc(meta.label)}" />`;
          }
          return `<input data-day="${dayIndex}" data-si="${si}" data-key="${k}" class="ssField input text-xs" type="number" step="${meta.step}" min="${meta.min}" max="${meta.max}" value="${esc(ss[k] ?? '')}" style="padding:.4rem .55rem;" placeholder="${esc(meta.placeholder)}" aria-label="${esc(meta.label)}" />`;
        }).join('')}
      </div>`;
    }

    return `
      <div class="sub-split-row" style="flex-direction:column;align-items:stretch;gap:.25rem;">
        <div style="display:flex;align-items:center;gap:.375rem;flex-wrap:wrap;">
          <select data-day="${dayIndex}" data-si="${si}" class="ssType input text-xs" style="width:auto;min-width:90px;padding:.4rem .55rem;">
            <option value="">Pick</option>
            ${typeOpts}
          </select>
          ${nameField}
          <span data-day="${dayIndex}" data-si="${si}" class="sub-split-remove ssRemove" title="Remove">&times;</span>
        </div>
        ${numericRow}
      </div>`;
  }).join('');

  return `
    <div class="sub-split-section">
      ${rows}
      <div data-day="${dayIndex}" class="sub-split-add ssAdd">+ Add sub-task</div>
    </div>`;
}


function wireSubSplits(getMeta, rerenderFn) {
  // type change
  document.querySelectorAll('.ssType').forEach(el => el.addEventListener('change', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const meta = getMeta(i);
    const ss = meta.subSplits[si];
    ss.type = e.target.value;
    // wipe everything when type changes (different fields apply)
    ss.name = ''; ss.customMode = false;
    ['sets','reps','duration','distance','speed','incline','level','notes'].forEach(k => ss[k] = null);
    rerenderFn();
  }));

  // cardio name dropdown
  document.querySelectorAll('.ssCardioSel').forEach(el => el.addEventListener('change', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const ss = getMeta(i).subSplits[si];
    if (e.target.value === CARDIO_CUSTOM) {
      ss.customMode = true;
      ss.name = '';
    } else {
      ss.customMode = false;
      ss.name = e.target.value;
    }
    // wipe field values that may not apply to the new selection
    ['sets','reps','duration','distance','speed','incline','level'].forEach(k => ss[k] = null);
    rerenderFn();
  }));

  // free-text name (cardio custom OR core/stretching)
  document.querySelectorAll('.ssCustomName, input.ssName').forEach(el => el.addEventListener('input', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    getMeta(i).subSplits[si].name = e.target.value;
  }));

  // numeric/text fields by data-key
  document.querySelectorAll('.ssField').forEach(el => el.addEventListener('input', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const k = el.dataset.key;
    const ss = getMeta(i).subSplits[si];
    if (FIELD_META[k]?.text) {
      ss[k] = e.target.value;
    } else {
      ss[k] = e.target.value === '' ? null : Number(e.target.value);
    }
  }));

  // remove
  document.querySelectorAll('.ssRemove').forEach(el => el.addEventListener('click', () => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    getMeta(i).subSplits.splice(si, 1);
    rerenderFn();
  }));

  // add
  document.querySelectorAll('.ssAdd').forEach(el => el.addEventListener('click', () => {
    const i = Number(el.dataset.day);
    const meta = getMeta(i);
    if (!meta.subSplits) meta.subSplits = [];
    meta.subSplits.push({ type:'', name:'', customMode:false, sets:null, reps:'', duration:null, distance:null, speed:null, incline:null, level:null, notes:'' });
    rerenderFn();
  }));
}

    data: {
      age: '', height_ft: '', height_in: '', weight_lbs: '',
      goal: '', daily_minutes: '',
      split_type: '',
      days: ['rest','rest','rest','rest','rest','rest','rest'],
      dayMeta: [{},{},{},{},{},{},{}],  // { cardio_type, cardio_duration_min, custom_name }
      exercises: {},  // { [slot_type]: [ {name, target_sets, target_reps} ] }

  };

function renderOnboard() {
  if (!state.onboard) initOnboard();
  const s = state.onboard;
  const total = 6;

function stepDays(d) {
  const split = SPLITS[d.split_type];
  const slots = [...split.slots, 'cardio', 'rest'];
  const dayRow = (i) => {
    const slot = d.days[i];
    const meta = d.dayMeta[i] || {};
    const opts = slots.map(s => `<option value="${s}" ${slot===s?'selected':''}>${SLOT_LABEL[s]}</option>`).join('');
    const cardioFields = slot === 'cardio' ? `
      <div class="mt-2 grid grid-cols-2 gap-2">
        <select data-day="${i}" class="cardioType input text-sm">
          <option value="">Type</option>
          ${CARDIO_TYPES.map(c => `<option value="${c}" ${meta.cardio_type===c?'selected':''}>${c}</option>`).join('')}

        <input data-day="${i}" type="number" min="5" max="180" value="${esc(meta.cardio_duration_min ?? '')}" class="cardioDur input text-sm" placeholder="min" />
      </div>` : '';
    const customField = slot === 'custom' ? `
      <input data-day="${i}" class="customName input text-sm mt-2" value="${esc(meta.custom_name ?? '')}" placeholder="Custom name (e.g. Arms)" />` : '';
    return `
      <div class="card !p-3">
        <div class="flex items-center gap-2">
          <div class="w-12 text-sm text-zinc-400 font-medium">${DOW_SHORT[i]}</div>

        </div>
        ${cardioFields}
        ${customField}
        ${slot !== 'rest' ? subSplitsUI(i, meta.subSplits, 'onboard') : ''}
      </div>`;
  };
  const workoutCount = d.days.filter(s => s !== 'rest').length;
  return `
    <h1 class="text-2xl font-bold mb-1">Pick your days</h1>
    <p class="text-zinc-400 text-sm mb-4">Assign each day of the week. ${workoutCount} workout day${workoutCount===1?'':'s'} planned.</p>

    <div class="space-y-2">${d.days.map((_, i) => dayRow(i)).join('')}</div>
    <button id="btnNext" class="btn btn-primary w-full mt-6">Continue</button>`;
}

  const uniqueSlots = [...new Set(d.days.filter(s => s !== 'rest' && s !== 'cardio'))];

          <button data-slot="${slot}" class="exAdd text-sm text-emerald-400 hover:text-emerald-300">+ Add</button>
        </div>
        <div class="text-xs text-zinc-500 flex gap-2 px-1 mb-1"><span class="flex-1">Exercise</span><span class="w-16 text-center">Sets</span><span class="w-20 text-center">Reps</span><span class="w-6"></span></div>
        <div id="slot-${slot}-rows">${rows || '<div class="text-sm text-zinc-500 py-2">No exercises yet.</div>'}</div>
      </div>`;
  };
  return `
    <h1 class="text-2xl font-bold mb-1">Set your exercises</h1>
    <p class="text-zinc-400 text-sm mb-6">Pre-filled from the library. Tweak anything you want.</p>
    <div class="space-y-3">${uniqueSlots.map(slotBlock).join('')}</div>
    <button id="btnFinish" class="btn btn-primary w-full mt-6">Finish and save</button>`;
}

function wireCurrentStep() {
  const s = state.onboard;
  const d = s.data;
  if (s.step === 0) {
    $('btnNext').addEventListener('click', () => {
      d.age = Number($('i_age').value) || null;
      d.height_ft = Number($('i_ft').value) || null;
      d.height_in = Number($('i_in').value) || null;
      d.weight_lbs = Number($('i_wt').value) || null;
      if (!d.age || !d.height_ft || d.weight_lbs == null) { toast('Fill in age, height, and weight.', 'error'); return; }
      s.step++; renderOnboard();
    });
  }
  if (s.step === 1) {
    document.querySelectorAll('input[name="goal"]').forEach(el => {
      el.addEventListener('change', (e) => { d.goal = e.target.value; renderOnboard(); });
    });
    $('btnNext').addEventListener('click', () => { if (!d.goal) return; s.step++; renderOnboard(); });
  }
  if (s.step === 2) {
    document.querySelectorAll('.minPick').forEach(b => b.addEventListener('click', () => {
      d.daily_minutes = Number(b.dataset.mins); renderOnboard();
    }));
    $('i_min').addEventListener('input', e => { d.daily_minutes = Number(e.target.value) || ''; $('btnNext').disabled = !d.daily_minutes; });
    $('btnNext').addEventListener('click', () => { if (!d.daily_minutes) return; s.step++; renderOnboard(); });
  }
  if (s.step === 3) {
    document.querySelectorAll('.splitPick').forEach(b => b.addEventListener('click', () => {
      d.split_type = b.dataset.split;
      d.days = [...SPLITS[d.split_type].template];
      d.exercises = {};
      renderOnboard();
    }));
    $('btnNext').addEventListener('click', () => { if (!d.split_type) return; s.step++; renderOnboard(); });
  }
  if (s.step === 4) {
    document.querySelectorAll('.slotPick').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day);
      d.days[i] = e.target.value;
      d.dayMeta[i] = { subSplits: [] };
      renderOnboard();
    }));
    document.querySelectorAll('.cardioType').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].cardio_type = e.target.value;
    }));
    document.querySelectorAll('.cardioDur').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].cardio_duration_min = Number(e.target.value) || null;
    }));
    document.querySelectorAll('.customName').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].custom_name = e.target.value;
    }));
    $('btnTemplate').addEventListener('click', () => {
      d.days = [...SPLITS[d.split_type].template];
      d.dayMeta = [{},{},{},{},{},{},{}];
      renderOnboard();
    });
    wireSubSplits(i => { if (!d.dayMeta[i]) d.dayMeta[i] = {}; if (!d.dayMeta[i].subSplits) d.dayMeta[i].subSplits = []; return d.dayMeta[i]; }, renderOnboard);
    $('btnNext').addEventListener('click', () => { s.step++; renderOnboard(); });
  }
  if (s.step === 5) {
    document.querySelectorAll('.exName').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].exercise_name = e.target.value;
    }));
    document.querySelectorAll('.exSets').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].target_sets = Number(e.target.value) || 3;
    }));
    document.querySelectorAll('.exReps').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].target_reps = e.target.value;
    }));
    document.querySelectorAll('.exDel').forEach(el => el.addEventListener('click', () => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot].splice(i, 1);
      renderOnboard();
    }));
    document.querySelectorAll('.exAdd').forEach(el => el.addEventListener('click', () => {
      const slot = el.dataset.slot;
      d.exercises[slot] = d.exercises[slot] || [];
      d.exercises[slot].push({ exercise_name: '', target_sets: 3, target_reps: '8-12' });
      renderOnboard();
    }));
    if ($('btnFinish')) $('btnFinish').addEventListener('click', finishOnboarding);
  }
}

async function finishOnboarding() {
  const d = state.onboard.data;
  const btn = $('btnFinish'); btn.disabled = true; btn.textContent = 'Saving...';
  try {
    // 1. save profile
    await qSaveProfile({
      age: d.age, height_ft: d.height_ft, height_in: d.height_in, weight_lbs: d.weight_lbs,
      goal: d.goal, daily_minutes: d.daily_minutes,
    });
    // 2. build plan days + exercises
    const days = d.days.map((slot, i) => ({
      slot_type: slot,
      custom_name: d.dayMeta[i]?.custom_name || null,
      cardio_type: d.dayMeta[i]?.cardio_type || null,
      cardio_duration_min: d.dayMeta[i]?.cardio_duration_min || null,
      sub_splits: (d.dayMeta[i]?.subSplits || []).filter(ss => ss.type).map(ss => { const { customMode, ...rest } = ss; return rest; }) || null,
    }));
    const flatExercises = [];
    Object.entries(d.exercises).forEach(([slot, list]) => {
      list.filter(x => x.exercise_name?.trim()).forEach(x => {
        flatExercises.push({ slot_type: slot, exercise_name: x.exercise_name.trim(), target_sets: x.target_sets, target_reps: x.target_reps });
      });
    });
    await qSavePlan({ split_type: d.split_type, name: SPLITS[d.split_type].name, days, exercises: flatExercises });
    // 3. refresh
    state.profile = await qProfile();
    state.plan = await qActivePlan();
    state.onboard = null;
    toast('You are all set.');
    location.hash = '#/';
    route();
  } catch (e) {
    console.error(e);
    toast(e.message || 'Something went wrong saving.', 'error');
    btn.disabled = false; btn.textContent = 'Finish and save';
  }
}

      <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Also today</div>
      ${todaySubSplits.filter(s => (s.type==='abs'?true:true)).map(s => {
        const type = s.type === 'abs' ? 'core' : s.type;
        const name = s.name || s.cardio_type || '';
        // metric pieces
        const right = [];
        if (s.sets && s.reps) right.push(`${s.sets} × ${esc(String(s.reps))}`);
        else if (s.sets) right.push(`${s.sets} sets`);
        else if (s.reps) right.push(`${esc(String(s.reps))} reps`);
        if (s.duration) right.push(`${s.duration} min`);
        if (s.distance) right.push(`${s.distance} mi`);
        const machine = [];
        if (s.speed != null) machine.push(`${s.speed} mph`);
        if (s.incline != null) machine.push(`${s.incline}% incl`);
        if (s.level != null) machine.push(`lvl ${s.level}`);
        if (machine.length) right.push(machine.join(' '));
        const rightLine = right.join(' · ');
        return `<div class="exercise-row" style="padding:.625rem 0;">
          <div style="display:flex;align-items:center;gap:.5rem;min-width:0;">
            ${slotChip(type)}

          <span class="exercise-meta">${rightLine}</span>

      }).join('')}

  if (todayDay.slot_type === 'rest') {
    todayBody = `<div style="color:var(--text-secondary);font-size:.9375rem;padding:.25rem 0;">Rest day. Recover, hydrate, sleep.</div>`;
  } else if (todayDay.slot_type === 'cardio') {
    todayBody = `
      <div style="color:var(--text-secondary);font-size:.9375rem;margin-bottom:.75rem;">${esc(todayDay.cardio_type || 'Cardio')} ${todayDay.cardio_duration_min?`\u00b7 ${todayDay.cardio_duration_min} min`:''}</div>
      ${subSplitSection}
      <a href="#/log" class="cta-button" style="text-decoration:none;">

      </a>`;

      <div class="exercise-row">
        <span class="exercise-name">${ytLink(e.exercise_name)}</span>
        <span class="exercise-meta">${e.target_sets} × ${esc(e.target_reps)}</span>

    todayBody = `
      <div style="margin-bottom:1rem;">${list}</div>
      ${subSplitSection}

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start workout
      </a>`;
  }

  // recent
  const recent = await qHistory(5);
  const recentHtml = recent.length === 0 ? `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No sessions yet.</div>` :
    recent.map(r => `
      <div class="session-row">
        <div style="display:flex;align-items:center;gap:.625rem;">
          ${slotChip(r.slot_type)}
          <span style="font-size:.875rem;color:var(--text-secondary);">${fmtDate(r.session_date)}</span>

        <span style="font-size:.75rem;color:var(--text-muted);font-variant-numeric:tabular-nums;">${(r.set_logs||[]).length} sets</span>

  appEl().innerHTML = shell(`
    <div style="margin-bottom:1.5rem;">
      <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:.25rem;">
        <div>

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}

async function renderLog() {

  if (!plan) { nav('#/'); return; }

  const dow = todayDow();
  const todayDay = plan.days.find(d => d.day_of_week === dow) || { slot_type:'rest' };

async function renderLogFor(slot, dayMeta = {}, overrideDate = null) {
  if (slot === 'cardio') return renderLogCardio(dayMeta, overrideDate);

  _currentSessionId = null; // reset for new log view
  const plan = state.plan;
  const exercises = plan ? plan.exercises.filter(e => e.slot_type === slot) : [];

  const fetchLastWeights = async () => {
    const out = {};
    for (const ex of exercises) {
      const last = await qLastWeightFor(ex.exercise_name);
      out[ex.exercise_name] = last;
    }
    return out;
  };
  const lastMap = await fetchLastWeights();

  // Try to load an existing draft for today
  const draft = !overrideDate ? await qLoadDraft(slot) : null;

  const logState = {
    slot_type: slot,
    session_date: overrideDate || null,
    notes: draft?.notes || '',
    rows: draft && draft.set_logs?.length
      ? draft.set_logs.sort((a,b) => a.set_number - b.set_number).map(s => ({
          exercise_name: s.exercise_name,
          set_number: s.set_number,
          reps: s.reps ?? '',
          weight_lbs: s.weight_lbs ?? '',
        }))
      : exercises.flatMap(ex => {
          const sets = [];
          for (let i = 1; i <= (ex.target_sets || 3); i++) {
            sets.push({ exercise_name: ex.exercise_name, set_number: i, reps: '', weight_lbs: '' });
          }
          return sets;
        }),
  };
  if (draft) _currentSessionId = draft.id;

  const paint = () => {
    const byEx = {};
    logState.rows.forEach(r => { (byEx[r.exercise_name] = byEx[r.exercise_name] || []).push(r); });

    const blocks = exercises.map(ex => {
      const setRows = (byEx[ex.exercise_name] || []).map((r, idx) => `
        <div class="set-log-row">
          <div class="set-num">${r.set_number}</div>
          <input data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setWt input" type="number" inputmode="decimal" step="0.5" value="${esc(r.weight_lbs)}" placeholder="lbs" />
          <input data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setReps input" type="number" inputmode="numeric" value="${esc(r.reps)}" placeholder="reps" />
          <button data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setDel" title="Remove set">×</button>
        </div>`).join('');
      const last = lastMap[ex.exercise_name];
      const lastLine = last ? `<div class="text-[11px] text-zinc-500">Last: ${last.weight_lbs ?? '?'} lbs × ${last.reps ?? '?'}</div>` : '';
      return `
        <div class="card">
          <div class="flex items-center justify-between mb-1">
            <div class="font-semibold">${ytLink(ex.exercise_name)}</div>
            <div class="text-xs text-zinc-500">Target: ${(byEx[ex.exercise_name] || []).length} × ${esc(ex.target_reps)}</div>
          </div>
          ${lastLine}
          <div class="text-[11px] text-zinc-500 flex gap-2 px-1 mt-2 mb-1">
            <span class="w-8 text-center">Set</span>
            <span class="flex-1 text-center">Weight</span>
            <span class="flex-1 text-center">Reps</span>
            <span class="w-6"></span>
          </div>
          ${setRows}
          <button data-ex="${esc(ex.exercise_name)}" class="addSet text-xs text-emerald-400 hover:text-emerald-300 mt-1">+ Add set</button>
        </div>`;
    }).join('') || `<div class="card text-zinc-500 text-sm">No exercises assigned to ${SLOT_LABEL[slot]}. Edit your plan to add some.</div>`;

    appEl().innerHTML = shell(`
      <div style="margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="section-label" style="margin-bottom:.125rem;">Log workout</div>
          <h1 style="font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;margin:0;display:flex;align-items:center;gap:.5rem;">${SLOT_LABEL[slot]} ${slotChip(slot)}</h1>
        </div>
        <div style="display:flex;align-items:center;gap:.75rem;">
          <span id="autoSaveInd" style="font-size:.75rem;color:var(--accent);transition:opacity .3s;opacity:0;">Saved</span>
          <a href="#/" style="font-size:.875rem;color:var(--text-muted);text-decoration:none;">Cancel</a>
        </div>
      </div>
      <div class="space-y-3 mb-4">${blocks}</div>
      <div class="card mb-4">
        <label class="label">Notes (optional)</label>
        <textarea id="notes" class="input" rows="2" placeholder="Felt strong, 3s rest, etc.">${esc(logState.notes)}</textarea>
      </div>
      <button id="btnSave" class="btn btn-primary w-full">Finish workout</button>`);

    const triggerAutoSave = debounce(() => qAutoSave(logState));
    document.querySelectorAll('.setWt').forEach(el => el.addEventListener('input', e => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const row = (logState.rows.filter(r => r.exercise_name === ex))[idx];
      if (row) { row.weight_lbs = e.target.value === '' ? '' : Number(e.target.value); triggerAutoSave(); }
    }));
    document.querySelectorAll('.setReps').forEach(el => el.addEventListener('input', e => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const row = (logState.rows.filter(r => r.exercise_name === ex))[idx];
      if (row) { row.reps = e.target.value === '' ? '' : Number(e.target.value); triggerAutoSave(); }
    }));
    document.querySelectorAll('.setDel').forEach(el => el.addEventListener('click', () => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const exRows = logState.rows.filter(r => r.exercise_name === ex);
      const row = exRows[idx];
      logState.rows = logState.rows.filter(r => r !== row);
      exRows.forEach((r, i) => { if (r !== row && i >= idx) r.set_number = Math.max(1, r.set_number - 1); });
      // renumber remaining
      const remaining = logState.rows.filter(r => r.exercise_name === ex);
      remaining.forEach((r, i) => { r.set_number = i + 1; });
      paint();
      triggerAutoSave();
    }));
    document.querySelectorAll('.addSet').forEach(el => el.addEventListener('click', () => {
      const ex = el.dataset.ex;
      const exRows = logState.rows.filter(r => r.exercise_name === ex);
      const nextNum = exRows.length ? Math.max(...exRows.map(r => r.set_number)) + 1 : 1;
      logState.rows.push({ exercise_name: ex, set_number: nextNum, reps: '', weight_lbs: '' });
      paint();
      triggerAutoSave();
    }));
    $('notes').addEventListener('input', e => { logState.notes = e.target.value; triggerAutoSave(); });
    $('btnSave').addEventListener('click', async () => {
      clearTimeout(_autoSaveTimer);
      const setsToSave = logState.rows
        .filter(r => r.weight_lbs !== '' || r.reps !== '')
        .map(r => ({
          exercise_name: r.exercise_name,
          set_number: r.set_number,
          reps: r.reps === '' ? null : Number(r.reps),
          weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
        }));
      if (setsToSave.length === 0 && !logState.notes) {
        if (!confirm('No sets filled in. Save anyway?')) return;
      }
      $('btnSave').disabled = true; $('btnSave').textContent = 'Finishing...';
      try {
        await qFinishSession(logState);
        toast('Workout saved.');
        nav('#/');
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        $('btnSave').disabled = false; $('btnSave').textContent = 'Finish workout';
      }
    });
  };

  paint();
}

        <a href="#/" class="text-sm text-zinc-400 hover:text-white">Cancel</a>
      </div>
    </div>
    <div class="card space-y-3">
      <div>

        <select id="cType" class="input">

        <label class="label">Duration (minutes)</label>

      <div>
        <label class="label">Notes (optional)</label>
        <textarea id="cNotes" class="input" rows="2" placeholder="Pace, distance, incline...">${esc(logState.notes)}</textarea>
      </div>
    </div>
    <button id="btnSave" class="btn btn-primary w-full mt-4">Finish cardio</button>`);

  $('cDur').addEventListener('input', e => { logState.cardio_duration_min = Number(e.target.value) || ''; triggerAutoSave(); });
  $('cNotes').addEventListener('input', e => { logState.notes = e.target.value; triggerAutoSave(); });

      await qFinishSession(logState);

      $('btnSave').disabled = false; $('btnSave').textContent = 'Finish cardio';
    }
  });
}

/* =========================================================
   VIEW: PLAN EDITOR
   ========================================================= */
function renderPlanEditor() {
  const plan = state.plan;
  if (!plan) { nav('#/'); return; }
  // reuse the onboard data shape, seed from current plan
  const data = {
    split_type: plan.split_type,
    days: plan.days.sort((a,b)=>a.day_of_week-b.day_of_week).map(d => d.slot_type),
    dayMeta: Array.from({length:7}, (_, i) => {
      const d = plan.days.find(x => x.day_of_week === i) || {};
      return { custom_name: d.custom_name, cardio_type: d.cardio_type, cardio_duration_min: d.cardio_duration_min, subSplits: d.sub_splits ? [...d.sub_splits] : [] };
    }),
    exercises: {},
  };
  plan.exercises.forEach(e => {
    (data.exercises[e.slot_type] = data.exercises[e.slot_type] || []).push({
      exercise_name: e.exercise_name, target_sets: e.target_sets, target_reps: e.target_reps
    });
  });

  const paint = () => {
    const split = SPLITS[data.split_type] || SPLITS.custom;
    const slotOptions = [...split.slots, 'cardio', 'rest'];
    const dayRow = (i) => {
      const slot = data.days[i];
      const meta = data.dayMeta[i] || {};
      const opts = slotOptions.map(s => `<option value="${s}" ${slot===s?'selected':''}>${SLOT_LABEL[s]}</option>`).join('');
      const cardio = slot === 'cardio' ? `
        <div class="mt-2 grid grid-cols-2 gap-2">
          <select data-day="${i}" class="cardioType input text-sm">
            <option value="">Type</option>
            ${CARDIO_TYPES.map(c => `<option value="${c}" ${meta.cardio_type===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <input data-day="${i}" type="number" min="5" max="180" value="${esc(meta.cardio_duration_min ?? '')}" class="cardioDur input text-sm" placeholder="min" />
        </div>` : '';
      const customF = slot === 'custom' ? `
        <input data-day="${i}" class="customName input text-sm mt-2" value="${esc(meta.custom_name ?? '')}" placeholder="Custom name" />` : '';
      return `
        <div class="card !p-3">
          <div class="flex items-center gap-2">
            <div class="w-12 text-sm text-zinc-400 font-medium">${DOW_SHORT[i]}</div>
            <select data-day="${i}" class="slotPick input text-sm flex-1">${opts}</select>
            ${slotChip(slot, meta.custom_name)}
          </div>
          ${cardio}${customF}
          ${slot !== 'rest' ? subSplitsUI(i, meta.subSplits, 'editor') : ''}
        </div>`;
    };

    const uniqueSlots = [...new Set(data.days.filter(s => s !== 'rest' && s !== 'cardio'))];
    const slotBlock = (slot) => {
      const picked = data.exercises[slot] || [];
      const rows = picked.map((ex, i) => `
        <div class="ex-edit-row">
          <input data-slot="${slot}" data-i="${i}" class="exName input" value="${esc(ex.exercise_name)}" placeholder="Exercise name" />
          <input data-slot="${slot}" data-i="${i}" class="exSets input" type="number" inputmode="numeric" min="1" max="10" value="${esc(ex.target_sets)}" placeholder="sets" />
          <input data-slot="${slot}" data-i="${i}" class="exReps input" value="${esc(ex.target_reps)}" placeholder="reps" />
          <button data-slot="${slot}" data-i="${i}" class="exDel" title="Remove">×</button>
        </div>`).join('');
      return `
        <div class="card">
          <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">${slotChip(slot)}<span class="font-semibold">${SLOT_LABEL[slot]}</span></div>
            <button data-slot="${slot}" class="exAdd text-sm text-emerald-400 hover:text-emerald-300">+ Add</button>
          </div>
          <div id="slot-${slot}-rows">${rows || '<div class="text-sm text-zinc-500 py-2">No exercises yet.</div>'}</div>
        </div>`;
    };

    appEl().innerHTML = shell(`
      <h1 class="text-2xl font-bold mb-4">Your plan</h1>

      <div class="card mb-4">
        <label class="label">Split type</label>
        <select id="splitType" class="input">
          ${Object.entries(SPLITS).map(([k,v]) => `<option value="${k}" ${data.split_type===k?'selected':''}>${v.name}</option>`).join('')}
        </select>
        <p class="text-xs text-zinc-500 mt-2">Changing split won't wipe your exercises, but may hide ones that don't match new slots.</p>
      </div>

      <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Week</div>
      <div class="space-y-2 mb-6">${data.days.map((_,i)=>dayRow(i)).join('')}</div>

      <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Exercises</div>
      <div class="space-y-3 mb-6">${uniqueSlots.length ? uniqueSlots.map(slotBlock).join('') : '<div class="card text-zinc-500 text-sm">No workout days assigned.</div>'}</div>

      <div class="flex gap-2">
        <button id="btnSave" class="btn btn-primary flex-1">Save plan</button>
        <a href="#/" class="btn btn-ghost">Cancel</a>
      </div>`);

    $('splitType').addEventListener('change', e => { data.split_type = e.target.value; paint(); });
    document.querySelectorAll('.slotPick').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); data.days[i] = e.target.value; data.dayMeta[i] = { subSplits: [] }; paint();
    }));
    document.querySelectorAll('.cardioType').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].cardio_type = e.target.value;
    }));
    document.querySelectorAll('.cardioDur').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].cardio_duration_min = Number(e.target.value) || null;
    }));
    document.querySelectorAll('.customName').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].custom_name = e.target.value;
    }));
    wireSubSplits(i => { if (!data.dayMeta[i]) data.dayMeta[i] = {}; if (!data.dayMeta[i].subSplits) data.dayMeta[i].subSplits = []; return data.dayMeta[i]; }, paint);
    document.querySelectorAll('.exName').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].exercise_name = e.target.value;
    }));
    document.querySelectorAll('.exSets').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].target_sets = Number(e.target.value) || 3;
    }));
    document.querySelectorAll('.exReps').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].target_reps = e.target.value;
    }));
    document.querySelectorAll('.exDel').forEach(el => el.addEventListener('click', () => {
      data.exercises[el.dataset.slot].splice(Number(el.dataset.i), 1); paint();
    }));
    document.querySelectorAll('.exAdd').forEach(el => el.addEventListener('click', () => {
      const slot = el.dataset.slot;
      data.exercises[slot] = data.exercises[slot] || [];
      const lib = EXERCISE_LIBRARY[slot] || [];
      const suggestion = lib[data.exercises[slot].length] || { name:'', target_sets:3, target_reps:'8-12' };
      data.exercises[slot].push({ exercise_name: suggestion.name || '', target_sets: suggestion.target_sets, target_reps: suggestion.target_reps });
      paint();
    }));
    $('btnSave').addEventListener('click', async () => {
      $('btnSave').disabled = true; $('btnSave').textContent = 'Saving...';
      try {
        const days = data.days.map((slot, i) => ({
          slot_type: slot,
          custom_name: data.dayMeta[i]?.custom_name || null,
          cardio_type: data.dayMeta[i]?.cardio_type || null,
          cardio_duration_min: data.dayMeta[i]?.cardio_duration_min || null,
          sub_splits: (data.dayMeta[i]?.subSplits || []).filter(ss => ss.type) || null,
        }));
        const flat = [];
        Object.entries(data.exercises).forEach(([slot, list]) => {
          list.filter(x => x.exercise_name?.trim()).forEach(x => flat.push({
            slot_type: slot, exercise_name: x.exercise_name.trim(), target_sets: x.target_sets, target_reps: x.target_reps,
          }));
        });
        await qSavePlan({ split_type: data.split_type, name: SPLITS[data.split_type].name, days, exercises: flat });
        state.plan = await qActivePlan();
        toast('Plan saved.');
        nav('#/');
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        $('btnSave').disabled = false; $('btnSave').textContent = 'Save plan';
      }
    });
  };
  paint();
}

/* =========================================================
   VIEW: HISTORY
   ========================================================= */
async function renderHistory() {
  appEl().innerHTML = shell(`<h1 class="text-2xl font-bold mb-4">History</h1><div class="text-zinc-500">Loading...</div>`);
  const rows = await qHistory(100);
  if (rows.length === 0) {
    appEl().innerHTML = shell(`<h1 class="text-2xl font-bold mb-4">History</h1><div class="card text-zinc-500 text-sm">No sessions logged yet.</div>`);
    return;
  }

  // Detect duplicate dates
  const dateCounts = {};
  rows.forEach(r => { dateCounts[r.session_date] = (dateCounts[r.session_date] || 0) + 1; });

  // group by month
  const groups = {};
  rows.forEach(r => {
    const d = new Date(r.session_date + 'T00:00:00');
    const key = d.toLocaleDateString(undefined, { year:'numeric', month:'long' });
    (groups[key] = groups[key] || []).push(r);
  });
  const groupHtml = Object.entries(groups).map(([k, list]) => `
    <div class="mb-5">
      <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">${esc(k)}</div>
      <div class="card !p-0 divide-y divide-zinc-800">
        ${list.map(r => {
          const sets = r.set_logs || [];
          const volume = sets.reduce((a,s) => a + (Number(s.reps)||0) * (Number(s.weight_lbs)||0), 0);
          const isDupe = dateCounts[r.session_date] > 1;
          return `
            <details class="group">
              <summary class="flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-zinc-900/60">
                <div class="flex items-center gap-3">
                  ${slotChip(r.slot_type)}
                  <span class="text-sm">${fmtDate(r.session_date)}</span>
                  ${isDupe ? '<span class="text-[10px] text-amber-400 bg-amber-400/10 px-1.5 rounded">dupe</span>' : ''}
                </div>
                <div class="text-xs text-zinc-500">
                  ${r.slot_type==='cardio' ? `${esc(r.cardio_type||'')}${r.cardio_duration_min?` \u00b7 ${r.cardio_duration_min}m`:''}` : `${sets.length} sets${volume?` \u00b7 ${fmtWt(volume)} lbs vol`:''}`}
                </div>
              </summary>
              <div class="px-4 pb-3 text-sm">
                ${r.slot_type==='cardio'
                  ? `<div class="text-zinc-400">${esc(r.cardio_type||'')} ${r.cardio_duration_min?` \u00b7 ${r.cardio_duration_min} min`:''}</div>`
                  : (() => {
                      const byEx = {};
                      sets.sort((a,b)=>a.set_number-b.set_number).forEach(s => (byEx[s.exercise_name]=byEx[s.exercise_name]||[]).push(s));
                      return Object.entries(byEx).map(([name, list]) => `
                        <div class="py-1">
                          <div class="font-medium">${ytLink(name)}</div>
                          <div class="text-zinc-400 text-xs">${list.map(s => `${s.weight_lbs ?? '-'}\u00d7${s.reps ?? '-'}`).join(' \u00b7 ')}</div>
                        </div>`).join('');
                    })()
                }
                ${r.notes ? `<div class="mt-2 pt-2 border-t border-zinc-800 text-zinc-400 text-xs whitespace-pre-wrap">${esc(r.notes)}</div>` : ''}
                <div class="mt-3 pt-2 border-t border-zinc-800 flex gap-2 flex-wrap">
                  <button data-sid="${r.id}" class="histDel btn btn-danger text-xs !py-1 !px-2">Delete</button>
                  <button data-sid="${r.id}" data-date="${r.session_date}" data-slot="${r.slot_type}" class="histOverwrite btn btn-ghost text-xs !py-1 !px-2">Re-log this day (overwrite)</button>
                  <button data-date="${r.session_date}" data-slot="${r.slot_type}" class="histAdd btn btn-ghost text-xs !py-1 !px-2">Add another entry</button>
                </div>
              </div>
            </details>`;
        }).join('')}
      </div>
    </div>`).join('');
  appEl().innerHTML = shell(`<h1 class="text-2xl font-bold mb-4">History</h1>${groupHtml}`);

  // Wire delete buttons
  document.querySelectorAll('.histDel').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!confirm('Delete this session permanently?')) return;
    el.disabled = true; el.textContent = 'Deleting...';
    try {
      await qDeleteSession(el.dataset.sid);
      toast('Session deleted.');
      renderHistory();
    } catch (err) {
      console.error(err); toast(err.message || 'Delete failed', 'error');
      el.disabled = false; el.textContent = 'Delete';
    }
  }));

  // Wire overwrite buttons - delete old, then open log for that date
  document.querySelectorAll('.histOverwrite').forEach(el => el.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (!confirm('This will delete the existing entry and let you re-log. Continue?')) return;
    el.disabled = true; el.textContent = 'Preparing...';
    try {
      await qDeleteSession(el.dataset.sid);
      const day = state.plan?.days?.find(d => d.slot_type === el.dataset.slot) || {};
      renderLogFor(el.dataset.slot, day, el.dataset.date);
    } catch (err) {
      console.error(err); toast(err.message || 'Failed', 'error');
      el.disabled = false; el.textContent = 'Re-log this day (overwrite)';
    }
  }));

  // Wire add-another buttons - open log for that date without deleting
  document.querySelectorAll('.histAdd').forEach(el => el.addEventListener('click', (e) => {
    e.stopPropagation();
    const day = state.plan?.days?.find(d => d.slot_type === el.dataset.slot) || {};
    renderLogFor(el.dataset.slot, day, el.dataset.date);
  }));
}
