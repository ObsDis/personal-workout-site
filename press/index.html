<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Press — BarbellMind</title>
<meta name="description" content="Press inquiries, media assets, and interviews for BarbellMind." />
<link rel="icon" href="/AppIcon-1024.png" />
<link rel="stylesheet" href="/site.css" />
</head>
<body>
<div id="site-nav"></div>

<section class="page-hero"><div class="wrap"><span class="eyebrow">Press</span><h1>Press and media</h1><p>Writing about BarbellMind or want assets and an interview? Send a note and we will get back to you.</p></div></section>
<section class="band"><div class="wrap">
  <form id="contactForm" class="formcard" novalidate>
    <div class="field"><label for="cf-email">Your email</label><input id="cf-email" name="email" type="email" placeholder="you@outlet.com" required /></div>
    <div class="field"><label for="cf-subject">Subject</label><input id="cf-subject" name="subject" type="text" placeholder="Press inquiry" /></div>
    <div class="field"><label for="cf-message">Message</label><textarea id="cf-message" name="message" placeholder="Tell us what you are working on" required></textarea></div>
    <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Send message</button>
    <div id="contactMsg" class="formmsg"></div>
  </form>
</div></section>

<div id="site-footer"></div>
<script src="/site.js"></script>
</body>
</html>
