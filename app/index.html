function stepSplit(d) {
  const card = (key, title, blurb, days) => `
    <button data-split="${key}" class="splitPick w-full text-left card hover:border-zinc-500 ${d.split_type===key?'!border-emerald-600 bg-zinc-900':''}">
      <div class="flex items-center justify-between mb-2">
        <div class="font-semibold">${title}</div>
        <div class="text-xs text-zinc-500">${days}</div>
      </div>
      <div class="text-sm text-zinc-400">${blurb}</div>
    </button>`;
  return `
    <h1 class="text-2xl font-bold mb-1">Pick a split</h1>
    <p class="text-zinc-400 text-sm mb-6">You can fully customize days and exercises next.</p>
    <div class="space-y-3">
      ${card('ppl', 'Push / Pull / Legs', 'High frequency, great for building muscle. Usually 6 days.', '5-6x/wk')}
      ${card('upper_lower', 'Upper / Lower', 'Balanced volume across the week. Good if you have 4 days.', '3-4x/wk')}
      ${card('full_body', 'Full Body', 'Efficient, hits everything each session. Good for 3 days.', '3x/wk')}
      ${card('custom', 'Build your own', 'Mix any slot types however you want.', 'any')}
    </div>
    <button id="btnNext" class="btn btn-primary w-full mt-6" ${d.split_type?'':'disabled'}>Continue</button>`;
}

function stepDays(d) {
  const split = SPLITS[d.split_type];
  const slots = [...split.slots, 'cardio', 'rest'];
  const dayRow = (i) => {
    const slot = d.days[i];
    const meta = d.dayMeta[i] || {};
    const opts = slots.map(s => `<option value="${s}" ${slot===s?'selected':''}>${SLOT_LABEL[s]}</option>`).join('');
    const cardioFields = slot === 'cardio' ? `
      <div class="mt-2 grid grid-cols-2 gap-2">
        <select data-day="${i}" class="cardioType input text-sm">
          <option value="">Type</option>
          ${CARDIO_TYPES.map(c => `<option value="${c}" ${meta.cardio_type===c?'selected':''}>${c}</option>`).join('')}
        </select>
        <input data-day="${i}" type="number" min="5" max="180" value="${esc(meta.cardio_duration_min ?? '')}" class="cardioDur input text-sm" placeholder="min" />
      </div>` : '';
    const customField = slot === 'custom' ? `
      <input data-day="${i}" class="customName input text-sm mt-2" value="${esc(meta.custom_name ?? '')}" placeholder="Custom name (e.g. Arms)" />` : '';
    return `
      <div class="card !p-3">
        <div class="flex items-center gap-2">
          <div class="w-12 text-sm text-zinc-400 font-medium">${DOW_SHORT[i]}</div>
          <select data-day="${i}" class="slotPick input text-sm flex-1">${opts}</select>
          ${slotChip(slot, meta.custom_name)}
        </div>
        ${cardioFields}
        ${customField}
        ${slot !== 'rest' ? subSplitsUI(i, meta.subSplits, 'onboard') : ''}
      </div>`;
  };
  const workoutCount = d.days.filter(s => s !== 'rest').length;
  return `
    <h1 class="text-2xl font-bold mb-1">Pick your days</h1>
    <p class="text-zinc-400 text-sm mb-4">Assign each day of the week. ${workoutCount} workout day${workoutCount===1?'':'s'} planned.</p>
    <div class="flex items-center justify-between mb-4">
      <div class="text-xs text-zinc-500">Quick fill:</div>
      <button id="btnTemplate" class="text-xs text-emerald-400 hover:text-emerald-300">Use ${split.name} default</button>
    </div>
    <div class="space-y-2">${d.days.map((_, i) => dayRow(i)).join('')}</div>
    <button id="btnNext" class="btn btn-primary w-full mt-6">Continue</button>`;
}

function stepExercises(d) {
  const uniqueSlots = [...new Set(d.days.filter(s => s !== 'rest' && s !== 'cardio'))];
  if (uniqueSlots.length === 0) {
    return `
      <h1 class="text-2xl font-bold mb-1">Exercises</h1>
      <p class="text-zinc-400 text-sm mb-6">You only have rest or cardio days. Nothing to set up here.</p>
      <button id="btnFinish" class="btn btn-primary w-full">Finish and save</button>`;
  }
  const slotBlock = (slot) => {
    const lib = EXERCISE_LIBRARY[slot] || [];
    const picked = d.exercises[slot] || lib.map(x => ({ exercise_name: x.name, target_sets: x.target_sets, target_reps: x.target_reps }));
    d.exercises[slot] = picked;
    const rows = picked.map((ex, i) => `
      <div class="ex-edit-row">
        <input data-slot="${slot}" data-i="${i}" class="exName input" value="${esc(ex.exercise_name)}" placeholder="Exercise name" />
        <input data-slot="${slot}" data-i="${i}" class="exSets input" type="number" inputmode="numeric" min="1" max="10" value="${esc(ex.target_sets)}" placeholder="sets" />
        <input data-slot="${slot}" data-i="${i}" class="exReps input" value="${esc(ex.target_reps)}" placeholder="reps" />
        <button data-slot="${slot}" data-i="${i}" class="exDel" title="Remove">×</button>
      </div>`).join('');
    return `
      <div class="card">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            ${slotChip(slot)}
            <span class="font-semibold">${SLOT_LABEL[slot]}</span>
          </div>
          <button data-slot="${slot}" class="exAdd text-sm text-emerald-400 hover:text-emerald-300">+ Add</button>
        </div>
        <div class="text-xs text-zinc-500 flex gap-2 px-1 mb-1"><span class="flex-1">Exercise</span><span class="w-16 text-center">Sets</span><span class="w-20 text-center">Reps</span><span class="w-6"></span></div>
        <div id="slot-${slot}-rows">${rows || '<div class="text-sm text-zinc-500 py-2">No exercises yet.</div>'}</div>
      </div>`;
  };
  return `
    <h1 class="text-2xl font-bold mb-1">Set your exercises</h1>
    <p class="text-zinc-400 text-sm mb-6">Pre-filled from the library. Tweak anything you want.</p>
    <div class="space-y-3">${uniqueSlots.map(slotBlock).join('')}</div>
    <button id="btnFinish" class="btn btn-primary w-full mt-6">Finish and save</button>`;
}

function wireCurrentStep() {
  const s = state.onboard;
  const d = s.data;
  if (s.step === 0) {
    $('btnNext').addEventListener('click', () => {
      d.age = Number($('i_age').value) || null;
      d.height_ft = Number($('i_ft').value) || null;
      d.height_in = Number($('i_in').value) || null;
      d.weight_lbs = Number($('i_wt').value) || null;
      if (!d.age || !d.height_ft || d.weight_lbs == null) { toast('Fill in age, height, and weight.', 'error'); return; }
      s.step++; renderOnboard();
    });
  }
  if (s.step === 1) {
    document.querySelectorAll('input[name="goal"]').forEach(el => {
      el.addEventListener('change', (e) => { d.goal = e.target.value; renderOnboard(); });
    });
    $('btnNext').addEventListener('click', () => { if (!d.goal) return; s.step++; renderOnboard(); });
  }
  if (s.step === 2) {
    document.querySelectorAll('.minPick').forEach(b => b.addEventListener('click', () => {
      d.daily_minutes = Number(b.dataset.mins); renderOnboard();
    }));
    $('i_min').addEventListener('input', e => { d.daily_minutes = Number(e.target.value) || ''; $('btnNext').disabled = !d.daily_minutes; });
    $('btnNext').addEventListener('click', () => { if (!d.daily_minutes) return; s.step++; renderOnboard(); });
  }
  if (s.step === 3) {
    document.querySelectorAll('.splitPick').forEach(b => b.addEventListener('click', () => {
      d.split_type = b.dataset.split;
      d.days = [...SPLITS[d.split_type].template];
      d.exercises = {};
      renderOnboard();
    }));
    $('btnNext').addEventListener('click', () => { if (!d.split_type) return; s.step++; renderOnboard(); });
  }
  if (s.step === 4) {
    document.querySelectorAll('.slotPick').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day);
      d.days[i] = e.target.value;
      d.dayMeta[i] = { subSplits: [] };
      renderOnboard();
    }));
    document.querySelectorAll('.cardioType').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].cardio_type = e.target.value;
    }));
    document.querySelectorAll('.cardioDur').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].cardio_duration_min = Number(e.target.value) || null;
    }));
    document.querySelectorAll('.customName').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); d.dayMeta[i].custom_name = e.target.value;
    }));
    $('btnTemplate').addEventListener('click', () => {
      d.days = [...SPLITS[d.split_type].template];
      d.dayMeta = [{},{},{},{},{},{},{}];
      renderOnboard();
    });
    wireSubSplits(i => { if (!d.dayMeta[i]) d.dayMeta[i] = {}; if (!d.dayMeta[i].subSplits) d.dayMeta[i].subSplits = []; return d.dayMeta[i]; }, renderOnboard);
    $('btnNext').addEventListener('click', () => { s.step++; renderOnboard(); });
  }
  if (s.step === 5) {
    document.querySelectorAll('.exName').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].exercise_name = e.target.value;
    }));
    document.querySelectorAll('.exSets').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].target_sets = Number(e.target.value) || 3;
    }));
    document.querySelectorAll('.exReps').forEach(el => el.addEventListener('input', e => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot][i].target_reps = e.target.value;
    }));
    document.querySelectorAll('.exDel').forEach(el => el.addEventListener('click', () => {
      const slot = el.dataset.slot, i = Number(el.dataset.i);
      d.exercises[slot].splice(i, 1);
      renderOnboard();
    }));
    document.querySelectorAll('.exAdd').forEach(el => el.addEventListener('click', () => {
      const slot = el.dataset.slot;
      d.exercises[slot] = d.exercises[slot] || [];
      d.exercises[slot].push({ exercise_name: '', target_sets: 3, target_reps: '8-12' });
      renderOnboard();
    }));
    if ($('btnFinish')) $('btnFinish').addEventListener('click', finishOnboarding);
  }
}

async function finishOnboarding() {
  const d = state.onboard.data;
  const btn = $('btnFinish'); btn.disabled = true; btn.textContent = 'Saving...';
  try {
    // 1. save profile
    await qSaveProfile({
      age: d.age, height_ft: d.height_ft, height_in: d.height_in, weight_lbs: d.weight_lbs,
      goal: d.goal, daily_minutes: d.daily_minutes,
    });
    // 2. build plan days + exercises
    const days = d.days.map((slot, i) => ({
      slot_type: slot,
      custom_name: d.dayMeta[i]?.custom_name || null,
      cardio_type: d.dayMeta[i]?.cardio_type || null,
      cardio_duration_min: d.dayMeta[i]?.cardio_duration_min || null,
      sub_splits: (d.dayMeta[i]?.subSplits || []).filter(ss => ss.type).map(ss => { const { customMode, ...rest } = ss; return rest; }) || null,
    }));
    const flatExercises = [];
    d.days.forEach((slot, i) => {
      if (!slot || slot === 'rest' || slot === 'cardio') return;
      const key = slot + '-' + i;
      (d.exercises[slot] || []).filter(x => x.exercise_name?.trim()).forEach(x => {
        flatExercises.push({ slot_type: slot, slot_key: key, exercise_name: x.exercise_name.trim(), target_sets: x.target_sets, target_reps: x.target_reps });
      });
    });
    await qSavePlan({ split_type: d.split_type, name: SPLITS[d.split_type].name, days, exercises: flatExercises });
    // 3. refresh
    state.profile = await qProfile();
    state.plan = await qActivePlan();
    state.onboard = null;
    toast('You are all set.');
    location.hash = '#/';
    route();
  } catch (e) {
    console.error(e);
    toast(e.message || 'Something went wrong saving.', 'error');
    btn.disabled = false; btn.textContent = 'Finish and save';
  }
}

// === DESIGN-HANDOFF SVG HELPERS (Arc, Ring, LinearBar, SparkLine, BarChart) ===
function svgArc({ value = 0, size = 132, stroke = 11, color = 'var(--m-cal)', track = 'rgba(255,255,255,0.06)' }) {
  // 270deg arc — starts at bottom-left, sweeps over top to bottom-right
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const fullArc = circ * (270 / 360);
  const v = Math.max(0, Math.min(1, value));
  const off = fullArc * (1 - v);
  return `<svg width="${size}" height="${size}" style="transform:rotate(135deg);overflow:visible;">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${track}" stroke-width="${stroke}" fill="none" stroke-dasharray="${fullArc} ${circ}" stroke-linecap="round"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${fullArc} ${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/>
  </svg>`;
}
function macroOverColor(color){ return `color-mix(in srgb, ${color} 42%, #ffffff)`; }
function svgRing({ value = 0, size = 32, stroke = 3.5, color = 'var(--green)', track = 'rgba(255,255,255,0.08)', overflow = false }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const base = Math.max(0, Math.min(1, value));
  const off = c * (1 - base);
  const over = overflow ? Math.max(0, Math.min(1, value - 1)) : 0;
  const offOver = c * (1 - over);
  const oc = macroOverColor(color);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg);overflow:visible;">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${track}" stroke-width="${stroke}" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    ${over > 0 ? `<circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${oc}" stroke-width="${stroke}" fill="none" stroke-dasharray="${c}" stroke-dashoffset="${offOver}" stroke-linecap="round" style="filter:drop-shadow(0 0 4px ${color});"/>` : ''}
  </svg>`;
}
function svgLinearBar({ value = 0, color = 'var(--green)', track = 'rgba(255,255,255,0.06)', height = 4, overflow = false }) {
  const v = Math.max(0, Math.min(1, value));
  const over = overflow ? Math.max(0, Math.min(1, value - 1)) : 0;
  const oc = macroOverColor(color);
  return `<div style="position:relative;width:100%;height:${height}px;background:${track};border-radius:${height/2}px;overflow:hidden;"><div style="width:${(v*100).toFixed(1)}%;height:100%;background:${color};border-radius:${height/2}px;"></div>${over>0?`<div style="position:absolute;top:0;left:0;width:${(over*100).toFixed(1)}%;height:100%;background:${oc};border-radius:${height/2}px;box-shadow:0 0 5px ${color};"></div>`:''}</div>`;
}
function svgSparkLine({ points = [], color = 'var(--green)', width = 140, height = 32 }) {
  if (!points || points.length < 2) return `<div style="height:${height}px;"></div>`;
  const mn = Math.min(...points), mx = Math.max(...points);
  const range = (mx - mn) || 1;
  const step = width / (points.length - 1);
  const path = points.map((v, i) => {
    const x = (i * step).toFixed(1);
    const y = (height - ((v - mn) / range) * height).toFixed(1);
    return `${i === 0 ? 'M' : 'L'}${x},${y}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" style="display:block;width:100%;height:${height}px;"><path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

// HTML-based bar chart with value labels above each bar.
//   compact: smaller text + tighter spacing, for the Today inline preview
//   when expanded, values + day initials are clearly readable
function htmlBarChart({ data, dayLabels, color = 'var(--m-cal)', highlight = -1, compact = false }) {
  if (!data || !data.length) return '';
  const mx = Math.max(...data.map(d => Number(d.value) || 0), 1);
  const fmtAbbr = (n) => {
    if (n >= 1000) return (n/1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
    return String(Math.round(n));
  };
  const barH = compact ? 38 : 64;
  const valFs = compact ? 9 : 11;
  const lblFs = compact ? 9 : 10;
  const gap   = compact ? 4 : 6;
  const bars = data.map((d, i) => {
    const v = Number(d.value) || 0;
    const pct = (v / mx) * 100;
    const isToday = i === highlight;
    const dim = (highlight >= 0 && !isToday) ? '.55' : '1';
    const lblCol = isToday ? color : 'var(--text-3)';
    const lblStr = (dayLabels && dayLabels[i]) || '';
    const valStr = v > 0 ? fmtAbbr(v) : '';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:${gap-2}px;flex:1;min-width:0;opacity:${dim};">
      <div style="font-size:${valFs}px;font-weight:700;color:${lblCol};font-variant-numeric:tabular-nums;line-height:1;height:${valFs+2}px;">${valStr}</div>
      <div style="width:100%;height:${barH}px;display:flex;align-items:flex-end;">
        <div style="width:100%;height:${pct.toFixed(1)}%;min-height:${v>0?'3px':'0'};background:${color};border-radius:3px;"></div>
      </div>
      <div style="font-size:${lblFs}px;font-weight:600;color:${isToday?color:'var(--text-3)'};line-height:1;">${lblStr}</div>
    </div>`;
  }).join('');
  return `<div style="display:flex;gap:${gap}px;align-items:flex-end;">${bars}</div>`;
}

function svgBarChart({ data = [], color = 'var(--m-cal)', height = 36, highlight = -1 }) {
  if (!data.length) return '';
  const mx = Math.max(...data.map(d => d.value), 1);
  const w = 200;
  const barW = w / data.length * 0.65;
  const gap = w / data.length * 0.35;
  return `<svg viewBox="0 0 ${w} ${height}" preserveAspectRatio="none" width="100%" height="${height}" style="display:block;">
    ${data.map((d, i) => {
      const x = (i * (w / data.length) + gap/2).toFixed(1);
      const h = ((d.value / mx) * height).toFixed(1);
      const y = (height - h).toFixed(1);
      const op = (highlight >= 0 && i !== highlight) ? '.5' : '1';
      return `<rect x="${x}" y="${y}" width="${barW.toFixed(1)}" height="${h}" rx="1.5" fill="${color}" opacity="${op}"/>`;
    }).join('')}
  </svg>`;
}

// Tappable stat detail sheet — opens a fullscreen bottom sheet with expanded info per card.
function statDetailSheet(kind) {
  const data = window._dashStats || {};
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;animation:sdFade .18s ease-out;';
  const sheet = document.createElement('div');
  sheet.style.cssText = 'width:100%;max-width:520px;background:var(--bg-card);border-top-left-radius:28px;border-top-right-radius:28px;padding:8px 18px calc(20px + var(--safe-bottom));max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;will-change:transform;transition:transform .22s cubic-bezier(.34,1.56,.64,1);';
  overlay.appendChild(sheet);
  // Inject keyframes once.
  if (!document.getElementById('sd-anims')) {
    const st = document.createElement('style');
    st.id = 'sd-anims';
    st.textContent = '@keyframes sdFade { from { opacity:0; } to { opacity:1; } } @keyframes sdSlide { from { transform:translateY(20px); } to { transform:translateY(0); } }';
    document.head.appendChild(st);
  }
  sheet.style.animation = 'sdSlide .24s cubic-bezier(.34,1.56,.64,1)';

  const close = () => {
    if (_closed) return;
    _closed = true;
    sheet.style.transform = 'translateY(110%)';

    setTimeout(() => overlay.remove(), 180);

    // Stash stat data for the detail sheet

    (allSets || []).forEach(sx => {

      });
      for (const [name, w] of Object.entries(thisWeekPeaks)) {

    // Sessions this week

    // === Final innerHTML ===

          <a href="#/profile" aria-label="Open profile" class="press" style="width:38px;height:38px;border-radius:999px;background:linear-gradient(135deg, #34D399, #0EA5E9);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#001A12;text-decoration:none;">${esc((firstName[0] || '?').toUpperCase())}</a>

  } catch (err) {

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}

   VIEW: LOG WORKOUT (today's slot, or pick)
   ========================================================= */
async function renderLog() {
  const plan = state.plan;
  if (!plan) { nav('#/'); return; }

  const dow = todayDow();
  const todayDay = plan.days.find(d => d.day_of_week === dow) || { slot_type:'rest' };
  if (todayDay.slot_type === 'rest') {
    const wDays = (plan.days || []).filter(d => d.slot_type !== 'rest' && d.slot_type !== 'cardio')
      .slice().sort((a, b) => ((a.day_of_week + 6) % 7) - ((b.day_of_week + 6) % 7));
    const dayBtns = wDays.map(d => `<button data-dow="${d.day_of_week}" class="logAnyDay btn btn-ghost">${esc(DOW_SHORT[d.day_of_week])} · ${esc(d.custom_name || SLOT_LABEL[d.slot_type] || d.slot_type)}</button>`).join('');
    const genericBtns = ['push','pull','legs','upper','lower','full','cardio'].map(s => `<button data-slot="${s}" class="logAny btn btn-ghost">${SLOT_LABEL[s]}</button>`).join('');
    appEl().innerHTML = shell(`
      <h1 class="text-2xl font-bold mb-2">Log</h1>
      <div class="card">
        <p class="text-zinc-400 mb-4">Today is a rest day. Log a workout anyway?</p>
        ${dayBtns ? `<div class="flex gap-2 flex-wrap mb-4">${dayBtns}</div><p class="text-zinc-500 text-xs mb-2">Or a generic slot:</p>` : ''}
        <div class="flex gap-2 flex-wrap">${genericBtns}</div>
      </div>`);
    document.querySelectorAll('.logAnyDay').forEach(b => b.addEventListener('click', () => {
      const d = (plan.days || []).find(x => x.day_of_week === Number(b.dataset.dow));
      if (d) renderLogFor(d.slot_type, d);
    }));
    document.querySelectorAll('.logAny').forEach(b => b.addEventListener('click', () => {
      renderLogFor(b.dataset.slot, { cardio_type: null, cardio_duration_min: null, custom_name: null });
    }));
    return;
  }
  renderLogFor(todayDay.slot_type, todayDay);
}

async function renderLogFor(slot, dayMeta = {}, overrideDate = null) {
  if (slot === 'cardio') return renderLogCardio(dayMeta, overrideDate);

  _currentSessionId = null; // reset for new log view
  const plan = state.plan;
  // Per-day exercise list: prefer the day's slot_key so two same-type days differ.
  const slotKey = dayKeyFor(dayMeta) || (dayMeta && dayMeta.slot_key) || slot;
  // Start from the plan's exercises for this day — but allow add/remove during the session.
  const baseExercises = plan ? plan.exercises.filter(e => (e.slot_key || e.slot_type) === slotKey).map(e => ({
    exercise_name: e.exercise_name,
    target_sets: e.target_sets,
    target_reps: e.target_reps,
  })) : [];

  const fetchExerciseStats = async () => {
    const out = {};
    // Run in parallel — for a 6-exercise slot that's 6 simultaneous queries.
    await Promise.all(baseExercises.map(async ex => {
      out[ex.exercise_name] = await qExerciseStats(ex.exercise_name);
    }));
    return out;
  };
  const statsMap = await fetchExerciseStats();

  // Try to load drafts: local (full structure incl. preset rows + mid-session edits)
  // + server (cross-device set values). Local takes priority for structure.
  pruneOldLocalDrafts();
  const local = !overrideDate ? loadLocalDraft(slot) : null;
  const draft = !overrideDate ? await qLoadDraft(slot) : null;
  // No active draft? fall back to the saved session for this slot+date (e.g. a
  // finished workout) so its entered values stay visible when reopened.
  let _finalizedSession = null;
  if (!local && !draft) { try { _finalizedSession = await qLoadSessionForSlot(slot, overrideDate || today()); } catch (_) {} }
  const srvSession = draft || _finalizedSession;

  // Always build the preset structure from the plan first so empty rows never vanish.
  const buildPresetRows = (exList) => exList.flatMap(ex => {
    const sets = [];
    for (let i = 1; i <= (ex.target_sets || 3); i++) {
      sets.push({ exercise_name: ex.exercise_name, set_number: i, reps: '', weight_lbs: '' });
    }
    return sets;
  });

  const logState = {
    slot_type: slot,
    session_date: overrideDate || null,
    notes: (local && local.notes) || srvSession?.notes || '',
    exercises: null,
    rows: null,
  };
  if (srvSession) _currentSessionId = srvSession.id;

  if (local && Array.isArray(local.exercises) && local.exercises.length) {
    // Local snapshot is authoritative — it knows about mid-session adds, removes, custom set counts.
    logState.exercises = local.exercises.map(e => ({ ...e }));
    logState.rows = (local.rows || []).map(r => ({ ...r }));
    if (local.startedAt) logState.startedAt = Number(local.startedAt);
    if (typeof local.activeIdx === 'number') logState.activeIdx = local.activeIdx;
    // Overlay any newer server-draft values onto local (last-write-wins on values only).
    if (srvSession && Array.isArray(srvSession.set_logs) && srvSession.set_logs.length) {
      const byKey = {};
      logState.rows.forEach((r, i) => { byKey[r.exercise_name + '#' + r.set_number] = i; });
      srvSession.set_logs.forEach(s => {
        const k = s.exercise_name + '#' + s.set_number;
        if (k in byKey) {
          const row = logState.rows[byKey[k]];
          // Prefer server value only if local row is still empty
          if (row.reps === '' || row.reps == null) row.reps = s.reps ?? '';
          if (row.weight_lbs === '' || row.weight_lbs == null) row.weight_lbs = s.weight_lbs ?? '';
        }
      });
    }
  } else {
    // No local snapshot. Start from plan preset; overlay server-draft values; add extras the server has.
    logState.exercises = baseExercises.map(e => ({ ...e }));
    logState.rows = buildPresetRows(logState.exercises);
    if (srvSession && Array.isArray(srvSession.set_logs) && srvSession.set_logs.length) {
      const draftSorted = [...srvSession.set_logs].sort((a,b) => a.set_number - b.set_number);
      const byKey = {};
      logState.rows.forEach((r, i) => { byKey[r.exercise_name + '#' + r.set_number] = i; });
      const seenExNames = new Set(logState.exercises.map(e => e.exercise_name));
      draftSorted.forEach(s => {
        const k = s.exercise_name + '#' + s.set_number;
        if (k in byKey) {
          logState.rows[byKey[k]].reps = s.reps ?? '';
          logState.rows[byKey[k]].weight_lbs = s.weight_lbs ?? '';
        } else if (seenExNames.has(s.exercise_name)) {
          // Extra set beyond the preset count for an existing exercise
          logState.rows.push({
            exercise_name: s.exercise_name,
            set_number: s.set_number,
            reps: s.reps ?? '',
            weight_lbs: s.weight_lbs ?? '',
          });
        } else {
          // Mid-session add that the user had typed into earlier
          logState.exercises.push({ exercise_name: s.exercise_name, target_sets: 3, target_reps: '8-12' });
          seenExNames.add(s.exercise_name);
          logState.rows.push({
            exercise_name: s.exercise_name,
            set_number: s.set_number,
            reps: s.reps ?? '',
            weight_lbs: s.weight_lbs ?? '',
          });
        }
      });
    }
  }

  // Merge any sets logged elsewhere today (e.g. via Claude / the MCP) into the
  // matching on-screen exercises, filling only empty fields so a lift logged
  // outside this screen shows up here without clobbering values you typed.
  try {
    const extById = await qTodaySetsByExercise(overrideDate || today());
    const onScreen = new Set(logState.exercises.map(e => e.exercise_name));
    const keyIdx = {};
    logState.rows.forEach((r, i) => { keyIdx[r.exercise_name + '#' + r.set_number] = i; });
    for (const exName in extById) {
      if (!onScreen.has(exName)) continue;
      extById[exName].sort((a, b) => a.set_number - b.set_number).forEach(sx => {
        const k = exName + '#' + sx.set_number;
        if (k in keyIdx) {
          const row = logState.rows[keyIdx[k]];
          if (row.reps === '' || row.reps == null) row.reps = sx.reps ?? '';
          if (row.weight_lbs === '' || row.weight_lbs == null) row.weight_lbs = sx.weight_lbs ?? '';
        } else {
          const idx = logState.rows.push({ exercise_name: exName, set_number: sx.set_number, reps: sx.reps ?? '', weight_lbs: sx.weight_lbs ?? '' }) - 1;
          keyIdx[k] = idx;
        }
      });
    }
  } catch (_) {}

  const paint = () => {
    const byEx = {};
    logState.rows.forEach(r => { (byEx[r.exercise_name] = byEx[r.exercise_name] || []).push(r); });

    const exerciseHtmls = logState.exercises.map(ex => {
      const setRows = (byEx[ex.exercise_name] || []).map((r, idx) => `
        <div class="set-log-row" style="background:var(--bg-elevated);border-radius:10px;padding:4px;margin-bottom:5px;">
          <div class="set-num" style="font-weight:700;color:var(--text-2);">${r.set_number}</div>
          <input data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setWt input" type="number" inputmode="decimal" step="0.5" value="${esc(r.weight_lbs)}" placeholder="lbs" style="background:transparent;border:0;font-weight:600;" />
          <input data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setReps input" type="number" inputmode="numeric" value="${esc(r.reps)}" placeholder="reps" style="background:transparent;border:0;font-weight:600;" />
          <button data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setRepeat" title="Copy this weight/reps to remaining empty sets" style="background:transparent;border:0;color:var(--green);cursor:pointer;font-size:1.05rem;line-height:1;padding:0 .25rem;font-weight:700;">↓</button>
          <button data-ex="${esc(ex.exercise_name)}" data-idx="${idx}" class="setDel" title="Remove set">×</button>
        </div>`).join('');
      const stat = statsMap[ex.exercise_name] || {};
      const { lastHeaviest, lifetimePR } = stat;
      const fmtBest = (b) => b ? `${fmtWt(b.weight)} lbs × ${b.reps}` : null;
      const lastLine = (lastHeaviest || lifetimePR) ? `
        <div style="display:flex;flex-wrap:wrap;gap:.75rem;font-size:.7rem;margin-bottom:.25rem;font-variant-numeric:tabular-nums;">
          ${lastHeaviest ? `<span style="display:inline-flex;align-items:center;gap:.25rem;">
            <span style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;font-size:.6rem;">Last</span>
            <span style="color:#93c5fd;font-weight:700;">${fmtBest(lastHeaviest)}</span>
          </span>` : ''}
          ${lifetimePR ? `<span style="display:inline-flex;align-items:center;gap:.25rem;">
            <span style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;font-size:.6rem;">PR</span>
            <span style="color:#fcd34d;font-weight:700;">${fmtBest(lifetimePR)}</span>
          </span>` : ''}
        </div>` : '';
      return `
        <div class="card log-ex-card" data-log-ex="${esc(ex.exercise_name)}">
          <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:.5rem;">
            <div style="display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:600;background:rgba(16,185,129,.10);border:1px solid rgba(16,185,129,.25);color:var(--accent);padding:.25rem .55rem;border-radius:999px;">
              <span style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-size:.62rem;font-weight:700;">Target</span>
              <span style="color:var(--accent);font-variant-numeric:tabular-nums;">${(byEx[ex.exercise_name] || []).length}</span>
              <span style="color:var(--text-muted);">×</span>
              <span style="color:#fcd34d;font-variant-numeric:tabular-nums;">${esc(ex.target_reps)}</span>
            </div>
          </div>
          ${lastLine}
          <div class="text-[11px] text-zinc-500 flex gap-2 px-1 mt-2 mb-1">
            <span class="w-8 text-center">Set</span>
            <span class="flex-1 text-center">Weight</span>
            <span class="flex-1 text-center">Reps</span>
            <span class="w-6"></span>
          </div>
          ${setRows}
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.25rem;">
            <button data-ex="${esc(ex.exercise_name)}" class="addSet text-xs text-emerald-400 hover:text-emerald-300">+ Add set</button>
            <button data-ex="${esc(ex.exercise_name)}" class="exRemove" title="Remove this exercise from session" style="background:transparent;border:0;color:var(--danger);cursor:pointer;font-size:.75rem;padding:.25rem .5rem;font-weight:600;">remove</button>
          </div>
        </div>`;
    });
    const addType = logState.addType || 'exercise';
    const addCardio = logState.addCardio || { cardio_type: 'Treadmill Walk', duration_min: '', notes: '' };
    logState.addCardio = addCardio;
    const tBtn = (k, l) => `<button data-add-type="${k}" class="addTypePick" type="button" style="flex:1;padding:.4rem .5rem;background:${addType===k?'var(--accent)':'var(--bg-elevated)'};color:${addType===k?'#000':'var(--text)'};border:1px solid ${addType===k?'var(--accent)':'var(--border)'};border-radius:.5rem;font-weight:600;font-size:.75rem;cursor:pointer;">${l}</button>`;
    let typeSpecific = '';
    if (addType === 'exercise') {
      typeSpecific = `
        <div style="display:grid;grid-template-columns:1fr 64px 90px;gap:.375rem;margin-bottom:.5rem;">
          <input id="addExName"  class="input" placeholder="Exercise name" />
          <input id="addExSets"  class="input" type="number" inputmode="numeric" min="1" max="10" placeholder="sets" style="text-align:center;" />
          <input id="addExReps"  class="input" placeholder="reps" style="text-align:center;" />
        </div>`;
    } else if (addType === 'core') {
      const lib = (typeof CORE_EXERCISES !== 'undefined') ? Object.keys(CORE_EXERCISES) : [];
      const opts = lib.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
      typeSpecific = `
        <div style="display:grid;grid-template-columns:1fr 64px 90px;gap:.375rem;margin-bottom:.375rem;">
          <input id="addExName"  class="input" placeholder="Core exercise (e.g. Plank)" list="addCoreList" />
          <datalist id="addCoreList">${opts}</datalist>
          <input id="addExSets"  class="input" type="number" inputmode="numeric" min="1" max="10" value="3" style="text-align:center;" />
          <input id="addExReps"  class="input" placeholder="reps or 30s" style="text-align:center;" />
        </div>`;
    } else if (addType === 'stretching') {
      const lib = (typeof STRETCHING_EXERCISES !== 'undefined') ? Object.keys(STRETCHING_EXERCISES) : [];
      const opts = lib.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
      typeSpecific = `
        <div style="display:grid;grid-template-columns:1fr 64px 90px;gap:.375rem;margin-bottom:.375rem;">
          <input id="addExName"  class="input" placeholder="Stretch (e.g. Pigeon)" list="addStretchList" />
          <datalist id="addStretchList">${opts}</datalist>
          <input id="addExSets"  class="input" type="number" inputmode="numeric" min="1" max="10" value="1" style="text-align:center;" />
          <input id="addExReps"  class="input" placeholder="duration or reps" style="text-align:center;" />
        </div>`;
    } else if (addType === 'cardio') {
      const cardioOpts = (typeof CARDIO_TYPES !== 'undefined') ? CARDIO_TYPES : ['Treadmill Walk','Treadmill Run','Outdoor Walk','Outdoor Run','Stationary Bike','Rowing','Stairmaster','Elliptical','Jump Rope'];
      typeSpecific = `
        <div style="display:grid;grid-template-columns:1fr 100px;gap:.375rem;margin-bottom:.375rem;">
          <select id="addCardioType" class="input">
            ${cardioOpts.map(c => `<option value="${esc(c)}" ${addCardio.cardio_type===c?'selected':''}>${esc(c)}</option>`).join('')}
          </select>
          <input id="addCardioDur"  class="input" type="number" inputmode="numeric" min="1" max="240" value="${esc(addCardio.duration_min)}" placeholder="min" style="text-align:center;" />
        </div>
        <input id="addCardioNotes" class="input" value="${esc(addCardio.notes)}" placeholder="Notes (optional)" style="margin-bottom:.375rem;font-size:.875rem;" />
        <p style="font-size:.7rem;color:var(--text-muted);margin-bottom:.375rem;">Cardio is saved as a separate cardio session for today (so it shows up cleanly in History and Volume).</p>`;
    }
    const addExerciseUI = `
      <div class="card" style="border-style:dashed;">
        <div class="section-label" style="margin-bottom:.375rem;">Add to this session</div>
        <div style="display:flex;gap:.25rem;margin-bottom:.5rem;flex-wrap:wrap;">
          ${tBtn('exercise',   'Exercise')}
          ${tBtn('cardio',     'Cardio')}
          ${tBtn('core',       'Core')}
          ${tBtn('stretching', 'Stretch')}
        </div>
        ${typeSpecific}
        ${addType !== 'cardio' ? `<label style="display:flex;align-items:center;gap:.5rem;font-size:.8125rem;color:var(--text-secondary);margin-bottom:.5rem;cursor:pointer;">
          <input type="checkbox" id="addToPlan" ${logState.addToPlan?'checked':''} style="width:18px;height:18px;accent-color:var(--accent);" />
          <span>Also save to my plan (shows up in future ${SLOT_LABEL[slot] || slot} sessions)</span>
        </label>` : ''}
        <button id="addExBtn" class="btn btn-primary" style="width:100%;font-size:.8125rem;height:44px;">Add</button>
        <p style="font-size:.7rem;color:var(--text-muted);margin-top:.375rem;">${addType==='cardio' ? 'Cardio is saved as its own session.' : 'By default this stays in this session only.'}</p>
      </div>`;
    // ===== Wizard state =====
    if (logState.activeIdx == null) logState.activeIdx = 0;
    if (logState.activeIdx >= logState.exercises.length) {
      logState.activeIdx = Math.max(0, logState.exercises.length - 1);
    }
    if (!logState.startedAt) logState.startedAt = Date.now();
    const activeIdx = logState.activeIdx;
    const total = logState.exercises.length;
    const activeEx = logState.exercises[activeIdx];
    const activeHtml = exerciseHtmls[activeIdx] || `<div class="card text-zinc-500 text-sm">No exercises in this session yet. Add one below to get started.</div>`;

    // ===== Progress dots =====
    const dots = logState.exercises.map((ex, i) => {
      const exRows = (byEx[ex.exercise_name] || []);
      const filled = exRows.filter(r => (r.weight_lbs !== '' && r.weight_lbs != null) || (r.reps !== '' && r.reps != null)).length;
      const totalRows = exRows.length;
      const isActive = i === activeIdx;
      const isDone = totalRows > 0 && filled >= totalRows;
      const bg = isActive ? 'var(--accent)' : (isDone ? 'rgba(16,185,129,.6)' : 'var(--border)');
      const w = isActive ? '26px' : '10px';
      return `<button data-jump="${i}" class="dotJump" aria-label="Go to exercise ${i+1}" style="width:${w};height:6px;border-radius:3px;background:${bg};border:0;cursor:pointer;padding:0;flex-shrink:0;transition:width .25s;"></button>`;
    }).join('');

    // ===== Swap (jump-to) sheet =====
    const _logSlotKey = (t) => (t === 'upper' ? 'push' : t === 'lower' ? 'legs' : t === 'abs' ? 'core' : t === 'stretching' ? 'stretch' : (t || 'custom'));
    const _logSplitColor = `var(--${_logSlotKey(logState.slot_type)})`;
    const swapSheet = `
      <div id="swapSheet" style="display:none;position:fixed;left:0;right:0;bottom:0;top:0;z-index:90;background:rgba(0,0,0,.55);">
        <div style="position:absolute;bottom:0;left:0;right:0;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:18px 18px calc(env(safe-area-inset-bottom,0) + 24px);max-height:80vh;overflow:auto;">
          <div style="width:36px;height:4px;border-radius:2px;background:var(--text-muted);opacity:.4;margin:0 auto 14px;"></div>
          <div class="section-label" style="margin-bottom:.4rem;">Workout</div>
          <div style="font-size:.7rem;color:var(--text-muted);line-height:1.4;margin-bottom:.7rem;">Tap a row to jump. Press and drag the handle on the right to reorder.</div>
          <div id="swapItems">
            ${logState.exercises.map((ex, i) => {
              const rowsForEx = (byEx[ex.exercise_name] || []);
              const done = rowsForEx.filter(r => (r.weight_lbs !== '' && r.weight_lbs != null) || (r.reps !== '' && r.reps != null)).length;
              const totalSets = rowsForEx.length;
              const isActive = i === activeIdx;
              return `<div data-canonical="${esc(ex.exercise_name)}" class="swapItem" style="display:flex;align-items:center;gap:.45rem;padding:.55rem .55rem .55rem .75rem;border-radius:14px;border:1px solid var(--border);background:${isActive?'var(--bg-elevated)':'transparent'};margin-bottom:.4rem;color:var(--text);">
                <button data-jump="${i}" class="swapJump" type="button" style="flex:1;min-width:0;display:flex;align-items:center;gap:.65rem;background:transparent;border:0;padding:.1rem 0;text-align:left;color:var(--text);cursor:pointer;">
                  <span class="swapIdx" style="width:26px;height:26px;border-radius:50%;background:${isActive?'var(--accent)':'var(--bg-elevated)'};color:${isActive?'#000':'var(--text)'};font-weight:700;font-size:.78rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-variant-numeric:tabular-nums;">${i+1}</span>
                  <span style="flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(displayExName(ex.exercise_name))}</span>
                  <span style="font-size:.7rem;color:var(--text-muted);flex-shrink:0;font-variant-numeric:tabular-nums;">${done}/${totalSets}</span>
                </button>
                <span class="swapDrag" aria-label="Drag to reorder" title="Drag to reorder" style="color:${_logSplitColor};font-size:1.05rem;line-height:1;padding:.4rem .35rem .4rem .55rem;cursor:grab;touch-action:none;user-select:none;flex-shrink:0;opacity:.9;">⋮⋮</span>
              </div>`;
            }).join('')}
          </div>

          <button id="swapClose" class="btn" style="width:100%;margin-top:.5rem;background:var(--bg-elevated);color:var(--text);">Close</button>
        </div>
      </div>`;

    // ===== Overflow (skip / discard) sheet =====
    const overflowSheet = `
      <div id="ovMenu" style="display:none;position:fixed;left:0;right:0;bottom:0;top:0;z-index:90;background:rgba(0,0,0,.55);">
        <div style="position:absolute;bottom:0;left:0;right:0;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:18px 18px calc(env(safe-area-inset-bottom,0) + 24px);">
          <div style="width:36px;height:4px;border-radius:2px;background:var(--text-muted);opacity:.4;margin:0 auto 14px;"></div>
          <div class="section-label" style="margin-bottom:10px;">Workout options</div>
          <button id="ovSkipNow" class="btn" style="width:100%;margin-bottom:.4rem;background:var(--bg-elevated);color:var(--text);justify-content:flex-start;text-align:left;height:48px;border-radius:12px;padding:0 .9rem;">Pause workout (come back later)</button>
          <button id="ovSkipForever" class="btn" style="width:100%;margin-bottom:.4rem;background:var(--bg-elevated);color:var(--danger);justify-content:flex-start;text-align:left;height:48px;border-radius:12px;padding:0 .9rem;">Discard workout (clear draft)</button>
          <button id="ovClose" class="btn" style="width:100%;margin-top:.5rem;background:var(--bg-elevated);color:var(--text);">Cancel</button>
        </div>
      </div>`;

    const exerciseLabel = total > 0 ? `EXERCISE ${activeIdx + 1} OF ${total}` : 'NO EXERCISES YET';
    const elapsedSec = Math.floor((Date.now() - logState.startedAt) / 1000);
    const initTimer = `${String(Math.floor(elapsedSec/60)).padStart(2,'0')}:${String(elapsedSec%60).padStart(2,'0')}`;

    appEl().innerHTML = `
      ${swapSheet}
      ${overflowSheet}
      <div style="position:sticky;top:0;z-index:30;background:color-mix(in srgb, var(--bg) 88%, transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:calc(env(safe-area-inset-top,0) + .55rem) 1rem .55rem;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:.65rem;">
          <a href="#/" id="wizClose" aria-label="Close workout" style="font-size:1.35rem;line-height:1;color:var(--text);text-decoration:none;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg-elevated);font-weight:600;">×</a>
          <div style="display:flex;align-items:center;gap:.5rem;min-width:0;overflow:hidden;">
            ${slotChip(slot)}
            <span id="workoutTimer" style="font-variant-numeric:tabular-nums;font-size:.82rem;font-weight:700;color:var(--text);background:var(--bg-elevated);padding:.22rem .6rem;border-radius:999px;">${initTimer}</span>
          </div>
          <div style="display:flex;align-items:center;gap:.5rem;">
            <span id="autoSaveInd" style="font-size:.7rem;color:var(--accent);opacity:0;transition:opacity .3s;">Saved</span>
            <button id="logOverflow" aria-label="Workout options" style="width:34px;height:34px;border-radius:50%;background:var(--bg-elevated);color:var(--text);border:0;font-size:1.05rem;font-weight:800;cursor:pointer;">⋯</button>
          </div>
        </div>
        ${total > 0 ? `<div style="display:flex;gap:.28rem;justify-content:center;margin-top:.6rem;align-items:center;">${dots}</div>` : ''}
      </div>

      <main style="max-width:42rem;margin:0 auto;padding:1rem 1.05rem 8.5rem;">
        <div class="section-label" style="margin-bottom:.25rem;">${exerciseLabel}</div>
        <h1 id="logExH1" style="font-size:1.55rem;font-weight:800;letter-spacing:-0.03em;margin:0 0 .9rem;line-height:1.1;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;">
          ${activeEx ? `<span id="logExNameWrap" data-canonical="${esc(activeEx.exercise_name)}">${ytLinkDisplay(activeEx.exercise_name)}</span>
            <button id="btnEditExName" type="button" aria-label="Edit exercise name" title="Edit name" style="background:transparent;border:0;cursor:pointer;color:var(--text-muted);padding:.15rem;line-height:0;border-radius:.25rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>` : 'Add an exercise to begin'}
        </h1>

        <div id="logExListClip" style="overflow:hidden;"><div id="logExList" style="will-change:transform;transition:transform .22s ease-out;">${activeHtml}</div></div>

        ${activeEx ? `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-top:.75rem;">
          <button id="btnSwap"  class="btn" style="background:var(--bg-elevated);color:var(--text);font-weight:600;height:46px;border-radius:14px;">Swap</button>
          <button id="btnCoach" class="btn" style="background:var(--bg-elevated);color:var(--text);font-weight:600;height:46px;border-radius:14px;">Coach</button>
          <button id="btnNote"  class="btn" style="background:var(--bg-elevated);color:var(--text);font-weight:600;height:46px;border-radius:14px;">Note</button>
        </div>` : ''}

        <div id="noteWrap" style="display:${logState.notes ? 'block' : 'none'};margin-top:.6rem;">
          <textarea id="notes" class="input" rows="2" placeholder="Felt strong, 3s rest, etc.">${esc(logState.notes)}</textarea>
        </div>

        <div id="addExWrapper" style="display:${total === 0 ? 'block' : 'none'};margin-top:.85rem;">
          ${addExerciseUI}
        </div>
        ${total > 0 ? `<button id="btnAddExHere" class="btn" style="width:100%;margin-top:.85rem;background:transparent;color:var(--text-secondary);border:1px dashed var(--border);height:46px;border-radius:14px;font-weight:600;">+ Add an exercise</button>` : ''}
      </main>

      <div style="position:fixed;bottom:0;left:0;right:0;z-index:35;padding:.55rem 1rem calc(env(safe-area-inset-bottom,0) + .8rem);background:color-mix(in srgb, var(--bg) 92%, transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);">
        <div style="display:grid;grid-template-columns:auto 1fr;gap:.65rem;align-items:stretch;max-width:560px;margin:0 auto;">
          <button id="btnPrevEx" class="btn" ${activeIdx === 0 || total === 0 ? 'disabled' : ''} aria-label="Previous exercise" style="background:var(--bg-elevated);color:var(--text);font-weight:700;width:54px;height:54px;border-radius:16px;font-size:1.25rem;${activeIdx===0||total===0?'opacity:.4;':''}">‹</button>
          ${(activeIdx >= total - 1 || total === 0)
            ? `<button id="btnSave" class="btn btn-primary" style="height:54px;border-radius:16px;font-weight:800;font-size:1rem;">Finish workout</button>`
            : `<button id="btnNextEx" class="btn" style="background:var(--accent);color:#000;font-weight:800;height:54px;border-radius:16px;font-size:.98rem;">Next exercise ›</button>`}
        </div>
      </div>`;

    const triggerAutoSave = debounce(() => qAutoSave(logState));
    // Local snapshot persists the full session structure (preset rows, mid-session adds/removes,
    // entered values). It runs synchronously on every change so nav-away can't lose it.
    const saveLocal = () => saveLocalDraft(slot, logState);
    saveLocal();  // initial snapshot so a draft exists from the first paint
    document.querySelectorAll('.setWt').forEach(el => el.addEventListener('input', e => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const row = (logState.rows.filter(r => r.exercise_name === ex))[idx];
      if (row) { row.weight_lbs = e.target.value === '' ? '' : Number(e.target.value); saveLocal(); triggerAutoSave(); }
    }));
    document.querySelectorAll('.setReps').forEach(el => el.addEventListener('input', e => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const row = (logState.rows.filter(r => r.exercise_name === ex))[idx];
      if (row) { row.reps = e.target.value === '' ? '' : Number(e.target.value); saveLocal(); triggerAutoSave(); }
    }));
    document.querySelectorAll('.setDel').forEach(el => el.addEventListener('click', () => {
      const ex = el.dataset.ex, idx = Number(el.dataset.idx);
      const exRows = logState.rows.filter(r => r.exercise_name === ex);
      const row = exRows[idx];
      logState.rows = logState.rows.filter(r => r !== row);
      exRows.forEach((r, i) => { if (r !== row && i >= idx) r.set_number = Math.max(1, r.set_number - 1); });
      // renumber remaining
      const remaining = logState.rows.filter(r => r.exercise_name === ex);
      remaining.forEach((r, i) => { r.set_number = i + 1; });
      paint();
      saveLocal(); triggerAutoSave();
    }));
    // Sortable was used in the legacy single-page log view to reorder cards. The
    // wizard shows ONE exercise at a time, so reordering no longer applies — skip
    // the lazy-load entirely. Reordering can be done from the Plan editor instead.
    // (Use Swap from the wizard to jump between exercises.)
    document.querySelectorAll('.setRepeat').forEach(el => el.addEventListener('click', () => {
      const exName = el.dataset.ex;
      const i = Number(el.dataset.idx);
      // Get this exercise's rows in row order
      const exRows = logState.rows.filter(r => r.exercise_name === exName);
      const src = exRows[i];
      if (!src) return;
      const w = src.weight_lbs;
      const r = src.reps;
      if (w === '' && (r === '' || r == null)) {
        toast('Fill in this set first.', 'error');
        return;
      }
      let copied = 0;
      for (let j = i + 1; j < exRows.length; j++) {
        const tgt = exRows[j];
        if (!tgt) continue;
        if ((tgt.weight_lbs === '' || tgt.weight_lbs == null) && (tgt.reps === '' || tgt.reps == null)) {
          tgt.weight_lbs = w;
          tgt.reps = r;
          copied++;
        }
      }
      if (copied) {
        toast('Copied to ' + copied + ' set' + (copied===1?'':'s') + '.');
        saveLocal(); triggerAutoSave();
        paint();
      } else {
        toast('No empty sets after this one.', 'error');
      }
    }));
    document.querySelectorAll('.exRemove').forEach(el => el.addEventListener('click', () => {
      const exName = el.dataset.ex;
      openRemoveExerciseSheet(exName, slot, async (mode) => {
        // mode: 'session' | 'plan' | 'cancel'
        if (mode === 'cancel') return;
        logState.exercises = logState.exercises.filter(e => e.exercise_name !== exName);
        logState.rows = logState.rows.filter(r => r.exercise_name !== exName);
        if (mode === 'plan' && state.plan?.id) {
          try {
            const { error } = await sb.from('plan_exercises')
              .delete()
              .eq('plan_id', state.plan.id)
              .eq('slot_key', slotKey)
              .eq('exercise_name', exName);
            if (error) throw error;
            state.plan.exercises = (state.plan.exercises || []).filter(e =>
              !((e.slot_key || e.slot_type) === slotKey && e.exercise_name === exName));
            toast(exName + ' removed from this session and from your plan.');
          } catch (e) {
            console.error('plan delete failed', e);
            toast('Removed from session, but failed to remove from plan: ' + (e.message || 'unknown'), 'error');
          }
        } else {
          toast(exName + ' removed from this session.');
        }
        if (logState.activeIdx >= logState.exercises.length) {
          logState.activeIdx = Math.max(0, logState.exercises.length - 1);
        }
        saveLocal();
        paint();
      });
    }));
    document.querySelectorAll('.addTypePick').forEach(el => el.addEventListener('click', () => {
      logState.addType = el.dataset.addType;
      paint();
    }));
    const addBtn = document.getElementById('addExBtn');
    if (addBtn) addBtn.addEventListener('click', async () => {
      const t = logState.addType || 'exercise';

      if (t === 'cardio') {
        const cType = document.getElementById('addCardioType')?.value || '';
        const cMin = Number(document.getElementById('addCardioDur')?.value) || 0;
        const cNotes = document.getElementById('addCardioNotes')?.value || '';
        if (!cMin) { toast('Enter cardio duration.', 'error'); return; }
        addBtn.disabled = true; addBtn.textContent = 'Saving cardio…';
        try {
          await qLogSession({
            slot_type: 'cardio',
            sets: [],
            cardio_type: cType,
            cardio_duration_min: cMin,
            notes: cNotes || null,
            session_date: logState.session_date || null,
          });
          toast('Cardio saved.');
          // Reset the cardio-form draft but keep the user on the same page
          logState.addCardio = { cardio_type: cType, duration_min: '', notes: '' };
        } catch (e) {
          console.error(e); toast(e.message || 'Cardio save failed', 'error');
        } finally {
          addBtn.disabled = false; addBtn.textContent = 'Add';
        }
        paint();
        return;
      }

      // Exercise / core / stretching: add as ad-hoc exercise within the session
      const name = (document.getElementById('addExName')?.value || '').trim();
      const sets = Number(document.getElementById('addExSets')?.value) || (t === 'stretching' ? 1 : 3);
      const reps = (document.getElementById('addExReps')?.value || '').trim() || '8-12';
      const alsoPlan = document.getElementById('addToPlan')?.checked || false;
      if (!name) { toast('Name required.', 'error'); return; }
      if (logState.exercises.some(e => e.exercise_name.toLowerCase() === name.toLowerCase())) {
        toast('That exercise is already in this session.', 'error');
        return;
      }
      logState.exercises.push({ exercise_name: name, target_sets: sets, target_reps: reps, ad_hoc_type: t });
      for (let i = 1; i <= sets; i++) {
        logState.rows.push({ exercise_name: name, set_number: i, reps: '', weight_lbs: '' });
      }
      logState.addToPlan = false;  // reset checkbox after add

      // If user wants this in their plan, persist to plan_exercises and refresh in-memory plan.
      if (alsoPlan && state.plan?.id) {
        try {
          const nextOrder = (state.plan.exercises || []).filter(e => (e.slot_key || e.slot_type) === slotKey).length;
          const { data: row, error } = await sb.from('plan_exercises').insert({
            plan_id: state.plan.id,
            slot_type: slot,
            slot_key: slotKey,
            exercise_name: name,
            target_sets: sets,
            target_reps: reps,
            order_idx: nextOrder,
          }).select().single();
          if (error) throw error;
          // Update in-memory state.plan so other views reflect the new exercise
          state.plan.exercises.push(row);
          toast('Added to session and saved to plan.');
        } catch (e) {
          console.error('save-to-plan failed', e);
          toast('Added to session, but saving to plan failed: ' + (e.message || 'unknown error'), 'error');
        }
      } else {
        toast('Added to session.');
      }
      saveLocal();
      paint();
    });
    document.querySelectorAll('.addSet').forEach(el => el.addEventListener('click', () => {
      const ex = el.dataset.ex;
      const exRows = logState.rows.filter(r => r.exercise_name === ex);
      const nextNum = exRows.length ? Math.max(...exRows.map(r => r.set_number)) + 1 : 1;
      logState.rows.push({ exercise_name: ex, set_number: nextNum, reps: '', weight_lbs: '' });
      paint();
      saveLocal(); triggerAutoSave();
    }));
    const notesEl = $('notes');
    if (notesEl) {
      notesEl.addEventListener('input', e => { logState.notes = e.target.value; saveLocal(); triggerAutoSave(); });
    }

    // ===== Workout timer (live mm:ss) =====
    if (window._workoutTimerInterval) { clearInterval(window._workoutTimerInterval); window._workoutTimerInterval = null; }
    const tickTimer = () => {
      const el = document.getElementById('workoutTimer');
      if (!el) return;
      const sec = Math.floor((Date.now() - (logState.startedAt || Date.now())) / 1000);
      el.textContent = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
    };
    window._workoutTimerInterval = setInterval(tickTimer, 1000);
    if (!window._workoutTimerHashHook) {
      window._workoutTimerHashHook = true;
      window.addEventListener('hashchange', () => {
        if (!/^#\/log\//.test(location.hash || '')) {
          if (window._workoutTimerInterval) { clearInterval(window._workoutTimerInterval); window._workoutTimerInterval = null; }
        }
      });
    }

    // ===== Wizard nav: prev/next + jump =====
    const goTo = (i) => {
      const n = logState.exercises.length;
      if (n === 0) return;
      logState.activeIdx = Math.max(0, Math.min(n - 1, i));
      saveLocal();
      paint();
    };
    const prevBtn = $('btnPrevEx');
    if (prevBtn) prevBtn.addEventListener('click', () => goTo((logState.activeIdx || 0) - 1));
    const nextBtn = $('btnNextEx');
    if (nextBtn) nextBtn.addEventListener('click', () => goTo((logState.activeIdx || 0) + 1));
    document.querySelectorAll('.dotJump').forEach(el => el.addEventListener('click', () => {
      const i = Number(el.dataset.jump);
      if (!isNaN(i)) goTo(i);
    }));

    // ===== Smooth swipe: drag tile horizontally; on release, finish or snap back =====
    const swipeRoot = document.getElementById('logExList');
    if (swipeRoot && !swipeRoot.dataset.swipeHooked) {
      swipeRoot.dataset.swipeHooked = '1';
      let sx = 0, sy = 0, st = 0, dx = 0, dy = 0, dragging = false, decided = false, isHoriz = false;
      const isInteractive = (el) => {
        if (!el) return false;
        const tag = (el.tagName || '').toLowerCase();
        if (['input','textarea','select','button','a','label'].includes(tag)) return true;
        if (el.closest && el.closest('.setWt, .setReps, .setDel, .setRepeat, .logExDrag, .ytLink, .exRemove')) return true;
        return false;
      };
      const setX = (px) => { swipeRoot.style.transform = `translateX(${px}px)`; };

      swipeRoot.addEventListener('touchstart', (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        if (isInteractive(e.target)) return;
        sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        dx = 0; dy = 0; st = Date.now();
        dragging = true; decided = false; isHoriz = false;
        swipeRoot.style.transition = 'none';
      }, { passive: true });

      swipeRoot.addEventListener('touchmove', (e) => {
        if (!dragging || !e.touches[0]) return;
        dx = e.touches[0].clientX - sx;
        dy = e.touches[0].clientY - sy;
        if (!decided) {
          if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
            decided = true;
            isHoriz = Math.abs(dx) > Math.abs(dy) * 1.2;
          }
        }
        if (isHoriz) {
          // Resist a bit at the edges of the list.
          const n = logState.exercises.length, idx = logState.activeIdx || 0;
          let drag = dx;
          if ((idx === 0 && dx > 0) || (idx >= n - 1 && dx < 0)) drag = dx * 0.25;
          setX(drag);
        }
      }, { passive: true });

      const finish = () => {
        if (!dragging) return;
        dragging = false;
        const w = swipeRoot.getBoundingClientRect().width || 320;
        const dt = Date.now() - st;
        const idx = logState.activeIdx || 0;
        const n = logState.exercises.length;
        // Threshold: 25% width OR fast flick (>240px/s with >40px movement).
        const passed = isHoriz && (Math.abs(dx) > w * 0.25 || (dt < 350 && Math.abs(dx) > 40));
        if (!passed) {
          swipeRoot.style.transition = 'transform .22s cubic-bezier(.34,1.56,.64,1)';
          setX(0);
          return;
        }
        const dir = dx < 0 ? +1 : -1;
        const target = idx + dir;
        if (target < 0 || target >= n) {
          swipeRoot.style.transition = 'transform .22s cubic-bezier(.34,1.56,.64,1)';
          setX(0);
          return;
        }
        // Animate the current tile fully off-screen, then repaint at new index. The
        // next paint resets transform to 0, so the new tile appears in place.
        swipeRoot.style.transition = 'transform .2s ease-out';
        setX(dir < 0 ? w : -w);
        setTimeout(() => goTo(target), 200);
      };
      swipeRoot.addEventListener('touchend',    finish, { passive: true });
      swipeRoot.addEventListener('touchcancel', finish, { passive: true });
    }

    // ===== Swap sheet (unified: tap to jump, drag handle to reorder) =====
    const openSwap = () => {
      const sh = $('swapSheet'); if (!sh) return;
      sh.style.display = 'block';
      const panel = sh.firstElementChild;
      const handle = panel && panel.firstElementChild;
      if (panel && handle) wireSheetSwipeClose(handle, panel, closeSwap);
      _initSwapSortable();
    };
    const closeSwap = () => {
      const sh = $('swapSheet'); if (!sh) return;
      const panel = sh.firstElementChild;
      if (panel) panel.style.transform = 'translateY(0)';
      sh.style.display = 'none';
      try { if (_swapSortable) { _swapSortable.destroy(); _swapSortable = null; } } catch(_) {}
      if (logState._reorderDirty) {
        logState._reorderDirty = false;
        if (activeIdx >= logState.exercises.length) activeIdx = 0;
        // Persist the new order to the local draft so re-render doesn't revert.
        try { saveLocal(); } catch(_) {}
        try { renderLog(); } catch(_) { try { route(); } catch(__) {} }
      }
    };
    // === Editable exercise name (h1 pencil) ===
    const editNameBtn = document.getElementById('btnEditExName');
    if (editNameBtn) editNameBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const wrap = document.getElementById('logExNameWrap');
      if (!wrap) return;
      const canonical = wrap.dataset.canonical || '';
      const current = displayExName(canonical);
      openRenameSheet(canonical, current);
    });
    function openRenameSheet(canonical, current) {
      const sh = document.createElement('div');
      sh.id = 'renameExSheet';
      sh.style.cssText = 'position:fixed;inset:0;z-index:120;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;';
      sh.innerHTML = `
        <div style="width:100%;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:18px 18px calc(env(safe-area-inset-bottom,0) + 24px);">
          <div style="width:36px;height:4px;border-radius:2px;background:var(--text-muted);opacity:.4;margin:0 auto 16px;"></div>
          <div style="font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:.25rem;">Rename exercise</div>
          <div style="font-size:.78rem;color:var(--text-muted);line-height:1.4;margin-bottom:.85rem;">Display only. Your history, PRs, and last-session numbers stay tied to the original name.</div>
          <div style="font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:.35rem;">Original</div>
          <div style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);border-radius:12px;padding:.6rem .75rem;font-size:.85rem;margin-bottom:.85rem;font-weight:500;">${esc(canonical)}</div>
          <div style="font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:.35rem;">Display name</div>
          <input id="renameExInput" type="text" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" value="${esc(current)}" style="width:100%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:.7rem .85rem;font-size:1rem;font-weight:600;margin-bottom:.95rem;outline:none;-webkit-appearance:none;" />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.5rem;">
            <button id="renameExReset" type="button" style="height:46px;border-radius:14px;background:var(--bg-elevated);color:var(--text);border:1px solid var(--border);font-weight:700;font-size:.92rem;cursor:pointer;">Reset to original</button>
            <button id="renameExSave"  type="button" style="height:46px;border-radius:14px;background:var(--accent);color:#000;border:0;font-weight:800;font-size:.95rem;cursor:pointer;">Save</button>
          </div>
          <button id="renameExCancel" type="button" style="width:100%;height:44px;border-radius:12px;background:transparent;color:var(--text-muted);border:0;font-weight:600;font-size:.88rem;cursor:pointer;">Cancel</button>
        </div>`;
      document.body.appendChild(sh);
      const input = sh.querySelector('#renameExInput');
      setTimeout(() => { try { input.focus(); input.setSelectionRange(0, input.value.length); } catch(_) {} }, 40);
      const close = () => sh.remove();
      const commit = (val) => {
        setExNameOverride(canonical, val);
        close();
        try { renderLog(); } catch(_) { try { route(); } catch(__) {} }
      };
      sh.querySelector('#renameExCancel').addEventListener('click', close);
      sh.addEventListener('click', (e) => { if (e.target === sh) close(); });
      sh.querySelector('#renameExSave').addEventListener('click', () => commit(input.value));
      sh.querySelector('#renameExReset').addEventListener('click', () => commit(''));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); commit(input.value); }
        if (e.key === 'Escape') { e.preventDefault(); close(); }
      });
    }

    // === Swap sheet: tap row to jump, drag handle to reorder ===
    let _swapSortable = null;
    async function _initSwapSortable() {
      const items = document.getElementById('swapItems');
      if (!items || _swapSortable) return;
      try {
        const Sortable = await loadSortable();
        if (!Sortable) return;
        _swapSortable = new Sortable(items, {
          animation: 160,
          handle: '.swapDrag',
          ghostClass: 'opacity-50',
          forceFallback: true,
          delay: 80,
          delayOnTouchOnly: true,
          onEnd: () => {
            const order = Array.from(items.querySelectorAll('.swapItem')).map(el => el.dataset.canonical);
            const byName = {};
            logState.exercises.forEach(ex => { byName[ex.exercise_name] = ex; });
            logState.exercises = order.map(n => byName[n]).filter(Boolean);
            Array.from(items.querySelectorAll('.swapIdx')).forEach((el, i) => { el.textContent = String(i+1); });
            // Also retag the jump buttons so the next tap jumps to the right index.
            Array.from(items.querySelectorAll('.swapJump')).forEach((el, i) => { el.dataset.jump = String(i); });
            logState._reorderDirty = true;
          }
        });
      } catch (e) { console.warn('Sortable load failed', e); }
    }

    const swapBtn = $('btnSwap');
    if (swapBtn) swapBtn.addEventListener('click', openSwap);
    document.querySelectorAll('.swapJump').forEach(el => el.addEventListener('click', () => {
      const i = Number(el.dataset.jump);
      closeSwap();
      if (!isNaN(i)) goTo(i);
    }));
    const swapCloseBtn = $('swapClose');
    if (swapCloseBtn) swapCloseBtn.addEventListener('click', closeSwap);
    const swapBackdrop = $('swapSheet');
    if (swapBackdrop) swapBackdrop.addEventListener('click', (e) => { if (e.target === swapBackdrop) closeSwap(); });

    // ===== Coach button =====
    const coachBtn = $('btnCoach');
    if (coachBtn) coachBtn.addEventListener('click', () => { nav('#/chat'); });

    // ===== Note toggle =====
    const noteBtn = $('btnNote');
    if (noteBtn) noteBtn.addEventListener('click', () => {
      const wrap = $('noteWrap');
      if (!wrap) return;
      const showing = wrap.style.display !== 'none';
      wrap.style.display = showing ? 'none' : 'block';
      if (!showing) {
        const ta = $('notes');
        if (ta) ta.focus();
      }
    });

    // ===== Add-exercise reveal =====
    const addToggle = $('btnAddExHere');
    if (addToggle) addToggle.addEventListener('click', () => {
      const wrap = $('addExWrapper');
      if (!wrap) return;
      const showing = wrap.style.display !== 'none';
      wrap.style.display = showing ? 'none' : 'block';
      if (!showing) wrap.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    // ===== Overflow menu (skip / discard) =====
    const openOv = () => {
      const m = $('ovMenu'); if (!m) return;
      m.style.display = 'block';
      const panel = m.firstElementChild;
      const handle = panel && panel.firstElementChild;
      if (panel && handle) wireSheetSwipeClose(handle, panel, closeOv);
    };
    const closeOv = () => {
      const m = $('ovMenu'); if (!m) return;
      const panel = m.firstElementChild;
      if (panel) panel.style.transform = 'translateY(0)';
      m.style.display = 'none';
    };
    const ovBtn = $('logOverflow');
    if (ovBtn) ovBtn.addEventListener('click', openOv);
    const ovCloseBtn = $('ovClose');
    if (ovCloseBtn) ovCloseBtn.addEventListener('click', closeOv);
    const ovBackdrop = $('ovMenu');
    if (ovBackdrop) ovBackdrop.addEventListener('click', (e) => { if (e.target === ovBackdrop) closeOv(); });
    const ovSkipNow = $('ovSkipNow');
    if (ovSkipNow) ovSkipNow.addEventListener('click', () => {
      saveLocal();
      closeOv();
      if (window._workoutTimerInterval) { clearInterval(window._workoutTimerInterval); window._workoutTimerInterval = null; }
      toast('Workout paused. Pick it up from Today.');
      nav('#/');
    });
    const ovSkipForever = $('ovSkipForever');
    if (ovSkipForever) ovSkipForever.addEventListener('click', async () => {
      if (!(await appConfirm({ title: 'Discard this workout?', message: 'Any unsaved sets will be lost.', confirmLabel: 'Discard', danger: true }))) return;
      try {
        clearLocalDraft(slot);
        if (typeof qDeleteSession === 'function' && _currentSessionId) {
          try { await qDeleteSession(_currentSessionId); } catch (_) {}
        }
      } catch (_) {}
      closeOv();
      if (window._workoutTimerInterval) { clearInterval(window._workoutTimerInterval); window._workoutTimerInterval = null; }
      toast('Workout discarded.');
      nav('#/');
    });

    // ===== Finish workout (only present on last exercise) =====
    const saveBtn = $('btnSave');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      clearTimeout(_autoSaveTimer);
      const setsToSave = logState.rows
        .filter(r => r.weight_lbs !== '' || r.reps !== '')
        .map(r => ({
          exercise_name: r.exercise_name,
          set_number: r.set_number,
          reps: r.reps === '' ? null : Number(r.reps),
          weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
        }));
      if (setsToSave.length === 0 && !logState.notes) {
        if (!(await appConfirm({ title: 'No sets filled in', message: 'Save the session anyway?', confirmLabel: 'Save', cancelLabel: 'Cancel' }))) return;
      }
      saveBtn.disabled = true; saveBtn.textContent = 'Finishing...';
      try {
        await qFinishSession(logState);
        clearLocalDraft(slot);
        if (window._workoutTimerInterval) { clearInterval(window._workoutTimerInterval); window._workoutTimerInterval = null; }
        toast('Workout saved.');
        nav('#/');
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        saveBtn.disabled = false; saveBtn.textContent = 'Finish workout';
      }
    });
  };

  paint();
}

async function renderLogCardio(dayMeta = {}, overrideDate = null) {
  _currentSessionId = null;
  const draft = !overrideDate ? await qLoadDraft('cardio') : null;
  const logState = {
    slot_type: 'cardio',
    session_date: overrideDate || null,
    cardio_type: draft?.cardio_type || dayMeta.cardio_type || CARDIO_TYPES[0],
    cardio_duration_min: draft?.cardio_duration_min || dayMeta.cardio_duration_min || '',
    notes: draft?.notes || '',
  };
  if (draft) _currentSessionId = draft.id;
  appEl().innerHTML = shell(`
    <div class="mb-4 flex items-center justify-between">
      <div>
        <div class="text-xs text-zinc-500 uppercase tracking-wider">Log cardio</div>
        <h1 class="text-2xl font-bold flex items-center gap-2">Cardio ${slotChip('cardio')}</h1>
      </div>
      <div class="flex items-center gap-3">
        <span id="autoSaveInd" class="text-xs text-emerald-400 transition-opacity" style="opacity:0">Saved</span>
        <a href="#/" class="text-sm text-zinc-400 hover:text-white">Cancel</a>
      </div>
    </div>
    <div class="card space-y-3">
      <div>
        <label class="label">Type</label>
        <select id="cType" class="input">
          ${CARDIO_TYPES.map(c => `<option value="${c}" ${logState.cardio_type===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="label">Duration (minutes)</label>
        <input id="cDur" class="input" type="number" inputmode="numeric" min="1" max="240" value="${esc(logState.cardio_duration_min)}" />
      </div>
      <div>
        <label class="label">Notes (optional)</label>
        <textarea id="cNotes" class="input" rows="2" placeholder="Pace, distance, incline...">${esc(logState.notes)}</textarea>
      </div>
    </div>
    <button id="btnSave" class="btn btn-primary w-full mt-4">Finish cardio</button>`);

  const triggerAutoSave = debounce(() => qAutoSave(logState));
  $('cType').addEventListener('change', e => { logState.cardio_type = e.target.value; triggerAutoSave(); });
  $('cDur').addEventListener('input', e => { logState.cardio_duration_min = Number(e.target.value) || ''; triggerAutoSave(); });
  $('cNotes').addEventListener('input', e => { logState.notes = e.target.value; triggerAutoSave(); });
  $('btnSave').addEventListener('click', async () => {
    clearTimeout(_autoSaveTimer);
    if (!logState.cardio_duration_min) { toast('Enter duration.', 'error'); return; }
    $('btnSave').disabled = true; $('btnSave').textContent = 'Finishing...';
    try {
      await qFinishSession(logState);
      clearLocalDraft('cardio');
      toast('Cardio saved.');
      nav('#/');
    } catch (e) {
      console.error(e); toast(e.message || 'Save failed', 'error');
      $('btnSave').disabled = false; $('btnSave').textContent = 'Finish cardio';
    }
  });
}

/* =========================================================
   VIEW: PLAN EDITOR
   ========================================================= */
// === PLAN — dashboard view matching screenshot reference ===
async function renderPlan() {
  const plan = state.plan;
  if (!plan) {
    appEl().innerHTML = shell(`
      <div style="padding:8px 0 18px;">
        <div class="eyebrow" style="margin-bottom:6px;">WEEK SCHEDULE</div>
        <div class="h-display">Plan</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--hairline);border-radius:18px;padding:24px;text-align:center;">
        <div style="font-size:15px;font-weight:600;margin-bottom:4px;">No active plan yet</div>
        <p style="font-size:13px;color:var(--text-3);margin-bottom:14px;">Build one to see your week.</p>
        <a href="#/plan/edit" class="btn btn-primary" style="display:inline-flex;text-decoration:none;">Create a plan</a>
      </div>
    `);
    return;
  }

  try {
    const dow = todayDow();
    const slotKey = (t) => (t === 'upper' ? 'push' : t === 'lower' ? 'legs' : t === 'abs' ? 'core' : t === 'stretching' ? 'stretch' : (t || 'custom'));
    const splitColor = (t) => `var(--${slotKey(t)})`;
    const splitSoft  = (t) => `var(--soft-${slotKey(t)})`;

    // Week date range — Mon→Sun of current week
    const today = new Date();
    const monday = new Date(today); monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    const monthsShort = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const sameMonth = monday.getMonth() === sunday.getMonth();
    const dateRange = sameMonth
      ? `${monthsShort[monday.getMonth()]} ${monday.getDate()} – ${sunday.getDate()}`
      : `${monthsShort[monday.getMonth()]} ${monday.getDate()} – ${monthsShort[sunday.getMonth()]} ${sunday.getDate()}`;

    // Split header label (e.g. "PPL · 6 days")
    const splitName = (SPLITS[plan.split_type] && SPLITS[plan.split_type].name) || 'Custom';
    const splitShort = splitName.match(/Push.*Pull.*Legs/i) ? 'PPL'
      : splitName.match(/Upper.*Lower/i) ? 'Upper / Lower'
      : splitName.length > 18 ? splitName.slice(0, 16) + '…'
      : splitName;
    const totalDays = (plan.days || []).filter(d => d.slot_type !== 'rest').length;

    // Selected day (URL hash query param, default today)
    const hashQs = (location.hash.split('?')[1] || '');
    const params = new URLSearchParams(hashQs);
    const selectedDow = (params.get('day') != null && params.get('day') !== '')
      ? Math.max(0, Math.min(6, Number(params.get('day'))))
      : dow;

    // Sorted Mon → Sun
    const mondayIdx = (n) => (n + 6) % 7;
    const daysSorted = (plan.days || []).slice().sort((a, b) => mondayIdx(a.day_of_week) - mondayIdx(b.day_of_week));

    // Day strip (horizontal scroll, 7 cells)
    const dayShort = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const dayStripHtml = `
      <div style="display:grid;grid-template-columns:repeat(7, minmax(0, 1fr));gap:6px;margin-bottom:18px;">
        ${daysSorted.map(d => {
          const t = d.slot_type;
