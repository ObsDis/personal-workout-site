async function nutAddView() {
  const body = document.getElementById('nut-body'); if (!body) return;
  let mode = 'manual';
  let draft = { food_name:'', brand:'', serving_size_g:'', servings:1, calories:'', protein_g:'', carbs_g:'', fat_g:'', fiber_g:'', barcode:'', source:'manual', meal_slot:'snack' };
  let searchResults = [];
  let favorites = await qFavorites(20);
  const numOrNull = (v) => (v === '' || v == null) ? null : Number(v);

  const slots = [
    { v:'breakfast', l:'Breakfast' }, { v:'lunch', l:'Lunch' },
    { v:'dinner', l:'Dinner' },       { v:'snack', l:'Snack' },
  ];

  const modeBtns = () => [
    ['manual', 'Manual'],
    ['barcode', 'Barcode'],
    ['search', 'Search'],
    ['photo', 'Photo (AI)'],
  ].map(([k, l]) => `<button data-mode="${k}" class="add-mode" type="button" style="flex:1;padding:.5rem;background:${mode===k?'var(--accent)':'var(--bg-elevated)'};color:${mode===k?'#000':'var(--text)'};border:1px solid ${mode===k?'var(--accent)':'var(--border)'};border-radius:.5rem;font-weight:600;font-size:.8125rem;cursor:pointer;">${l}</button>`).join('');

  // Per-ingredient helpers for AI photo breakdowns
  const ensureItemRates = (items) => {
    (items || []).forEach(it => {
      if (!it._rates) {
        const g = Math.max(1, Number(it.grams) || 0);
        it._rates = {
          calories: (Number(it.calories) || 0) / g,
          protein_g: (Number(it.protein_g) || 0) / g,
          carbs_g:   (Number(it.carbs_g) || 0) / g,
          fat_g:     (Number(it.fat_g) || 0) / g,
          fiber_g:   (Number(it.fiber_g) || 0) / g,
        };
      }
    });
  };
  const rescaleItem = (it) => {
    if (!it._rates) return;
    const g = Math.max(0, Number(it.grams) || 0);
    it.calories  = Math.round(it._rates.calories * g);
    it.protein_g = Math.round(it._rates.protein_g * g * 10) / 10;
    it.carbs_g   = Math.round(it._rates.carbs_g * g * 10) / 10;
    it.fat_g     = Math.round(it._rates.fat_g * g * 10) / 10;
    it.fiber_g   = Math.round(it._rates.fiber_g * g * 10) / 10;
  };
  const recalcTotalsFromItems = () => {
    if (!draft.items || !draft.items.length) return;
    const sumNum = (k) => draft.items.reduce((s, it) => s + (Number(it[k]) || 0), 0);
    draft.serving_size_g = Math.round(sumNum('grams'));
    draft.calories = Math.round(sumNum('calories'));
    draft.protein_g = Math.round(sumNum('protein_g') * 10) / 10;
    draft.carbs_g = Math.round(sumNum('carbs_g') * 10) / 10;
    draft.fat_g = Math.round(sumNum('fat_g') * 10) / 10;
    draft.fiber_g = Math.round(sumNum('fiber_g') * 10) / 10;
  };

  const renderForm = () => {
    const isAuto = ['barcode','search','photo'].includes(mode);
    const formCard = `
      <div class="card" style="margin-bottom:1rem;">
        <label class="label">Meal</label>
        <select id="nf_slot" class="input" style="margin-bottom:.625rem;">
          ${slots.map(s => `<option value="${s.v}" ${draft.meal_slot===s.v?'selected':''}>${s.l}</option>`).join('')}
        </select>
        <label class="label">Food name</label>
        <input id="nf_name" class="input" placeholder="e.g. Greek yogurt" value="${esc(draft.food_name)}" style="margin-bottom:.5rem;" />
        <div class="form-grid cols-2-on-desktop" style="margin-bottom:.5rem;">
          <div><label class="label">Brand (optional)</label><input id="nf_brand" class="input" value="${esc(draft.brand)}" /></div>
          <div><label class="label">Serving (g)</label><input id="nf_serv" class="input" type="number" inputmode="decimal" step="0.1" value="${esc(draft.serving_size_g)}" /></div>
        </div>
        <div class="form-grid cols-2-on-desktop" style="margin-bottom:.5rem;">
          <div><label class="label">Servings</label><input id="nf_servings" class="input" type="number" inputmode="decimal" step="0.5" value="${esc(draft.servings)}" /></div>
          <div><label class="label">Calories</label><input id="nf_kcal" class="input" type="number" inputmode="decimal" step="0.1" value="${esc(draft.calories)}" /></div>
        </div>
        <div class="form-grid" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:.5rem;">
          <div><label class="label">Protein g</label><input id="nf_p" class="input" type="number" inputmode="decimal" step="0.1" value="${esc(draft.protein_g)}" /></div>
          <div><label class="label">Carbs g</label><input id="nf_c" class="input" type="number" inputmode="decimal" step="0.1" value="${esc(draft.carbs_g)}" /></div>
          <div><label class="label">Fat g</label><input id="nf_f" class="input" type="number" inputmode="decimal" step="0.1" value="${esc(draft.fat_g)}" /></div>
        </div>
        ${isAuto && draft.source ? `<div style="font-size:.7rem;color:var(--text-muted);margin-bottom:.5rem;">Source: ${esc(draft.source)}${draft.confidence?` · confidence: ${esc(draft.confidence)}`:''}${draft.caveat?` · ${esc(draft.caveat)}`:''}</div>` : ''}
        <button id="nf_save" class="btn btn-primary" style="width:100%;">Save to today</button>
      </div>`;

    let modeUI = '';
    if (mode === 'barcode') {
      modeUI = `<div class="card" style="margin-bottom:1rem;">
        <div class="section-label" style="margin-bottom:.5rem;">Barcode</div>
        <button id="bc_scan" class="btn btn-primary" style="width:100%;margin-bottom:.5rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:.375rem;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Open scanner
        </button>
        <details style="margin-bottom:.5rem;">
          <summary style="cursor:pointer;color:var(--text-muted);font-size:.8125rem;padding:.25rem 0;">Or type the barcode manually</summary>
          <div style="display:flex;gap:.5rem;margin-top:.5rem;">
            <input id="bc_input" class="input" inputmode="numeric" placeholder="12-13 digits" style="flex:1;" />
            <button id="bc_lookup" class="btn btn-ghost">Look up</button>
          </div>
        </details>
        <p style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem;">Lookups via OpenFoodFacts (free). iOS Safari uses ZXing fallback for camera scanning.</p>
        <div id="bc_status" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>
      </div>`;
    } else if (mode === 'search') {
      modeUI = `<div class="card" style="margin-bottom:1rem;">
        <div class="section-label" style="margin-bottom:.5rem;">Search OpenFoodFacts</div>
        <input id="sr_q" class="input" placeholder="Start typing… e.g. chobani plain yogurt" style="margin-bottom:.5rem;" autocomplete="off" />
        <div id="sr_status" style="font-size:.7rem;color:var(--text-muted);min-height:1rem;"></div>
        <div id="sr_results"></div>
      </div>`;
    } else if (mode === 'photo') {
      modeUI = `<div class="card" style="margin-bottom:1rem;">
        <div class="section-label" style="margin-bottom:.5rem;">Photo scan (AI estimate)</div>
        <button id="ph_camera" class="btn btn-primary" style="width:100%;margin-bottom:.5rem;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:.375rem;"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Open camera scanner
        </button>
        <details style="margin-bottom:.5rem;">
          <summary style="cursor:pointer;color:var(--text-muted);font-size:.8125rem;padding:.25rem 0;">Or upload a file</summary>
          <input id="ph_file" type="file" accept="image/*" class="input" style="padding:.5rem;margin-top:.5rem;" />
          <button id="ph_go" class="btn btn-ghost" style="width:100%;margin-top:.5rem;">Identify uploaded photo</button>
        </details>
        <label class="label" style="margin-top:.25rem;">Portion hint (optional)</label>
        <select id="ph_hint" class="input">
          <option value="">No hint — let AI guess</option>
          <option value="small">Small portion (snack-size, ~100g)</option>
          <option value="medium">Medium portion (regular meal)</option>
          <option value="large">Large portion (heavy meal)</option>
          <option value="custom">I'll type a specific weight</option>
        </select>
        <input id="ph_custom_g" class="input" type="number" placeholder="Specific weight in grams" style="margin-top:.5rem;display:none;" />
        <p style="font-size:.7rem;color:var(--text-muted);margin-top:.5rem;line-height:1.4;">Uses Groq vision (llama-4-maverick). Always review the numbers before saving — portion estimates are best-effort.</p>
        <div id="ph_status" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>
      </div>`;
    }

    const favBlock = favorites.length === 0 ? '' : `
      <div class="card">
        <div class="section-label" style="margin-bottom:.5rem;">Recent / favorites</div>
        ${favorites.map(f => `
          <div class="exercise-row" style="padding:.5rem 0;">
            <div style="min-width:0;">
              <div class="exercise-name" style="font-size:.9375rem;">${esc(f.food_name)}</div>
              <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;">${f.brand?esc(f.brand)+' · ':''}${f.serving_size_g?fmtWt(f.serving_size_g)+'g · ':''}${fmtWt(f.calories)} kcal · P${fmtWt(f.protein_g)}/C${fmtWt(f.carbs_g)}/F${fmtWt(f.fat_g)}</div>
            </div>
            <button data-id="${f.id}" class="fav-use btn btn-ghost" style="padding:.4rem .75rem;font-size:.8125rem;">+ Add</button>
          </div>`).join('')}
      </div>`;

    // Build the editable ingredient breakdown when AI returned items[]
    let breakdownCard = '';
    if (Array.isArray(draft.items) && draft.items.length) {
      ensureItemRates(draft.items);
      const rows = draft.items.map((it, i) => `
        <div class="ing-row" data-i="${i}" style="display:grid;grid-template-columns:1fr 70px 60px 28px;gap:.375rem;align-items:center;padding:.375rem 0;border-bottom:1px solid rgba(63,63,70,.4);">
          <input class="input ing-name" data-i="${i}" value="${esc(it.name || '')}" placeholder="ingredient" style="font-size:.875rem;padding:.375rem .5rem;" />
          <input class="input ing-grams" data-i="${i}" type="number" inputmode="decimal" step="1" value="${esc(it.grams)}" style="font-size:.875rem;padding:.375rem .5rem;text-align:right;" />
          <div style="font-size:.75rem;color:var(--text-muted);text-align:right;font-variant-numeric:tabular-nums;"><span class="ing-kcal" data-i="${i}">${fmtWt(it.calories || 0)}</span> kcal</div>
          <button class="ing-rm" data-i="${i}" type="button" title="Remove" style="background:transparent;border:0;color:var(--danger);cursor:pointer;font-size:1.125rem;padding:.125rem;">×</button>
        </div>`).join('');
      breakdownCard = `
        <div class="card" style="margin-bottom:1rem;border:1px solid rgba(16,185,129,.25);background:rgba(16,185,129,.04);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;">
            <div class="section-label" style="margin:0;color:var(--accent);">AI breakdown — edit grams to refine</div>
            <button id="ing_add" type="button" class="btn btn-ghost" style="padding:.25rem .625rem;font-size:.75rem;">+ Item</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 70px 60px 28px;gap:.375rem;padding-bottom:.25rem;border-bottom:1px solid rgba(63,63,70,.6);font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;">
            <div>Ingredient</div><div style="text-align:right;">Grams</div><div style="text-align:right;">Cals</div><div></div>
          </div>
          <div id="ing_rows">${rows}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.625rem;line-height:1.4;">
            Per-ingredient macros scale automatically as you change grams. Adjust to match what you actually ate; totals at the bottom update live.
          </div>
        </div>`;
    }

    body.innerHTML = `
      <div style="display:flex;gap:.375rem;margin-bottom:1rem;">${modeBtns()}</div>
      ${modeUI}
      ${breakdownCard}
      ${formCard}
      ${favBlock}
    `;
    wireForm();
    // Scroll the form into view after an AI scan so user sees the editable totals
    if (mode === 'photo' && draft.items && draft.items.length) {
      const el = document.querySelector('.card[style*="rgba(16,185,129,.04)"]');
      if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  function bindDraft() {
    const set = (id, key, num) => { const el = document.getElementById(id); if (el) el.addEventListener('input', e => draft[key] = num ? (e.target.value === '' ? '' : Number(e.target.value)) : e.target.value); };
    set('nf_name', 'food_name'); set('nf_brand', 'brand');
    set('nf_serv', 'serving_size_g', true); set('nf_servings', 'servings', true);
    set('nf_kcal', 'calories', true); set('nf_p', 'protein_g', true); set('nf_c', 'carbs_g', true); set('nf_f', 'fat_g', true);
    const slot = document.getElementById('nf_slot'); if (slot) slot.addEventListener('change', e => draft.meal_slot = e.target.value);
  }

  function wireForm() {
    document.querySelectorAll('.add-mode').forEach(el => el.addEventListener('click', () => {
      mode = el.dataset.mode; renderForm();
    }));
    bindDraft();

    if (mode === 'barcode') {
      const status = document.getElementById('bc_status');
      const lookup = async () => {
        const code = document.getElementById('bc_input').value.trim();
        if (!code) { status.textContent = 'Enter a barcode.'; return; }
        status.textContent = 'Looking up…';
        try { const food = await lookupBarcode(code); Object.assign(draft, food); status.textContent = '✓ Found: ' + (food.food_name || 'Unknown'); renderForm(); }
        catch (e) { status.textContent = '✗ ' + (e.message || 'Lookup failed'); }
      };
      const lookupBtn = document.getElementById('bc_lookup');
      const inputEl = document.getElementById('bc_input');
      if (lookupBtn) lookupBtn.addEventListener('click', lookup);
      if (inputEl) inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
      const scanBtn = document.getElementById('bc_scan');
      if (scanBtn) scanBtn.addEventListener('click', async () => {
        try {
          status.textContent = 'Opening camera…';
          const code = await scanBarcodeFromVideoUnified();
          if (inputEl) inputEl.value = code;
          status.textContent = '✓ Scanned: ' + code + '. Looking up…';
          const food = await lookupBarcode(code);
          Object.assign(draft, food); status.textContent = '✓ Found: ' + food.food_name; renderForm();
        } catch (e) { status.textContent = '✗ ' + e.message; }
      });
    }

    if (mode === 'search') {
      const inputEl = document.getElementById('sr_q');
      const out = document.getElementById('sr_results');
      const status = document.getElementById('sr_status');
      let debounceT = null;
      let curReqId = 0;
      const renderResults = (list) => {
        if (!list || !list.length) {
          out.innerHTML = '<div style="color:var(--text-muted);font-size:.875rem;padding:.5rem 0;">No results.</div>';
          return;
        }
        out.innerHTML = list.map((f, i) => `
          <div class="exercise-row sr-row" data-i="${i}" style="padding:.5rem 0;cursor:pointer;">
            <div style="min-width:0;">
              <div class="exercise-name" style="font-size:.875rem;">${esc(f.food_name || 'Unknown')}</div>
              <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;">${f.brand?esc(f.brand)+' · ':''}${f.serving_size_g?fmtWt(f.serving_size_g)+'g · ':''}${f.calories?fmtWt(f.calories)+' kcal':'no kcal data'}</div>
            </div>
            <button data-i="${i}" class="sr-use btn btn-ghost" style="padding:.35rem .65rem;font-size:.8125rem;">Use</button>
          </div>`).join('');
        // Click the whole row OR the Use button to apply
        const apply = (i) => { Object.assign(draft, searchResults[Number(i)]); renderForm(); };
        out.querySelectorAll('.sr-use').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); apply(el.dataset.i); }));
        out.querySelectorAll('.sr-row').forEach(el => el.addEventListener('click', () => apply(el.dataset.i)));
      };

      const runSearch = async (q) => {
        if (!q || q.length < 2) { out.innerHTML=''; status.textContent=''; return; }
        const reqId = ++curReqId;
        status.textContent = 'Searching…';
        try {
          const list = await searchFood(q, 12);
          // discard if a newer query started
          if (reqId !== curReqId) return;
          // filter out clearly-broken rows (no calories AND no food name)
          searchResults = list.filter(f => (f.food_name && f.food_name !== 'Unknown'));
          status.textContent = searchResults.length ? `${searchResults.length} results` : '';
          renderResults(searchResults);
        } catch (e) {
          if (reqId !== curReqId) return;
          status.textContent = '';
          out.innerHTML = `<div style="color:var(--danger);font-size:.875rem;">${esc(e.message)}</div>`;
        }
      };

      if (inputEl) {
        inputEl.addEventListener('input', e => {
          clearTimeout(debounceT);
          const q = e.target.value.trim();
          if (q.length < 2) { out.innerHTML=''; status.textContent=''; return; }
          debounceT = setTimeout(() => runSearch(q), 350);
        });
        inputEl.addEventListener('keydown', e => {
          if (e.key === 'Enter') { clearTimeout(debounceT); runSearch(inputEl.value.trim()); }
        });
        // Auto-focus + restore previous query if any
        setTimeout(() => inputEl.focus(), 30);
      }
    }

    if (mode === 'photo') {
      const status = document.getElementById('ph_status');
      const hintSel = document.getElementById('ph_hint');
      const customG = document.getElementById('ph_custom_g');
      hintSel?.addEventListener('change', () => {
        customG.style.display = (hintSel.value === 'custom') ? 'block' : 'none';
      });
      const portionHint = () => {
        const v = hintSel?.value || '';
        if (v === 'custom') {
          const g = Number(customG.value);
          return g ? `The portion shown weighs approximately ${g} grams.` : '';
        }
        if (v === 'small') return 'Assume a small/snack-size portion (~100g).';
        if (v === 'medium') return 'Assume a typical meal portion.';
        if (v === 'large') return 'Assume a large/heavy meal portion.';
        return '';
      };
      const runOnFile = async (file) => {
        if (!file) { status.textContent = 'No file.'; return; }
        if (file.size > 4 * 1024 * 1024) { status.textContent = 'Photo too large (4MB max for AI).'; return; }
        status.textContent = 'Analyzing… (10-20s)';
        try {
          const guess = await aiEstimateFoodFromPhoto(file, portionHint());
          Object.assign(draft, guess);
          status.textContent = (guess.source === 'ai_photo+off' ? '✓ Matched in OFF: ' : '✓ Estimated: ') + guess.food_name + (guess.source === 'ai_photo+off' ? ' (database macros)' : ' (edit before saving)');
          renderForm();
        } catch (e) { status.textContent = '✗ ' + (e.message || 'AI failed'); console.error(e); }
      };
      document.getElementById('ph_camera').addEventListener('click', async () => {
        try {
          status.textContent = 'Opening camera…';
          const guess = await captureFoodWithCamera(async (file, setMsg) => {
            if (file.size > 4 * 1024 * 1024) throw new Error('Photo too large (4MB max for AI).');
            setMsg('Identifying food and macros…');
            const g = await aiEstimateFoodFromPhoto(file, portionHint());
            setMsg('✓ ' + (g.food_name || 'Identified'));
            return g;
          });
          Object.assign(draft, guess);
          status.textContent = (guess.source === 'ai_photo+off' ? '✓ Matched in OFF: ' : '✓ Estimated: ') + (guess.food_name || 'Unknown') + (guess.source === 'ai_photo+off' ? ' (database macros)' : ' (review numbers before saving)');
          renderForm();
        } catch (e) { status.textContent = '✗ ' + (e.message || 'Capture failed'); }
      });
      const goBtn = document.getElementById('ph_go');
      if (goBtn) goBtn.addEventListener('click', async () => {
        const file = document.getElementById('ph_file').files?.[0];
        if (!file) { status.textContent = 'Pick a photo first.'; return; }
        await runOnFile(file);
      });
    }

    // Ingredient rows (only present after AI scan)
    document.querySelectorAll('.ing-grams').forEach(el => {
      el.addEventListener('input', (e) => {
        const i = Number(el.dataset.i);
        const it = draft.items && draft.items[i];
        if (!it) return;
        it.grams = Number(e.target.value) || 0;
        rescaleItem(it);
        const k = document.querySelector(`.ing-kcal[data-i="${i}"]`);
        if (k) k.textContent = fmtWt(it.calories || 0);
        recalcTotalsFromItems();
        // Update the bottom total fields in place without full re-render
        ['nf_serv','nf_kcal','nf_p','nf_c','nf_f'].forEach((id, idx) => {
          const e = document.getElementById(id);
          if (!e) return;
          const map = ['serving_size_g','calories','protein_g','carbs_g','fat_g'];
          e.value = draft[map[idx]];
        });
      });
    });
    document.querySelectorAll('.ing-name').forEach(el => {
      el.addEventListener('input', (e) => {
        const i = Number(el.dataset.i);
        if (draft.items && draft.items[i]) draft.items[i].name = e.target.value;
      });
    });
    document.querySelectorAll('.ing-rm').forEach(el => {
      el.addEventListener('click', () => {
        const i = Number(el.dataset.i);
        if (!draft.items) return;
        draft.items.splice(i, 1);
        recalcTotalsFromItems();
        renderForm();
      });
    });
    const addBtn = document.getElementById('ing_add');
    if (addBtn) addBtn.addEventListener('click', () => {
      if (!draft.items) draft.items = [];
      draft.items.push({ name: '', grams: 0, calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, fiber_g: 0, _rates: { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, fiber_g: 0 } });
      renderForm();
    });

    const saveBtn = document.getElementById('nf_save');
    if (saveBtn) saveBtn.addEventListener('click', async () => {
      if (!draft.food_name) { toast('Food name required.', 'error'); return; }
      saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
      try {
        // Recompute totals from items if user edited the breakdown
        if (Array.isArray(draft.items) && draft.items.length) recalcTotalsFromItems();
        const row = {
          log_date: localDateISO(),
          meal_slot: draft.meal_slot || 'snack',
          food_name: draft.food_name,
          brand: draft.brand || null,
          serving_size_g: numOrNull(draft.serving_size_g),
          servings: numOrNull(draft.servings) || 1,
          calories: numOrNull(draft.calories),
          protein_g: numOrNull(draft.protein_g),
          carbs_g: numOrNull(draft.carbs_g),
          fat_g: numOrNull(draft.fat_g),
          fiber_g: numOrNull(draft.fiber_g),
          source: draft.source || 'manual',
          barcode: draft.barcode || null,
        };
        await qSaveFoodLog(row);
        await qBumpFavorite(row);
        toast('Saved.');
        location.hash = '#/nutrition';
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        saveBtn.disabled = false; saveBtn.textContent = 'Save to today';
      }
    });

    document.querySelectorAll('.fav-use').forEach(el => el.addEventListener('click', async () => {
      const fav = favorites.find(f => f.id === el.dataset.id); if (!fav) return;
      try {
        await qSaveFoodLog({
          log_date: localDateISO(),
          meal_slot: 'snack',
          food_name: fav.food_name, brand: fav.brand,
          serving_size_g: fav.serving_size_g, servings: 1,
          calories: fav.calories, protein_g: fav.protein_g, carbs_g: fav.carbs_g, fat_g: fav.fat_g, fiber_g: fav.fiber_g,
          source: 'favorite', barcode: fav.barcode,
        });
        await sb.from('food_favorites').update({ use_count: (fav.use_count||0)+1, last_used_at: new Date().toISOString() }).eq('id', fav.id);
        toast('Added.'); location.hash = '#/nutrition';
      } catch (e) { console.error(e); toast('Save failed', 'error'); }
    }));
  }
  renderForm();
}


async function nutMealsView() {
  const body = document.getElementById('nut-body'); if (!body) return;
  // Show the lightest data we have: full cache > fast cache > skeleton.
  if (!_mealPlansFast && !_mealPlansCache) {
    body.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:18px;">
        <div style="flex:1;height:56px;border-radius:16px;background:var(--bg-elevated);opacity:.55;"></div>
      </div>
      ${[0,1].map(() => `<div class="card" style="margin-bottom:.75rem;opacity:.55;">
        <div style="height:14px;width:55%;border-radius:6px;background:var(--bg-elevated);margin-bottom:.55rem;"></div>
        <div style="height:11px;width:80%;border-radius:6px;background:var(--bg-elevated);margin-bottom:.45rem;"></div>
        <div style="height:11px;width:65%;border-radius:6px;background:var(--bg-elevated);"></div>
      </div>`).join('')}`;
  }
  const plans = _mealPlansCache || await qMealPlansFast();
  if (!_mealPlansCache) {
    // Hydrate full items in background; re-render once when ready (only if user is still here).
    qMealPlans().then(() => { if (location.hash.startsWith('#/nutrition/meals')) nutMealsView(); });
  }
  body.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:18px;">

  document.getElementById('mp_new').addEventListener('click', () => mpEditor(null));
  document.querySelectorAll('.mp-edit').forEach(el => el.addEventListener('click', () => {

  document.querySelectorAll('.mp-shop').forEach(el => el.addEventListener('click', () => {
    const src = _mealPlansCache || plans;

    if (!pl) return;
    if (!(pl.meal_plan_items && pl.meal_plan_items.length) && !_mealPlansCache) { toast('Loading plan…'); return; }
    mpShoppingSheet(pl);
  }));
}

// Log meal-plan item(s) into today's food log (macros only count once logged).
async function mpLogItems(ids) {
  const idList = String(ids || '').split(',').map(x => x.trim()).filter(Boolean);
  if (!idList.length) { toast('Nothing to log', 'error'); return; }
  const src = _mealPlansCache || [];
  const map = {};
  src.forEach(p => (p.meal_plan_items || []).forEach(it => { map[it.id] = it; }));
  const items = idList.map(id => map[id]).filter(Boolean);
  if (!items.length) { toast('Could not find those items', 'error'); return; }
  const date = localDateISO();
  let kcal = 0;
  try {
    for (const it of items) {
      await qSaveFoodLog({
        log_date: date,
        logged_at: new Date().toISOString(),
        meal_slot: it.meal_slot || null,
        food_name: it.food_name,
        serving_size_g: it.serving_size_g ?? null,
        servings: 1,
        calories: Number(it.calories) || 0,
        protein_g: Number(it.protein_g) || 0,
        carbs_g: Number(it.carbs_g) || 0,
        fat_g: Number(it.fat_g) || 0,
        fiber_g: Number(it.fiber_g) || 0,
        source: 'meal_plan',
      });
      kcal += Number(it.calories) || 0;
    }
    toast('Logged ' + items.length + ' item' + (items.length > 1 ? 's' : '') + ' · +' + Math.round(kcal) + ' kcal');
  } catch (e) { console.error('mpLogItems', e); toast('Log failed', 'error'); }
}

// Interactive shopping checklist for a meal plan (aggregates foods across all days).
function mpShoppingSheet(plan) {
  const items = plan.meal_plan_items || [];
  const agg = {};
  items.forEach(it => {
    const name = (it.food_name || '').trim(); if (!name) return;
    const key = name.toLowerCase();
    if (!agg[key]) agg[key] = { name, grams: 0, count: 0 };
    agg[key].grams += Number(it.serving_size_g) || 0;
    agg[key].count += 1;
  });
  const list = Object.values(agg).sort((a, b) => a.name.localeCompare(b.name));
  const storeKey = 'mp_shop_' + plan.id;
  let checked = {};
  try { checked = JSON.parse(localStorage.getItem(storeKey) || '{}'); } catch (_) {}
  const save = () => { try { localStorage.setItem(storeKey, JSON.stringify(checked)); } catch (_) {} };
  const rowHtml = (r) => {
    const on = !!checked[r.name.toLowerCase()];
    const qty = r.grams > 0 ? (fmtWt(r.grams) + 'g') : (r.count + '\u00d7');
    return '<div data-k="' + esc(r.name.toLowerCase()) + '" class="mp-shop-row" style="display:flex;align-items:center;gap:.7rem;padding:.7rem .25rem;border-bottom:1px solid var(--hairline);cursor:pointer;">'
      + '<span style="width:22px;height:22px;border-radius:6px;border:2px solid ' + (on ? 'var(--green)' : 'var(--border)') + ';background:' + (on ? 'var(--green)' : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + (on ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#0b0b0c" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' : '') + '</span>'
      + '<span style="flex:1;min-width:0;font-size:.92rem;' + (on ? 'text-decoration:line-through;color:var(--text-muted);' : '') + '">' + esc(r.name) + '</span>'
      + '<span style="font-size:.8rem;color:var(--text-3);font-variant-numeric:tabular-nums;">' + qty + '</span>'
      + '</div>';
  };
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;z-index:95;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;';
  ov.innerHTML = '<div style="width:100%;max-width:520px;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:10px 18px calc(env(safe-area-inset-bottom,0) + 20px);max-height:85vh;display:flex;flex-direction:column;">'
    + '<div style="width:36px;height:4px;border-radius:99px;background:var(--border);margin:4px auto 12px;"></div>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.35rem;"><div style="font-weight:800;font-size:1.05rem;">Shopping list</div><button id="mp_shop_clear" style="background:transparent;border:0;color:var(--text-muted);font-size:.8rem;font-weight:700;cursor:pointer;">Clear checks</button></div>'
    + '<div style="color:var(--text-3);font-size:.75rem;margin-bottom:.5rem;">' + esc(plan.name) + ' · ' + list.length + ' item' + (list.length === 1 ? '' : 's') + '</div>'
    + '<div id="mp_shop_list" style="overflow-y:auto;-webkit-overflow-scrolling:touch;">' + (list.length ? list.map(rowHtml).join('') : '<div style="color:var(--text-muted);text-align:center;padding:1.5rem 0;">No foods in this plan yet.</div>') + '</div>'
    + '</div>';
  document.body.appendChild(ov);
  const close = () => ov.remove();
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  const listEl = ov.querySelector('#mp_shop_list');
  const renderList = () => { listEl.innerHTML = list.length ? list.map(rowHtml).join('') : '<div style="color:var(--text-muted);text-align:center;padding:1.5rem 0;">No foods in this plan yet.</div>'; };
  listEl.addEventListener('click', (e) => {
    const row = e.target.closest('.mp-shop-row'); if (!row) return;
    const k = row.dataset.k; checked[k] = !checked[k]; save(); renderList();
  });
  ov.querySelector('#mp_shop_clear').addEventListener('click', () => { checked = {}; save(); renderList(); });
}

function mpEditor(pl) {
  const isEdit = !!pl;
  const body = document.getElementById('nut-body'); if (!body) return;
  let draft = {
    id: pl?.id || null,
    name: pl?.name || '',
    description: pl?.description || '',
    kcal_target: pl?.kcal_target || (state.profile?.kcal_target || ''),
    protein_target_g: pl?.protein_target_g || (state.profile?.protein_target_g || ''),
    carbs_target_g:   pl?.carbs_target_g   || (state.profile?.carbs_target_g   || ''),
    fat_target_g:     pl?.fat_target_g     || (state.profile?.fat_target_g     || ''),
    is_active: !!pl?.is_active,
    items: (pl?.meal_plan_items || []).map(it => ({ ...it, day_index: it.day_index || 1 })),
  };
  if (draft.items.length === 0) draft.items.push({ day_index:1, meal_slot:'breakfast', food_name:'', calories:null, protein_g:null, carbs_g:null, fat_g:null });
  const slots = ['breakfast','lunch','dinner','snack'];

  const dayCount = () => Math.max(1, ...draft.items.map(i => i.day_index || 1));

  const totalsForDay = (day) => {
    const its = draft.items.filter(i => (i.day_index||1) === day);
    return its.reduce((a, i) => ({
      kcal: a.kcal + Number(i.calories||0),
      p: a.p + Number(i.protein_g||0),
      c: a.c + Number(i.carbs_g||0),
      f: a.f + Number(i.fat_g||0),
    }), { kcal:0, p:0, c:0, f:0 });
  };

  const paint = () => {
    const days = Array.from({length: dayCount()}, (_, i) => i + 1);
    body.innerHTML = `
      <div class="card" style="margin-bottom:1rem;">
        <label class="label">Plan name</label>
        <input id="mp_name" class="input" value="${esc(draft.name)}" placeholder="e.g. Cut · 2200 kcal · 5 days" style="margin-bottom:.5rem;" />
        <label class="label">Description</label>
        <input id="mp_desc" class="input" value="${esc(draft.description)}" placeholder="optional" style="margin-bottom:.5rem;" />
        <div class="form-grid cols-2-on-desktop" style="margin-bottom:.5rem;">
          <div><label class="label">kcal/day target</label><input id="mp_k" class="input" type="number" value="${esc(draft.kcal_target)}" /></div>
          <div><label class="label">Protein g</label><input id="mp_p" class="input" type="number" value="${esc(draft.protein_target_g)}" /></div>
        </div>
        <div class="form-grid cols-2-on-desktop">
          <div><label class="label">Carbs g</label><input id="mp_c" class="input" type="number" value="${esc(draft.carbs_target_g)}" /></div>
          <div><label class="label">Fat g</label><input id="mp_f" class="input" type="number" value="${esc(draft.fat_target_g)}" /></div>
        </div>
        <label style="display:flex;align-items:center;gap:.5rem;margin-top:.625rem;font-size:.875rem;">
          <input id="mp_active" type="checkbox" ${draft.is_active?'checked':''} />
          <span>Make this the active plan</span>
        </label>
      </div>

      ${days.map(day => {
        const dayItems = draft.items.filter(i => (i.day_index||1) === day);
        const t = totalsForDay(day);
        return `<div class="card" style="margin-bottom:.75rem;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem;">
            <div class="section-label" style="margin:0;">Day ${day}</div>
            <div style="display:flex;align-items:center;gap:.625rem;">
              <span style="font-size:.7rem;color:var(--text-muted);font-variant-numeric:tabular-nums;">${fmtWt(t.kcal)} kcal · P${fmtWt(t.p)}/C${fmtWt(t.c)}/F${fmtWt(t.f)}</span>
              ${days.length > 1 ? `<button data-day="${day}" class="mp-rm-day" style="background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:.875rem;padding:.25rem .375rem;">remove day</button>` : ''}
            </div>
          </div>
          ${dayItems.map((it) => {
            const i = draft.items.indexOf(it);
            return `<div style="display:grid;grid-template-columns:90px 1fr 70px 56px 36px;gap:.375rem;align-items:start;padding:.5rem 0;border-bottom:1px solid rgba(39,39,42,.5);">
              <select data-i="${i}" class="mp-slot input">
                ${slots.map(sl => `<option value="${sl}" ${it.meal_slot===sl?'selected':''}>${sl[0].toUpperCase()+sl.slice(1)}</option>`).join('')}
              </select>
              <input data-i="${i}" data-k="food_name" class="mp-fld input" value="${esc(it.food_name||'')}" placeholder="Food" />
              <input data-i="${i}" data-k="calories"  class="mp-fld input" style="text-align:center;" type="number" value="${esc(it.calories ?? '')}" placeholder="kcal" />
              <input data-i="${i}" data-k="protein_g" class="mp-fld input" style="text-align:center;" type="number" value="${esc(it.protein_g ?? '')}" placeholder="P" />
              <button data-i="${i}" class="mp-del-item" style="background:transparent;border:0;color:var(--text-muted);cursor:pointer;font-size:1.125rem;height:44px;">×</button>
            </div>`;
          }).join('')}
          <button data-day="${day}" class="mp-add-meal sub-split-add">+ Add meal to Day ${day}</button>
        </div>`;
      }).join('')}

      <div style="display:flex;gap:.5rem;margin-bottom:1rem;">
        <button id="mp_add_day" class="btn btn-ghost" style="flex:1;">+ Add another day</button>
      </div>

      <div style="display:flex;gap:.5rem;">
        <a href="#/nutrition/meals" class="btn btn-ghost">Cancel</a>
        <button id="mp_save" class="btn btn-primary" style="flex:1;">${isEdit?'Update plan':'Create plan'}</button>
      </div>
    `;

    const get = (id) => document.getElementById(id);
    get('mp_name').addEventListener('input', e => draft.name = e.target.value);
    get('mp_desc').addEventListener('input', e => draft.description = e.target.value);
    get('mp_k').addEventListener('input', e => draft.kcal_target = e.target.value);
    get('mp_p').addEventListener('input', e => draft.protein_target_g = e.target.value);
    get('mp_c').addEventListener('input', e => draft.carbs_target_g = e.target.value);
    get('mp_f').addEventListener('input', e => draft.fat_target_g = e.target.value);
    get('mp_active').addEventListener('change', e => draft.is_active = e.target.checked);
    document.querySelectorAll('.mp-slot').forEach(el => el.addEventListener('change', e => {
      draft.items[Number(el.dataset.i)].meal_slot = e.target.value;
    }));
    document.querySelectorAll('.mp-fld').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.i), k = el.dataset.k;
      const v = e.target.value;
      draft.items[i][k] = (k === 'food_name') ? v : (v === '' ? null : Number(v));
    }));
    document.querySelectorAll('.mp-del-item').forEach(el => el.addEventListener('click', () => {
      draft.items.splice(Number(el.dataset.i), 1); paint();
    }));
    document.querySelectorAll('.mp-add-meal').forEach(el => el.addEventListener('click', () => {
      const day = Number(el.dataset.day);
      draft.items.push({ day_index: day, meal_slot:'breakfast', food_name:'', calories:null, protein_g:null, carbs_g:null, fat_g:null });
      paint();
    }));
    document.querySelectorAll('.mp-rm-day').forEach(el => el.addEventListener('click', async () => {
      const day = Number(el.dataset.day);
      if (!(await appConfirm({ title: `Remove Day ${day}?`, message: 'This deletes all meals on that day.', confirmLabel: 'Remove', danger: true }))) return;
      draft.items = draft.items.filter(i => (i.day_index||1) !== day);
      // re-number subsequent days
      draft.items.forEach(i => { if (i.day_index > day) i.day_index--; });
      if (draft.items.length === 0) draft.items.push({ day_index:1, meal_slot:'breakfast', food_name:'', calories:null });
      paint();
    }));
    get('mp_add_day').addEventListener('click', () => {
      const next = dayCount() + 1;
      draft.items.push({ day_index: next, meal_slot:'breakfast', food_name:'', calories:null });
      paint();
    });
    get('mp_save').addEventListener('click', async () => {
      const btn = get('mp_save'); btn.disabled = true; btn.textContent = 'Saving…';
      try {
        await qSaveMealPlan({
          id: draft.id, name: draft.name, description: draft.description,
          kcal_target: Number(draft.kcal_target) || null,
          protein_target_g: Number(draft.protein_target_g) || null,
          carbs_target_g: Number(draft.carbs_target_g) || null,
          fat_target_g: Number(draft.fat_target_g) || null,
          is_active: draft.is_active,
          items: draft.items.filter(it => it.food_name).map(it => ({
            day_index: it.day_index || 1,
            meal_slot: it.meal_slot,
            food_name: it.food_name,
            serving_size_g: it.serving_size_g ?? null,
            calories: it.calories,
            protein_g: it.protein_g, carbs_g: it.carbs_g ?? null, fat_g: it.fat_g ?? null, fiber_g: it.fiber_g ?? null,
            notes: it.notes || null,
          })),
        });
        toast('Plan saved.');
        location.hash = '#/nutrition/meals'; renderNutrition();
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        btn.disabled = false; btn.textContent = isEdit ? 'Update plan' : 'Create plan';
      }
    });
  };
  paint();
}


// ---- Body measurements queries ----
async function qBodyMeasurements(limit = 500) {
  const { data, error } = await sb.from('body_measurements')
    .select('*')
    .order('measured_date', { ascending: true })
    .limit(limit);
  if (error) { console.warn('qBodyMeasurements failed', error); return []; }
  return data || [];
}

async function qSaveBodyMeasurement(row) {
  const uid = state.session.user.id;
  const payload = { user_id: uid, ...row };
  const { data, error } = await sb.from('body_measurements').insert(payload).select().single();
  if (error) throw error;
  return data;
}

async function qDeleteBodyMeasurement(id) {
  const { error } = await sb.from('body_measurements').delete().eq('id', id);
  if (error) throw error;
}

    waist_in: '',
    chest_in: '',
    bicep_left_in: '',
    bicep_right_in: '',
    thigh_left_in: '',
    thigh_right_in: '',
    calf_left_in: '',
    calf_right_in: '',
    notes: '',
  };

  const paint = () => {
    // Build per-measurement charts
    const charts = MEASUREMENT_FIELDS.map(f => {
      const points = rows
        .filter(r => r[f.key] != null && r[f.key] !== '')
        .map(r => ({ x: new Date(r.measured_date + 'T12:00:00'), y: Number(r[f.key]) }));
      if (points.length === 0) {
        return `<div class="card" style="margin-bottom:.75rem;padding:.875rem 1rem;">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.25rem;">
            <span style="font-weight:600;font-size:.9375rem;color:${f.color};">${f.label}</span>
            <span style="font-size:.75rem;color:var(--text-muted);">no data</span>
          </div>
        </div>`;
      }
      const last = points[points.length - 1];
      const first = points[0];
      const delta = last.y - first.y;
      const deltaColor = delta < 0 ? '#34d399' : delta > 0 ? '#fbbf24' : 'var(--text-muted)';
      const deltaText = points.length > 1
        ? `<span style="color:${deltaColor};">${delta > 0 ? '+' : ''}${delta.toFixed(1)}″ all-time</span>`
        : '';
      return `<div class="card" style="margin-bottom:.75rem;padding:.875rem 1rem;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.5rem;">
          <span style="font-weight:600;font-size:.9375rem;color:${f.color};">${f.label}</span>
          <span style="font-size:.875rem;color:var(--text-secondary);font-variant-numeric:tabular-nums;">
            <strong style="color:var(--text);">${last.y.toFixed(1)}″</strong>
            ${deltaText ? ` · ${deltaText}` : ''}
          </span>
        </div>
        ${lineChart(points, { unit: 'in', title: 'Measurement' })}
      </div>`;
    }).join('');

    // Recent entries list
    const recent = rows.slice().reverse().slice(0, 20);
    const list = recent.map(r => {
      const parts = MEASUREMENT_FIELDS
        .filter(f => r[f.key] != null && r[f.key] !== '')
        .map(f => `<span style="color:${f.color};">${f.label.split(' — ')[0]}${f.label.includes('left')?' L':f.label.includes('right')?' R':''}: ${Number(r[f.key]).toFixed(1)}″</span>`)
        .join(' · ');
      return `<div class="exercise-row" style="padding:.625rem 0;">
        <div style="min-width:0;flex:1;">
          <div style="font-weight:600;font-size:.875rem;">${fmtDateShort(r.measured_date)}</div>
          <div style="color:var(--text-muted);font-size:.7rem;margin-top:2px;line-height:1.4;">${parts || '—'}</div>
          ${r.notes ? `<div style="color:var(--text-secondary);font-size:.7rem;margin-top:2px;">${esc(r.notes)}</div>` : ''}
        </div>
        <button data-id="${r.id}" class="bm-del" style="background:transparent;border:0;color:var(--danger);cursor:pointer;font-size:1.125rem;padding:.25rem .5rem;">&times;</button>
      </div>`;
    }).join('');

    // The form
    const formField = (f) => `<div>
      <label class="label" style="font-size:.7rem;color:${f.color};">${f.label} (in)</label>
      <input id="m_${f.key}" class="input" type="number" inputmode="decimal" step="0.125" min="0" max="80" value="${esc(draft[f.key])}" placeholder="${esc(f.label)}" />
    </div>`;

    body.innerHTML = `
      ${_measPills}
      <div class="card" style="margin-bottom:1rem;">
        <div class="section-label" style="margin-bottom:.5rem;">Add measurements</div>
        <label class="label" style="font-size:.7rem;">Date</label>
        <input id="m_date" type="date" class="input" max="${todayISO}" value="${esc(draft.measured_date)}" style="margin-bottom:.625rem;" />

        <div style="display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:.5rem;margin-bottom:.625rem;">
          ${MEASUREMENT_FIELDS.map(formField).join('')}
        </div>

        <label class="label" style="font-size:.7rem;">Notes (optional)</label>
        <input id="m_notes" class="input" value="${esc(draft.notes)}" placeholder="cold, after gym, etc." style="margin-bottom:.625rem;" />

        <button id="m_save" class="btn btn-primary" style="width:100%;">Save measurements</button>
        <p style="font-size:.7rem;color:var(--text-muted);margin-top:.5rem;">Fill in only the ones you measured — empty fields are skipped.</p>
      </div>

      ${rows.length === 0
        ? `<div class="card" style="color:var(--text-muted);text-align:center;">No measurements yet. Add your first entry above.</div>`
        : `<div class="section-label">Trends</div>${charts}${recent.length ? `<div class="section-label" style="margin-top:1rem;">Recent entries</div><div class="card">${list}</div>` : ''}`}
    `;

    wireRangePills(body);
    // Wire form
    const get = (id) => document.getElementById(id);
    get('m_date').addEventListener('change', e => draft.measured_date = e.target.value || todayISO);
    MEASUREMENT_FIELDS.forEach(f => {
      const el = get('m_' + f.key);
      if (el) el.addEventListener('input', e => draft[f.key] = e.target.value);
    });
    get('m_notes').addEventListener('input', e => draft.notes = e.target.value);
    get('m_save').addEventListener('click', async () => {
      const numOrNull = v => (v === '' || v == null) ? null : Number(v);
      const payload = {
        measured_date: draft.measured_date,
        recorded_at: new Date(draft.measured_date + 'T12:00:00').toISOString(),
        notes: draft.notes || null,
      };
      let any = false;
      MEASUREMENT_FIELDS.forEach(f => {
        const v = numOrNull(draft[f.key]);
        payload[f.key] = v;
        if (v != null && !isNaN(v)) any = true;
      });
      if (!any) { toast('Fill in at least one measurement.', 'error'); return; }
      get('m_save').disabled = true; get('m_save').textContent = 'Saving…';
      try {
        await qSaveBodyMeasurement(payload);
        toast('Saved.');
        renderProgress();
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        get('m_save').disabled = false; get('m_save').textContent = 'Save measurements';
      }
    });
    document.querySelectorAll('.bm-del').forEach(el => el.addEventListener('click', async () => {
      if (!(await appConfirm({ title: 'Delete this entry?', confirmLabel: 'Delete', danger: true }))) return;
      try { await qDeleteBodyMeasurement(el.dataset.id); renderProgress(); }
      catch (e) { console.error(e); toast('Delete failed', 'error'); }
    }));
  };
  paint();
}


/* =========================================================
   ROUTER
   ========================================================= */
const ROUTES = {
  '#/login':    renderLogin,
  '#/onboard':  renderOnboard,
  '#/':         renderDashboard,
  '':           renderDashboard,
  '#/plan':       renderPlan,
  '#/plan/edit':  renderPlanEditor,
  '#/log':      renderLog,
  '#/history':  () => { location.hash = '#/progress/history'; },
  '#/profile':  renderProfile,
  '#/connect':  renderConnectAI,
  '#/progress':         renderProgress,
  '#/progress/prs':     renderProgress,
  '#/progress/exercises': renderProgress,
  '#/progress/volume':  renderProgress,
  '#/progress/history': renderProgress,
  '#/progress/weight':  renderProgress,
  '#/progress/photos':  renderProgress,
  '#/progress/measurements':  renderProgress,
  '#/chat':             renderChat,
  '#/nutrition':            renderNutrition,
  '#/nutrition/add':        renderNutrition,
  '#/nutrition/trends':     renderNutrition,
  '#/nutrition/targets':    renderNutrition,
  '#/nutrition/meals':      renderNutrition,
};

function getTheme() {
  try { return localStorage.getItem('app_theme') || 'auto'; } catch { return 'auto'; }
}
function setTheme(mode) {
  try {
    if (mode === 'light' || mode === 'dark') {
      localStorage.setItem('app_theme', mode);
      document.documentElement.setAttribute('data-theme', mode);
    } else {
      localStorage.removeItem('app_theme');
      document.documentElement.removeAttribute('data-theme');
    }
  } catch {}
}
if (typeof window !== 'undefined') { window.setTheme = setTheme; window.getTheme = getTheme; }

// In-memory prefetch & background sync helpers (called once from route() after auth).
function _prefetchMealPlans() {
  if (!state?.session?.user?.id) return;
  if (typeof qMealPlansFast === 'function') setTimeout(() => { qMealPlansFast().catch(() => {}); }, 250);
  if (typeof qMealPlans === 'function')     setTimeout(() => { qMealPlans().catch(() => {}); }, 2500);
}
function _prefetchHistory() {
  if (!state?.session?.user?.id) return;
  setTimeout(() => { qHistory(200).catch(() => {}); }, 600);
}

// Apple Health auto-sync: every ~90min while the app is open, pull weight.
const AH_AUTO_SYNC_MS = 90 * 60 * 1000;
let _ahAutoSyncTimer = null;
async function _doAhAutoSync() {
  if (typeof appleHealthAvailable !== 'function' || !appleHealthAvailable()) return;
  if (typeof syncWeightFromAppleHealth !== 'function') return;
  try {
    const res = await syncWeightFromAppleHealth(7);
    if (res?.added) console.log('AH auto-sync added', res.added, 'weight entries');
    try { if (typeof syncHealthFromAppleHealth === 'function') { const hr = await syncHealthFromAppleHealth(30); if (hr && hr.added) console.log('AH health synced', hr.added); if (typeof paintHealthSection === 'function') { const h = location.hash || '#/'; if (h === '#/' || h === '' || h === '#') paintHealthSection(); } } } catch (e) { console.warn('AH health sync failed', e); }
    localStorage.setItem('ah_last_sync', String(Date.now()));
  } catch (e) { console.warn('AH auto-sync failed', e); }
}
function startAhAutoSync() {
  if (typeof appleHealthAvailable !== 'function' || !appleHealthAvailable()) return;
  if (_ahAutoSyncTimer) return;
  const last = Number(localStorage.getItem('ah_last_sync') || 0);
  const since = Date.now() - last;
  const initialDelay = since >= AH_AUTO_SYNC_MS ? 8000 : (AH_AUTO_SYNC_MS - since);
  setTimeout(_doAhAutoSync, initialDelay);
  _ahAutoSyncTimer = setInterval(_doAhAutoSync, AH_AUTO_SYNC_MS);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const lastNow = Number(localStorage.getItem('ah_last_sync') || 0);
      if (Date.now() - lastNow >= AH_AUTO_SYNC_MS) _doAhAutoSync();
    }
  });
}

function route() {
  if (!CONFIG_OK) return renderNotConfigured();
  if (state?.session && !window._postAuthHooked) {
    window._postAuthHooked = true;
    try { _prefetchMealPlans(); } catch(_) {}
    try { _prefetchHistory(); } catch(_) {}
    try { startAhAutoSync(); } catch(_) {}
  }
  const hash = location.hash || '#/';
  if (!state.session && hash !== '#/login') { location.hash = '#/login'; return; }
  if (state.session && !state.profile && hash !== '#/onboard') { location.hash = '#/onboard'; return; }
  // Paywall gate: native iOS enforces the paid experience via Apple IAP.
  // Web is left open during TestFlight; revisit before public App Store launch.
  if (IS_NATIVE && state.session && state.profile && !isSubscribed() && hash !== '#/onboard') {
    renderPaywall();
    updateChatBubble && updateChatBubble();
    return;
  }
  const path = hash.split('?')[0];
  const fn = ROUTES[path] || ROUTES[hash] || renderDashboard;
  fn();
  updateChatBubble();
}

window.addEventListener('hashchange', route);

/* =========================================================
   BOOT
   ========================================================= */
async function boot() {
  if (!CONFIG_OK) return renderNotConfigured();
  try {
    const { data } = await sb.auth.getSession();
    state.session = data.session;
    if (state.session) {
      state.profile = await qProfile();
      try { syncUserTimezone(); } catch (_) {}
      // Auto-redeem promo code if user typed one on the login screen
      try {
        const pending = (localStorage.getItem('_PENDING_PROMO') || '').trim();
        if (pending) {
          const { data: rpcData, error: rpcErr } = await sb.rpc('redeem_promo_code', { p_code: pending });
          localStorage.removeItem('_PENDING_PROMO');
          if (rpcErr) {
            console.warn('[promo] auto-redeem failed', rpcErr);
            setTimeout(() => toast('Promo code rejected: ' + (rpcErr.message || 'invalid'), 'error'), 600);
          } else if (rpcData) {
            // Refresh profile so the new subscription_status takes effect immediately
            state.profile = await qProfile();
            setTimeout(() => toast('Promo code applied ✓', 'success'), 600);
          }
        }
      } catch (e) { console.warn('[promo] auto-redeem threw', e); }
      // Sync chat API keys from profile down to localStorage so the chat works on every device
      // the user logs in on, without re-pasting the key.
      try {
        if (state.profile?.groq_api_key && !localStorage.getItem('GROQ_API_KEY')) {
          localStorage.setItem('GROQ_API_KEY', state.profile.groq_api_key);
        }
        if (state.profile?.hf_api_key && !localStorage.getItem('HF_API_KEY')) {
          localStorage.setItem('HF_API_KEY', state.profile.hf_api_key);
        }
        // If we just received fresh keys via URL params, push them up to the profile
        const pendingSync = window._pendingKeySync || localStorage.getItem('_KEYS_PENDING_SYNC') === '1';
        if (pendingSync && state.session?.user?.id) {
          const upd = {};
          const lg = localStorage.getItem('GROQ_API_KEY');
          const lh = localStorage.getItem('HF_API_KEY');
          if (lg && lg !== state.profile?.groq_api_key) upd.groq_api_key = lg;
          if (lh && lh !== state.profile?.hf_api_key) upd.hf_api_key = lh;
          if (Object.keys(upd).length) {
            try {
              await sb.from('profiles').update({ ...upd, updated_at: new Date().toISOString() }).eq('id', state.session.user.id);
            } catch (e) { console.warn('profile key sync failed', e); }
          }
          localStorage.removeItem('_KEYS_PENDING_SYNC');
          window._pendingKeySync = false;
        }
      } catch (e) { console.warn('chat key sync failed', e); }
      if (state.profile) state.plan = await qActivePlan();
    }
  } catch (e) {
    console.error('Boot error', e);
  }
  // Native: deep-link auth callback (workout://callback) — Supabase magic link / OAuth
  if (IS_NATIVE && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
    try {
      window.Capacitor.Plugins.App.addListener('appUrlOpen', async ({ url }) => {
        try {
          if (!url) return;
          // barbellmind:// scheme is used by the home-screen widgets to deep-link into specific tabs.
          if (url.startsWith('barbellmind://')) {
            const route = url.replace('barbellmind://', '').split('?')[0].split('#')[0];
            const map = { log: '#/log', nutrition: '#/nutrition', eat: '#/nutrition', plan: '#/plan', today: '#/', progress: '#/progress', coach: '#/chat', chat: '#/chat' };
            const hash = map[route] || '#/';
            location.hash = hash;
            try { window.route && window.route(); } catch(_) {}
            return;
          }
          if (!url.startsWith('workout://')) return;
          const u = new URL(url.replace('workout://', 'https://workout.local/'));
          const params = new URLSearchParams(u.hash.startsWith('#') ? u.hash.slice(1) : u.search.slice(1));
          const access_token = params.get('access_token');
          const refresh_token = params.get('refresh_token');
          if (access_token && refresh_token) {
            await sb.auth.setSession({ access_token, refresh_token });
            state.session = (await sb.auth.getSession()).data.session;
            state.profile = await qProfile();
            location.hash = '#/'; route();
          }
        } catch (e) { console.warn('appUrlOpen handler', e); }
      });
    } catch (e) { console.warn('App listener setup failed', e); }
  }
  // Initialize RevenueCat once session + profile are loaded.
  if (IS_NATIVE && state.session) {
    try { await initRevenueCat(); } catch (e) { console.warn(e); }
  }
  sb.auth.onAuthStateChange((evt, sess) => {
    if ((evt === 'SIGNED_IN' || evt === 'TOKEN_REFRESHED') && sess) {
      if (!state.session) {
        state.session = sess;
        location.hash = '#/';
        location.reload();
      } else {
        state.session = sess;
      }
    }
    if (evt === 'SIGNED_OUT') {
      state.session = null; state.profile = null; state.plan = null;
      location.hash = '#/login'; route();
    }
  });
  route();
}
boot();
</script>
