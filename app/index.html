async function speakReplyText(text) {
  if (!voiceState.speakReplies || !text) return;
  // strip markdown punctuation that doesn't read aloud well
  const clean = text
    .replace(/```[\s\S]*?```/g, '')
    .replace(/[*_`]+/g, '')
    .replace(/\[(.+?)\]\(.+?\)/g, '$1')
    .replace(/\s+/g, ' ')
    .trim();
  if (!clean) return;

  // Try v2 natural TTS via HF Inference API first.
  if (voice2.enabled) {
    try {
      voiceState.ttsStartedAt = Date.now();
      updateVoiceStatusBar();
      // Barge-in: in conversation mode, schedule mic restart slightly into playback
      if (voiceState.conversationMode && !voiceState.listening) {
        setTimeout(() => {
          if (voiceState.conversationMode && !voiceState.listening && voice2.ttsPlaying) {
            try { toggleVoiceInput(); } catch {}
          }
        }, voiceState.bargeInMinMs);
      }
      await v2SpeakNatural(clean);
      updateVoiceStatusBar();
      if (voiceState.conversationMode && !voiceState.listening && (location.hash || '').startsWith('#/chat')) {
        setTimeout(() => { if (voiceState.conversationMode && !voiceState.listening) toggleVoiceInput(); }, 200);
      }
      return;
    } catch (e) {
      console.warn('[voice v2] natural TTS failed, falling back to Web Speech:', e.message || e);
      // continue into Web Speech fallback
    }
  }

  if (!_voiceSupportsTTS()) return;
  try { speechSynthesis.cancel(); } catch {}
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = (voiceState.preferredVoice?.lang) || 'en-US';
  u.rate = voiceState.rate || 1.05;
  u.pitch = 1.0;
  if (voiceState.preferredVoice) u.voice = voiceState.preferredVoice;
  u.onend = () => {
    updateVoiceStatusBar();
    // Mic is already started on TTS-start in convo mode (barge-in). Only fall back here
    // if it didn't start for some reason (older browsers, errors).
    if (voiceState.conversationMode && !voiceState.listening) {
      setTimeout(() => {
        if (voiceState.conversationMode && !voiceState.listening && (location.hash || '').startsWith('#/chat')) {
          toggleVoiceInput();
        }
      }, 250);
    }
  };
  u.onerror = () => {
    updateVoiceStatusBar();
    if (voiceState.conversationMode && !voiceState.listening && (location.hash || '').startsWith('#/chat')) {
      setTimeout(() => { if (voiceState.conversationMode && !voiceState.listening) toggleVoiceInput(); }, 400);
    }
  };
  // Update bar to "Speaking" before/around start
  u.onstart = () => {
    voiceState.ttsStartedAt = Date.now();
    updateVoiceStatusBar();
    // Barge-in: start listening AFTER a brief delay so the mic doesn't pick up the
    // very first words from the speaker (which would self-cancel TTS via echo).
    if (voiceState.conversationMode && !voiceState.listening) {
      setTimeout(() => {
        if (voiceState.conversationMode && !voiceState.listening && speechSynthesis.speaking) {
          try { toggleVoiceInput(); } catch (e) { console.warn('barge-in mic start failed', e); }
        }
      }, voiceState.bargeInMinMs);
    }
  };
  voiceState.utterance = u;
  speechSynthesis.speak(u);
  updateVoiceStatusBar();
}

function stopSpeaking() {
  v2StopTtsPlayback();
  if (_voiceSupportsTTS()) { try { speechSynthesis.cancel(); } catch {} }
  voiceState.utterance = null;
  updateVoiceStatusBar();
}

function toggleChatTTS() {
  voiceState.speakReplies = !voiceState.speakReplies;
  localStorage.setItem('CHAT_TTS', voiceState.speakReplies ? '1' : '0');
  if (!voiceState.speakReplies) stopSpeaking();
  // refresh button state
  const btn = document.getElementById('chatTTSBtn');
  if (btn) {
    btn.classList.toggle('on', voiceState.speakReplies);
    btn.title = voiceState.speakReplies ? 'Voice replies: ON (tap to mute)' : 'Voice replies: OFF (tap to enable)';
  }
  toast(voiceState.speakReplies ? 'Voice replies on' : 'Voice replies off');
}

function toggleVoiceInput() {
  // If currently listening, stop (will auto-send via onend if there is content)
  if (voiceState.listening && voiceState.recognition) {
    try { voiceState.recognition.stop(); } catch {}
    return;
  }
  if (!_voiceSupportsSTT()) {
    toast('Voice input not supported in this browser. Try Chrome on desktop or Safari on iOS.', 'error');
    return;
  }
  // Stop any TTS that's currently speaking
  stopSpeaking();

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';
  const input = document.getElementById('chatInput');
  const micBtn = document.getElementById('chatMicBtn');
  let finalText = '';
  let touched = false;

  rec.onstart = () => {
    voiceState.listening = true;
    micBtn?.classList.add('listening');
    updateVoiceStatusBar();
  };
  rec.onspeechstart = () => {
    // Barge-in: only cancel TTS if it's been speaking long enough that this isn't an echo self-trigger.
    if (_voiceSupportsTTS() && speechSynthesis.speaking) {
      const since = Date.now() - (voiceState.ttsStartedAt || 0);
      if (since > voiceState.bargeInMinMs) {
        try { speechSynthesis.cancel(); } catch {}
        voiceState.utterance = null;
        updateVoiceStatusBar();
      }
      // else: this speechstart fired too soon after TTS began. It's almost certainly
      // the mic picking up the speaker's own audio — ignore it so we don't kill our
      // own reply mid-sentence.
    }
  };
  rec.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalText += t;
      else interim += t;
    }
    touched = true;
    if (input) {
      input.value = (finalText + interim).trim();
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 128) + 'px';
    }
  };
  rec.onerror = (e) => {
    if (e.error === 'no-speech') {
      // benign - just close out without complaining
    } else if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      toast('Microphone permission denied.', 'error');
    } else {
      toast('Voice error: ' + e.error, 'error');
    }
  };
  rec.onend = () => {
    voiceState.listening = false;
    voiceState.recognition = null;
    micBtn?.classList.remove('listening');
    updateVoiceStatusBar();
    if (touched && input?.value.trim()) {
      // Auto-send what was transcribed
      handleChatSend();
    }
  };

  voiceState.recognition = rec;
  try { rec.start(); }
  catch (e) { toast('Could not start voice input: ' + e.message, 'error'); }
}

function updateVoiceStatusBar() {
  const bar = document.getElementById('voiceStatusBar');
  if (!bar) return;
  const inConvo = voiceState.conversationMode;
  const stopHandsFreeLink = inConvo
    ? '<button onclick="toggleConversationMode()" style="margin-left:auto;background:transparent;border:0;color:inherit;font-size:.75rem;cursor:pointer;text-decoration:underline;">end conversation</button>'
    : '';
  if (voiceState.listening) {
    bar.className = 'voice-status-bar';
    bar.style.display = 'flex';
    const ttsActive = _voiceSupportsTTS() && speechSynthesis.speaking;
    const label = ttsActive
      ? 'Speaking — talk to interrupt'
      : (inConvo ? 'Listening…' : 'Listening — tap mic again to stop and send');
    bar.innerHTML = '<span class="vs-dot"></span><span>' + label + '</span>' + stopHandsFreeLink;
    return;
  }
  if (typeof chatState !== 'undefined' && chatState.isLoading) {
    bar.className = 'voice-status-bar tts';
    bar.style.display = 'flex';
    bar.innerHTML = '<span class="vs-dot"></span><span>Thinking…</span>' + stopHandsFreeLink;
    return;
  }
  if (voiceState.speakReplies && _voiceSupportsTTS() && speechSynthesis.speaking) {
    bar.className = 'voice-status-bar tts';
    bar.style.display = 'flex';
    const hint = (inConvo && voiceState.listening) ? ' — speak to interrupt' : '';
    bar.innerHTML = '<span class="vs-dot"></span><span>Speaking reply' + hint + '</span><span class="speaking-indicator"><span></span><span></span><span></span></span>' +
      (inConvo ? stopHandsFreeLink : '<button onclick="stopSpeaking()" style="margin-left:auto;background:transparent;border:0;color:inherit;font-size:.75rem;cursor:pointer;text-decoration:underline;">stop</button>');
    return;
  }
  if (inConvo) {
    bar.className = 'voice-status-bar tts';
    bar.style.display = 'flex';
    bar.innerHTML = '<span class="vs-dot"></span><span>Conversation mode — say something</span>' + stopHandsFreeLink;
    return;
  }
  bar.style.display = 'none';
  bar.innerHTML = '';
}

/* Auto-retry Groq on transient failures (5xx / network).
   Permanent errors (auth, rate limit, no key) are passed straight through. */
async function callGroqWithToolsRetry(messages, systemPrompt) {
  const maxAttempts = 3;
  let lastErr;
  for (let attempt = 1; attempt <= maxAttempts; attempt++) {
    try {
      return await callGroqWithTools(messages, systemPrompt);
    } catch (e) {
      lastErr = e;
      const msg = e?.message || '';
      // Don't retry on permanent / actionable errors
      const permanent = /NO_GROQ_KEY|RATE_LIMITED|GROQ_ERROR: 4(00|01|03|04|22)/.test(msg);
      if (permanent) throw e;
      if (attempt < maxAttempts) {
        const wait = 600 * attempt;
        console.warn(`Groq transient error (attempt ${attempt}/${maxAttempts}); retrying in ${wait}ms:`, msg);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
    }
  }
  throw lastErr;
}

async function sendChatMessage(userMsg) {
  chatState.messages.push({ role: 'user', content: userMsg });
  chatState.isLoading = true;
  renderChatMessages();
  try { updateVoiceStatusBar(); } catch {}

  // Build system prompt with user data
  const userName = state.profile?.display_name || 'there';
  let systemPrompt = KB_CONTEXT.replace(/\{\{username\}\}/g, userName);
  const userContext = await getChatUserContext();
  systemPrompt += userContext;
  if (voiceState.conversationMode) {
    systemPrompt += `\n\nVOICE CONVERSATION MODE: replies are read aloud. Keep them under 3 sentences and direct unless the user asks for detail. Avoid markdown, lists, or code blocks; use plain prose only.`;
  }
  systemPrompt += `\n\nLOGGING TOOLS AVAILABLE — USE PROACTIVELY:
- log_food: when the user describes eating something, call this. ALWAYS provide estimates for calories, protein_g, carbs_g, fat_g, AND fiber_g. NEVER omit these. Use standard nutrition database values when the user doesn't give numbers — for example, 1 medium sweet potato is roughly 115 kcal / 2g protein / 27g carbs / 0g fat / 4g fiber. 100g cooked chicken breast is roughly 165 kcal / 31g protein / 0g carbs / 3.6g fat. 1 cup cooked white rice is roughly 205 kcal / 4g protein / 45g carbs / 0g fat. Pick meal_slot from time of day if unspecified (≤10am breakfast, 11-2 lunch, 5-9 dinner, else snack).
- log_workout_set: when the user says they did a set of an exercise with weight and reps, call this once per set.
- log_body_weight: when the user reports their body weight.
- log_cardio: when the user reports a cardio session.
Always confirm in plain English what you logged, including the macro estimates you used.`;

  // Only send last 20 messages for context window management
  const recentMessages = chatState.messages.slice(-20).map(m => ({
    role: m.role, content: m.content
  }));

  let response = '';
  let usedFallback = false;

  try {
    response = await callGroqWithToolsRetry(recentMessages, systemPrompt);
  } catch (groqErr) {
    const m = groqErr?.message || '';
    console.warn('Groq failed:', m);
    let errKind = 'transient';
    if (m === 'NO_GROQ_KEY') errKind = 'no_key';
    else if (m === 'RATE_LIMITED' || /429|GROQ_ERROR: 429/.test(m)) errKind = 'rate_limited';
    else if (/GROQ_ERROR: 401|GROQ_ERROR: 403/.test(m)) errKind = 'bad_key';
    else if (/GROQ_ERROR: 4\d{2}/.test(m)) errKind = 'bad_request';

    if (errKind === 'no_key') {
      try { response = await callHuggingFace(recentMessages, systemPrompt); usedFallback = true; }
      catch { response = 'I need an API key to work. Tap the gear icon in the chat header and paste a Groq or HuggingFace key.'; }
    } else if (errKind === 'bad_key') {
      response = 'Your Groq API key was rejected. Open chat settings (gear icon) and paste a fresh one from console.groq.com/keys.';
    } else if (errKind === 'rate_limited') {
      try { response = await callHuggingFace(recentMessages, systemPrompt); usedFallback = true; }
      catch (hfErr) {
        if (hfErr?.message === 'NO_HF_KEY') {
          response = 'Hit Groq\'s rate limit (free tier is 30 requests/minute). Wait ~30 seconds and try again, or add a HuggingFace key as backup in settings.';
        } else {
          response = 'Both Groq and HuggingFace hit rate limits. Wait a moment and try again.';
        }
      }
    } else if (errKind === 'bad_request') {
      response = 'The AI rejected this request (often happens with very long messages). Try shortening your last message.';
    } else {
      // transient: tried 3 retries already and still failed
      try { response = await callHuggingFace(recentMessages, systemPrompt); usedFallback = true; }
      catch (hfErr) {
        response = 'Groq is having a brief hiccup and HuggingFace backup isn\'t set up. Try again in a few seconds — these usually clear up fast.';
      }
    }
  }

  chatState.messages.push({ role: 'assistant', content: response });
  chatState.isLoading = false;
  chatState.hasActiveConvo = true;
  renderChatMessages();
  try { updateVoiceStatusBar(); } catch {}
  try {
    // Don't speak our own error messages aloud — they're cosmetic noise in voice/conversation mode.
    // Exact-phrase match against the canned error strings we generate, so we don't
    // accidentally suppress real replies that happen to mention "API key" or "try again".
    const errorPhrases = [
      'I need an API key to work',
      'Your Groq API key was rejected',
      "Hit Groq's rate limit",
      'Both Groq and HuggingFace hit rate limits',
      'The AI rejected this request',
      'Groq is having a brief hiccup',
      'Sorry, I ran into',
    ];
    const looksLikeOurError = errorPhrases.some(ph => (response || '').includes(ph));
    if (!looksLikeOurError) speakReplyText(response);
  } catch (e) { console.warn('TTS failed', e); }
}

        ).join('')}
      </div>
    </div>`;
  } else {
    chatState.messages.forEach(m => {
      if (m.role === 'user') {
        html += `<div class="chat-msg user">${esc(m.content)}</div>`;
      } else {
        html += `<div class="chat-msg assistant">${formatChatMsg(m.content)}</div>`;

  if (chatState.isLoading) {
    html += `<div class="chat-msg assistant"><div class="chat-typing"><span></span><span></span><span></span></div></div>`;
  }

  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function wireChatEvents() {
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  if (!input || !sendBtn) return;

  // Voice input mic button
  const micBtn = document.getElementById('chatMicBtn');
  if (micBtn) {
    if (!_voiceSupportsSTT()) {
      micBtn.style.opacity = '0.4';
      micBtn.title = 'Voice input not supported in this browser';
    }
    micBtn.addEventListener('click', toggleVoiceInput);
  }
  // Voice output toggle button — sync class to current state on render
  const ttsBtn = document.getElementById('chatTTSBtn');
  if (ttsBtn) {
    if (!_voiceSupportsTTS()) {
      ttsBtn.style.opacity = '0.4';
      ttsBtn.title = 'Voice replies not supported in this browser';
    } else {
      ttsBtn.classList.toggle('on', voiceState.speakReplies);
      ttsBtn.title = voiceState.speakReplies ? 'Voice replies: ON (tap to mute)' : 'Voice replies: OFF (tap to enable)';
    }
  }
  updateVoiceStatusBar();

  // Send on button tap/click (works on mobile + desktop)
  sendBtn.addEventListener('click', handleChatSend);
  sendBtn.addEventListener('touchend', function(e) {
    e.preventDefault(); // prevent ghost click / double-fire
    handleChatSend();
  });

  // Auto-resize textarea
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 128) + 'px';
  });

  // Enter to send (desktop + mobile with hardware keyboard)
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleChatSend();
    }
  });

  // Suggested prompt chips (delegated from message container)
  const msgContainer = document.getElementById('chatMessages');
  if (msgContainer) {
    msgContainer.addEventListener('click', function(e) {
      const chip = e.target.closest('.chat-suggest-chip');
      if (chip && chip.dataset.prompt) {
        input.value = chip.dataset.prompt;
        handleChatSend();
      }
    });
  }

  // Focus input after short delay (let mobile keyboard settle)
  setTimeout(() => input.focus(), 150);
}

// ---- Handle send button ----
function handleChatSend() {
  try { stopSpeaking(); } catch {}
  const input = document.getElementById('chatInput');
  if (!input) return;
  const msg = input.value.trim();
  if (!msg || chatState.isLoading) return;
  input.value = '';
  input.style.height = 'auto';
  sendChatMessage(msg);
}

// ---- Floating bubble (shown when navigating away from chat mid-convo) ----
function updateChatBubble() {
  let bubble = document.getElementById('chatBubble');
  if (!bubble) {
    bubble = document.createElement('button');
    bubble.id = 'chatBubble';
    bubble.className = 'chat-bubble';
    bubble.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="10" r="1" fill="currentColor"/><circle cx="12" cy="10" r="1" fill="currentColor"/><circle cx="15" cy="10" r="1" fill="currentColor"/></svg>`;
    bubble.addEventListener('click', () => { location.hash = '#/chat'; });
    document.body.appendChild(bubble);
  }

  const hash = location.hash || '#/';
  if (chatState.hasActiveConvo && hash !== '#/chat') {
    bubble.classList.add('visible');
    chatState.isOpen = false;
  } else {
    bubble.classList.remove('visible');
  }
}

// Two-stage cache. Fast (plans only, ~2KB) for the list view. Full (with items) for the editor.
let _mealPlansFast = null;
let _mealPlansFastInflight = null;
let _mealPlansCache = null;
let _mealPlansInflight = null;
async function qMealPlansFast({ forceRefresh = false } = {}) {
  if (!forceRefresh && _mealPlansFast) return _mealPlansFast;
  if (_mealPlansFastInflight) return _mealPlansFastInflight;
  _mealPlansFastInflight = (async () => {
    const { data, error } = await sb.from('meal_plans')
      .select('id, name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, is_active, created_at')
      .order('created_at', { ascending: false });
    _mealPlansFastInflight = null;
    if (error) { console.error(error); return []; }
    _mealPlansFast = (data || []).map(pl => ({ ...pl, meal_plan_items: [] }));
    return _mealPlansFast;
  })();
  return _mealPlansFastInflight;
}
async function qMealPlans({ forceRefresh = false } = {}) {
  if (!forceRefresh && _mealPlansCache) return _mealPlansCache;
  if (_mealPlansInflight) return _mealPlansInflight;
  _mealPlansInflight = (async () => {
    const { data, error } = await sb.from('meal_plans').select('*, meal_plan_items(*)').order('created_at', { ascending: false });
    _mealPlansInflight = null;
    if (error) { console.error(error); return []; }
    _mealPlansCache = data || [];
    _mealPlansFast = _mealPlansCache;
    return _mealPlansCache;
  })();
  return _mealPlansInflight;
}
function invalidateMealPlansCache() { _mealPlansCache = null; _mealPlansFast = null; }
async function qSaveMealPlan({ id, name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, items, is_active }) {
  const uid = state.session.user.id;
  let plan;
  if (id) {
    const { data, error } = await sb.from('meal_plans').update({ name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, is_active }).eq('id', id).select().single();
    if (error) throw error; plan = data;
    await sb.from('meal_plan_items').delete().eq('plan_id', id);
  } else {
    const { data, error } = await sb.from('meal_plans').insert({ user_id: uid, name, description, kcal_target, protein_target_g, carbs_target_g, fat_target_g, is_active: is_active || false }).select().single();
    if (error) throw error; plan = data;
  }
  if (items?.length) {
    const rows = items.map((it, idx) => ({ plan_id: plan.id, order_idx: idx, ...it }));
    const { error } = await sb.from('meal_plan_items').insert(rows);
    if (error) throw error;
  }
  if (is_active) {
    await sb.from('meal_plans').update({ is_active: false }).neq('id', plan.id).eq('user_id', uid);
  }
  invalidateMealPlansCache();
  return plan;
}

  if (error) throw error;
  invalidateMealPlansCache();
}

const round1 = (n) => n == null || isNaN(n) ? null : Math.round(Number(n) * 10) / 10;

async function lookupBarcode(barcode) {
  const url = `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('OpenFoodFacts: HTTP ' + r.status);
  const data = await r.json();
  if (data.status !== 1 && !data.product) throw new Error('Product not found in OpenFoodFacts');
  const p = data.product || {};
  const nut = p.nutriments || {};
  const serving = Number(p.serving_quantity) || 100;
  const factor = serving / 100;
  return {
    food_name: p.product_name || p.generic_name || 'Unknown',
    brand: p.brands || null,
    serving_size_g: serving,
    calories: round1(nut['energy-kcal_100g'] * factor || (nut['energy-kcal'] || 0)),
    protein_g: round1((nut['proteins_100g'] || 0) * factor),
    carbs_g:   round1((nut['carbohydrates_100g'] || 0) * factor),
    fat_g:     round1((nut['fat_100g'] || 0) * factor),
    fiber_g:   round1((nut['fiber_100g'] || 0) * factor),
    barcode,
    source: 'openfoodfacts',
  };
}
async function searchFoodOFF(query, limit = 10) {
  // OpenFoodFacts can hang for 20+ seconds. Abort after 4s and let the caller fall back.
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 4000);
  try {
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=${limit}`;
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!r.ok) throw new Error('OpenFoodFacts search failed');
    const data = await r.json();
    return (data.products || []).map(p => {
      const nut = p.nutriments || {};
      const serving = Number(p.serving_quantity) || 100;
      const factor = serving / 100;
      return {
        food_name: p.product_name || p.generic_name || 'Unknown',
        brand: p.brands || null,
        serving_size_g: serving,
        calories: round1(nut['energy-kcal_100g'] * factor || (nut['energy-kcal'] || 0)),
        protein_g: round1((nut['proteins_100g'] || 0) * factor),
        carbs_g:   round1((nut['carbohydrates_100g'] || 0) * factor),
        fat_g:     round1((nut['fat_100g'] || 0) * factor),
        fiber_g:   round1((nut['fiber_100g'] || 0) * factor),
        barcode: p.code || null,
        source: 'openfoodfacts',
      };
    });
  } finally {
    clearTimeout(timeout);
  }
}

// USDA FoodData Central — much faster and more reliable than OpenFoodFacts.
// Tries the user's saved API key first; falls back to DEMO_KEY (rate-limited).
// Sign up for a free key at https://fdc.nal.usda.gov/api-key-signup
function getUSDAKey() {
  let k = '';

  if (k) return k;
  const fromProfile = (state && state.profile && state.profile.usda_api_key) ? String(state.profile.usda_api_key).trim() : '';
  if (fromProfile) {
    try { localStorage.setItem('USDA_API_KEY', fromProfile); } catch(_) {}
    return fromProfile;
  }
  // Default key for this app. 1000 requests/hour. Sign up for your own at
  // https://fdc.nal.usda.gov/api-key-signup
  return '7WczIUUqrbkmlVf93IcT6XhtREUXO8ZQMVLvQ6l9';
}

async function searchFoodUSDA(query, limit = 10) {
  const key = getUSDAKey();
  // Search branded foods first (better for user food log), then survey/foundation as backup.
  const url = `https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(query)}&pageSize=${limit}&dataType=Branded,Foundation,SR%20Legacy,Survey%20(FNDDS)`;
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timeout);
    if (!r.ok) {
      if (r.status === 429) throw new Error('USDA rate limit hit. Add your own free API key in Profile.');
      throw new Error('USDA search failed (' + r.status + ')');
    }
    const data = await r.json();
    const foods = data.foods || [];
    // Each food row has foodNutrients with id/name/amount. Map standard ones.
    const nut = (food, names) => {
      for (const n of (food.foodNutrients || [])) {
        const nm = (n.nutrientName || n.name || '').toLowerCase();
        if (names.some(needle => nm.includes(needle))) return Number(n.value) || 0;
      }
      return 0;
    };
    return foods.map(f => {
      const serving = Number(f.servingSize) || 100;
      const servingUnit = (f.servingSizeUnit || 'g').toLowerCase();
      const isGrams = servingUnit === 'g' || servingUnit === 'gm';
      // USDA values are per 100g; scale to the food's reported serving size if grams.
      const factor = (isGrams ? serving : 100) / 100;
      return {
        food_name: f.description || f.brandName || 'Unknown',
        brand: f.brandOwner || f.brandName || null,
        serving_size_g: isGrams ? serving : 100,
        calories: round1(nut(f, ['energy', 'kcal']) * factor),
        protein_g: round1(nut(f, ['protein']) * factor),
        carbs_g:   round1(nut(f, ['carbohydrate']) * factor),
        fat_g:     round1(nut(f, ['total lipid', 'fat,']) * factor),
        fiber_g:   round1(nut(f, ['fiber']) * factor),
        barcode: f.gtinUpc || null,
        source: 'usda',
      };
    });
  } finally {
    clearTimeout(timeout);
  }
}

// Combined food search — try USDA first (fast, reliable). If it fails or returns
// nothing, fall back to OpenFoodFacts (community data, more international items).
async function searchFood(query, limit = 12) {
  if (!query || query.trim().length < 2) return [];
  try {
    const usdaResults = await searchFoodUSDA(query, limit);
    if (usdaResults && usdaResults.length > 0) return usdaResults;
  } catch (e) {
    console.warn('[search] USDA failed, trying OFF:', e.message);
  }
  try {
    return await searchFoodOFF(query, limit);
  } catch (e) {
    console.warn('[search] OFF also failed:', e.message);
    return [];
  }
}

// Convert a base64/dataURL string to a File so existing flows keep working.
function fileFromDataUrl(dataUrl, filename = 'capture.jpg') {
  const m = /^data:([^;]+);base64,(.+)$/.exec(dataUrl);
  if (!m) throw new Error('Invalid image data URL.');
  const type = m[1] || 'image/jpeg';
  const bin = atob(m[2]);
  const len = bin.length;
  const buf = new Uint8Array(len);
  for (let i = 0; i < len; i++) buf[i] = bin.charCodeAt(i);
  return new File([buf], filename, { type });
}

// Single-frame ZXing decode on an arbitrary image File. Used to decode a barcode
// from a Capacitor-Camera photo on native iOS where live getUserMedia is unreliable.
async function decodeBarcodeFromImageFile(file) {
  const Z = await loadZXing();
  if (!Z) throw new Error('ZXing failed to load.');
  const url = URL.createObjectURL(file);
  try {
    const img = new Image();
    img.src = url;
    if (img.decode) { try { await img.decode(); } catch {} }
    else await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    const reader = new Z.BrowserMultiFormatReader();
    const result = await reader.decodeFromImageElement(img);
    return result && result.getText ? result.getText() : '';
  } finally {
    URL.revokeObjectURL(url);
  }
}

// Sync the last N days of body-weight samples from Apple Health into Supabase body_weights.
// Returns { added, skipped, error }. Dedupes against existing rows by (recorded_at, weight_lbs).
async function syncWeightFromAppleHealth(daysBack = 365) {
  const HK = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorHealthkit;
  if (!HK) return { added: 0, skipped: 0, error: 'Apple Health plugin not installed. Reinstall the app.' };

  // Authorize once per install (shared flag) -- avoids re-presenting the Health sheet.
  if (!(await requestHealthAuthOnce(HK))) {
    return { added: 0, skipped: 0, error: 'Permission request failed.' };
  }

  // Pull samples
  let samples = [];
  try {
    const end = new Date();
    const start = new Date(end.getTime() - daysBack * 86400000);
    const res = await HK.queryHKitSampleType({
      sampleName: 'weight',
      startDate: start.toISOString(),
      endDate: end.toISOString(),
      limit: 2000,
    });
    samples = (res && (res.resultData || res.data)) || [];
  } catch (e) {
    return { added: 0, skipped: 0, error: e.message || 'Could not read Apple Health weight.' };
  }
  if (!samples.length) return { added: 0, skipped: 0, error: null };

  // Convert kg -> lbs (Perfood returns kg by default), dedupe against existing rows
  const KG_TO_LBS = 2.2046226218;
  const existing = await qBodyWeights();
  const existingKey = new Set(existing.map(r => {
    const d = new Date(r.recorded_at).toISOString().slice(0, 16);
    return `${d}__${Math.round(Number(r.weight_lbs) * 10) / 10}`;
  }));

  const toInsert = [];
  for (const sx of samples) {
    let val = Number(sx.value);
    const unit = (sx.unitName || sx.unit || '').toLowerCase();
    if (!val || val <= 0) continue;
    // Auto-detect units: if value looks like lbs already (heavier than 50), use as lbs
    let lbs;
    if (unit.includes('lb') || unit.includes('pound')) lbs = val;
    else if (unit.includes('kg') || unit.includes('gram')) lbs = val * KG_TO_LBS;
    else if (val > 50 && val < 500) lbs = val; // heuristic: looks like lbs
    else lbs = val * KG_TO_LBS;             // assume kg
    if (lbs > 800 || lbs < 50) continue;
    lbs = Math.round(lbs * 10) / 10;
    const when = sx.startDate || sx.endDate || new Date().toISOString();
    const key = `${new Date(when).toISOString().slice(0, 16)}__${lbs}`;
    if (existingKey.has(key)) continue;
    toInsert.push({
      user_id: state.session.user.id,
      weight_lbs: lbs,
      recorded_at: when,
      source: 'apple_health',
      notes: sx.sourceName ? `via ${sx.sourceName}` : null,
    });
    existingKey.add(key);
  }
  if (!toInsert.length) return { added: 0, skipped: samples.length, error: null };

  try {
    let added = 0;
    for (let i = 0; i < toInsert.length; i += 500) {
      const batch = toInsert.slice(i, i + 500);
      const { error } = await sb.from('body_weights').insert(batch);
      if (error) throw error;
      added += batch.length;
    }
    return { added, skipped: samples.length - added, error: null };
  } catch (e) {
    return { added: 0, skipped: 0, error: e.message || 'Supabase insert failed.' };
  }
}

async function syncHealthFromAppleHealth(daysBack = 30) {
  const HK = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.CapacitorHealthkit;
  if (!HK) return { added: 0, error: 'Apple Health plugin not installed. Reinstall the app.' };
  const uid = state && state.session && state.session.user && state.session.user.id;
  if (!uid) return { added: 0, error: 'Not signed in.' };

  // Authorize once per install (calling this every sync flashes a blank Health sheet).
  if (!(await requestHealthAuthOnce(HK))) return { added: 0, error: 'Permission request failed.' };

  const end = new Date();
  const start = new Date(end.getTime() - daysBack * 86400000);
  const startISO = start.toISOString(), endISO = end.toISOString();
  const startDay = localDateISO(start);

  const daily = {}; // key -> day -> {sum,count}
  const cell = (k, day) => { (daily[k] = daily[k] || {}); (daily[k][day] = daily[k][day] || { sum:0, count:0 }); return daily[k][day]; };

  // Yield to the main thread between native calls so the WebView never stalls.
  const yieldToUI = () => new Promise((r) => setTimeout(r, 0));
  const ingest = (m, rows) => {
    if (m.kind === 'sleep') {
      for (const sx of rows) {
        const stt = String(sx.sleepState != null ? sx.sleepState : (sx.value != null ? sx.value : '')).toUpperCase();
        const asleep = stt.includes('ASLEEP') || stt === 'CORE' || stt === 'DEEP' || stt === 'REM';
        if (!asleep) continue;
        let secs = Number(sx.duration);
        if (!isFinite(secs) || secs <= 0) secs = (new Date(sx.endDate) - new Date(sx.startDate)) / 1000;
        if (!isFinite(secs) || secs <= 0) continue;
        cell(m.key, localDateISO(new Date(sx.endDate || sx.startDate))).sum += secs / 3600;
      }
    } else {
      for (const sx of rows) {
        let v = Number(sx.value);
        if (!isFinite(v)) continue;
        if (m.conv) v *= m.conv;
        if (m.tempF) { const u = String(sx.unitName || '').toLowerCase(); if (u.indexOf('c') !== -1 || v < 45) v = v * 9/5 + 32; }
        const c = cell(m.key, localDateISO(new Date(sx.startDate || sx.endDate))); c.sum += v; c.count += 1;
      }
    }
  };

  let _hkSamples = 0, _hkMax = 0; const _hkT0 = Date.now();
  try { localStorage.setItem('hk_sync_inflight', JSON.stringify({ at: _hkT0, days: daysBack })); } catch (_) {}
  try { console.log('[HK] sync START days=' + daysBack); } catch (_) {}
  // Pull each metric in small time chunks. One month-long heart-rate query is
  // tens of thousands of samples; serializing that across the Capacitor bridge
  // in a single shot can kill the WebView (blank white). Small chunks + a yield
  // after every call keep each payload tiny and the UI alive.
  for (const m of HEALTH_METRICS) {
    const chunkDays = (m.kind === 'avg') ? 3 : 10; // tighter windows for high-frequency vitals
    for (let cur = start.getTime(); cur < end.getTime(); cur += chunkDays * 86400000) {
      const cEnd = Math.min(end.getTime(), cur + chunkDays * 86400000);
      let res;
      try {
        res = await HK.queryHKitSampleType({ sampleName: m.hk, startDate: new Date(cur).toISOString(), endDate: new Date(cEnd).toISOString(), limit: 3000 });
      } catch (e) { await yieldToUI(); continue; }
      const rows = (res && (res.resultData || res.data)) || [];
      _hkSamples += rows.length; if (rows.length > _hkMax) _hkMax = rows.length;
      try { console.log('[HK] ' + m.key + ' ' + new Date(cur).toISOString().slice(0, 10) + ' rows=' + rows.length + ' cum=' + _hkSamples); } catch (_) {}
      if (rows.length) ingest(m, rows);
      await yieldToUI();
    }
  }
  // Heavy native pulls survived without killing the WebView; clear the sentinel.
  try { localStorage.removeItem('hk_sync_inflight'); console.log('[HK] all queries done ' + (Date.now() - _hkT0) + 'ms totalSamples=' + _hkSamples + ' maxChunk=' + _hkMax); } catch (_) {}

  const out = [];
  for (const m of HEALTH_METRICS) {
    const byDay = daily[m.key]; if (!byDay) continue;
    for (const day of Object.keys(byDay)) {
      const c = byDay[day];
      let value = (m.kind === 'avg') ? (c.count ? c.sum / c.count : NaN) : c.sum;
      if (!isFinite(value) || value <= 0) continue;
      value = Math.round(value * 1000) / 1000;
      out.push({ user_id: uid, metric: m.key, value, unit: m.unit || null, day,
        recorded_at: new Date(day + 'T12:00:00').toISOString(),
        agg: (m.kind === 'avg' ? 'avg' : 'sum'), hk_uuid: null, source: 'apple_health' });
    }
  }

  // Steps / distance / flights from raw HealthKit samples double-count iPhone+Watch
  // overlap. Apple's de-duplicated daily totals (native HKStatisticsQuery) are the

        { key: 'distance', val: (typeof ag.distanceMetersToday === 'number') ? ag.distanceMetersToday * M_TO_MILES : null, unit: 'mi' },

    await sb.from('health_metrics').delete().eq('user_id', uid).gte('day', startDay);

async function aiEstimateFoodFromPhoto(file, portionHint = '') {
  const key = getGroqKey();
  if (!key) throw new Error('AI key not loaded yet. Pull down to refresh, or check your connection — keys sync after sign-in.');
  const dataUrl = await new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
  const body = {
    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
    messages: [{
      role: 'user',
      content: [
        { type: 'text', text: (portionHint ? (portionHint + ' ') : '') + 'Identify the food in this image. If it is a single packaged product (cereal box, protein bar, soda can, frozen meal), set is_packaged=true and extract brand + exact product name. If it is a plate or composite meal (salad, bowl, stir fry, sandwich, etc.) set is_packaged=false and break it down into each visible ingredient. For EACH ingredient estimate the visible grams using the plate, hand, or utensil as scale reference, then compute that ingredient\'s macros at the estimated grams (NOT per 100g). Use plate ~26cm, dinner fork ~20cm, palm ~10cm as scale anchors if visible. Reply with JSON only, no prose: {"food_name":"<short label for the whole dish>","brand":null,"is_packaged":true|false,"items":[{"name":"...","grams":<g>,"calories":<kcal>,"protein_g":<g>,"carbs_g":<g>,"fat_g":<g>,"fiber_g":<g>}],"serving_size_g":<sum of all item grams>,"calories":<sum>,"protein_g":<sum>,"carbs_g":<sum>,"fat_g":<sum>,"fiber_g":<sum>,"confidence":"low|medium|high","caveat":"<one sentence: scale assumed, any uncertainty>"}. Always include items[] even for single foods (a single chicken breast still has one item).' },
        { type: 'image_url', image_url: { url: dataUrl } }
      ]
    }],
    response_format: { type: 'json_object' },
    max_tokens: 900,
    temperature: 0.2
  };
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST', headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' }, body: JSON.stringify(body)
  });
  const text = await r.text();
  if (!r.ok) throw new Error('Vision API error ' + r.status + ': ' + text.slice(0, 200));
  let j;
  try { j = JSON.parse(text); } catch (e) { throw new Error('Vision API returned non-JSON: ' + text.slice(0, 200)); }
  const content = j.choices?.[0]?.message?.content;
  if (!content) throw new Error('Vision API returned empty content. Raw: ' + text.slice(0, 200));
  let parsed;
  try { parsed = JSON.parse(content); }
  catch (e) {
    // Sometimes the model wraps JSON in code fences or leaks prose. Try to extract.
    const m = content.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('Vision response was not JSON. Got: ' + content.slice(0, 200));
    try { parsed = JSON.parse(m[0]); }
    catch { throw new Error('Failed to parse vision JSON: ' + m[0].slice(0, 200)); }
  }
  const result = { ...parsed, source: 'ai_photo' };

  // If AI says this is a packaged/branded product, try to find an exact OFF match
  // and prefer those macros (more accurate than the model's estimate).
  const isPackaged = parsed.is_packaged === true || (parsed.brand && String(parsed.brand).trim());
  if (isPackaged && parsed.food_name) {
    try {
      const q = [parsed.brand, parsed.food_name].filter(Boolean).join(' ').trim();
      if (q.length >= 3) {
        const hits = await searchFood(q, 5);
        // Light "good enough" filter: must have calories AND at least one macro
        const usable = hits.find(h => h.calories && (h.protein_g || h.carbs_g || h.fat_g));
        if (usable) {
          // Preserve AI's food_name / brand text (better display labels), but swap in
          // OFF's serving size + macros + barcode. Mark source so user knows the swap happened.
          return {
            food_name: parsed.food_name,
            brand: parsed.brand || usable.brand || null,
            serving_size_g: usable.serving_size_g,
            calories: usable.calories,
            protein_g: usable.protein_g,
            carbs_g: usable.carbs_g,
            fat_g: usable.fat_g,
            fiber_g: usable.fiber_g,
            barcode: usable.barcode || null,
            confidence: 'high',
            caveat: 'Matched in OpenFoodFacts by brand + name; macros are from the database.',
            source: 'ai_photo+off',
          };
        }
      }
    } catch (e) {
      // OFF lookup failed — that's fine, just keep the AI estimate
      console.warn('OFF lookup after AI failed', e);
    }
  }
  return result;
}

    const draft = { ...food, servings: food.servings ?? 1, meal_slot: food.meal_slot || 'snack' };
    if (!opts.editMode) {
      // pick a default meal slot by time of day (only on add, not edit)
      const hr = new Date().getHours();
      draft.meal_slot = hr < 10 ? 'breakfast' : hr < 14 ? 'lunch' : hr < 18 ? 'snack' : 'dinner';
    }

    // Track baseline per-gram rates so serving / servings changes auto-scale macros.
    // The baseline locks at first paint; user can manually override and we'll
    // respect their last-typed value until they touch the serving fields again.
    const baseServ = Math.max(1, Number(draft.serving_size_g) || 100);
    let baseRates = {
      calories: (Number(draft.calories) || 0) / baseServ,
      protein_g: (Number(draft.protein_g) || 0) / baseServ,
      carbs_g:   (Number(draft.carbs_g) || 0)   / baseServ,
      fat_g:     (Number(draft.fat_g) || 0)     / baseServ,
      fiber_g:   (Number(draft.fiber_g) || 0)   / baseServ,
    };
    const recalcFromServing = () => {
      const g = Math.max(0, Number(draft.serving_size_g) || 0) * Math.max(0, Number(draft.servings) || 0);
      draft.calories  = Math.round(g * baseRates.calories);
      draft.protein_g = Math.round(g * baseRates.protein_g * 10) / 10;
      draft.carbs_g   = Math.round(g * baseRates.carbs_g   * 10) / 10;
      draft.fat_g     = Math.round(g * baseRates.fat_g     * 10) / 10;
      draft.fiber_g   = Math.round(g * baseRates.fiber_g   * 10) / 10;

      const g = Math.max(1, Number(it.grams) || 0);

        calories: (Number(it.calories) || 0) / g,

async function captureFoodWithCamera(consume) {
  // Try live getUserMedia preview + 3s auto-snap (works on web AND iOS WKWebView with NSCameraUsageDescription).
  // If getUserMedia is blocked (e.g. simulator, permission denied at OS level), fall back to the
  // Capacitor Camera shutter UI which always works on native.
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  } catch (gumErr) {
    if (!IS_NATIVE) throw gumErr;
    // Fallback: system camera shutter, then run consume on the resulting File
    const file = await nativeCameraPhoto({ quality: 80 });
    const ovl = document.createElement('div');
    ovl.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1rem;color:#fafafa;';
    ovl.innerHTML = `<div style="font-size:.875rem;font-weight:600;">Analyzing…</div><div id="capNativeMsg" style="font-size:.8125rem;color:#a3a3a3;text-align:center;min-height:1.25rem;">Identifying food and macros…</div>`;
    document.body.appendChild(ovl);
    const setMsg = (m) => { const e = document.getElementById('capNativeMsg'); if (e) e.textContent = m; };
    try { const res = await consume(file, setMsg); ovl.remove(); return res; }
    catch (e) { ovl.remove(); throw e; }
  }
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.srcObject = stream; video.setAttribute('playsinline','true');
    video.style.cssText = 'width:100%;max-width:560px;aspect-ratio:4/3;object-fit:cover;border-radius:.75rem;background:#000;';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1rem;';
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:.875rem;color:#fafafa;font-weight:600;text-align:center;';
    heading.textContent = 'Frame the food';
    overlay.appendChild(heading);
    const frameWrap = document.createElement('div');
    frameWrap.style.cssText = 'position:relative;width:100%;max-width:560px;';
    frameWrap.appendChild(video);
    const counterEl = document.createElement('div');
    counterEl.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.65);pointer-events:none;';
    frameWrap.appendChild(counterEl);
    overlay.appendChild(frameWrap);
    const status = document.createElement('div');
    status.style.cssText = 'font-size:.8125rem;color:#a3a3a3;text-align:center;min-height:1.25rem;';
    status.textContent = 'Hold still — auto-capturing in 3…';
    overlay.appendChild(status);
    const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:.5rem;width:100%;max-width:560px;';
    const cancel = document.createElement('button'); cancel.className = 'btn btn-ghost'; cancel.textContent = 'Cancel'; cancel.style.flex = '1';
    const snap = document.createElement('button'); snap.className = 'btn btn-primary'; snap.textContent = 'Capture now'; snap.style.flex = '2';
    row.appendChild(cancel); row.appendChild(snap); overlay.appendChild(row);
    document.body.appendChild(overlay);
    video.play();

    let stopped = false;
    let countdownTimer;
    const stop = () => { stopped = true; clearInterval(countdownTimer); try { stream.getTracks().forEach(t => t.stop()); } catch {} overlay.remove(); };
    cancel.onclick = () => { stop(); reject(new Error('Cancelled')); };

    const captureFrame = async () => {
      if (stopped) return;
      // Wait for the video to actually have frames before snapping — otherwise
      // we capture a blank image and the AI returns useless guesses.
      if (video.readyState < 2 || !video.videoWidth) {
        try {
          await Promise.race([
            new Promise(res => video.addEventListener('loadeddata', res, { once: true })),
            new Promise(res => setTimeout(res, 1500)),
          ]);
        } catch {}
      }
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 1280; canvas.height = video.videoHeight || 960;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.85));
      if (!blob) { stop(); reject(new Error('Capture failed')); return; }
      const file = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
      // Switch overlay to "analyzing" mode
      counterEl.textContent = '';
      heading.textContent = 'Analyzing photo';
      status.style.color = '#34d399';
      status.textContent = 'Sending to AI…';
      snap.disabled = true; snap.textContent = 'Working…';
      try {
        const result = await consume(file, (msg) => { status.textContent = msg; });
        stop();
        resolve(result);
      } catch (e) {
        stop();
        reject(e);
      }
    };
    snap.onclick = captureFrame;

    // 3-2-1 countdown then auto-snap
    let n = 3;
    counterEl.textContent = n;
    countdownTimer = setInterval(() => {
      if (stopped) return;
      n--;
      if (n <= 0) {
        clearInterval(countdownTimer);
        counterEl.textContent = '';
        captureFrame();
      } else {
        counterEl.textContent = n;
        status.textContent = `Hold still — auto-capturing in ${n}…`;
      }
    }, 1000);
  });
}

    overlay.appendChild(cancel);

    video.play();
    let done = false;
    let promptTimer;

      clearTimeout(promptTimer);
      promptTimer = setTimeout(() => {
        if (done) return;
        status.style.color = '#fbbf24';
        status.textContent = 'No barcode detected — try repositioning or better lighting.';
        armPrompt();

      if (done) { try { controls.stop(); } catch {} return; }
      if (result) {

        resolve(result.getText());
      }

  });

// Unified scanner: prefer MLKit live scanner on native, fall back to single-shot photo decode,
// then BarcodeDetector on web, then live ZXing on web.
async function scanBarcodeFromVideoUnified() {
  if (IS_NATIVE) {
    try { return await scanBarcodeMLKit(); }
    catch (e) {
      if (e && e.code === 'MLKIT_UNAVAILABLE') return scanBarcodeNative();
      throw e;
    }
  }
  if ('BarcodeDetector' in window) return scanBarcodeFromVideo();
  return scanBarcodeWithZXing();
}


// MLKit live barcode scanner — iOS uses startScan() + 'barcodeScanned' listener with the
// camera shown BEHIND the WebView. We add body.barcode-scanner-active to hide our app UI
// so the camera preview is visible; a minimal overlay sits on top with a cancel button.
async function scanBarcodeMLKit() {
  const MK = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.BarcodeScanner;
  if (!MK || typeof MK.startScan !== 'function' || typeof MK.addListener !== 'function') {
    const err = new Error('MLKit barcode scanner not installed');
    err.code = 'MLKIT_UNAVAILABLE';
    throw err;
  }
  // Confirm device supports it (also returns false in simulator)
  try {
    if (typeof MK.isSupported === 'function') {
      const sup = await MK.isSupported();
      if (sup && sup.supported === false) {
        const err = new Error('Device does not support MLKit barcode scanning.');
        err.code = 'MLKIT_UNAVAILABLE';
        throw err;
      }
    }
  } catch (e) { if (e.code === 'MLKIT_UNAVAILABLE') throw e; }

  // Ask the system for camera permission (iOS prompt only fires once)
  try {
    if (typeof MK.requestPermissions === 'function') {
      const perm = await MK.requestPermissions();
      if (perm && perm.camera && perm.camera !== 'granted' && perm.camera !== 'limited') {
        throw new Error('Camera permission denied. Enable it in Settings → BarbellMind.');
      }
    }
  } catch (e) {
    if (e && e.message && e.message.includes('Camera permission')) throw e;
    // permission API may be missing on some plugin versions — proceed.
  }

  return new Promise(async (resolve, reject) => {
    let settled = false;
    let listener = null;
    const overlay = document.createElement('div');
    overlay.className = 'barcode-scanner-overlay';
    overlay.innerHTML = `
      <div class="bs-corner bs-tl"></div>
      <div class="bs-corner bs-tr"></div>
      <div class="bs-corner bs-bl"></div>
      <div class="bs-corner bs-br"></div>
      <div class="bs-status">Point camera at barcode</div>
      <button class="bs-cancel">Cancel</button>
    `;

    const cleanup = async () => {
      try { if (listener && listener.remove) await listener.remove(); } catch {}
      try { await MK.removeAllListeners(); } catch {}
      try { await MK.stopScan(); } catch {}
      document.documentElement.classList.remove('barcode-scanner-active');
      document.body.classList.remove('barcode-scanner-active');
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    };

    overlay.querySelector('.bs-cancel').addEventListener('click', async () => {
      if (settled) return; settled = true;
      await cleanup();
      reject(new Error('Cancelled'));
    });

    document.documentElement.classList.add('barcode-scanner-active');
    document.body.classList.add('barcode-scanner-active');
    document.body.appendChild(overlay);

    try {
      listener = await MK.addListener('barcodeScanned', async (result) => {
        if (settled) return;
        const bc = result && (result.barcode || (result.barcodes && result.barcodes[0]));
        const code = bc && (bc.rawValue || bc.displayValue || '');
        if (!code) return; // ignore empty hits, keep scanning
        settled = true;
        await cleanup();
        resolve(code);
      });
      await MK.startScan({
        formats: ['EAN_13','EAN_8','UPC_A','UPC_E','CODE_128','CODE_39','ITF','CODABAR','QR_CODE'],
        lensFacing: 'BACK',
      });
    } catch (e) {
      if (!settled) { settled = true; await cleanup(); reject(e); }
    }
  });
}

    let stopped = false;
    let startedAt = Date.now();
    const stop = () => { stopped = true; try { stream.getTracks().forEach(t => t.stop()); } catch {} overlay.remove(); };
    cancel.onclick = () => { stop(); reject(new Error('Cancelled')); };

    // 15s reposition prompt that resets each time it triggers
    const RESET_INTERVAL_MS = 15000;
    let promptTimer;
    const armPrompt = () => {
      clearTimeout(promptTimer);
      promptTimer = setTimeout(() => {
        if (stopped) return;
        status.style.color = '#fbbf24';
        status.textContent = 'No barcode detected — try repositioning or better lighting.';
        startedAt = Date.now();
        armPrompt();
      }, RESET_INTERVAL_MS);
    };
    armPrompt();

    const tick = async () => {
      if (stopped) return;
      try {
        const found = await detector.detect(video);
        if (found && found.length) {
          status.style.color = '#34d399';
          status.textContent = '✓ Found ' + found[0].rawValue;
          clearTimeout(promptTimer);
          stop();
          resolve(found[0].rawValue);
          return;
        }
      } catch {}
      requestAnimationFrame(tick);
    };
    setTimeout(tick, 400);
  });
}

function computeTargets({ sex, weight_lbs, height_ft, height_in, age, activity, goal }) {
  const kg = (Number(weight_lbs) || 0) * 0.45359237;
  const cm = ((Number(height_ft) || 0) * 12 + (Number(height_in) || 0)) * 2.54;
  let bmr = 10 * kg + 6.25 * cm - 5 * (Number(age) || 30);
  bmr += sex === 'female' ? -161 : 5;
  const act = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 }[activity || 'moderate'] || 1.55;
  const tdee = bmr * act;
  let kcal = tdee;
  if (goal === 'lose_weight') kcal = tdee - 500;
  else if (goal === 'build_muscle' || goal === 'gain_strength') kcal = tdee + 250;
  let pp = 0.30, cp = 0.40, fp = 0.30;
  if (goal === 'lose_weight') { pp = 0.35; cp = 0.35; fp = 0.30; }
  if (goal === 'maintain' || goal === 'general_fitness') { pp = 0.25; cp = 0.50; fp = 0.25; }
  return {
    kcal: Math.round(kcal),
    protein_g: Math.round((kcal * pp) / 4),
    carbs_g:   Math.round((kcal * cp) / 4),
    fat_g:     Math.round((kcal * fp) / 9),
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
  };
}
