          const isSel = d.day_of_week === selectedDow;
          const isToday = d.day_of_week === dow;
          const idx = mondayIdx(d.day_of_week);
          const labelShort = (SLOT_LABEL[t] || t).toUpperCase().slice(0, 5);
          return `<a href="#/plan?day=${d.day_of_week}" class="press" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface);border:${isSel ? '2px solid ' + splitColor(t) : '1px solid var(--hairline)'};border-radius:14px;text-decoration:none;color:inherit;position:relative;${isSel ? 'box-shadow:0 0 0 4px rgba(52,211,153,0.04);' : ''}">
            <div style="font-size:9px;font-weight:800;letter-spacing:.08em;color:var(--text-3);">${esc(dayShort[idx].toUpperCase())}</div>
            <div style="width:6px;height:6px;border-radius:99px;background:${t === 'rest' ? 'var(--text-4)' : splitColor(t)};"></div>
            <div style="font-size:9.5px;font-weight:800;letter-spacing:.04em;color:${isSel ? splitColor(t) : (t === 'rest' ? 'var(--text-3)' : 'var(--text-2)')};">${esc(labelShort)}</div>
            ${isToday ? `<div style="position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:99px;background:var(--green);"></div>` : ''}
          </a>`;
        }).join('')}
      </div>`;

    // Selected day detail
    const selectedDay = daysSorted.find(d => d.day_of_week === selectedDow) || { slot_type: 'rest' };
    const selT = selectedDay.slot_type;
    const selExercises = exercisesForKey(plan, dayKeyFor(selectedDay));
    const selLabel = SLOT_LABEL[selT] || selT;
    const selDayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][selectedDow];
    const selWorkoutName = selectedDay.custom_name || (selT === 'cardio' && selectedDay.cardio_type) || selLabel;

    // Hero card (split-tinted)
    const heroHtml = (selT === 'rest')
      ? `<div style="background:linear-gradient(140deg, ${splitSoft(selT)} 0%, rgba(28,28,30,0.4) 60%), var(--surface);border:1px solid var(--soft-rest);border-radius:20px;padding:18px;margin-bottom:24px;">
          <span class="chip slot-rest" style="margin-bottom:10px;">● REST</span>
          <div style="font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1;margin-top:6px;">${esc(selDayName)}</div>
          <div style="font-size:13px;color:var(--text-2);font-weight:500;margin-top:6px;">Recovery · sleep + walk</div>
        </div>`
      : `<div style="background:linear-gradient(140deg, ${splitSoft(selT)} 0%, rgba(28,28,30,0.4) 60%), var(--surface);border:1px solid ${splitSoft(selT)};border-radius:20px;padding:18px;margin-bottom:24px;position:relative;overflow:hidden;">
          <div style="position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(closest-side, ${splitColor(selT)}30, transparent);pointer-events:none;"></div>
          <span class="chip slot-${selT}" style="margin-bottom:10px;position:relative;">● ${esc((SLOT_LABEL[selT] || selT).toUpperCase())}</span>
          <div style="font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1;margin-top:6px;position:relative;">${esc(selDayName)}${selectedDay.custom_name ? ` · ${esc(selectedDay.custom_name)}` : ''}</div>
          <div style="font-size:13px;color:var(--text-2);font-weight:500;margin-top:6px;position:relative;">${selExercises.length} ${selExercises.length === 1 ? 'exercise' : 'exercises'}${selT === 'cardio' && selectedDay.cardio_duration_min ? ` · ${selectedDay.cardio_duration_min} min` : ''}</div>
          <div style="display:flex;gap:8px;margin-top:16px;position:relative;">
            <a href="#/log" class="press" style="flex:1;background:linear-gradient(135deg, ${splitSoft(selT)}, transparent);border:1px solid ${splitSoft(selT)};color:${splitColor(selT)};height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;font-weight:700;text-decoration:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
              ${selectedDow === dow ? 'Start workout' : 'Preview'}
            </a>
            <a href="#/plan/edit" class="press" style="width:48px;height:48px;border-radius:14px;background:var(--surface-2);display:flex;align-items:center;justify-content:center;color:var(--text-2);text-decoration:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
            </a>
          </div>
        </div>`;

    // Lifetime PRs map (for PR badges). Single cached query under the hood.
    let exerciseStats = {};
    try { exerciseStats = await qAllExerciseStatsMap(); } catch (e) { console.warn('exerciseStats', e); }

    // Exercises section — picker-style rows with letter badge + muscle/equipment + last
    const exListHtml = (selT === 'rest')
      ? ''
      : `<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.75rem;">
          <div style="font-size:.66rem;font-weight:800;letter-spacing:.08em;color:var(--text-muted);">${selExercises.length} EXERCISE${selExercises.length === 1 ? '' : 'S'}</div>
          <button id="planAddExercise" data-slot="${selT}" data-key="${dayKeyFor(selectedDay) || selT}" class="press" style="display:inline-flex;align-items:center;gap:5px;background:transparent;border:0;color:var(--accent);font-size:.74rem;font-weight:800;letter-spacing:.06em;cursor:pointer;padding:.2rem .3rem;">+ ADD EXERCISE</button>
        </div>
        ${selExercises.length === 0
          ? `<div style="background:var(--surface);border:1px dashed var(--hairline);border-radius:16px;padding:24px 16px;text-align:center;">
              <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:12px;">No exercises set for this slot.</div>
              <button id="planAddExerciseEmpty" data-slot="${selT}" data-key="${dayKeyFor(selectedDay) || selT}" class="btn btn-ghost" style="display:inline-flex;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(16,185,129,.3);cursor:pointer;">+ Add exercise</button>
            </div>`
          : `<div style="display:flex;flex-direction:column;gap:.5rem;">
              ${selExercises.map((ex, idx) => {
                const stats = exerciseStats[ex.exercise_name] || {};
                const last = stats.lastHeaviest;
                const pr = stats.lifetimePR;
                const meta = (typeof EXERCISE_META !== 'undefined' && EXERCISE_META[ex.exercise_name]) || { muscle:'Mixed', equipment:'Free weight' };
                const badge = (typeof MUSCLE_BADGE !== 'undefined' && MUSCLE_BADGE[meta.muscle]) || { letter:'X', color:'#9CA3AF' };
                const lastBit = last ? ` · <span style="color:var(--accent);font-weight:600;">last ${esc(String(last.weight_lbs))}×${esc(String(last.reps))}</span>` : '';
                return `<div style="display:flex;align-items:stretch;gap:.4rem;">
                <a href="#/plan/edit" class="press" style="flex:1;min-width:0;display:flex;align-items:center;gap:.7rem;padding:.7rem .8rem;background:var(--surface);border:1px solid var(--hairline);border-radius:14px;text-decoration:none;color:inherit;">
                  <span style="width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.04);color:${badge.color};font-weight:800;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${badge.letter}</span>
                  <span style="flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;">
                    <span style="display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;">
                      <span style="font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(typeof displayExName === 'function' ? displayExName(ex.exercise_name) : ex.exercise_name)}</span>
                      ${pr ? `<span style="background:rgba(168,85,247,.16);color:#C084FC;font-size:.58rem;font-weight:800;letter-spacing:.08em;padding:2px 6px;border-radius:6px;">PR</span>` : ''}
                    </span>
                    <span style="font-size:.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(meta.muscle)} · ${esc(meta.equipment)} · ${ex.target_sets}×${esc(String(ex.target_reps))}${lastBit}</span>
                  </span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-4)" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
                <button type="button" class="planRmEx" data-id="${esc(ex.id||'')}" data-name="${esc(ex.exercise_name)}" aria-label="Remove ${esc(ex.exercise_name)}" style="flex-shrink:0;width:42px;background:var(--surface);border:1px solid var(--hairline);border-radius:14px;color:var(--text-muted);font-size:1.25rem;line-height:1;cursor:pointer;">&times;</button>
                </div>`;
              }).join('')}
            </div>`}
      `;

    // Sub-splits — only if present
    const subs = selectedDay.sub_splits || [];
    const subHtml = (selT !== 'rest' && subs.filter(s => s.type).length)
      ? `<div style="margin-top:18px;">
          <div class="eyebrow" style="margin-bottom:10px;">ALSO TODAY</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${subs.filter(s => s.type).map(sub => {
              const t = sub.type === 'abs' ? 'core' : sub.type;
              const bits = [];
              if (sub.sets && sub.reps) bits.push(`${sub.sets}×${sub.reps}`);
              else if (sub.duration) bits.push(`${sub.duration} min`);
              return `<div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--surface);border:1px solid var(--hairline);border-radius:14px;">
                <div style="width:28px;height:28px;border-radius:8px;background:${splitSoft(t)};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  <div style="width:6px;height:6px;border-radius:99px;background:${splitColor(t)};"></div>
                </div>
                <div style="flex:1;font-size:14px;font-weight:600;">${esc(sub.name || sub.cardio_type || SLOT_LABEL[t] || t)}</div>
                <div class="tabnum" style="font-size:12px;color:var(--text-3);font-weight:600;">${esc(bits.join(' · '))}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`
      : '';

    appEl().innerHTML = shell(`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0 18px;">
        <div>
          <div class="eyebrow" style="margin-bottom:6px;">WEEK · ${esc(dateRange.toUpperCase())}</div>
          <div class="h-display">Plan</div>
        </div>
        <a href="#/plan/edit" class="press" style="display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--hairline);color:var(--text);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;text-decoration:none;margin-top:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 12 13 12"/></svg>
          ${esc(splitShort)} · ${totalDays} days
        </a>
      </div>

      ${dayStripHtml}

      ${heroHtml}

      ${exListHtml}

      ${subHtml}
    `);
  } catch (err) {
    console.error('[renderPlan] crashed:', err);
    appEl().innerHTML = shell(`
      <div class="card" style="padding:1.5rem;">
        <h1 class="text-2xl font-bold mb-2">Your plan</h1>
        <p style="color:var(--text-muted);margin-bottom:1rem;">Couldn't load. Try edit mode.</p>
        <pre style="background:var(--bg-elevated);padding:.75rem;border-radius:.5rem;font-size:.7rem;color:var(--text-muted);overflow:auto;">${esc(err.message || String(err))}</pre>
        <a href="#/plan/edit" class="btn btn-primary" style="display:inline-flex;text-decoration:none;margin-top:1rem;">Open editor</a>
      </div>
    `);
  }
}

// === Plan: Add Exercise picker + Configure sheets ===========================
// Used by the Plan editor's "+ Add" buttons. Opens a picker styled to match the
// rest of the app, then a Configure step where the user sets goal/sets/reps/rest.
// Calls onAdd({exercise_name, target_sets, target_reps}) when the user confirms.
async function openExercisePickerSheet(slot, onAdd) {
  let tab = 'strength';   // 'strength' | 'cardio' | 'custom'
  let muscle = 'All';
  let equipment = 'Any';
  let query = '';
  // If the slot has its own muscle set (e.g. Pull → Back/Biceps), restrict chips.
  const allowedMuscles = musclesForSlot(slot);   // null = no constraint
  const chipMuscles = allowedMuscles ? ['All', ...allowedMuscles] : MUSCLE_GROUPS.slice();
  const sh = document.createElement('div');
  sh.id = 'exPickerSheet';
  sh.style.cssText = 'position:fixed;inset:0;z-index:130;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;';
  const close = () => sh.remove();

  const slotLabel = (SLOT_LABEL[slot] || slot || 'today').toUpperCase();
  const slotKey = (slot === 'upper' ? 'push' : slot === 'lower' ? 'legs' : slot === 'abs' ? 'core' : slot === 'stretching' ? 'stretch' : (slot || 'custom'));
  const slotColor = `var(--${slotKey})`;

  // Pre-resolve per-exercise last-session info; non-blocking — start empty and fill in.
  const statsByName = {};
  const renderList = () => {
    const list = sh.querySelector('#exListBody');
    if (!list) return;
    const all = allCatalogExercises();
    const q = query.trim().toLowerCase();
    const filtered = all.filter(e => {
      // Slot constraint — only show muscles relevant to this day's slot.
      if (allowedMuscles && !allowedMuscles.includes(e.muscle)) return false;
      if (muscle !== 'All' && e.muscle !== muscle) return false;
      if (equipment !== 'Any' && e.equipment !== equipment) return false;
      if (q && !e.name.toLowerCase().includes(q)) return false;
      return true;
    });
    list.innerHTML = filtered.length === 0
      ? `<div style="text-align:center;color:var(--text-muted);font-size:.85rem;padding:1.4rem 0;">No exercises match those filters.</div>`
      : filtered.map(e => {
          const badge = MUSCLE_BADGE[e.muscle] || MUSCLE_BADGE.Mixed;
          const stat = statsByName[e.name];
          const lastLine = stat && stat.lastHeaviest
            ? `<span style="color:var(--accent);font-weight:600;">last ${esc(String(stat.lastHeaviest.weight))}×${esc(String(stat.lastHeaviest.reps))}</span>`
            : '';
          return `
            <button data-pick="${esc(e.name)}" type="button" class="exPickRow" style="display:flex;align-items:center;gap:.8rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:.85rem .9rem;width:100%;color:var(--text);cursor:pointer;text-align:left;min-height:64px;">
              <span style="width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.04);color:${badge.color};font-weight:800;font-size:1.05rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${badge.letter}</span>
              <span style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;">
                <span style="font-weight:700;font-size:.98rem;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.name)}</span>
                <span style="font-size:.74rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.muscle)} · ${esc(e.equipment)}${lastLine ? ' · ' + lastLine : ''}</span>
              </span>
              <span style="width:32px;height:32px;border-radius:50%;background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-size:1.3rem;line-height:1;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;">+</span>
            </button>`;
        }).join('');
    list.querySelectorAll('.exPickRow').forEach(btn => btn.addEventListener('click', () => {
      const name = btn.dataset.pick;
      const meta = (allCatalogExercises().find(x => x.name === name)) || { target_sets:3, target_reps:'8-12' };
      openExerciseConfigureSheet({ name, muscle: meta.muscle, equipment: meta.equipment, suggested_sets: meta.target_sets, suggested_reps: meta.target_reps, lastHeaviest: (statsByName[name] && statsByName[name].lastHeaviest) || null }, slot, (cfg) => {
        close();
        onAdd(cfg);
      });
    }));
  };

  // Suggested list for this slot
  const suggested = (EXERCISE_LIBRARY[slot] || []).slice(0, 6).map(ex => {
    const meta = EXERCISE_META[ex.name] || { muscle:'Mixed', equipment:'Free weight' };
    return { name: ex.name, muscle: meta.muscle, equipment: meta.equipment, target_sets: ex.target_sets, target_reps: ex.target_reps };
  });

  sh.innerHTML = `
    <div style="width:100%;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:14px 18px calc(env(safe-area-inset-bottom,0) + 22px);height:92dvh;max-height:92dvh;display:flex;flex-direction:column;box-sizing:border-box;overflow:hidden;">
      <div style="width:38px;height:4px;border-radius:2px;background:var(--text-muted);opacity:.4;margin:0 auto 14px;flex-shrink:0;"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;flex-shrink:0;">
        <div style="display:flex;align-items:center;gap:.45rem;">
          <span style="width:7px;height:7px;border-radius:99px;background:${slotColor};display:inline-block;"></span>
          <span style="font-size:.7rem;font-weight:800;letter-spacing:.1em;color:${slotColor};line-height:1;">${esc(slotLabel)} DAY</span>
        </div>
        <button id="exPickClose" type="button" aria-label="Close" style="width:34px;height:34px;border-radius:50%;background:var(--bg-elevated);color:var(--text);border:0;font-size:1.1rem;cursor:pointer;line-height:1;padding:0;flex-shrink:0;">×</button>
      </div>
      <div style="font-size:1.65rem;font-weight:800;letter-spacing:-.025em;color:var(--text);margin:.1rem 0 .9rem;line-height:1.1;flex-shrink:0;">Add exercise</div>

      <div style="position:relative;margin-bottom:.7rem;flex-shrink:0;">
        <svg style="position:absolute;left:.85rem;top:50%;transform:translateY(-50%);pointer-events:none;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="exPickSearch" type="search" placeholder="Search exercises…" autocomplete="off" autocorrect="off" spellcheck="false" style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:.85rem .85rem .85rem 2.6rem;font-size:1rem;width:100%;outline:none;-webkit-appearance:none;box-sizing:border-box;" />
      </div>

      <!-- Tab switcher: Strength | Cardio | Custom -->
      <div style="display:flex;gap:.4rem;background:var(--bg-elevated);padding:.25rem;border-radius:14px;margin-bottom:.7rem;flex-shrink:0;">
        ${['strength','cardio','custom'].map(t => {
          const label = t==='strength'?'Strength':t==='cardio'?'Cardio':'Custom';
          const active = tab===t;
          return `<button data-pick-tab="${t}" type="button" class="exPickTab" style="flex:1;height:36px;border:0;border-radius:10px;background:${active?'var(--accent)':'transparent'};color:${active?'#000':'var(--text)'};font-weight:${active?'800':'600'};font-size:.86rem;cursor:pointer;">${label}</button>`;
        }).join('')}
      </div>

      <!-- Muscle row (strength tab only) -->
      <div id="exMuscleRow" style="display:${tab==='strength'?'flex':'none'};gap:.5rem;overflow-x:auto;padding:2px 0 8px;margin-bottom:.25rem;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch;">${chipMuscles.map(g => `<button data-muscle="${g}" type="button" class="exMusclePill" style="flex-shrink:0;display:inline-flex;align-items:center;gap:5px;height:36px;padding:0 .95rem;border-radius:999px;background:${g===muscle?'var(--text)':'var(--bg-elevated)'};color:${g===muscle?'#000':'var(--text)'};border:1px solid ${g===muscle?'var(--text)':'var(--border)'};font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;line-height:1;">${g==='All'?'':'<span style=&quot;display:inline-block;width:6px;height:6px;border-radius:99px;background:'+(MUSCLE_BADGE[g]?.color || '#888')+';&quot;></span>'}<span>${esc(g)}</span></button>`).join('')}</div>

      <div id="exEquipRow" style="display:${tab==='strength'?'flex':'none'};gap:.5rem;overflow-x:auto;padding:2px 0 10px;margin-bottom:.7rem;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch;">${EQUIPMENT_GROUPS.map(g => `<button data-equip="${g}" type="button" class="exEquipPill" style="flex-shrink:0;display:inline-flex;align-items:center;height:32px;padding:0 .85rem;border-radius:999px;background:transparent;color:var(--text-muted);border:1px solid var(--border);font-weight:600;font-size:.78rem;cursor:pointer;white-space:nowrap;line-height:1;">${esc(g)}</button>`).join('')}</div>

      <div id="exPickScroller" style="flex:1 1 auto;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:.8rem;">
        <!-- Strength tab -->
        <div id="exTabStrength" style="display:${tab==='strength'?'block':'none'};">
          ${suggested.length ? `
            <div style="font-size:.68rem;font-weight:800;letter-spacing:.09em;color:var(--accent);margin:.1rem 0 .55rem;">+ SUGGESTED FOR ${esc(slotLabel)} DAY</div>
            <div style="display:flex;gap:.65rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.2rem;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
              ${suggested.map(e => {
                const badge = MUSCLE_BADGE[e.muscle] || MUSCLE_BADGE.Mixed;
                return `<button data-pick-sug="${esc(e.name)}" type="button" class="exSugCard" style="flex-shrink:0;width:180px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:16px;padding:.8rem .85rem;color:var(--text);text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:.25rem;">
                  <span style="color:${badge.color};font-weight:800;font-size:1.1rem;line-height:1;">${badge.letter}</span>
                  <span style="font-weight:700;font-size:.92rem;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.3em;">${esc(e.name)}</span>
                  <span style="font-size:.72rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.muscle)} · ${esc(e.equipment)}</span>
                </button>`;
              }).join('')}
            </div>` : ''}

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem;">
            <div style="font-size:.68rem;font-weight:800;letter-spacing:.09em;color:var(--text-muted);">EXERCISES</div>
            <button id="exPickGoCustom" type="button" style="background:transparent;border:0;color:var(--accent);font-size:.74rem;font-weight:800;letter-spacing:.06em;cursor:pointer;">+ CREATE CUSTOM</button>
          </div>
          <div id="exListBody" style="display:flex;flex-direction:column;gap:.55rem;"></div>
        </div>

        <!-- Cardio tab -->
        <div id="exTabCardio" style="display:${tab==='cardio'?'block':'none'};">
          <div style="font-size:.68rem;font-weight:800;letter-spacing:.09em;color:var(--text-muted);margin:.1rem 0 .55rem;">CARDIO TYPES</div>
          <div id="exCardioBody" style="display:flex;flex-direction:column;gap:.55rem;">
            ${CARDIO_TYPES.map(name => `
              <button data-pick-cardio="${esc(name)}" type="button" style="display:flex;align-items:center;gap:.8rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:14px;padding:.85rem .9rem;width:100%;color:var(--text);cursor:pointer;text-align:left;min-height:60px;">
                <span style="width:40px;height:40px;border-radius:11px;background:rgba(34,211,153,.12);color:var(--accent);font-weight:800;font-size:1.05rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">♥</span>
                <span style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;">
                  <span style="font-weight:700;font-size:.98rem;">${esc(name)}</span>
                  <span style="font-size:.74rem;color:var(--text-muted);">Cardio · duration based</span>
                </span>
                <span style="width:32px;height:32px;border-radius:50%;background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-size:1.3rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;">+</span>
              </button>`).join('')}
          </div>
        </div>

        <!-- Custom tab -->
        <div id="exTabCustom" style="display:${tab==='custom'?'block':'none'};padding:.4rem 0;">
          <div style="font-size:.68rem;font-weight:800;letter-spacing:.09em;color:var(--text-muted);margin:.1rem 0 .65rem;">CREATE CUSTOM EXERCISE</div>
          <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:.6rem 0 .3rem;">Name</label>
          <input id="customExName" type="text" placeholder="e.g. Cable Crossover" autocomplete="off" autocorrect="off" spellcheck="false" style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:.75rem .85rem;font-size:1rem;width:100%;outline:none;box-sizing:border-box;-webkit-appearance:none;" />

          <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .3rem;">Primary muscle</label>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
            ${(chipMuscles.length > 1 ? chipMuscles.slice(1) : MUSCLE_GROUPS.slice(1)).map((g, i) => `
              <button data-custom-muscle="${g}" type="button" class="exCustomMuscle" style="height:34px;padding:0 .85rem;border-radius:999px;background:${i===0?'rgba(255,255,255,.08)':'var(--bg-elevated)'};color:var(--text);border:1px solid ${i===0?'var(--accent)':'var(--border)'};font-weight:700;font-size:.78rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;line-height:1;">
                <span style="display:inline-block;width:6px;height:6px;border-radius:99px;background:${MUSCLE_BADGE[g]?.color || '#888'};"></span>${esc(g)}
              </button>`).join('')}
          </div>

          <label style="display:block;font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .3rem;">Equipment</label>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
            ${EQUIPMENT_GROUPS.slice(1).map((g, i) => `
              <button data-custom-equip="${g}" type="button" class="exCustomEquip" style="height:32px;padding:0 .8rem;border-radius:999px;background:${i===0?'rgba(255,255,255,.08)':'var(--bg-elevated)'};color:var(--text);border:1px solid ${i===0?'var(--accent)':'var(--border)'};font-weight:600;font-size:.78rem;cursor:pointer;line-height:1;">${esc(g)}</button>`).join('')}
          </div>

          <button id="customExNext" type="button" style="width:100%;height:48px;border-radius:14px;background:var(--accent);color:#000;border:0;font-weight:800;font-size:1rem;cursor:pointer;margin-top:1.1rem;">Continue →</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(sh);
  renderList();
  // Background-fetch last-session stats so the rows light up over time.
  (async () => {
    try {
      const names = allCatalogExercises().map(e => e.name);
      // Only fetch for a slice to avoid hammering Supabase
      const slice = names.slice(0, 40);
      for (const n of slice) {
        try { statsByName[n] = await qExerciseStats(n); } catch(_) {}
      }
      renderList();
    } catch(_) {}
  })();

  sh.querySelector('#exPickClose').addEventListener('click', close);
  sh.addEventListener('click', (e) => { if (e.target === sh) close(); });

  // Tab switcher
  sh.querySelectorAll('.exPickTab').forEach(btn => btn.addEventListener('click', () => {
    tab = btn.dataset.pickTab;
    sh.querySelectorAll('.exPickTab').forEach(b => {
      const active = b.dataset.pickTab === tab;
      b.style.background = active ? 'var(--accent)' : 'transparent';
      b.style.color = active ? '#000' : 'var(--text)';
      b.style.fontWeight = active ? '800' : '600';
    });
    sh.querySelector('#exMuscleRow').style.display = tab==='strength' ? 'flex' : 'none';
    sh.querySelector('#exEquipRow').style.display = tab==='strength' ? 'flex' : 'none';
    sh.querySelector('#exTabStrength').style.display = tab==='strength' ? 'block' : 'none';
    sh.querySelector('#exTabCardio').style.display = tab==='cardio' ? 'block' : 'none';
    sh.querySelector('#exTabCustom').style.display = tab==='custom' ? 'block' : 'none';
  }));

  // Cardio picker rows
  sh.querySelectorAll('[data-pick-cardio]').forEach(btn => btn.addEventListener('click', () => {
    const name = btn.dataset.pickCardio;
    close();
    onAdd({ exercise_name: name, target_sets: 1, target_reps: '30 min', goal: 'cardio', cardio_type: name });
  }));

  // "+ CREATE CUSTOM" link in the strength header → switch to Custom tab.
  const goCustomBtn = sh.querySelector('#exPickGoCustom');
  if (goCustomBtn) goCustomBtn.addEventListener('click', () => {
    const customTabBtn = sh.querySelector('[data-pick-tab="custom"]');
    if (customTabBtn) customTabBtn.click();
  });

  // Custom muscle/equipment chip selection + Continue.
  let customMuscle = (chipMuscles.length > 1 ? chipMuscles[1] : MUSCLE_GROUPS[1]);
  let customEquip = EQUIPMENT_GROUPS[1];
  sh.querySelectorAll('.exCustomMuscle').forEach(b => b.addEventListener('click', () => {
    customMuscle = b.dataset.customMuscle;
    sh.querySelectorAll('.exCustomMuscle').forEach(x => {
      const active = x.dataset.customMuscle === customMuscle;
      x.style.background = active ? 'rgba(255,255,255,.08)' : 'var(--bg-elevated)';
      x.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    });
  }));
  sh.querySelectorAll('.exCustomEquip').forEach(b => b.addEventListener('click', () => {
    customEquip = b.dataset.customEquip;
    sh.querySelectorAll('.exCustomEquip').forEach(x => {
      const active = x.dataset.customEquip === customEquip;
      x.style.background = active ? 'rgba(255,255,255,.08)' : 'var(--bg-elevated)';
      x.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    });
  }));
  const customNext = sh.querySelector('#customExNext');
  if (customNext) customNext.addEventListener('click', () => {
    const inp = sh.querySelector('#customExName');
    const name = (inp && inp.value || '').trim();
    if (!name) { inp && inp.focus(); return; }
    openExerciseConfigureSheet({ name, muscle: customMuscle, equipment: customEquip, suggested_sets: 3, suggested_reps: '8-12', lastHeaviest: null }, slot, (cfg) => {
      close();
      onAdd(cfg);
    });
  });

  sh.querySelectorAll('.exMusclePill').forEach(btn => btn.addEventListener('click', () => {
    muscle = btn.dataset.muscle;
    sh.querySelectorAll('.exMusclePill').forEach(b => {
      const active = b.dataset.muscle === muscle;
      b.style.background = active ? 'var(--text)' : 'var(--bg-elevated)';
      b.style.color = active ? '#000' : 'var(--text)';
      b.style.borderColor = active ? 'var(--text)' : 'var(--border)';
    });
    renderList();
  }));
  // Bump initial muscle highlight to the first allowed (if slot-filtered).
  if (allowedMuscles && allowedMuscles.length) {
    // 'All' is still the default — no auto-select beyond the styling on render.
  }
  sh.querySelectorAll('.exEquipPill').forEach(btn => btn.addEventListener('click', () => {
    equipment = btn.dataset.equip;
    sh.querySelectorAll('.exEquipPill').forEach(b => {
      const active = b.dataset.equip === equipment;
      b.style.background = active ? 'var(--text)' : 'transparent';
      b.style.color = active ? '#000' : 'var(--text-muted)';
      b.style.borderColor = active ? 'var(--text)' : 'var(--border)';
    });
    renderList();
  }));
  sh.querySelectorAll('.exSugCard').forEach(btn => btn.addEventListener('click', () => {
    const name = btn.dataset.pickSug;
    const meta = (allCatalogExercises().find(x => x.name === name)) || { target_sets:3, target_reps:'8-12' };
    openExerciseConfigureSheet({ name, muscle: meta.muscle, equipment: meta.equipment, suggested_sets: meta.target_sets, suggested_reps: meta.target_reps, lastHeaviest: (statsByName[name] && statsByName[name].lastHeaviest) || null }, slot, (cfg) => {
      close();
      onAdd(cfg);
    });
  }));
  const search = sh.querySelector('#exPickSearch');
  search.addEventListener('input', () => { query = search.value; renderList(); });
}

function openExerciseConfigureSheet(info, slot, onConfirm) {
  // Parse suggested reps -> min/max
  const parseRange = (r) => {
    if (typeof r === 'number') return { min: r, max: r };
    const m = String(r || '').match(/(\d+)\s*[-–to]+\s*(\d+)/);
    if (m) return { min: Number(m[1]), max: Number(m[2]) };
    const single = String(r || '').match(/(\d+)/);
    if (single) return { min: Number(single[1]), max: Number(single[1]) };
    return { min: 8, max: 12 };
  };
  const range = parseRange(info.suggested_reps);
  let goal = (range.min <= 5) ? 'strength' : (range.min >= 13 ? 'endurance' : 'hypertrophy');
  let sets = Number(info.suggested_sets) || 3;
  let minR = range.min, maxR = range.max;
  let rest = goal === 'strength' ? 180 : goal === 'endurance' ? 45 : 90;

  const sh = document.createElement('div');
  sh.id = 'exConfigSheet';
  sh.style.cssText = 'position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;';
  const close = () => sh.remove();
  const badge = MUSCLE_BADGE[info.muscle] || MUSCLE_BADGE.Mixed;
  const lastText = info.lastHeaviest ? `LAST ${info.lastHeaviest.weight}×${info.lastHeaviest.reps}` : '';

  const goalDef = {
    strength:    { label:'Strength',    sub:'3-5 reps',   min:3,  max:5,  rest:180 },
    hypertrophy: { label:'Hypertrophy', sub:'8-12 reps',  min:8,  max:12, rest:90 },
    endurance:   { label:'Endurance',   sub:'15-20 reps', min:15, max:20, rest:45 },
  };

  const render = () => {
    sh.innerHTML = `
    <div style="width:100%;background:var(--bg-card);border-top-left-radius:24px;border-top-right-radius:24px;padding:18px 18px calc(env(safe-area-inset-bottom,0) + 22px);max-height:90vh;overflow-y:auto;">
      <div style="width:36px;height:4px;border-radius:2px;background:var(--text-muted);opacity:.4;margin:0 auto 14px;"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;">
        <button id="cfgBack" type="button" aria-label="Back" style="width:34px;height:34px;border-radius:50%;background:var(--bg-elevated);color:var(--text);border:0;font-size:1.1rem;cursor:pointer;">‹</button>
        <div style="font-size:.66rem;font-weight:800;letter-spacing:.12em;color:var(--text-muted);">CONFIGURE</div>
        <button id="cfgClose" type="button" aria-label="Close" style="width:34px;height:34px;border-radius:50%;background:var(--bg-elevated);color:var(--text);border:0;font-size:1.05rem;cursor:pointer;">×</button>
      </div>

      <div style="display:flex;align-items:center;gap:.85rem;margin:.8rem 0 1.25rem;">
        <span style="width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.04);color:${badge.color};font-weight:800;font-size:1.4rem;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${badge.letter}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:1.25rem;font-weight:800;letter-spacing:-.02em;color:var(--text);line-height:1.2;">${esc(info.name)}</div>
          <div style="display:flex;align-items:center;gap:.4rem;margin-top:.3rem;font-size:.66rem;font-weight:800;letter-spacing:.07em;">
            <span style="color:${badge.color};">${esc(String(info.muscle).toUpperCase())}</span>
            <span style="color:var(--text-muted);">·</span>
            <span style="background:rgba(255,255,255,.06);color:var(--text);padding:.18rem .5rem;border-radius:6px;">${esc(String(info.equipment).toUpperCase())}</span>
            ${lastText ? `<span style="background:rgba(16,185,129,.12);color:var(--accent);padding:.18rem .5rem;border-radius:6px;">${esc(lastText)}</span>` : ''}
          </div>
        </div>
      </div>

      <div style="font-size:.66rem;font-weight:800;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.45rem;">TRAINING GOAL</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:1.25rem;">
        ${Object.entries(goalDef).map(([k, v]) => {
          const active = goal === k;
          return `<button data-goal="${k}" type="button" class="cfgGoal" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:.7rem .25rem;border-radius:14px;border:1px solid ${active ? 'var(--accent)' : 'var(--border)'};background:${active ? 'rgba(16,185,129,.12)' : 'var(--bg-elevated)'};color:${active ? 'var(--accent)' : 'var(--text)'};font-weight:700;cursor:pointer;">
            <span style="font-size:.95rem;">${v.label}</span>
            <span style="font-size:.7rem;color:${active ? 'var(--accent)' : 'var(--text-muted)'};">${v.sub}</span>
          </button>`;
        }).join('')}
      </div>

      <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:16px;padding:.5rem .8rem;margin-bottom:1.25rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--border);">
          <span style="font-size:1rem;font-weight:700;color:var(--text);">Sets</span>
          <div style="display:flex;align-items:center;gap:.5rem;">
            <button id="cfgSetsMinus" type="button" style="width:32px;height:32px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:1.1rem;cursor:pointer;">−</button>
            <span style="font-size:1.1rem;font-weight:800;color:var(--text);min-width:24px;text-align:center;font-variant-numeric:tabular-nums;">${sets}</span>
            <button id="cfgSetsPlus" type="button" style="width:32px;height:32px;border-radius:10px;background:var(--accent);border:0;color:#000;font-size:1.1rem;cursor:pointer;font-weight:700;">+</button>
          </div>
        </div>

        <div style="padding:.7rem 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem;">
            <span style="font-size:1rem;font-weight:700;color:var(--text);">Rep range</span>
            <span style="font-size:1rem;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums;">${minR}–${maxR}</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:.45rem .6rem;display:flex;align-items:center;justify-content:space-between;">
              <button id="cfgMinMinus" type="button" style="width:26px;height:26px;border-radius:8px;background:transparent;border:0;color:var(--text-muted);font-size:1rem;cursor:pointer;">−</button>
              <div style="display:flex;flex-direction:column;align-items:center;line-height:1.1;">
                <span style="font-size:.6rem;color:var(--text-muted);font-weight:700;letter-spacing:.08em;">MIN</span>
                <span style="font-size:1.05rem;font-weight:800;color:#60A5FA;font-variant-numeric:tabular-nums;">${minR}</span>
              </div>
              <button id="cfgMinPlus" type="button" style="width:26px;height:26px;border-radius:8px;background:transparent;border:0;color:var(--text-muted);font-size:1rem;cursor:pointer;">+</button>
            </div>
            <div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:.45rem .6rem;display:flex;align-items:center;justify-content:space-between;">
              <button id="cfgMaxMinus" type="button" style="width:26px;height:26px;border-radius:8px;background:transparent;border:0;color:var(--text-muted);font-size:1rem;cursor:pointer;">−</button>
              <div style="display:flex;flex-direction:column;align-items:center;line-height:1.1;">
                <span style="font-size:.6rem;color:var(--text-muted);font-weight:700;letter-spacing:.08em;">MAX</span>
                <span style="font-size:1.05rem;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;">${maxR}</span>
              </div>
              <button id="cfgMaxPlus" type="button" style="width:26px;height:26px;border-radius:8px;background:transparent;border:0;color:var(--text-muted);font-size:1rem;cursor:pointer;">+</button>
            </div>
          </div>
        </div>

        <div style="padding:.55rem 0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem;">
            <span style="font-size:1rem;font-weight:700;color:var(--text);">Rest between sets</span>
            <span style="font-size:.95rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;">${rest}<span style="color:var(--text-muted);font-size:.78rem;font-weight:600;"> s</span></span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;">
            ${[60, 90, 120, 180].map(v => {
              const active = rest === v;
              return `<button data-rest="${v}" type="button" class="cfgRest" style="padding:.55rem 0;border-radius:12px;border:1px solid ${active ? 'var(--accent)' : 'var(--border)'};background:${active ? 'rgba(16,185,129,.12)' : 'var(--bg)'};color:${active ? 'var(--accent)' : 'var(--text)'};font-weight:700;font-size:.85rem;cursor:pointer;">${v}s</button>`;
            }).join('')}
          </div>
        </div>
      </div>

      <button id="cfgSave" type="button" style="width:100%;height:50px;border-radius:14px;background:var(--accent);color:#000;border:0;font-weight:800;font-size:1rem;cursor:pointer;">Add to plan</button>
    </div>`;

    sh.querySelector('#cfgClose').addEventListener('click', close);
    sh.querySelector('#cfgBack').addEventListener('click', close);
    sh.addEventListener('click', (e) => { if (e.target === sh) close(); });
    sh.querySelectorAll('.cfgGoal').forEach(b => b.addEventListener('click', () => {
      const k = b.dataset.goal;
      goal = k;
      const v = goalDef[k];
      if (v) { minR = v.min; maxR = v.max; rest = v.rest; }
      render();
    }));
    sh.querySelector('#cfgSetsMinus').addEventListener('click', () => { sets = Math.max(1, sets - 1); render(); });
    sh.querySelector('#cfgSetsPlus').addEventListener('click', () => { sets = Math.min(12, sets + 1); render(); });
    sh.querySelector('#cfgMinMinus').addEventListener('click', () => { minR = Math.max(1, minR - 1); if (minR > maxR) maxR = minR; render(); });
    sh.querySelector('#cfgMinPlus').addEventListener('click', () => { minR = Math.min(30, minR + 1); if (minR > maxR) maxR = minR; render(); });
    sh.querySelector('#cfgMaxMinus').addEventListener('click', () => { maxR = Math.max(minR, maxR - 1); render(); });
    sh.querySelector('#cfgMaxPlus').addEventListener('click', () => { maxR = Math.min(50, maxR + 1); render(); });
    sh.querySelectorAll('.cfgRest').forEach(b => b.addEventListener('click', () => { rest = Number(b.dataset.rest); render(); }));
    sh.querySelector('#cfgSave').addEventListener('click', () => {
      const reps = minR === maxR ? String(minR) : `${minR}-${maxR}`;
      close();
      onConfirm({ exercise_name: info.name, target_sets: sets, target_reps: reps, rest_seconds: rest, goal });
    });
  };

  document.body.appendChild(sh);
  render();
}

function renderPlanEditor() {
  const plan = state.plan;
  if (!plan) { nav('#/'); return; }
  // reuse the onboard data shape, seed from current plan
  const data = {
    split_type: plan.split_type,
    days: plan.days.sort((a,b)=>a.day_of_week-b.day_of_week).map(d => d.slot_type),
    dayMeta: Array.from({length:7}, (_, i) => {
      const d = plan.days.find(x => x.day_of_week === i) || {};
      return { custom_name: d.custom_name, cardio_type: d.cardio_type, cardio_duration_min: d.cardio_duration_min, subSplits: d.sub_splits ? [...d.sub_splits] : [] };
    }),
    exercises: {},
  };
  plan.exercises.forEach(e => {
    const key = e.slot_key || e.slot_type;
    (data.exercises[key] = data.exercises[key] || []).push({
      exercise_name: e.exercise_name, target_sets: e.target_sets, target_reps: e.target_reps
    });
  });

  const paint = () => {
    const split = SPLITS[data.split_type] || SPLITS.custom;
    const slotOptions = [...split.slots, 'cardio', 'rest'];
    const keyForDay = (i) => { const st = data.days[i]; return (!st || st === 'rest' || st === 'cardio') ? null : st + '-' + i; };
    const dayRow = (i) => {
      const slot = data.days[i];
      const meta = data.dayMeta[i] || {};
      const opts = slotOptions.map(s => `<option value="${s}" ${slot===s?'selected':''}>${SLOT_LABEL[s]}</option>`).join('');
      const cardio = slot === 'cardio' ? `
        <div class="mt-2 grid grid-cols-2 gap-2">
          <select data-day="${i}" class="cardioType input text-sm">
            <option value="">Type</option>
            ${CARDIO_TYPES.map(c => `<option value="${c}" ${meta.cardio_type===c?'selected':''}>${c}</option>`).join('')}
          </select>
          <input data-day="${i}" type="number" min="5" max="180" value="${esc(meta.cardio_duration_min ?? '')}" class="cardioDur input text-sm" placeholder="min" />
        </div>` : '';
      const customF = slot === 'custom' ? `
        <input data-day="${i}" class="customName input text-sm mt-2" value="${esc(meta.custom_name ?? '')}" placeholder="Custom name" />` : '';
      const _dayKey = keyForDay(i);
      const dayExCount = _dayKey ? (data.exercises[_dayKey] || []).length : 0;
      const dayExBtn = _dayKey ? `
        <button data-day-key="${_dayKey}" class="dayAddEx press" style="display:flex;align-items:center;justify-content:space-between;gap:.5rem;background:var(--accent-dim);border:1px solid rgba(16,185,129,.3);color:var(--green);border-radius:12px;padding:.65rem .85rem;font-size:.84rem;font-weight:700;cursor:pointer;width:100%;margin-top:.6rem;">
          <span>+ Add exercise${dayExCount ? ` <span style="color:var(--text-muted);font-weight:600;">(${dayExCount})</span>` : ''}</span>
          <span style="font-size:.9rem;">›</span>
        </button>` : '';
      return `
        <div class="pe-day-card" style="background:var(--surface);border:1px solid var(--hairline);">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;font-size:11px;color:var(--text-3);font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-align:center;">${DOW_SHORT[i]}</div>
            <select data-day="${i}" class="slotPick input" style="font-size:13px;flex:1;">${opts}</select>
            ${slotChip(slot, meta.custom_name)}
          </div>
          ${cardio}${customF}
          ${dayExBtn}
          ${slot !== 'rest' ? subSplitsUI(i, meta.subSplits, 'editor') : ''}
        </div>`;
    };

    const workoutDayIdx = data.days.map((s, i) => i).filter(i => data.days[i] !== 'rest' && data.days[i] !== 'cardio');
    const dayBlock = (i) => {
      const slot = data.days[i];
      const key = slot + '-' + i;
      const meta = data.dayMeta[i] || {};
      const title = meta.custom_name || SLOT_LABEL[slot] || slot;
      const picked = data.exercises[key] || [];
      const rows = picked.map((ex, j) => `
        <div class="ex-edit-row" data-slot-row="${key}" data-i="${j}">
          <span class="exDrag" title="Drag to reorder" aria-label="Drag handle" style="cursor:grab;color:var(--text-muted);font-size:1rem;line-height:1;padding:0 .25rem;user-select:none;display:flex;align-items:center;justify-content:center;">⋮⋮</span>
          <input data-slot="${key}" data-i="${j}" class="exName input" value="${esc(ex.exercise_name)}" placeholder="Exercise name" />
          <input data-slot="${key}" data-i="${j}" class="exSets input" type="number" inputmode="numeric" min="1" max="10" value="${esc(ex.target_sets)}" placeholder="sets" />
          <input data-slot="${key}" data-i="${j}" class="exReps input" value="${esc(ex.target_reps)}" placeholder="reps" />
          <button data-slot="${key}" data-i="${j}" class="exDel" title="Remove">×</button>
        </div>`).join('');
      return `
        <div style="background:var(--surface);border:1px solid var(--hairline);border-radius:16px;padding:14px 14px 8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:10px;">${slotChip(slot, meta.custom_name)}<span style="font-weight:700;font-size:15px;letter-spacing:-.015em;">${esc(DOW_SHORT[i])} · ${esc(title)}</span></div>
            <button data-slot="${key}" class="exAdd press" style="background:var(--accent-dim);color:var(--green);border:0;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;">+ Add</button>
          </div>
          <div id="slot-${key}-rows" data-sortable-slot="${key}">${rows || '<div style="color:var(--text-3);font-size:13px;padding:8px 0;text-align:center;">No exercises yet.</div>'}</div>
        </div>`;
    };

    appEl().innerHTML = shell(`<div class="plan-editor">
      <div style="padding:8px 0 18px;">
        <div class="eyebrow" style="margin-bottom:6px;">WEEK SCHEDULE</div>
        <div class="h-display">Your plan</div>
      </div>

      <div style="background:var(--surface);border:1px solid var(--hairline);border-radius:18px;padding:16px;margin-bottom:18px;">
        <div class="eyebrow" style="margin-bottom:8px;color:var(--text-3);">SPLIT TYPE</div>
        <select id="splitType" class="input" style="background:var(--bg-elevated);">
          ${Object.entries(SPLITS).map(([k,v]) => `<option value="${k}" ${data.split_type===k?'selected':''}>${v.name}</option>`).join('')}
        </select>
        <p style="font-size:11px;color:var(--text-3);margin-top:8px;line-height:1.4;">Changing split won't wipe your exercises, but may hide ones that don't match new slots.</p>
      </div>

      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;">
        <div class="h-section">Week</div>
        <div style="color:var(--text-3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;">Tap to edit</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">${data.days.map((_,i)=>dayRow(i)).join('')}</div>

      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;">
        <div class="h-section">Exercises</div>
        <div style="color:var(--text-3);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;">Per-day</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">${workoutDayIdx.length ? workoutDayIdx.map(dayBlock).join('') : '<div style="background:var(--surface);border:1px solid var(--hairline);border-radius:16px;padding:18px;color:var(--text-3);font-size:13px;text-align:center;">No workout days assigned yet. Pick at least one slot above.</div>'}</div>

      <div style="display:flex;gap:8px;">
        <button id="btnSave" class="btn btn-primary" style="flex:1;">Save plan</button>
        <a href="#/" class="btn btn-ghost">Cancel</a>
      </div>
      </div>`);

    $('splitType').addEventListener('change', e => { data.split_type = e.target.value; paint(); });
    // Wire drag-and-drop reorder on each slot's exercise list (lazy-load Sortable.js).
    (async () => {
      try {
        const Sortable = await loadSortable();
        document.querySelectorAll('[data-sortable-slot]').forEach(container => {
          const slot = container.getAttribute('data-sortable-slot');
          if (container.dataset.sortableInited) return;
          container.dataset.sortableInited = '1';
          new Sortable(container, {
            animation: 150,
            handle: '.exDrag',
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: (evt) => {
              const arr = data.exercises[slot] || [];
              if (evt.oldIndex === evt.newIndex) return;
              const [moved] = arr.splice(evt.oldIndex, 1);
              arr.splice(evt.newIndex, 0, moved);
              paint();
            },
          });
        });
      } catch (e) {
        console.warn('Sortable load failed; reorder disabled', e);
      }
    })();
    document.querySelectorAll('.slotPick').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); data.days[i] = e.target.value; data.dayMeta[i] = { subSplits: [] }; paint();
    }));
    document.querySelectorAll('.cardioType').forEach(el => el.addEventListener('change', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].cardio_type = e.target.value;
    }));
    document.querySelectorAll('.cardioDur').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].cardio_duration_min = Number(e.target.value) || null;
    }));
    document.querySelectorAll('.customName').forEach(el => el.addEventListener('input', e => {
      const i = Number(el.dataset.day); data.dayMeta[i].custom_name = e.target.value;
    }));
    wireSubSplits(i => { if (!data.dayMeta[i]) data.dayMeta[i] = {}; if (!data.dayMeta[i].subSplits) data.dayMeta[i].subSplits = []; return data.dayMeta[i]; }, paint);
    document.querySelectorAll('.exName').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].exercise_name = e.target.value;
    }));
    document.querySelectorAll('.exSets').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].target_sets = Number(e.target.value) || 3;
    }));
    document.querySelectorAll('.exReps').forEach(el => el.addEventListener('input', e => {
      data.exercises[el.dataset.slot][Number(el.dataset.i)].target_reps = e.target.value;
    }));
    document.querySelectorAll('.exDel').forEach(el => el.addEventListener('click', () => {
      data.exercises[el.dataset.slot].splice(Number(el.dataset.i), 1); paint();
    }));
    document.querySelectorAll('.exAdd').forEach(el => el.addEventListener('click', () => {
      try {
        const key = el.dataset.slot;
        const slot = slotTypeOfKey(key);
        data.exercises[key] = data.exercises[key] || [];
        if (typeof openExercisePickerSheet !== 'function') {
          console.warn('[picker] not loaded'); toast && toast('Could not open picker', 'error');
          return;
        }
        openExercisePickerSheet(slot, (cfg) => {
          data.exercises[key].push({
            exercise_name: cfg.exercise_name,
            target_sets:   cfg.target_sets,
            target_reps:   cfg.target_reps,
          });
          paint();
        });
      } catch (e) {
        console.error('[plan] +Add error', e);
        toast && toast('Picker error', 'error');
      }
    }));
    // === New per-day "+ Add exercise" buttons inside each day card ===
    document.querySelectorAll('.dayAddEx').forEach(el => el.addEventListener('click', () => {
      try {
        const key = el.dataset.dayKey;
        const slot = slotTypeOfKey(key);
        data.exercises[key] = data.exercises[key] || [];
        if (typeof openExercisePickerSheet !== 'function') {
          console.warn('[picker] not loaded'); toast && toast('Could not open picker', 'error');
          return;
        }
        openExercisePickerSheet(slot, (cfg) => {
          data.exercises[key].push({
            exercise_name: cfg.exercise_name,
            target_sets:   cfg.target_sets,
            target_reps:   cfg.target_reps,
          });
          paint();
        });
      } catch (e) {
        console.error('[plan] day +Add error', e);
        toast && toast('Picker error', 'error');
      }
    }));
    $('btnSave').addEventListener('click', async () => {
      $('btnSave').disabled = true; $('btnSave').textContent = 'Saving...';
      try {
        const days = data.days.map((slot, i) => ({
          slot_type: slot,
          custom_name: data.dayMeta[i]?.custom_name || null,
          cardio_type: data.dayMeta[i]?.cardio_type || null,
          cardio_duration_min: data.dayMeta[i]?.cardio_duration_min || null,
          sub_splits: (data.dayMeta[i]?.subSplits || []).filter(ss => ss.type) || null,
        }));
        const flat = [];
        data.days.forEach((slot, i) => {
          if (!slot || slot === 'rest' || slot === 'cardio') return;
          const key = slot + '-' + i;
          (data.exercises[key] || []).filter(x => x.exercise_name?.trim()).forEach(x => flat.push({
            slot_type: slot, slot_key: key, exercise_name: x.exercise_name.trim(), target_sets: x.target_sets, target_reps: x.target_reps,
          }));
        });
        await qSavePlan({ split_type: data.split_type, name: SPLITS[data.split_type].name, days, exercises: flat });
        state.plan = await qActivePlan();
        toast('Plan saved.');
        nav('#/');
      } catch (e) {
        console.error(e); toast(e.message || 'Save failed', 'error');
        $('btnSave').disabled = false; $('btnSave').textContent = 'Save plan';
      }
    });
  };
  paint();
}

async function qBodyWeights(limit = 1000) {
  const { data, error } = await sb.from('body_weights').select('*').order('recorded_at', { ascending: true }).limit(limit);
  if (error) { console.error(error); return []; }
  return data || [];
}
// Get the most recent N body-weight entries (desc) returned in ASC order.
// Use this instead of qBodyWeights(N) when you want "the last N" — qBodyWeights(N)
// returns the OLDEST N because of its ascending sort.
async function qBodyWeightsRecent(n = 30) {
  const { data, error } = await sb.from('body_weights')
    .select('*').order('recorded_at', { ascending: false }).limit(n);
  if (error) { console.error(error); return []; }
  return (data || []).slice().reverse();
}
async function qSaveBodyWeight({ weight_lbs, source = 'manual', notes = null, recorded_at = null }) {
  const uid = state.session.user.id;
  const row = { user_id: uid, weight_lbs, source, notes };
  if (recorded_at) row.recorded_at = recorded_at;
  const { data, error } = await sb.from('body_weights').insert(row).select().single();
  if (error) throw error;
  // Only sync profile.weight_lbs if this is the most recent entry the user has.
  const recordedTs = recorded_at ? new Date(recorded_at).getTime() : Date.now();
  const { data: latest } = await sb.from('body_weights').select('recorded_at').order('recorded_at', { ascending: false }).limit(1).maybeSingle();
  if (!latest || new Date(latest.recorded_at).getTime() <= recordedTs) {
    await sb.from('profiles').update({ weight_lbs, updated_at: new Date().toISOString() }).eq('id', uid);
  }
  return data;
}
async function qDeleteBodyWeight(id) {
  const { error } = await sb.from('body_weights').delete().eq('id', id);
  if (error) throw error;
}

// Cached set-log fetch. The dashboard uses this on every Today repaint, but the
// data is rarely volatile, so cache for 5 minutes per session.
let _allSetLogsCache = null;
let _allSetLogsAt = 0;
let _allSetLogsInflight = null;
async function qAllSetLogs() {
  const now = Date.now();
  if (_allSetLogsCache && (now - _allSetLogsAt) < 300000) return _allSetLogsCache;
  if (_allSetLogsInflight) return _allSetLogsInflight;
  _allSetLogsInflight = (async () => {
    const { data, error } = await sb.from('set_logs')

async function qUploadPhoto(file, { weight_lbs = null, notes = null, taken_at = null, angle = 'front' } = {}) {
  if (!state.session || !state.session.user) throw new Error('Not signed in.');
  const uid = state.session.user.id;
  // Derive extension robustly. Prefer the file's actual MIME type since iOS native
  // file picker sometimes hands us files named "image.jpg" even when they're HEIC.
  const mimeExt = {
    'image/jpeg': 'jpeg', 'image/jpg': 'jpg', 'image/png': 'png',
    'image/heic': 'heic', 'image/heif': 'heif', 'image/webp': 'webp',
  };
  let ext = mimeExt[(file.type || '').toLowerCase()];
  if (!ext) {
    const fromName = (file.name || '').split('.').pop();
    ext = (fromName && fromName.length <= 5) ? fromName.toLowerCase() : 'jpg';
  }
  const contentType = file.type || (ext === 'png' ? 'image/png' : ext === 'heic' ? 'image/heic' : 'image/jpeg');
  const stamp = new Date().toISOString().replace(/[:.]/g, '-');
  const path = `${uid}/${stamp}.${ext}`;
  console.log('[photo upload] starting', { path, contentType, size: file.size, name: file.name });
  const up = await sb.storage.from('progress-photos').upload(path, file, { contentType, upsert: false });
  if (up.error) { console.error('[photo upload] storage failed', up.error); throw new Error('Storage upload failed: ' + (up.error.message || up.error)); }
  const row = { user_id: uid, storage_path: path, weight_lbs, notes, angle };
  if (taken_at) row.taken_at = taken_at;
  const { data, error } = await sb.from('progress_photos').insert(row).select().single();
  if (error) { console.error('[photo upload] insert failed', error); throw new Error('Database insert failed: ' + (error.message || error)); }
  console.log('[photo upload] success', data.id);
  return data;
}
async function qDeletePhoto(photo) {

async function qPhotoSignedUrl(path, expiresIn = 3600) {
  // Primary: signed URL — fast, no app memory used.
  try {
    const { data, error } = await sb.storage.from('progress-photos').createSignedUrl(path, expiresIn);
    if (!error && data && data.signedUrl) return data.signedUrl;
    if (error) console.warn('Signed URL error for', path, error);
  } catch (e) { console.warn('Signed URL threw', e); }
  // Fallback: download the file via SDK + convert to a blob:// object URL.
  // Slower and uses memory, but bypasses any URL/header weirdness in WKWebView.
  try {

}

function computePRs(sets) {
  const pr = {};
  sets.forEach(s => {
    if (!s.weight_lbs || !s.reps) return;
    const w = Number(s.weight_lbs), r = Number(s.reps);
    const epley = w * (1 + r / 30);
    const date = s.sessions?.session_date;
    const cur = pr[s.exercise_name] || { exercise_name: s.exercise_name, max_weight: 0, max_reps_at_max: 0, max_weight_date: null, est_1rm: 0, est_1rm_date: null, total_sets: 0, total_volume: 0, _slotCounts: {} };
    if (w > cur.max_weight || (w === cur.max_weight && r > cur.max_reps_at_max)) {
      cur.max_weight = w; cur.max_reps_at_max = r; cur.max_weight_date = date;
    }
    if (epley > cur.est_1rm) {
      cur.est_1rm = epley; cur.est_1rm_date = date;
    }
    cur.total_sets += 1;
    cur.total_volume += w * r;
    const slot = s.sessions?.slot_type || 'custom';
    cur._slotCounts[slot] = (cur._slotCounts[slot] || 0) + 1;
    pr[s.exercise_name] = cur;
  });
  Object.values(pr).forEach(p => {
    p.dominant_slot = Object.entries(p._slotCounts || {}).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'custom';
    delete p._slotCounts;
  });
  return Object.values(pr).sort((a,b) => b.max_weight - a.max_weight);
}


function fmtWt(n) {
  if (n == null || n === '') return '';
  const v = Number(n);
  if (!isFinite(v)) return '';
  // strip trailing .0 so 185.0 → 185, but 185.5 stays 185.5
  return v.toFixed(1).replace(/\.0$/, '');
}
function fmtDateShort(s) {
  if (!s) return '';
  const d = (s instanceof Date) ? s : new Date(typeof s === 'string' && s.length === 10 ? s + 'T00:00:00' : s);
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'2-digit' });
}

async function readExifDate(file) {
  // Reads JPEG/HEIC EXIF DateTimeOriginal from the first ~256 KB of the file.
  // Returns "YYYY-MM-DD" or null if not found / not JPEG.
  try {
    const slice = file.slice(0, Math.min(file.size, 262144));
    const buf = await slice.arrayBuffer();
    const dv = new DataView(buf);
    if (dv.byteLength < 4) return null;
    if (dv.getUint16(0, false) !== 0xFFD8) return null;  // not JPEG
    let off = 2;
    while (off + 4 < dv.byteLength) {
      const marker = dv.getUint16(off, false); off += 2;
      const segLen = dv.getUint16(off, false);
      if (marker === 0xFFE1 && segLen >= 14) {
        // Check "Exif␀␀" header
        const exifHeader = String.fromCharCode(dv.getUint8(off+2), dv.getUint8(off+3), dv.getUint8(off+4), dv.getUint8(off+5));
        if (exifHeader === 'Exif') {
          const tiffStart = off + 8;
          const little = dv.getUint16(tiffStart, false) === 0x4949;
          const ifd0Off = dv.getUint32(tiffStart + 4, little);
          const readIFD = (ifdOff) => {
            const entries = dv.getUint16(tiffStart + ifdOff, little);
            const out = {};
            for (let i = 0; i < entries; i++) {
              const eOff = tiffStart + ifdOff + 2 + i * 12;
              const tag = dv.getUint16(eOff, little);
              const type = dv.getUint16(eOff + 2, little);
              const count = dv.getUint32(eOff + 4, little);
              const valOff = dv.getUint32(eOff + 8, little);
              out[tag] = { type, count, valOff };
            }
            return out;
          };
          const ifd0 = readIFD(ifd0Off);
          // ExifIFDPointer = 0x8769
          const exifIFDOff = ifd0[0x8769]?.valOff;
          if (!exifIFDOff) return null;
          const exifIFD = readIFD(exifIFDOff);
          // DateTimeOriginal = 0x9003
          const dto = exifIFD[0x9003];
          if (!dto || dto.type !== 2) return null;
          const strOff = tiffStart + dto.valOff;
          let str = '';
          for (let i = 0; i < dto.count - 1; i++) {
            const c = dv.getUint8(strOff + i);
            if (c === 0) break;
            str += String.fromCharCode(c);
          }
          // EXIF format: "YYYY:MM:DD HH:MM:SS"
          const m = str.match(/^(\d{4}):(\d{2}):(\d{2})/);
          if (m) return `${m[1]}-${m[2]}-${m[3]}`;
          return null;
        }
      }
      off += segLen;
    }
  } catch (e) {
    console.warn('EXIF read failed', e);
  }
  return null;
}

function lineChart(points, opts = {}) {
  const W = opts.W || 600, H = opts.H || 220, padL = 40, padR = 12, padT = 16, padB = opts.hideX ? 24 : 56;
  if (!points || points.length === 0) return `<div style="color:var(--text-muted);font-size:.875rem;padding:1rem 0;">No data yet.</div>`;
  if (points.length === 1) {
    const p = points[0];
    return `<div style="color:var(--text-secondary);font-size:.875rem;padding:1rem 0;">Only one entry: ${esc(fmtDateShort(p.x))} · ${fmtWt(p.y)} ${esc(opts.unit || '')}</div>`;
  }
  const fmtMD = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  const fmtFull = (d) => { const dt = (d instanceof Date) ? d : new Date(d); return dt.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' }); };
  const xs = points.map(p => +p.x), ys = points.map(p => +p.y);
  const xmin = Math.min(...xs), xmax = Math.max(...xs);
  const ymin = Math.min(...ys), ymax = Math.max(...ys);
  const ypad = Math.max((ymax - ymin) * 0.12, 1);
  const ya = ymin - ypad, yb = ymax + ypad;
  const sx = x => padL + ((x - xmin) / Math.max(xmax - xmin, 1)) * (W - padL - padR);
  const sy = y => H - padB - ((y - ya) / Math.max(yb - ya, 0.0001)) * (H - padT - padB);
  const path = points.map((p, i) => `${i?'L':'M'}${sx(+p.x).toFixed(1)},${sy(+p.y).toFixed(1)}`).join(' ');
  const unit = opts.unit || '';
  const minSpacing = 26;
  const interval = Math.max(1, Math.ceil((points.length * minSpacing) / (W - padL - padR)));
  const dots = points.map((p) => `<circle class="lc-dot" cx="${sx(+p.x).toFixed(1)}" cy="${sy(+p.y).toFixed(1)}" r="3.5" fill="#10b981" pointer-events="none"/>`).join('');
  const hits = points.map((p) => {
    const cx = sx(+p.x), cy = sy(+p.y);
    const title = `${fmtFull(p.x)} · ${fmtWt(p.y)} ${unit}`.trim();
    return `<button type="button" class="lc-pt" data-x="${cx.toFixed(1)}" data-y="${cy.toFixed(1)}" data-label="${esc(title)}" style="position:absolute;left:${(cx/W*100).toFixed(2)}%;top:${(cy/H*100).toFixed(2)}%;width:42px;height:42px;transform:translate(-50%,-50%);background:transparent;border:0;padding:0;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;z-index:4;"></button>`;
  }).join('');
  const dateLabels = opts.hideX ? '' : points.map((p, i) => {
    if (i % interval !== 0 && i !== points.length - 1) return '';
    return `<text x="${sx(+p.x).toFixed(1)}" y="${H - padB + 14}" fill="#71717a" font-size="9" text-anchor="middle" font-family="ui-sans-serif">${esc(fmtMD(p.x))}</text>`;
  }).join('');
  const yTicks = 4, ticks = [];
  for (let i = 0; i <= yTicks; i++) {
    const v = ya + (i/yTicks) * (yb - ya);
    const yPx = sy(v);
    ticks.push(`<line x1="${padL}" y1="${yPx.toFixed(1)}" x2="${W-padR}" y2="${yPx.toFixed(1)}" stroke="#27272a" stroke-width="0.5"/><text x="${padL-6}" y="${yPx.toFixed(1)}" fill="#71717a" font-size="10" text-anchor="end" dominant-baseline="middle">${fmtWt(v)}</text>`);
  }
  const id = 'lc_' + Math.random().toString(36).slice(2, 8);
  try { (window.__lcData = window.__lcData || {})[id] = { points, opts: { unit, title: opts.title || '' } }; } catch (_) {}
  const expandBtn = (opts.expandBtn === false) ? '' : `<button type="button" class="lc-expand-btn" aria-label="Expand chart" style="position:absolute;top:4px;right:4px;z-index:6;width:30px;height:30px;border-radius:8px;border:1px solid var(--hairline);background:var(--bg-elevated);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>`;
  const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:${opts.svgHeight || 'auto'};display:block;">
    ${ticks.join('')}
    <path d="${path}" fill="none" stroke="#10b981" stroke-width="2"/>
    ${dots}
    ${dateLabels}
  </svg>`;
  return `<div class="lc-wrap" data-chart-id="${id}" data-w="${W}" data-h="${H}" style="position:relative;">
    ${svg}
    ${hits}
    ${expandBtn}
    <div class="lc-tooltip" style="position:absolute;pointer-events:none;background:#0a0a0a;color:#fafafa;border:1px solid #27272a;border-radius:.5rem;padding:.375rem .625rem;font-size:.75rem;font-weight:500;white-space:nowrap;display:none;transform:translate(-50%, -120%);box-shadow:0 4px 12px rgba(0,0,0,.6);z-index:7;"></div>
  </div>`;
}

// Activate a chart's tap-for-value tooltips and its expand button.
function wireLineChart(root) {
  if (!root || root.dataset.wired) return; root.dataset.wired = '1';
  const W = +root.dataset.w || 600, H = +root.dataset.h || 220;
  const svg = root.querySelector('svg');
  const tip = root.querySelector('.lc-tooltip');
  let pinned = false;
  const show = (cx, cy, label) => {
    if (!svg || !tip) return;
    const rect = svg.getBoundingClientRect();
    tip.textContent = label;
    tip.style.left = (Number(cx) * (rect.width / W)) + 'px';
    tip.style.top = (Number(cy) * (rect.height / H)) + 'px';
    tip.style.display = 'block';
  };
  const hide = () => { if (tip) tip.style.display = 'none'; };
  root.querySelectorAll('.lc-pt').forEach((btn) => {
    btn.addEventListener('mouseenter', () => { if (!pinned) show(btn.dataset.x, btn.dataset.y, btn.dataset.label); });
    btn.addEventListener('mouseleave', () => { if (!pinned) hide(); });
    btn.addEventListener('click', (e) => { e.stopPropagation(); pinned = true; show(btn.dataset.x, btn.dataset.y, btn.dataset.label); });
  });
  root.addEventListener('click', (e) => {
    if (e.target && e.target.closest && (e.target.closest('.lc-pt') || e.target.closest('.lc-expand-btn'))) return;
    pinned = false; hide();
  });
  const exp = root.querySelector('.lc-expand-btn');
  if (exp) exp.addEventListener('click', (e) => { e.stopPropagation(); expandChart(root.dataset.chartId); });
}
function wireLineCharts() {
  try { document.querySelectorAll('.lc-wrap:not([data-wired])').forEach(wireLineChart); } catch (_) {}
}
if (typeof window !== 'undefined') {
  window.wireLineCharts = wireLineCharts;
  window.wireLineChart = wireLineChart;
  // Charts are injected via innerHTML (which never runs inline scripts), so wire
  // them whenever the DOM changes. One observer covers every chart, everywhere.
  try {
    const _start = () => {
      if (!document.body) { setTimeout(_start, 120); return; }
      new MutationObserver(() => wireLineCharts()).observe(document.body, { childList: true, subtree: true });
      wireLineCharts();
    };
    _start();
  } catch (_) {}
}

// Fullscreen, scrollable, tappable version of a chart.
function expandChart(id) {
  const data = window.__lcData && window.__lcData[id];
  if (!data) return;
  const allPts = (data.points || []).slice();
  if (allPts.length < 2) return;
  const title = (data.opts && data.opts.title) || 'Chart';
  const unit = (data.opts && data.opts.unit) || '';
  let range = 0; // 0 = all time, else number of days

  const head = document.createElement('div');
  head.style.cssText = 'flex:none;display:flex;align-items:center;justify-content:space-between;padding:calc(14px + var(--safe-top,0px)) 18px 6px;';
  head.innerHTML = `<div style="font-weight:700;font-size:17px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(title)}</div><button id="lcExpClose" class="press" style="flex:none;margin-left:12px;background:var(--bg-elevated);border:1px solid var(--hairline);color:var(--text);border-radius:10px;width:36px;height:36px;font-size:16px;cursor:pointer;">✕</button>`;
  overlay.appendChild(head);

  const stat = document.createElement('div');

  overlay.appendChild(stat);

  const area = document.createElement('div');
  area.style.cssText = 'flex:1;min-height:0;padding:6px 12px;';
  overlay.appendChild(area);

  const tabsRow = document.createElement('div');
  tabsRow.style.cssText = 'flex:none;display:flex;gap:8px;justify-content:center;padding:8px 14px calc(16px + var(--safe-bottom,0px));';
  overlay.appendChild(tabsRow);

  const ranges = [['7D', 7], ['30D', 30], ['90D', 90], ['All', 0]];

  const paint = () => {
    let pts = allPts;
    if (range) { const cut = Date.now() - range * 86400000; pts = allPts.filter(p => (+new Date(p.x)) >= cut); }
    tabsRow.innerHTML = ranges.map(([lab, d]) => `<button class="press lcRange" data-d="${d}" style="flex:1;max-width:92px;padding:9px 4px;border-radius:10px;border:1px solid var(--hairline);background:${range === d ? 'var(--green)' : 'var(--bg-elevated)'};color:${range === d ? '#06291d' : 'var(--text-2)'};font-weight:700;font-size:13px;cursor:pointer;">${lab}</button>`).join('');
    tabsRow.querySelectorAll('.lcRange').forEach(b => b.addEventListener('click', () => { range = parseInt(b.getAttribute('data-d'), 10); paint(); }));
    if (pts.length >= 1) {
      const last = pts[pts.length - 1], first = pts[0];
      const delta = pts.length > 1 ? (Number(last.y) - Number(first.y)) : 0;
      stat.innerHTML = `<span class="tabnum" style="font-size:30px;font-weight:800;letter-spacing:-.03em;">${Math.round(Number(last.y))}</span> <span style="font-size:13px;color:var(--text-3);font-weight:600;">${esc(unit)}</span>${pts.length > 1 ? ` <span style="font-size:13px;font-weight:700;color:${delta >= 0 ? 'var(--green)' : 'var(--danger)'};">${delta >= 0 ? '+' : ''}${Math.round(delta)} ${esc(unit)}</span>` : ''}`;
    } else { stat.innerHTML = ''; }
    if (pts.length < 2) {
      area.innerHTML = `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:13px;">${pts.length ? 'Only one entry in this range.' : 'No entries in this range.'}</div>`;
      return;
    }
    const W = Math.max(220, area.clientWidth - 24);
    const Hh = Math.max(180, area.clientHeight - 12);
    area.innerHTML = `<div style="width:100%;height:100%;">${lineChart(pts, { unit, title, expandBtn: false, W, H: Hh, svgHeight: Hh + 'px' })}</div>`;

  };

  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  const cb = head.querySelector('#lcExpClose'); if (cb) cb.addEventListener('click', close);
  requestAnimationFrame(() => requestAnimationFrame(paint));
}
if (typeof window !== 'undefined') window.expandChart = expandChart;



async function bluetoothReadWeight() {
  if (!navigator.bluetooth) {
    throw new Error('Web Bluetooth not available. Use Chrome on desktop or Android.');
  }
  const device = await navigator.bluetooth.requestDevice({
    filters: [{ services: ['weight_scale'] }],
    optionalServices: ['weight_scale']
  });
  const server = await device.gatt.connect();
  const service = await server.getPrimaryService('weight_scale');
  const ch = await service.getCharacteristic('weight_measurement');
  return new Promise((resolve, reject) => {
    const t = setTimeout(() => { try { ch.stopNotifications(); } catch {} reject(new Error('Timed out — step on the scale.')); }, 30000);
    ch.addEventListener('characteristicvaluechanged', (e) => {
      try {
        const v = e.target.value;
        const flags = v.getUint8(0);
        const isImperial = (flags & 0x01) === 1;
        const raw = v.getUint16(1, true);
        let lbs;
        if (isImperial) lbs = raw * 0.01;
        else lbs = (raw * 0.005) * 2.2046226218;
        clearTimeout(t);
        try { ch.stopNotifications(); server.disconnect(); } catch {}
        resolve({ weight_lbs: Math.round(lbs * 10) / 10, source: 'bluetooth' });
      } catch (err) { clearTimeout(t); reject(err); }
    });
    ch.startNotifications().catch(reject);
  });
}
