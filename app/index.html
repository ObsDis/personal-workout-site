/* ===== Progress: per-exercise progression over time ===== */
function _epley1RM(w, reps) { w = Number(w) || 0; reps = Number(reps) || 0; if (w <= 0) return 0; return w * (1 + reps / 30); }

async function progressExercisesView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div style="color:var(--text-muted);padding:1rem 0;">Loading…</div>`;
  let sets = [];
  try { sets = await qAllSetLogs(); } catch (_) {}
  const counts = {};
  for (const s of sets) { const n = s.exercise_name; if (!n) continue; counts[n] = (counts[n] || 0) + 1; }
  const exNames = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  if (!exNames.length) {
    body.innerHTML = `<div class="card" style="text-align:center;padding:2rem 1.25rem;"><div style="font-weight:700;margin-bottom:.35rem;">No lifts logged yet</div><div style="color:var(--text-muted);font-size:.85rem;">Log a few workouts and your progress charts show up here.</div></div>`;
    return;
  }
  const params = new URLSearchParams((location.hash.split('?')[1] || ''));
  let selected = params.get('ex'); if (!selected || !counts[selected]) selected = exNames[0];
  let metric = (params.get('metric') === 'weight') ? 'weight' : 'orm';

  const paint = () => {
    const chartArea = document.getElementById('exChart'); if (!chartArea) return;
    const byDate = {};
    for (const s of sets) {
      if (s.exercise_name !== selected) continue;
      const d = s.sessions && s.sessions.session_date; if (!d) continue;
      const w = Number(s.weight_lbs) || 0, reps = Number(s.reps) || 0;
      const cell = byDate[d] || (byDate[d] = { date: d, top: 0, orm: 0, vol: 0 });
      if (w > cell.top) cell.top = w;
      const o = _epley1RM(w, reps); if (o > cell.orm) cell.orm = o;
      cell.vol += w * reps;
    }
    const series = Object.values(byDate).sort((a, b) => a.date < b.date ? -1 : 1);
    if (!series.length) { chartArea.innerHTML = `<div style="color:var(--text-muted);font-size:.85rem;padding:1rem 0;">No sets recorded for ${esc(selected)} yet.</div>`; return; }
    const pts = series.map(s => ({ x: new Date(s.date + 'T00:00:00'), y: metric === 'weight' ? s.top : Math.round(s.orm) }));
    const first = series[0], last = series[series.length - 1];
    const cur = metric === 'weight' ? last.top : Math.round(last.orm);
    const start = metric === 'weight' ? first.top : Math.round(first.orm);
    const delta = cur - start;

/* ===== Eat: macro trends over time ===== */
async function qFoodLogsRange(days) {
  const since = localDateISO(new Date(Date.now() - days * 86400000));
  const { data, error } = await sb.from('food_logs').select('log_date,calories,protein_g,carbs_g,fat_g').gte('log_date', since).order('log_date', { ascending: true }).limit(8000);
  if (error) { console.warn('[qFoodLogsRange]', error.message); return []; }
  return data || [];
}

// HTML bar chart with a dashed target line (no SVG text, so nothing stretches).
function macroDailyChart(values, target, color, labels) {
  const n = values.length; if (!n) return '';
  const mx = Math.max(target || 0, ...values, 1);
  const barH = 120;
  const bars = values.map(v => { const pct = (v / mx) * 100; return `<div style="flex:1;min-width:0;display:flex;align-items:flex-end;height:100%;"><div style="width:72%;margin:0 auto;height:${pct.toFixed(1)}%;min-height:${v > 0 ? '2px' : '0'};background:${color};border-radius:3px;"></div></div>`; }).join('');
  const labs = labels.map(l => `<div style="flex:1;min-width:0;text-align:center;font-size:9px;color:var(--text-3);font-weight:600;white-space:nowrap;overflow:hidden;">${l || ''}</div>`).join('');
  const tpct = target ? Math.min(100, (target / mx) * 100) : 0;
  const tline = target ? `<div style="position:absolute;left:0;right:0;bottom:${tpct.toFixed(1)}%;border-top:1.5px dashed var(--text-3);pointer-events:none;"></div>` : '';
  return `<div style="position:relative;height:${barH}px;display:flex;gap:3px;align-items:flex-end;">${bars}${tline}</div><div style="display:flex;gap:3px;margin-top:4px;">${labs}</div>`;
}

async function nutTrendsView() {
  const body = document.getElementById('nut-body'); if (!body) return;
  body.innerHTML = `<div style="color:var(--text-muted);padding:1rem 0;">Loading…</div>`;
  const params = new URLSearchParams((location.hash.split('?')[1] || ''));
  let rangeDays = parseInt(params.get('range') || '30', 10); if (![7, 30, 90].includes(rangeDays)) rangeDays = 30;
  let macro = params.get('m') || 'kcal';
  const tg = state.profile || {};
  let logs = [];
  try { logs = await qFoodLogsRange(90); } catch (_) {}
  if (!logs.length) {
    body.innerHTML = `<div class="card" style="text-align:center;padding:2rem 1.25rem;"><div style="font-weight:700;margin-bottom:.35rem;">No food logged yet</div><div style="color:var(--text-muted);font-size:.85rem;">Log meals for a few days and your trends show up here.</div></div>`;
    return;
  }
  const macroCfg = {
    kcal: { key: 'calories', target: tg.kcal_target, color: 'var(--m-cal)', label: 'Calories', unit: 'kcal' },
    protein: { key: 'protein_g', target: tg.protein_target_g, color: 'var(--m-protein)', label: 'Protein', unit: 'g' },
    carbs: { key: 'carbs_g', target: tg.carbs_target_g, color: 'var(--m-carbs)', label: 'Carbs', unit: 'g' },
    fat: { key: 'fat_g', target: tg.fat_target_g, color: 'var(--m-fat)', label: 'Fat', unit: 'g' },
  };
  const byDay = {};
  for (const l of logs) { const d = l.log_date; (byDay[d] = byDay[d] || { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0 }); byDay[d].calories += +l.calories || 0; byDay[d].protein_g += +l.protein_g || 0; byDay[d].carbs_g += +l.carbs_g || 0; byDay[d].fat_g += +l.fat_g || 0; }

  const paint = () => {
    const cfg = macroCfg[macro];
    const today = new Date(); const days = [];
    for (let i = rangeDays - 1; i >= 0; i--) { const dt = new Date(today.getTime() - i * 86400000); const iso = localDateISO(dt); days.push({ iso, dt, val: byDay[iso] ? byDay[iso][cfg.key] : 0, has: !!byDay[iso] }); }

    const logged = days.filter(d => d.has); const avg = logged.length ? Math.round(logged.reduce((a, d) => a + d.val, 0) / logged.length) : 0;
    const weeks = Math.min(8, Math.max(1, Math.ceil(rangeDays / 7)));
    const wk = [];
    for (let w = 0; w < weeks; w++) {
      const end = new Date(today.getTime() - w * 7 * 86400000); const start = new Date(end.getTime() - 6 * 86400000);
      let kcalSum = 0, protSum = 0, daysLogged = 0, protHit = 0;
      for (let i = 0; i < 7; i++) { const dt = new Date(end.getTime() - i * 86400000); const iso = localDateISO(dt); const e = byDay[iso]; if (e) { daysLogged++; kcalSum += e.calories; protSum += e.protein_g; if (tg.protein_target_g && e.protein_g >= tg.protein_target_g * 0.9) protHit++; } }
      if (daysLogged) wk.push({ label: 'Wk of ' + ((start.getMonth() + 1) + '/' + start.getDate()), avgKcal: Math.round(kcalSum / daysLogged), avgProt: Math.round(protSum / daysLogged), daysLogged, protHit });
    }

    document.getElementById('trendBody').innerHTML = `

        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px;">
          <span class="tabnum" style="font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;">${avg}</span>
          <span style="font-size:12px;color:var(--text-3);font-weight:600;">avg ${cfg.unit}/day${cfg.target ? ' · target ' + cfg.target : ''}</span>
        </div>
        ${macroDailyChart(values, cfg.target, cfg.color, labels)}
        <div style="display:flex;gap:6px;margin-top:14px;justify-content:center;">${[7, 30, 90].map(rangePill).join('')}</div>
      </div>
      <div class="card">
        <div class="section-label" style="margin-bottom:.5rem;">Weekly averages</div>
        ${wk.length ? wk.map((w, i) => `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;${i < wk.length - 1 ? 'border-bottom:1px solid var(--hairline);' : ''}">
          <div><div style="font-size:13px;font-weight:600;">${w.label}</div><div style="font-size:11px;color:var(--text-3);">${w.daysLogged}/7 days logged</div></div>
          <div style="text-align:right;"><div class="tabnum" style="font-size:14px;font-weight:700;">${w.avgKcal} <span style="font-size:10px;color:var(--text-3);">kcal</span> &middot; ${w.avgProt}<span style="font-size:10px;color:var(--text-3);">g P</span></div>
          <div style="font-size:11px;color:${tg.protein_target_g ? (w.protHit >= Math.ceil(w.daysLogged * 0.7) ? 'var(--green)' : 'var(--text-3)') : 'var(--text-3)'};">${tg.protein_target_g ? ('protein hit ' + w.protHit + '/' + w.daysLogged) : 'set a protein target'}</div></div>
        </div>`).join('') : `<div style="color:var(--text-muted);font-size:.85rem;">Not enough logged days yet.</div>`}

    `;
    document.querySelectorAll('.tMacro').forEach(b => b.addEventListener('click', () => { macro = b.getAttribute('data-m'); paint(); }));
  };

  body.innerHTML = `<div id="trendBody"></div>`;

// === Progress: shared time-range helpers ===
const PROG_RANGES = [
  { d: 7,  label: '7d' },
  { d: 30, label: '30d' },
  { d: 90, label: '90d' },
  { d: 0,  label: 'All' },
];
function getProgRange() {
  const hash = location.hash || '';
  const q = hash.indexOf('?');
  if (q < 0) return 30;
  const params = new URLSearchParams(hash.slice(q + 1));
  const r = params.get('range');
  if (r == null) return 30;
  const n = parseInt(r, 10);
  return Number.isFinite(n) ? n : 90;
}
function setProgRange(days) {
  const cur = location.hash || '#/progress';
  const q = cur.indexOf('?');
  const base = q >= 0 ? cur.slice(0, q) : cur;
  location.hash = `${base}?range=${days}`;
}
function rangePillsHtml(active) {
  const pills = PROG_RANGES.map(r => {
    const is = r.d === active;
    const bg = is ? 'var(--text)' : 'transparent';
    const fg = is ? 'var(--bg)' : 'var(--text-secondary)';
    return `<button data-range="${r.d}" class="rng-pill" style="background:${bg};color:${fg};border:0;padding:.5rem 0;border-radius:999px;font-size:.78rem;font-weight:700;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent;white-space:nowrap;transition:background .18s,color .18s;">${r.label}</button>`;
  }).join('');
  return `<div class="rng-bar" style="display:flex;gap:.25rem;padding:.25rem;margin:.25rem 0 .9rem;background:var(--bg-card);border:1px solid var(--border);border-radius:999px;">${pills}</div>`;
}
function wireRangePills(scope) {
  const root = scope || document;
  root.querySelectorAll('.rng-pill').forEach(b => {
    b.addEventListener('click', () => setProgRange(Number(b.dataset.range)));
  });
}
function withinRangeDays(date, days) {
  if (!days) return true;
  const d = (date instanceof Date) ? date : new Date(date);
  if (Number.isNaN(d.getTime())) return false;
  const cutoff = Date.now() - days * 86400000;
  return d.getTime() >= cutoff;
}

async function progressVolumeView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div class="card">Loading…</div>`;
  const sets = await qAllSetLogs();
  const rangeDays = getProgRange();
  const pills = rangePillsHtml(rangeDays);

  if (sets.length === 0) {
    body.innerHTML = `${pills}<div class="card" style="color:var(--text-muted);">No logged sets yet.</div>`;
    wireRangePills(body);
    return;
  }

  // Per-day rollup: total volume + dominant split for the day
  // sets is rows from set_logs joined with sessions (session_date, slot)
  const byDay = new Map(); // ISO date -> { volume, slotVolume:Map }
  for (const sx of sets) {
    if (!sx.weight_lbs || !sx.reps) continue;
    const date = sx.sessions?.session_date; if (!date) continue;
    const v = Number(sx.weight_lbs) * Number(sx.reps);
    if (!byDay.has(date)) byDay.set(date, { volume: 0, slotVolume: new Map() });
    const cell = byDay.get(date);
    cell.volume += v;
    const slot = sx.sessions?.slot_type || 'custom';
    cell.slotVolume.set(slot, (cell.slotVolume.get(slot) || 0) + v);
  }

  // Range filter on days
  const today = new Date();
  const today0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const cutoff = rangeDays ? new Date(today0.getTime() - (rangeDays - 1) * 86400000) : null;

  // Stats
  let total = 0, totalInRange = 0, daysTrained = 0;
  let maxDay = 0;
  const dominantSlotOfDay = (cell) => {
    let best = null, bestV = -1;
    for (const [slot, vol] of cell.slotVolume) {
      if (vol > bestV) { best = slot; bestV = vol; }
    }
    return best || 'custom';
  };
  for (const [dateISO, cell] of byDay) {
    total += cell.volume;
    const d = new Date(dateISO + 'T00:00:00');
    if (!cutoff || d >= cutoff) {
      totalInRange += cell.volume;
      daysTrained++;
      if (cell.volume > maxDay) maxDay = cell.volume;
    }
  }

  // Slot colors (match existing PR view scheme)
  const slotColor = {
    push:'#fca5a5', upper:'#fca5a5',
    pull:'#93c5fd',
    legs:'#fcd34d', lower:'#fcd34d',
    full:'#c4b5fd',
    cardio:'#6ee7b7',
    core:'#67e8f9', abs:'#67e8f9',
    stretching:'#fda4af',
    custom:'#10b981',
    rest:'#52525b',
  };

  // Build calendar months: from earliest visible day to today
  const startDate = cutoff ? new Date(cutoff) : (() => {
    let earliest = today0;
    for (const dateISO of byDay.keys()) {
      const d = new Date(dateISO + 'T00:00:00');
      if (d < earliest) earliest = d;
    }
    return earliest;
  })();
  // 30d (default) → show only the current month.
  // Larger ranges → expand back to the month that contains the cutoff date.
  let monthCount;
  if (!rangeDays || rangeDays <= 31) {
    monthCount = 1;
  } else if (cutoff) {
    const span = (today0.getFullYear() - cutoff.getFullYear()) * 12 + (today0.getMonth() - cutoff.getMonth()) + 1;
    monthCount = Math.max(1, Math.min(span, 24)); // cap at 24 months for performance
  } else {
    // "All" range — span from earliest logged day to today
    let earliest = today0;
    for (const dateISO of byDay.keys()) {
      const d = new Date(dateISO + 'T00:00:00');
      if (d < earliest) earliest = d;
    }
    const span = (today0.getFullYear() - earliest.getFullYear()) * 12 + (today0.getMonth() - earliest.getMonth()) + 1;
    monthCount = Math.max(1, Math.min(span, 24));
  }
  const months = [];
  for (let i = monthCount - 1; i >= 0; i--) {
    months.push(new Date(today0.getFullYear(), today0.getMonth() - i, 1));
  }

  const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const calendarHtml = months.map(monthStart => {
    const y = monthStart.getFullYear(), m = monthStart.getMonth();
    const firstDow = new Date(y, m, 1).getDay(); // 0 = Sun
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(`<div class="cal-cell cal-blank"></div>`);
    for (let day = 1; day <= daysInMonth; day++) {
      const dateObj = new Date(y, m, day);
      const iso = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const cell = byDay.get(iso);
      const inRange = (!cutoff || dateObj >= cutoff) && dateObj <= today0;
      let bg = 'rgba(63,63,70,.25)';
      let opacity = 1;
      let title = `${MONTHS_LONG[m]} ${day}`;
      let aria = title + ': no workout';
      if (cell && inRange) {
        const slot = dominantSlotOfDay(cell);
        const color = slotColor[slot] || slotColor.custom;
        const intensity = maxDay > 0 ? Math.min(1, cell.volume / maxDay) : 1;
        // Map intensity 0..1 to alpha 0.25..1
        const alpha = 0.25 + intensity * 0.75;
        bg = color;
        opacity = alpha;
        title = `${MONTHS_LONG[m]} ${day} · ${fmtWt(cell.volume)} lbs · ${SLOT_LABEL[slot] || slot}`;
        aria = title;
      } else if (!inRange) {
        bg = 'transparent';
        opacity = 0.4;
      }
      const isToday = (dateObj.getTime() === today0.getTime());
      const ring = isToday ? 'box-shadow:inset 0 0 0 1.5px var(--text);' : '';
      cells.push(`<div class="cal-cell" data-tip="${esc(title)}" role="img" aria-label="${esc(aria)}" style="background:${bg};opacity:${opacity};${ring}"></div>`);
    }
    return `<div class="cal-month">
      <div class="cal-month-label">${MONTHS_LONG[m]} ${y}</div>
      <div class="cal-grid">
        <div class="cal-dow">S</div><div class="cal-dow">M</div><div class="cal-dow">T</div><div class="cal-dow">W</div><div class="cal-dow">T</div><div class="cal-dow">F</div><div class="cal-dow">S</div>
        ${cells.join('')}
      </div>
    </div>`;
  }).join('');

  // Slot legend (only show slots that actually appear in range)
  const slotsUsed = new Set();
  for (const [dateISO, cell] of byDay) {
    const d = new Date(dateISO + 'T00:00:00');
    if (cutoff && d < cutoff) continue;
    slotsUsed.add(dominantSlotOfDay(cell));
  }
  const legend = [...slotsUsed].sort().map(slot => `
    <span style="display:inline-flex;align-items:center;gap:.375rem;font-size:.7rem;color:var(--text-secondary);">
      <span style="width:.75rem;height:.75rem;border-radius:.25rem;background:${slotColor[slot] || slotColor.custom};"></span>${SLOT_LABEL[slot] || slot}
    </span>`).join('');

  const rangeLabel = (PROG_RANGES.find(r => r.d === rangeDays) || {}).label || `${rangeDays}d`;
  const blockCard = (label, value, sub, bg, fg) => `
    <div style="background:${bg};color:${fg};border-radius:20px;padding:.95rem 1rem;display:flex;flex-direction:column;justify-content:space-between;min-height:108px;">
      <div style="font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;opacity:.78;">${label}</div>
      <div style="font-variant-numeric:tabular-nums;margin-top:.4rem;">
        <span style="font-size:1.55rem;font-weight:800;letter-spacing:-0.025em;line-height:1;">${value}</span>
        ${sub ? `<span style="font-size:.78rem;font-weight:600;margin-left:.22rem;opacity:.8;">${sub}</span>` : ''}
      </div>
    </div>`;

  body.innerHTML = `
    ${pills}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.85rem;">
      ${blockCard('Volume · ' + rangeLabel, fmtWt(totalInRange), 'lbs', '#C4B5FD', '#0A0A0C')}
      ${blockCard('Days trained',                String(daysTrained),    '',    '#86EFAC', '#0A0A0C')}
      ${blockCard('Best day',                    maxDay ? fmtWt(maxDay) : '—', maxDay ? 'lbs' : '', '#FDBA74', '#0A0A0C')}
      ${blockCard('All-time',                    fmtWt(total),           'lbs', '#5EEAD4', '#0A0A0C')}
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;flex-wrap:wrap;gap:.5rem;">
        <div class="section-label" style="margin:0;">Calendar · color = split, shade = volume</div>
        <div style="display:flex;gap:.625rem;flex-wrap:wrap;">${legend}</div>
      </div>
      <div id="cal-stack" style="display:flex;flex-direction:column;gap:1.25rem;">${calendarHtml}</div>
      <div id="cal-tip" style="margin-top:.625rem;font-size:.75rem;color:var(--text-muted);min-height:1rem;">Tap a day for details.</div>
    </div>`;

  wireRangePills(body);

  // Tooltip wiring (single line below the calendar)
  const tipEl = document.getElementById('cal-tip');
  body.querySelectorAll('.cal-cell').forEach(c => {
    if (!c.dataset.tip) return;
    const setTip = () => { if (tipEl) tipEl.textContent = c.dataset.tip; };
    c.addEventListener('mouseenter', setTip);
    c.addEventListener('click', setTip);
    c.addEventListener('touchstart', setTip, { passive: true });
  });
}

      <div id="bwMsg" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>

  wireRangePills(body);

  $('bwSave').addEventListener('click', async () => {
    const v = Number($('bwIn').value);
    if (!v) { toast('Enter a weight.', 'error'); return; }
    const dateStr = $('bwDate')?.value || todayISO;

      await qSaveBodyWeight({ weight_lbs: v, source: 'manual', recorded_at });

      console.error(e); toast(e.message || 'Save failed', 'error');
      $('bwSave').disabled = false; $('bwSave').textContent = 'Add';
    }
  });
  $('bwIn').addEventListener('keydown', e => { if (e.key === 'Enter') $('bwSave').click(); });
  document.querySelectorAll('.bw-del').forEach(el => el.addEventListener('click', async () => {
    if (!(await appConfirm({ title: 'Delete this entry?', confirmLabel: 'Delete', danger: true }))) return;

    catch (e) { console.error(e); toast('Delete failed', 'error'); }
  }));
  const bwAH = $('bwAH');
  if (bwAH) {
    bwAH.addEventListener('click', async () => {
      const msg = $('bwMsg');
      bwAH.disabled = true;
      const orig = bwAH.innerHTML;
      bwAH.textContent = 'Syncing from Apple Health…';
      msg.textContent = 'Asking iOS for permission… (first time only)';
      const r = await syncWeightFromAppleHealth(365);

      if (r.error) { msg.textContent = '✗ ' + r.error; toast(r.error, 'error'); return; }
      if (r.added === 0) {
        msg.textContent = r.skipped ? `Up to date — ${r.skipped} samples already on file.` : 'No weight entries found in Apple Health.';
      } else {
        msg.textContent = `✓ Added ${r.added} new ${r.added === 1 ? 'entry' : 'entries'} from Apple Health.`;
        toast(`Imported ${r.added} from Apple Health.`);
        renderProgress();
      }
    });
  }
  if (btSupported) {
    $('bwBT').addEventListener('click', async () => {
      const msg = $('bwMsg');
      msg.textContent = 'Pick your scale, then step on it…';
      try {
        const r = await bluetoothReadWeight();
        msg.textContent = `Read ${r.weight_lbs} lbs from scale, saving…`;
        await qSaveBodyWeight({ weight_lbs: r.weight_lbs, source: 'bluetooth' });
        toast('Saved from scale.');
        renderProgress();
      } catch (e) {
        console.error(e); msg.textContent = e.message || 'Bluetooth read failed.';
      }
    });
  }
}


async function progressPhotosView() {
  const body = document.getElementById('prog-body'); if (!body) return;
  body.innerHTML = `<div class="card">Loading…</div>`;
  const photos = await qPhotos();
  const urls = await Promise.all(photos.map(p => qPhotoSignedUrl(p.storage_path)));
  photos.forEach((p, i) => p._url = urls[i]);

  // Normalize legacy angle values just in case
  photos.forEach(p => { if (p.angle === 'side_left' || p.angle === 'side_right') p.angle = 'side'; });

  const ANGLE_LABEL = { front: 'Head-on', side: 'Side profile' };
  const ANGLES = ['front', 'side'];

  const todayISO = localDateISO();
  let selectedAngle = 'front';
  let selectedDate = todayISO;
  let dateLockedByExif = false;

  let pickedFile = null;
  let bodyWeightsCache = null;
  let cmpFromKey = null;  // 'YYYY-MM'
  let cmpToKey = null;    // 'YYYY-MM'

  // Pinch + pan zoom for any image inside a container. Double-tap to reset.
  const makeZoomable = (container) => {
    const img = container.querySelector('img');
    if (!img) return;
    let scale = 1, tx = 0, ty = 0;
    let startScale = 1, startTx = 0, startTy = 0;
    let startD = 0, midX = 0, midY = 0;
    let lastTap = 0;
    const apply = () => { img.style.transform = `translate3d(${tx}px,${ty}px,0) scale(${scale})`; };
    const reset = () => { scale = 1; tx = 0; ty = 0; img.style.transition = 'transform .2s ease'; apply(); };
    img.style.transformOrigin = 'center center';
    img.style.willChange = 'transform';
    img.style.touchAction = 'none';
    container.style.touchAction = 'none';
    container.addEventListener('touchstart', (e) => {
      img.style.transition = 'none';
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        startD = Math.hypot(dx, dy);
        startScale = scale;
      } else if (e.touches.length === 1) {
        startTx = tx; startTy = ty;
        midX = e.touches[0].clientX; midY = e.touches[0].clientY;
        // Double-tap to reset
        const now = Date.now();
        if (now - lastTap < 300) reset();
        lastTap = now;
      }
    }, { passive: false });
    container.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && startD) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const d = Math.hypot(dx, dy);
        scale = Math.max(1, Math.min(5, startScale * (d / startD)));
        apply();
      } else if (e.touches.length === 1 && scale > 1.02) {
        e.preventDefault();
        tx = startTx + (e.touches[0].clientX - midX);
        ty = startTy + (e.touches[0].clientY - midY);
        apply();
      }
    }, { passive: false });
    container.addEventListener('touchend', () => {
      img.style.transition = 'transform .15s ease';
      if (scale < 1.05) reset();
    });
    // Desktop: scroll wheel zoom
    container.addEventListener('wheel', (e) => {
      e.preventDefault();
      img.style.transition = 'none';
      const delta = -e.deltaY * 0.005;
      scale = Math.max(1, Math.min(5, scale + delta));
      if (scale <= 1) { tx = 0; ty = 0; }
      apply();
    }, { passive: false });
  };

  // Fullscreen lightbox for any progress photo (or two side-by-side)
  const photoLightbox = (photos) => {
    const list = Array.isArray(photos) ? photos.filter(Boolean) : [photos].filter(Boolean);
    if (!list.length) return;
    let idx = 0;
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;padding:calc(.5rem + var(--safe-top)) .25rem calc(.5rem + var(--safe-bottom));';
    const close = () => { overlay.remove(); document.removeEventListener('keydown', onKey); window.removeEventListener('orientationchange', onRot); window.removeEventListener('resize', onRot); };
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    const onRot = () => { renderInner(); };
    document.addEventListener('keydown', onKey);
    window.addEventListener('orientationchange', onRot);
    window.addEventListener('resize', onRot);

    const renderInner = () => {
      const cap = (p) => `${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}`;
      const isLandscape = window.innerWidth > window.innerHeight;
      if (list.length >= 2) {
        // Side-by-side, full width, captions overlaid bottom-left so they don't shrink images
        overlay.innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.25rem;width:100%;max-width:1400px;flex:1;min-height:0;">
            ${list.slice(0, 2).map((p, i) => `
              <div class="lbZoom" style="position:relative;overflow:hidden;background:#0a0a0a;border-radius:.5rem;display:flex;align-items:center;justify-content:center;min-height:0;">
                ${p._url ? `<img src="${esc(p._url)}" style="max-width:100%;max-height:100%;object-fit:contain;"/>` : '<div style="color:#71717a;font-size:.875rem;">no preview</div>'}
                <div style="position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.7);color:#fafafa;font-size:.7rem;padding:3px 8px;border-radius:4px;font-weight:600;pointer-events:none;">${cap(p)}</div>
              </div>`).join('')}
          </div>
          <button class="lbClose" style="background:rgba(255,255,255,.15);color:#fafafa;border:0;border-radius:999px;padding:.5rem 1.25rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-size:.875rem;">Close</button>
          <div style="color:#71717a;font-size:.6875rem;text-align:center;">Pinch to zoom · double-tap to reset</div>`;
      } else {
        const p = list[idx];
        overlay.innerHTML = `
          <div class="lbZoom" style="position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;flex:1;min-height:0;">
            ${p._url ? `<img src="${esc(p._url)}" style="max-width:100%;max-height:100%;object-fit:contain;"/>` : '<div style="color:#71717a;font-size:.875rem;">no preview</div>'}
            <div style="position:absolute;left:8px;bottom:8px;background:rgba(0,0,0,.7);color:#fafafa;font-size:.75rem;padding:4px 10px;border-radius:6px;font-weight:600;pointer-events:none;">${cap(p)}${list.length>1?` · ${idx+1} / ${list.length}`:''}</div>
          </div>
          <div style="display:flex;gap:.5rem;">
            ${list.length>1 ? `<button class="lbPrev" style="background:rgba(255,255,255,.15);color:#fafafa;border:0;border-radius:999px;padding:.5rem 1rem;font-weight:600;cursor:pointer;">Prev</button>
            <button class="lbNext" style="background:rgba(255,255,255,.15);color:#fafafa;border:0;border-radius:999px;padding:.5rem 1rem;font-weight:600;cursor:pointer;">Next</button>` : ''}
            <button class="lbClose" style="background:rgba(255,255,255,.15);color:#fafafa;border:0;border-radius:999px;padding:.5rem 1.25rem;font-weight:600;cursor:pointer;font-size:.875rem;">Close</button>
          </div>
          <div style="color:#71717a;font-size:.6875rem;text-align:center;">Pinch to zoom · double-tap to reset · ${isLandscape ? 'landscape' : 'rotate phone for larger view'}</div>`;
      }
      overlay.querySelector('.lbClose').onclick = close;
      const prev = overlay.querySelector('.lbPrev'); if (prev) prev.onclick = () => { idx = (idx - 1 + list.length) % list.length; renderInner(); };
      const next = overlay.querySelector('.lbNext'); if (next) next.onclick = () => { idx = (idx + 1) % list.length; renderInner(); };
      // Make every image zoomable
      overlay.querySelectorAll('.lbZoom').forEach(c => makeZoomable(c));
    };
    renderInner();
    document.body.appendChild(overlay);
  };

  // Look up the closest body_weights entry to `dateStr` (YYYY-MM-DD).
  // Picks the entry with the smallest absolute day difference, max 7 days apart.
  const findWeightForDate = async (dateStr) => {
    if (!dateStr) return null;
    if (!bodyWeightsCache) bodyWeightsCache = await qBodyWeights();
    const target = new Date(dateStr + 'T12:00:00').getTime();
    let best = null, bestDelta = Infinity;
    for (const w of bodyWeightsCache) {
      const d = new Date(w.recorded_at).getTime();
      const delta = Math.abs(d - target);
      if (delta < bestDelta) { best = w; bestDelta = delta; }
    }
    if (best && bestDelta <= 7 * 86400000) return Number(best.weight_lbs);
    return null;
  };
  const tryAutoFillWeight = async (dateStr) => {
    const w = await findWeightForDate(dateStr);
    if (w == null) return;
    // Pre-fill the input if user hasn't typed anything yet
    const el = document.getElementById('phWt');
    if (el && !el.value) {
      el.value = String(w);
      const msg = document.getElementById('phMsg');
      if (msg) msg.textContent = `Pulled ${w} lbs from ${fmtDateShort(dateStr)} body weight log.`;
    }
  };
  // Default compare angle: pick the angle that already has >=2 photos; fall back to 'front'
  const angleCount = (a) => photos.filter(p => (p.angle||'front') === a).length;
  let cmpAngle = (angleCount('front') >= 2) ? 'front' : (angleCount('side') >= 2 ? 'side' : 'front');

  const dateOf = (p) => (typeof p.taken_at === 'string' ? p.taken_at.slice(0,10) : new Date(p.taken_at).toISOString().slice(0,10));

  const existingForUpload = () => {
    const d = new Date(selectedDate + 'T12:00:00');
    const ym = d.getFullYear() * 100 + d.getMonth();
    return photos.find(p => {
      const pd = new Date(p.taken_at);
      return (pd.getFullYear() * 100 + pd.getMonth()) === ym && (p.angle || 'front') === selectedAngle;
    });
  };

  const angleBtn = (a, label) => `<button data-angle="${a}" class="ph-angle ${selectedAngle===a?'active':''}" type="button" style="flex:1;padding:.625rem;background:${selectedAngle===a?'var(--accent)':'var(--bg-elevated)'};color:${selectedAngle===a?'#000':'var(--text)'};border:1px solid ${selectedAngle===a?'var(--accent)':'var(--border)'};border-radius:.5rem;font-weight:600;font-size:.875rem;cursor:pointer;">${label}</button>`;

  const renderUploadCard = () => {
    const existing = existingForUpload();
    return `
    <div class="card" style="margin-bottom:1rem;">
      <div class="section-label" style="margin-bottom:.5rem;">Add a progress photo</div>
      <div style="font-size:.8125rem;color:var(--text-secondary);line-height:1.5;margin-bottom:.75rem;">
        Up to 2 per month: one head-on and one side profile. Date is auto-detected from the photo's EXIF data when available.
      </div>

      <label class="label">Angle</label>
      <div style="display:flex;gap:.5rem;margin-bottom:.625rem;">
        ${angleBtn('front', 'Head-on')}
        ${angleBtn('side', 'Side profile')}
      </div>

      <label class="label">Photo</label>
      ${IS_NATIVE
        ? `<div style="display:flex;gap:.5rem;margin-bottom:.625rem;">
            <button id="phPick" type="button" class="btn btn-ghost" style="flex:1;">${pickedFile ? '✓ Photo selected — tap to replace' : 'Choose photo'}</button>
          </div>`
        : `<input id="phFile" type="file" accept="image/*" class="input" style="padding:.5rem;margin-bottom:.625rem;" />`
      }

      <label class="label">Date taken ${dateLockedByExif ? '<span style="color:var(--accent);font-weight:500;">· auto-detected from photo</span>' : ''}</label>
      <input id="phDate" type="date" class="input" value="${selectedDate}" max="${todayISO}" style="margin-bottom:.625rem;" />

      <div class="form-grid cols-2-on-desktop" style="gap:.5rem;">
        <div>
          <label class="label">Weight (lbs)</label>
          <input id="phWt" type="number" inputmode="decimal" step="0.1" min="50" max="800" class="input" placeholder="optional" />
        </div>
        <div>
          <label class="label">Notes</label>
          <input id="phNotes" class="input" placeholder="optional" />
        </div>
      </div>

      ${existing ? `<div style="font-size:.75rem;color:var(--text-secondary);margin-top:.625rem;padding:.5rem .625rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:.5rem;">You already have a <strong>${ANGLE_LABEL[selectedAngle]}</strong> photo for ${new Date(selectedDate+'T12:00:00').toLocaleString(undefined,{month:'long',year:'numeric'})}. Uploading will replace it.</div>` : ''}

      <button id="phUp" class="btn btn-primary" style="margin-top:.75rem;width:100%;">Upload</button>
      <div id="phMsg" style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;"></div>
    </div>`;
  };

  const renderCompareFilter = () => `
    <select id="cmpAngleFilter" class="input" style="font-size:.75rem;padding:.375rem .5rem;width:auto;">
      <option value="front" ${cmpAngle==='front'?'selected':''}>Head-on</option>
      <option value="side"  ${cmpAngle==='side'?'selected':''}>Side profile</option>
    </select>`;

  // Pick the most recent photo of `angle` in month `key` (YYYY-MM)
  const photoForMonth = (key, angle) => {
    if (!key) return null;
    const inMonth = photos
      .filter(p => (p.angle||'front') === angle && dateOf(p).slice(0,7) === key);
    if (!inMonth.length) return null;
    // pick the latest by date
    inMonth.sort((a,b) => new Date(a.taken_at) - new Date(b.taken_at));
    return inMonth[inMonth.length - 1];
  };
  const fmtMonth = (key) => {
    const [y, m] = key.split('-').map(Number);
    return new Date(y, m - 1, 1).toLocaleString(undefined, { month: 'long', year: 'numeric' });
  };

  const renderCompare = () => {
    const filtered = photos.filter(p => (p.angle||'front') === cmpAngle);
    const monthKeys = [...new Set(filtered.map(p => dateOf(p).slice(0,7)))].sort();
    if (monthKeys.length < 2) {
      return `<div class="card" style="margin-bottom:1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;flex-wrap:wrap;gap:.5rem;">
          <div class="section-label" style="margin:0;">Compare</div>
          ${renderCompareFilter()}
        </div>
        <div style="font-size:.875rem;color:var(--text-muted);">Need ${ANGLE_LABEL[cmpAngle]} photos from at least 2 different months to compare.</div>
      </div>`;
    }
    // Default selection: first and last month with this angle
    if (!cmpFromKey || !monthKeys.includes(cmpFromKey)) cmpFromKey = monthKeys[0];
    if (!cmpToKey || !monthKeys.includes(cmpToKey) || cmpToKey === cmpFromKey) {
      cmpToKey = monthKeys[monthKeys.length - 1];
      if (cmpToKey === cmpFromKey && monthKeys.length > 1) cmpToKey = monthKeys[monthKeys.length - 2];
    }
    const optsFor = (selected, excludeKey) => monthKeys.map(k => {
      const disabled = (excludeKey && k === excludeKey) ? 'disabled' : '';
      const sel = k === selected ? 'selected' : '';
      return `<option value="${k}" ${disabled} ${sel}>${fmtMonth(k)}</option>`;
    }).join('');

    return `<div class="card" style="margin-bottom:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;flex-wrap:wrap;gap:.5rem;">
        <div class="section-label" style="margin:0;">Compare</div>
        ${renderCompareFilter()}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;align-items:start;">
        <div>
          <select id="cmpMonthFrom" class="input" style="font-size:.875rem;">${optsFor(cmpFromKey, cmpToKey)}</select>
          <div id="cmp-left" data-side="left" style="margin-top:.5rem;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;position:relative;"></div>
          <div id="cmpCapLeft" style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem;text-align:center;"></div>
        </div>
        <div>
          <select id="cmpMonthTo" class="input" style="font-size:.875rem;">${optsFor(cmpToKey, cmpFromKey)}</select>
          <div id="cmp-right" data-side="right" style="margin-top:.5rem;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;position:relative;"></div>
          <div id="cmpCapRight" style="font-size:.7rem;color:var(--text-muted);margin-top:.25rem;text-align:center;"></div>
        </div>
      </div>
      <button id="cmpFullscreen" class="btn btn-ghost" style="width:100%;margin-top:.625rem;font-size:.8125rem;">Open side-by-side full screen</button>
      <div style="font-size:.7rem;color:var(--text-muted);margin-top:.375rem;text-align:center;">Each side shows the most recent ${ANGLE_LABEL[cmpAngle]} photo of that month.</div>
    </div>`;
  };

  const renderGallery = () => {
    if (photos.length === 0) return `<div class="card" style="color:var(--text-muted);">No photos yet.</div>`;
    return `<div class="card">
      <div class="section-label" style="margin-bottom:.625rem;">All photos</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.5rem;">
        ${photos.slice().reverse().map(p => `
          <div class="ph-cell" data-photo-id="${esc(p.id)}" style="position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent;">
            ${p._url ? `<img src="${esc(p._url)}" alt="" loading="lazy" style="width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:var(--radius-sm);background:var(--bg);" />` : `<div style="width:100%;aspect-ratio:3/4;background:var(--bg);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.75rem;">no preview</div>`}
            <div style="position:absolute;left:6px;top:6px;background:rgba(0,0,0,.7);color:#fafafa;font-size:.6rem;padding:2px 6px;border-radius:4px;font-weight:600;pointer-events:none;">${ANGLE_LABEL[p.angle||'front']}</div>
            <div style="position:absolute;left:6px;bottom:6px;right:6px;background:rgba(0,0,0,.65);color:#fafafa;font-size:.625rem;padding:2px 6px;border-radius:4px;pointer-events:none;">${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}</div>
            <button data-id="${esc(p.id)}" data-path="${esc(p.storage_path)}" class="ph-del" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);color:#fafafa;border:0;border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:1rem;line-height:1;">&times;</button>
          </div>`).join('')}
      </div>
    </div>`;
  };

  const paintAll = () => {
    body.innerHTML = `${renderUploadCard()}${renderCompare()}${renderGallery()}`;
    wireUpload();
    wireCompare();
    wireGallery();
  };

  const paintSide = (side) => {
    const key = side === 'left' ? cmpFromKey : cmpToKey;
    const p = photoForMonth(key, cmpAngle);
    const slot = document.getElementById(`cmp-${side}`);
    const cap = document.getElementById(side === 'left' ? 'cmpCapLeft' : 'cmpCapRight');
    if (!slot) return;
    slot.dataset.photoId = p ? p.id : '';
    if (p && p._url) slot.innerHTML = `<img src="${esc(p._url)}" style="width:100%;height:100%;object-fit:cover;display:block;" />`;
    else slot.innerHTML = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.75rem;">no photo this month</div>`;
    if (cap) cap.textContent = p ? `${fmtDateShort(p.taken_at)}${p.weight_lbs?` · ${fmtWt(p.weight_lbs)} lbs`:''}` : '';
  };

  function wireUpload() {
    document.querySelectorAll('.ph-angle').forEach(el => el.addEventListener('click', () => {
      selectedAngle = el.dataset.angle;
      paintAll();
    }));

    const fileEl = document.getElementById('phFile');
    if (fileEl) fileEl.addEventListener('change', async () => {
      const f = fileEl.files?.[0];
      if (!f) return;
      pickedFile = f;
      const exifDate = await readExifDate(f);
      if (exifDate) { selectedDate = exifDate; dateLockedByExif = true; }
      else { dateLockedByExif = false; }
      paintAll();
      await tryAutoFillWeight(selectedDate);
    });

    const phPick = document.getElementById('phPick');
    if (phPick) phPick.addEventListener('click', async () => {
      try {
        const Cam = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Camera;
        if (!Cam) throw new Error('Camera plugin not available.');
        const photo = await Cam.getPhoto({
          quality: 85,
          source: 'PROMPT', // user picks camera or library
          resultType: 'dataUrl',
          allowEditing: false,
          saveToGallery: false,
          correctOrientation: true,
          promptLabelHeader: 'Add progress photo',
          promptLabelCancel: 'Cancel',
          promptLabelPhoto: 'From library',
          promptLabelPicture: 'Take photo',
        });
        if (!photo || !photo.dataUrl) return;
        pickedFile = fileFromDataUrl(photo.dataUrl, 'progress.' + (photo.format || 'jpg'));
        const exifDate = await readExifDate(pickedFile);
        if (exifDate) { selectedDate = exifDate; dateLockedByExif = true; }
        else { dateLockedByExif = false; }
        paintAll();
        await tryAutoFillWeight(selectedDate);
      } catch (e) {
        if (e && /cancel/i.test(String(e.message || e))) return;
        console.error('[photo picker] failed', e);
        toast(e.message || 'Photo picker failed', 'error');
      }
    });

    const dateEl = document.getElementById('phDate');
    if (dateEl) dateEl.addEventListener('change', async e => {
      selectedDate = e.target.value || todayISO;
      dateLockedByExif = false;
      paintAll();
      await tryAutoFillWeight(selectedDate);
    });

    const upBtn = document.getElementById('phUp');
    if (upBtn) upBtn.addEventListener('click', async () => {
      const inputEl = document.getElementById('phFile');
      const file = pickedFile || (inputEl && inputEl.files && inputEl.files[0]) || null;
      if (!file) { toast('Pick a photo first.', 'error'); return; }
      if (file.size > 10 * 1024 * 1024) { toast('Photo too large (10MB max).', 'error'); return; }
      const wt = Number(document.getElementById('phWt').value) || null;
      const notes = document.getElementById('phNotes').value || null;
      upBtn.disabled = true; upBtn.textContent = 'Uploading…';
      try {
        const existing = existingForUpload();
        if (existing) await qDeletePhoto(existing);
        const taken_at = new Date(selectedDate + 'T12:00:00').toISOString();
        await qUploadPhoto(file, { weight_lbs: wt, notes, taken_at, angle: selectedAngle });
        toast('Photo saved.');
        renderProgress();
      } catch (e) {
        console.error(e);
        const msgEl = document.getElementById('phMsg');
        if (msgEl) msgEl.textContent = '✗ ' + (e.message || 'Upload failed');
        toast(e.message || 'Upload failed', 'error');
        upBtn.disabled = false; upBtn.textContent = 'Upload';
      }
    });
  }

  function wireCompare() {
    const filter = document.getElementById('cmpAngleFilter');
    if (filter) filter.addEventListener('change', e => { cmpAngle = e.target.value; cmpFromKey = null; cmpToKey = null; paintAll(); });

    const fromSel = document.getElementById('cmpMonthFrom');
    const toSel = document.getElementById('cmpMonthTo');
    if (!fromSel || !toSel) return;

    paintSide('left'); paintSide('right');

    fromSel.addEventListener('change', () => {
      cmpFromKey = fromSel.value;
      if (cmpFromKey === cmpToKey) {
        // shift To to the next available month
        const months = [...toSel.options].map(o => o.value).filter(v => v !== cmpFromKey);
        if (months.length) cmpToKey = months[months.length - 1];
      }
      paintAll();
    });
    toSel.addEventListener('change', () => {
      cmpToKey = toSel.value;
      paintAll();
    });

    // Tap either side to view that photo fullscreen
    ['left','right'].forEach(side => {
      const slot = document.getElementById('cmp-' + side);
      if (!slot) return;
      slot.addEventListener('click', () => {
        const id = slot.dataset.photoId;
        const p = photos.find(x => x.id === id);
        if (p) photoLightbox(p);
      });
    });

    // Full side-by-side fullscreen viewer
    const fsBtn = document.getElementById('cmpFullscreen');
    if (fsBtn) fsBtn.addEventListener('click', () => {
      const a = photoForMonth(cmpFromKey, cmpAngle);
      const b = photoForMonth(cmpToKey, cmpAngle);
      if (a && b) photoLightbox([a, b]);
      else if (a || b) photoLightbox(a || b);
    });
  }

  function wireGallery() {
    document.querySelectorAll('.ph-del').forEach(el => el.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!(await appConfirm({ title: 'Delete this photo?', confirmLabel: 'Delete', danger: true }))) return;
      try {
        await qDeletePhoto({ id: el.dataset.id, storage_path: el.dataset.path });
        renderProgress();
      } catch (e) { console.error(e); toast('Delete failed', 'error'); }
    }));
    document.querySelectorAll('.ph-cell').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.photoId;
      const p = photos.find(x => x.id === id);
      if (p) photoLightbox(p);
    }));
  }

  paintAll();
}

5. Frequency: 2x/week per body part minimum. Better than 1x even at same total volume.

// ---- Fetch user workout data from Supabase for context ----
async function getChatUserContext() {
  if (!sb || !state.session) return '';
  try {
    const [profileData, historyData, planData] = await Promise.all([
      sb.from('profiles').select('*').maybeSingle(),
      sb.from('sessions').select('*, set_logs(*)').neq('is_draft', true)
        .order('session_date', { ascending: false }).limit(30),
      qActivePlan(),
    ]);

    let ctx = '\n\nUSER DATA:\n';

    // Profile
    const p = profileData?.data;
    if (p) {
      ctx += `Profile: name="${p.display_name || 'Unknown'}", goal="${p.goal || 'not set'}", experience="${p.experience || 'not set'}"`;
      if (p.weight_lbs) ctx += `, weight=${p.weight_lbs}lbs`;
      if (p.height_in) ctx += `, height=${Math.floor(p.height_in/12)}'${p.height_in%12}"`;
      ctx += '\n';
    }

    // Active plan
    if (planData) {
      ctx += `Active plan: "${planData.name}" (${planData.split_type})\n`;
      if (planData.days) {
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        ctx += 'Weekly schedule: ' + planData.days.map((d,i) => `${dayNames[i]}=${d.slot_type}`).join(', ') + '\n';
      }
      if (planData.exercises?.length) {
        const bySlot = {};
        planData.exercises.forEach(e => {
          if (!bySlot[e.slot_type]) bySlot[e.slot_type] = [];
          bySlot[e.slot_type].push(`${e.exercise_name} ${e.target_sets}x${e.target_reps}`);
        });
        Object.entries(bySlot).forEach(([slot, exs]) => {
          ctx += `  ${slot}: ${exs.join(', ')}\n`;
        });
      }
    }

    // Recent workout history (last 30 sessions)
    const sessions = historyData?.data || [];
    if (sessions.length > 0) {
      ctx += `\nRecent workouts (last ${sessions.length} sessions):\n`;

      // Summarize by muscle group frequency
      const slotCounts = {};
      const exerciseVolume = {};
      const recentPRs = {};
      let totalSessions = sessions.length;
      const firstDate = sessions[sessions.length - 1]?.session_date;
      const lastDate = sessions[0]?.session_date;

      sessions.forEach(s => {
        slotCounts[s.slot_type] = (slotCounts[s.slot_type] || 0) + 1;
        (s.set_logs || []).forEach(log => {
          const key = log.exercise_name;
          if (!exerciseVolume[key]) exerciseVolume[key] = { totalSets: 0, maxWeight: 0, lastWeight: 0, lastDate: '' };
          exerciseVolume[key].totalSets++;
          if (log.weight_lbs > exerciseVolume[key].maxWeight) {
            exerciseVolume[key].maxWeight = log.weight_lbs;
          }
          if (!exerciseVolume[key].lastDate || s.session_date > exerciseVolume[key].lastDate) {
            exerciseVolume[key].lastWeight = log.weight_lbs || 0;
            exerciseVolume[key].lastDate = s.session_date;
          }
        });
      });

      ctx += `Period: ${firstDate} to ${lastDate} (${totalSessions} workouts)\n`;
      ctx += `Split distribution: ${Object.entries(slotCounts).map(([k,v]) => `${k}=${v}`).join(', ')}\n`;

      // Top exercises by volume
      const topExercises = Object.entries(exerciseVolume)
        .sort((a,b) => b[1].totalSets - a[1].totalSets)
        .slice(0, 15);
      if (topExercises.length) {
        ctx += 'Top exercises:\n';
        topExercises.forEach(([name, v]) => {
          ctx += `  ${name}: ${v.totalSets} sets, max ${v.maxWeight}lbs, last ${v.lastWeight}lbs (${v.lastDate})\n`;
        });
      }

      // Check for potential gaps
      const allSlots = ['push','pull','legs','upper','lower','full'];
      const activeSlots = Object.keys(slotCounts);
      if (planData?.days) {
        const plannedSlots = [...new Set(planData.days.map(d => d.slot_type).filter(s => s !== 'rest'))];
        const missedSlots = plannedSlots.filter(s => !activeSlots.includes(s));
        if (missedSlots.length) {
          ctx += `WARNING: User has not logged any ${missedSlots.join(', ')} sessions in this period!\n`;
        }
      }
    } else {
      ctx += '\nNo workout history found yet. User is likely new.\n';
    }

    return ctx;
  } catch (e) {
    console.error('Error fetching chat context:', e);
    return '\n\n(Could not load user workout data)\n';
  }
}

// ---- Format assistant messages with basic markdown ----
function formatChatMsg(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>');
}

async function executeChatTool(name, args) {
  try {
    const today = localDateISO();
    if (name === 'log_food') {
      let row = {
        log_date: args.log_date || today,
        meal_slot: args.meal_slot || 'snack',
        food_name: args.food_name,
        brand: args.brand || null,
        serving_size_g: args.serving_size_g ?? null,
        servings: args.servings ?? 1,
        calories: args.calories ?? null,
        protein_g: args.protein_g ?? null,
        carbs_g: args.carbs_g ?? null,
        fat_g: args.fat_g ?? null,
        fiber_g: args.fiber_g ?? null,
        source: 'chat',
      };
      // Fallback: if model omitted all macros, look up via OpenFoodFacts so we never save an empty row.
      const allMacrosMissing = (row.calories == null) && (row.protein_g == null) && (row.carbs_g == null) && (row.fat_g == null);
      let off_used = false;
      if (allMacrosMissing && row.food_name) {
        try {
          const results = await searchFoodOFF(row.food_name, 1);
          if (results && results.length) {
            const r = results[0];
            row.calories = row.calories ?? r.calories ?? null;
            row.protein_g = row.protein_g ?? r.protein_g ?? null;
            row.carbs_g = row.carbs_g ?? r.carbs_g ?? null;
            row.fat_g = row.fat_g ?? r.fat_g ?? null;
            row.fiber_g = row.fiber_g ?? r.fiber_g ?? null;
            row.serving_size_g = row.serving_size_g ?? r.serving_size_g ?? null;
            row.brand = row.brand ?? r.brand ?? null;
            row.source = 'chat+openfoodfacts';
            off_used = true;
          }
        } catch {}
      }
      const saved = await qSaveFoodLog(row);
      try { await qBumpFavorite(row); } catch {}
      const summary = `Logged: ${row.food_name}${row.brand?` (${row.brand})`:''} · ${row.calories??'?'} kcal · P${row.protein_g??'?'}/C${row.carbs_g??'?'}/F${row.fat_g??'?'}` + (off_used ? ' [filled from OpenFoodFacts because model omitted macros]' : '');
      return { ok: true, summary, id: saved.id, off_used };
    }

    if (name === 'log_workout_set') {
      const date = args.session_date || today;
      const slot = args.slot_type || 'custom';
      let sessionId;
      const { data: existing } = await sb.from('sessions').select('id').eq('session_date', date).eq('slot_type', slot).maybeSingle();
      if (existing?.id) sessionId = existing.id;
      else {
        const { data, error } = await sb.from('sessions').insert({ user_id: state.session.user.id, session_date: date, slot_type: slot }).select().single();
        if (error) throw error;
        sessionId = data.id;
      }
      let setNum = args.set_number;
      if (!setNum) {
        const { data: prev } = await sb.from('set_logs').select('set_number').eq('session_id', sessionId).eq('exercise_name', args.exercise_name).order('set_number', { ascending: false }).limit(1);
        setNum = (prev?.[0]?.set_number || 0) + 1;
      }
      const { error } = await sb.from('set_logs').insert({
        session_id: sessionId,
        exercise_name: args.exercise_name,
        set_number: setNum,
        reps: args.reps,
        weight_lbs: args.weight_lbs,
      });
      if (error) throw error;
      return { ok: true, summary: `Logged ${args.exercise_name} set ${setNum}: ${args.weight_lbs} lbs × ${args.reps}` };
    }

    if (name === 'log_body_weight') {
      let recorded_at = args.recorded_at || null;
      if (recorded_at && recorded_at.length === 10) recorded_at = new Date(recorded_at + 'T12:00:00').toISOString();
      await qSaveBodyWeight({
        weight_lbs: args.weight_lbs,
        source: 'chat',
        notes: args.notes || null,
        recorded_at,
      });
      return { ok: true, summary: `Logged body weight: ${args.weight_lbs} lbs` };
    }

    if (name === 'log_cardio') {
      const date = args.session_date || today;
      const { data, error } = await sb.from('sessions').insert({
        user_id: state.session.user.id,
        session_date: date,
        slot_type: 'cardio',
        cardio_type: args.cardio_type || 'Cardio',
        cardio_duration_min: args.duration_min,
        notes: args.notes || null,
      }).select().single();
      if (error) throw error;
      return { ok: true, summary: `Logged cardio: ${args.cardio_type || 'Cardio'} · ${args.duration_min} min`, id: data.id };
    }

    return { ok: false, error: `Unknown tool: ${name}` };
  } catch (e) {
    return { ok: false, error: String(e?.message || e) };
  }
}

async function callGroqWithTools(messages, systemPrompt, maxIterations = 4) {
  const key = getChatKeys().groq;
  if (!key) throw new Error('NO_GROQ_KEY');

  let convo = [{ role: 'system', content: systemPrompt }, ...messages];

  for (let iter = 0; iter < maxIterations; iter++) {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: convo,
        tools: CHAT_TOOLS,
        tool_choice: 'auto',
        temperature: 0.5,
        max_tokens: 1024,
      })
    });
    if (res.status === 429) throw new Error('RATE_LIMITED');
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`GROQ_ERROR: ${res.status} ${errBody}`);
    }
    const data = await res.json();
    const msg = data.choices?.[0]?.message;
    if (!msg) return 'No response.';

    convo.push(msg);

    if (!msg.tool_calls || msg.tool_calls.length === 0) {
      return msg.content || '';
    }

    // Execute every tool call, feed results back
    for (const tc of msg.tool_calls) {
      let parsedArgs = {};
      try { parsedArgs = JSON.parse(tc.function.arguments || '{}'); } catch {}
      const toolResult = await executeChatTool(tc.function.name, parsedArgs);
      convo.push({
        role: 'tool',
        tool_call_id: tc.id,
        content: JSON.stringify(toolResult)
      });
    }
  }

  return 'I made several tool calls but couldn\'t finish summarizing — try again or ask more specifically.';
}

const voice2 = {
  vad: null,
  vadLoading: null,
  micStream: null,
  audioEl: null,
  ttsPlaying: false,
  recording: null,    // MediaRecorder while user is speaking
  recordChunks: [],
  speaking: false,    // VAD signal: user is currently speaking
  enabled: true,      // master switch
  ttsBlob: null,
  hfFailedAt: 0,      // remember if HF TTS errored recently
};

async function v2LoadVadLib() {
  if (window.vad && window.vad.MicVAD) return window.vad;
  if (voice2.vadLoading) return voice2.vadLoading;
  voice2.vadLoading = new Promise((res, rej) => {
    const a = document.createElement('script');
    a.src = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js';
    a.onload = () => {
      const b = document.createElement('script');
      b.src = 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.22/dist/bundle.min.js';
      b.onload = () => res(window.vad);
      b.onerror = () => rej(new Error('Failed to load VAD library'));
      document.head.appendChild(b);
    };
    a.onerror = () => rej(new Error('Failed to load ONNX runtime'));
    document.head.appendChild(a);
  });
  return voice2.vadLoading;
}

// HF Inference API TTS — tries higher-quality model first, falls back.
async function v2HfTtsSynthesize(text) {
  const key = (localStorage.getItem('HF_API_KEY') || (state.profile && state.profile.hf_api_key) || '').trim();
  if (!key) throw new Error('No HF token.');
  const models = [
    // model id, body builder
    { id: 'facebook/mms-tts-eng', body: () => ({ inputs: text }) },
    { id: 'microsoft/speecht5_tts', body: () => ({ inputs: text }) },
  ];
  let lastErr;
  for (const m of models) {
    try {
      const r = await fetch(`https://api-inference.huggingface.co/models/${m.id}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
        body: JSON.stringify(m.body()),
      });
      if (!r.ok) {
        const t = await r.text();
        // 503: model warming up — retry one model down
        if (r.status === 503) { lastErr = new Error('Model warming up (' + m.id + ')'); continue; }
        lastErr = new Error('HF ' + m.id + ' ' + r.status + ': ' + t.slice(0, 120));
        continue;
      }
      const blob = await r.blob();
      return blob;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('All TTS models failed.');
}

// Play a TTS blob through an audio element. Cancels any prior playback.
async function v2PlayBlob(blob) {
  v2StopTtsPlayback();
  const url = URL.createObjectURL(blob);
  const au = new Audio();
  au.src = url;
  au.preload = 'auto';
  voice2.audioEl = au;
  voice2.ttsPlaying = true;
  voice2.ttsBlob = blob;
  return new Promise((resolve) => {
    au.onended = () => { voice2.ttsPlaying = false; URL.revokeObjectURL(url); resolve(); };
    au.onerror = () => { voice2.ttsPlaying = false; URL.revokeObjectURL(url); resolve(); };
    au.play().catch(() => { voice2.ttsPlaying = false; resolve(); });
  });
}

function v2StopTtsPlayback() {
  voice2.ttsCancelled = true;
  voice2.ttsToken = (voice2.ttsToken || 0) + 1; // any in-flight loop will see a token mismatch and bail
  if (voice2.audioEl) { try { voice2.audioEl.pause(); voice2.audioEl.src = ''; } catch {} voice2.audioEl = null; }
  voice2.ttsPlaying = false;
}

// Whisper STT via Groq. Sends a WAV/WebM blob to /audio/transcriptions.
async function v2WhisperTranscribe(audioBlob) {
  const key = getGroqKey();
  if (!key) throw new Error('No Groq key for Whisper.');
  const form = new FormData();
  // Groq accepts webm/opus/wav/mp3 — MediaRecorder default on iOS is mp4/aac, on web is webm
  const ext = audioBlob.type.includes('mp4') ? 'mp4' : audioBlob.type.includes('webm') ? 'webm' : 'wav';
  form.append('file', new File([audioBlob], 'speech.' + ext, { type: audioBlob.type || 'audio/webm' }));
  form.append('model', 'whisper-large-v3-turbo');
  form.append('temperature', '0');
  form.append('response_format', 'json');
  const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + key },
    body: form,
  });
  if (!r.ok) { const t = await r.text(); throw new Error('Whisper ' + r.status + ': ' + t.slice(0, 200)); }
  const j = await r.json();
  return (j.text || '').trim();
}

// Try the upgraded TTS path; throw to caller to fall back to Web Speech.
// VAD-driven conversation loop. Uses Silero VAD to detect speech start/end,
// records audio chunks during speech, then transcribes via Groq Whisper and sends
// the result through handleChatSend so the rest of the chat pipeline runs normally.
async function v2StartConvoLoop() {
  if (voice2.vad) return; // already running
  try {
    const vadLib = await v2LoadVadLib();
    // Open mic with echo cancellation, noise suppression, auto gain — critical for
    // not picking up the AI's own playback or ambient noise as user speech.
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, channelCount: 1, sampleRate: 16000 },
    });
    voice2.micStream = stream;

    const vad = await vadLib.MicVAD.new({
      stream,
      // Calibrate sensitivity — higher = needs cleaner speech to trigger
      positiveSpeechThreshold: 0.6,
      negativeSpeechThreshold: 0.45,
      // Frames of silence before considering speech ended (~32ms each)
      redemptionFrames: 24, // ~770ms of silence
      // Minimum frames of speech to count as real (filters single noises)
      minSpeechFrames: 8,    // ~256ms
      onSpeechStart: () => {
        voice2.speaking = true;
        // Real speech detected — barge in on TTS if it's playing
        if (voice2.ttsPlaying) v2StopTtsPlayback();
        updateVoiceStatusBar();
      },
      onSpeechEnd: async (audioFloat32) => {
        voice2.speaking = false;
        updateVoiceStatusBar();
        // Convert Float32 PCM @ 16kHz to a WAV blob and send to Whisper
        try {
          const wav = float32ToWavBlob(audioFloat32, 16000);
          const text = await v2WhisperTranscribe(wav);
          if (text && text.length >= 2 && !looksLikeNoise(text)) {
            const input = document.getElementById('chatInput');
            if (input) {
              input.value = text;
              handleChatSend();
            }
          }
        } catch (e) {
          console.warn('[voice v2] whisper failed', e);
        }
      },
      onVADMisfire: () => {
        // VAD thought there was speech but it was too short — ignore
        voice2.speaking = false;
        updateVoiceStatusBar();
      },
    });
    voice2.vad = vad;
    vad.start();
    voiceState.listening = true;
    updateVoiceStatusBar();
  } catch (e) {
    console.error('[voice v2] convo loop init failed', e);
    voice2.vad = null;
    if (voice2.micStream) { try { voice2.micStream.getTracks().forEach(t => t.stop()); } catch {} voice2.micStream = null; }
    throw e;
  }
}

function v2StopConvoLoop() {
  if (voice2.vad) { try { voice2.vad.pause(); voice2.vad.destroy && voice2.vad.destroy(); } catch {} voice2.vad = null; }
  if (voice2.micStream) { try { voice2.micStream.getTracks().forEach(t => t.stop()); } catch {} voice2.micStream = null; }
  voice2.speaking = false;
  voiceState.listening = false;
  updateVoiceStatusBar();
}

// Encode a Float32Array PCM @ sampleRate into a 16-bit mono WAV blob
function float32ToWavBlob(samples, sampleRate) {
  const numSamples = samples.length;
  const buffer = new ArrayBuffer(44 + numSamples * 2);
  const view = new DataView(buffer);
  const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + numSamples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);     // PCM
  view.setUint16(22, 1, true);     // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, numSamples * 2, true);
  let off = 44;
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    off += 2;
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

// Heuristic: ignore obvious non-speech transcripts (Whisper hallucinations on silence)
function looksLikeNoise(text) {
  const t = text.trim().toLowerCase();
  const trash = ['you', '.', 'thanks for watching!', 'thank you.', 'thank you', '[music]', '[noise]', '(music)', 'bye.', 'okay.', 'ok.'];
  return trash.includes(t);
}

// Split a long string into ~300-char sentence chunks. TTS models (especially
// facebook/mms-tts-eng) truncate or degrade on longer inputs, so we synthesize
// per chunk and play them back to back.
function v2ChunkForTTS(text, maxLen = 300) {
  const out = [];
  // Split on sentence boundaries but keep punctuation
  const parts = text.split(/(?<=[.!?])\s+/);
  let buf = '';
  for (const part of parts) {
    if (!part) continue;
    if (part.length > maxLen) {
      // Hard split overly long sentences on commas/clauses
      if (buf) { out.push(buf.trim()); buf = ''; }
      const sub = part.split(/(?<=[,;:])\s+/);
      let sb = '';
      for (const piece of sub) {
        if ((sb + ' ' + piece).trim().length > maxLen && sb) { out.push(sb.trim()); sb = piece; }
        else { sb = sb ? sb + ' ' + piece : piece; }
      }
      if (sb) { out.push(sb.trim()); }
      continue;
    }
    if ((buf + ' ' + part).trim().length > maxLen) { out.push(buf.trim()); buf = part; }
    else { buf = buf ? buf + ' ' + part : part; }
  }
  if (buf.trim()) out.push(buf.trim());
  return out.filter(Boolean);
}

async function v2SpeakNatural(text) {
  if (!text) return;
  // If HF failed in the last 5 minutes, skip and let caller use fallback
  if (voice2.hfFailedAt && (Date.now() - voice2.hfFailedAt) < 5 * 60 * 1000) {
    throw new Error('HF TTS recently failed; using fallback.');
  }
  const chunks = v2ChunkForTTS(text, 300);
  if (!chunks.length) return;

  // Cancel any in-flight playback before starting fresh
  v2StopTtsPlayback();
  voice2.ttsCancelled = false;
  const myToken = (voice2.ttsToken = (voice2.ttsToken || 0) + 1);

  // Pre-fetch the first chunk before playback starts; subsequent chunks
  // are fetched in the background while the previous one plays.
  let nextBlobPromise = v2HfTtsSynthesize(chunks[0]);

  try {
    for (let i = 0; i < chunks.length; i++) {
      if (voice2.ttsCancelled || voice2.ttsToken !== myToken) return;
      let blob;
      try {
        blob = await nextBlobPromise;
      } catch (e) {
        // If the very first chunk fails, surface to caller so Web Speech fallback runs
        if (i === 0) { voice2.hfFailedAt = Date.now(); throw e; }
        // Otherwise just skip this chunk and try the next
        console.warn('[voice v2] chunk ' + i + ' synthesis failed; skipping', e.message || e);
        nextBlobPromise = (i + 1 < chunks.length) ? v2HfTtsSynthesize(chunks[i + 1]) : null;
        continue;
      }
      // Kick off fetch for the NEXT chunk while we play this one
      if (i + 1 < chunks.length) nextBlobPromise = v2HfTtsSynthesize(chunks[i + 1]);
      if (voice2.ttsCancelled || voice2.ttsToken !== myToken) return;
      await v2PlayBlob(blob);
    }
  } finally {
    voice2.ttsPlaying = false;
  }
}

const voiceState = {
  listening: false,
  speakReplies: localStorage.getItem('CHAT_TTS') === '1',
  recognition: null,
  utterance: null,
  voicesLoaded: false,
  preferredVoice: null,
  allVoices: [],
  byGender: { female: [], male: [], unknown: [] },
  selectedGender: localStorage.getItem('CHAT_VOICE_GENDER') || 'female',
  selectedVoiceName: localStorage.getItem('CHAT_VOICE_NAME') || '',
  rate: Number(localStorage.getItem('CHAT_VOICE_RATE')) || 1.0,
  conversationMode: false,
  lastTtsRestoreFlag: null,
  ttsStartedAt: 0,         // when current TTS began (for barge-in echo guard)
  bargeInMinMs: 1800,      // ignore speechstart events younger than this since TTS start
};

const FEMALE_VOICE_HINTS = ['samantha','karen','tessa','moira','fiona','alva','allison','ava','nicky','susan','kate','catherine','serena','veena','vicki','victoria','zoe','zoey','aria','hazel','zira','jenny','anne','anna','eva','heather','sandy','female','woman','linda','amy','michelle','olivia','emma','sophie','chloe','grace','amber','clara','natalie','rachel','meghan','tracy','wendy','kelly','sarah','lily'];
const MALE_VOICE_HINTS = ['daniel','aaron','fred','alex','tom','jorge','reed','rishi','bruce','albert','junior','david','mark','ryan','guy','brian','christopher','eric','lee','james','adam','male','man','arthur','oliver','john','mike','peter','simon','steve','andrew','jack','luke','thomas','william','rob','paul'];

function genderForVoice(voice) {
  if (!voice || !voice.name) return 'unknown';
  const n = voice.name.toLowerCase();
  if (FEMALE_VOICE_HINTS.some(h => n.includes(h))) return 'female';
  if (MALE_VOICE_HINTS.some(h => n.includes(h))) return 'male';
  return 'unknown';
}
function _isHighQualityVoice(v) {
  return /enhanced|premium|natural|neural|wavenet|studio|online/i.test(v.name);
}

function _voiceSupportsSTT() {
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}
function _voiceSupportsTTS() {
  return !!window.speechSynthesis;
}

function _loadVoices() {
  if (!_voiceSupportsTTS()) return;
  const pick = () => {
    const all = speechSynthesis.getVoices();
    if (!all.length) return false;
    voiceState.voicesLoaded = true;
    voiceState.allVoices = all.filter(v => v.lang && v.lang.toLowerCase().startsWith('en'));
    voiceState.byGender = { female: [], male: [], unknown: [] };
    voiceState.allVoices.forEach(v => voiceState.byGender[genderForVoice(v)].push(v));
    Object.keys(voiceState.byGender).forEach(g => {
      voiceState.byGender[g].sort((a, b) => {
        const ha = _isHighQualityVoice(a) ? 0 : 1;
        const hb = _isHighQualityVoice(b) ? 0 : 1;
        if (ha !== hb) return ha - hb;
        return a.name.localeCompare(b.name);
      });
    });
    voiceState.preferredVoice = pickPreferredVoice();
    return true;
  };
  if (!pick()) {
    speechSynthesis.addEventListener('voiceschanged', pick);
  }
}

function pickPreferredVoice() {
  if (!voiceState.allVoices.length) return null;
  if (voiceState.selectedVoiceName) {
    const exact = voiceState.allVoices.find(v => v.name === voiceState.selectedVoiceName);
    if (exact) return exact;
  }
  const gender = voiceState.selectedGender || 'female';
  const list = voiceState.byGender[gender] || [];
  const enhanced = list.find(_isHighQualityVoice);
  if (enhanced) return enhanced;
  if (list.length) return list[0];
  const anyHigh = voiceState.allVoices.find(_isHighQualityVoice);
  if (anyHigh) return anyHigh;
  return voiceState.allVoices[0];
}

function setVoiceGender(gender) {
  voiceState.selectedGender = gender;
  localStorage.setItem('CHAT_VOICE_GENDER', gender);
  voiceState.selectedVoiceName = '';
  localStorage.removeItem('CHAT_VOICE_NAME');
  voiceState.preferredVoice = pickPreferredVoice();
}

function setVoiceByName(name) {
  voiceState.selectedVoiceName = name || '';
  if (name) localStorage.setItem('CHAT_VOICE_NAME', name);
  else localStorage.removeItem('CHAT_VOICE_NAME');
  voiceState.preferredVoice = pickPreferredVoice();
}

function setVoiceRate(rate) {
  voiceState.rate = Number(rate) || 1.0;
  localStorage.setItem('CHAT_VOICE_RATE', String(voiceState.rate));
}

async function toggleConversationMode() {
  voiceState.conversationMode = !voiceState.conversationMode;
  const cmBtn = document.getElementById('chatConvoBtn');
  const ttsBtn = document.getElementById('chatTTSBtn');

  if (voiceState.conversationMode) {
    document.body.classList.add('convo-mode');
    // Remember prior TTS preference so we can restore it
    voiceState.lastTtsRestoreFlag = voiceState.speakReplies;
    voiceState.speakReplies = true;
    localStorage.setItem('CHAT_TTS', '1');
    if (ttsBtn) { ttsBtn.classList.add('on'); ttsBtn.title = 'Voice replies: ON'; }
    cmBtn?.classList.add('on');
    cmBtn?.setAttribute('aria-pressed', 'true');
    updateVoiceStatusBar();
    // Try the v2 VAD + Whisper loop first; fall back to Web Speech if it fails to load.
    try {
      await v2StartConvoLoop();
    } catch (e) {
      console.warn('[voice v2] convo loop unavailable, falling back to Web Speech:', e);
      if (_voiceSupportsSTT() && !voiceState.listening) toggleVoiceInput();
      else { toast('Voice input failed to initialize. Try again.', 'error'); voiceState.conversationMode = false; document.body.classList.remove('convo-mode'); }
    }
  } else {
    v2StopConvoLoop();
    try { voiceState.recognition?.abort(); } catch {}
    stopSpeaking();
    voiceState.listening = false;
    if (voiceState.lastTtsRestoreFlag === false) {
      voiceState.speakReplies = false;
      localStorage.setItem('CHAT_TTS', '0');
      if (ttsBtn) { ttsBtn.classList.remove('on'); ttsBtn.title = 'Voice replies: OFF (tap to enable)'; }
    }
    cmBtn?.classList.remove('on');
    cmBtn?.setAttribute('aria-pressed', 'false');
    document.body.classList.remove('convo-mode');
  }
  updateVoiceStatusBar();
}
