<style>
  /* ============================================================
     DESIGN TOKENS — three-layer (primitive → semantic → component)
     Apple/Claude-inspired with emerald fitness accent.
     Auto light/dark via prefers-color-scheme.
     ============================================================ */
  :root {
    /* PRIMITIVES — warm grays + emerald + iOS surfaces */
    --gray-50:  #FAF9F5;   --gray-100: #F5F4ED;
    --gray-200: #EAE9E2;   --gray-300: #D6D4CB;
    --gray-400: #A8A6A0;   --gray-500: #8B8980;
    --gray-600: #6B6961;   --gray-700: #4A4844;
    --gray-800: #2A2924;   --gray-900: #1F1E1B;
    --gray-950: #0F0E0C;

    --ios-d-surface-1: #1C1C1E;
    --ios-d-surface-2: #2C2C2E;
    --ios-d-surface-3: #3A3A3C;

    --emerald-300: #6EE7B7;
    --emerald-400: #34D399;
    --emerald-500: #10B981;
    --emerald-600: #059669;
    --emerald-700: #047857;

    --red-400: #F87171;
    --red-500: #EF4444;
    --red-600: #DC2626;

    /* Radii — Apple uses 10-22px range */
    --r-2: 8px;   --r-3: 12px;   --r-4: 16px;
    --r-5: 20px;  --r-6: 28px;

    /* Shadows — soft layered, no harsh drop */
    --shadow-1: 0 1px 2px rgba(0,0,0,.05), 0 1px 1px rgba(0,0,0,.03);
    --shadow-2: 0 4px 14px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-3: 0 12px 36px rgba(0,0,0,.14), 0 4px 12px rgba(0,0,0,.06);

    /* Motion */
    --ease-spring: cubic-bezier(.34, 1.56, .64, 1);
    --ease-out:    cubic-bezier(.16, 1, .3, 1);

    /* === SEMANTIC (LIGHT default) === */
    --bg:           var(--gray-50);
    --bg-card:      #FFFFFF;
    --bg-elevated:  var(--gray-100);
    --bg-overlay:   rgba(255, 255, 255, 0.72);
    --bg-glass:     rgba(255, 255, 255, 0.85);

    --border:        rgba(0, 0, 0, 0.07);
    --border-light:  rgba(0, 0, 0, 0.04);
    --border-strong: rgba(0, 0, 0, 0.14);

    --text:           var(--gray-900);
    --text-secondary: var(--gray-700);
    --text-muted:     var(--gray-500);

    --accent:       var(--emerald-500);
    --accent-hover: var(--emerald-600);
    --accent-dim:   rgba(16, 185, 129, 0.10);
    --accent-bg:    rgba(16, 185, 129, 0.06);

    --danger:    var(--red-500);
    --danger-bg: rgba(239, 68, 68, 0.10);

    --radius:    var(--r-5);
    --radius-sm: var(--r-4);
    --radius-xs: var(--r-3);

    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top:    env(safe-area-inset-top, 0px);

    color-scheme: light;
  }

  /*
    Theme attribute hierarchy on <html>:
      data-theme="dark"  -> always dark, ignore system
      data-theme="light" -> always light, ignore system
      (no attribute)     -> follow system via prefers-color-scheme
  */

  /* System-dark (only when user hasn't picked light explicitly) */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:          #000000;
      --bg-card:     var(--ios-d-surface-1);
      --bg-elevated: var(--ios-d-surface-2);
      --bg-overlay:  rgba(28, 28, 30, 0.72);
      --bg-glass:    rgba(28, 28, 30, 0.85);
      --border:        rgba(255, 255, 255, 0.08);
      --border-light:  rgba(255, 255, 255, 0.04);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text:           #FFFFFF;
      --text-secondary: rgba(235, 235, 245, 0.65);
      --text-muted:     rgba(235, 235, 245, 0.45);
      --accent:       var(--emerald-400);
      --accent-hover: var(--emerald-300);
      --accent-dim:   rgba(52, 211, 153, 0.14);
      --accent-bg:    rgba(52, 211, 153, 0.08);
      --shadow-1: 0 1px 2px rgba(0,0,0,.4), 0 1px 1px rgba(0,0,0,.2);
      --shadow-2: 0 4px 16px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3);
      --shadow-3: 0 12px 44px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.35);
      color-scheme: dark;
    }
  }

  /* Explicit dark override — wins over the media query because of higher specificity */
  :root[data-theme="dark"] {
    --bg:          #000000;
    --bg-card:     var(--ios-d-surface-1);
    --bg-elevated: var(--ios-d-surface-2);
    --bg-overlay:  rgba(28, 28, 30, 0.72);
    --bg-glass:    rgba(28, 28, 30, 0.85);
    --border:        rgba(255, 255, 255, 0.08);
    --border-light:  rgba(255, 255, 255, 0.04);
    --border-strong: rgba(255, 255, 255, 0.16);
    --text:           #FFFFFF;
    --text-secondary: rgba(235, 235, 245, 0.65);
    --text-muted:     rgba(235, 235, 245, 0.45);
    --accent:       var(--emerald-400);
    --accent-hover: var(--emerald-300);
    --accent-dim:   rgba(52, 211, 153, 0.14);
    --accent-bg:    rgba(52, 211, 153, 0.08);
    --shadow-1: 0 1px 2px rgba(0,0,0,.4), 0 1px 1px rgba(0,0,0,.2);
    --shadow-2: 0 4px 16px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.3);
    --shadow-3: 0 12px 44px rgba(0,0,0,.55), 0 4px 12px rgba(0,0,0,.35);
    color-scheme: dark;
  }
  /* Explicit light override — :not() in the media query above already excludes us, so
     light tokens just stay as the base :root values. We re-declare color-scheme so the
     iOS keyboard accessory bar and form controls render in light. */
  :root[data-theme="light"] { color-scheme: light; }

  /* === MACRO BLOCK COLORS (Cal-AI style) === */
  :root {
    --c-calories: #C4B5FD;    /* lavender */
    --c-carbs:    #FEF08A;    /* yellow */
    --c-protein:  #86EFAC;    /* mint */
    --c-fat:      #FDBA74;    /* peach */
    --c-fiber:    #5EEAD4;    /* teal */
    --c-coral:    #FB923C;    /* coral, used for active tab */
  }

  /* === DESIGN HANDOFF TOKENS (from Claude design) === */
  :root {
    --surface:    #1C1C1E;
    --surface-2:  #2C2C2E;
    --surface-3:  #3A3A3C;
    --text-2:     #98989F;
    --text-3:     #6C6C70;
    --text-4:     #48484A;
    --green:      #34D399;
    --green-2:    #10B981;
    --green-glow: rgba(52, 211, 153, 0.22);
    --hairline:   rgba(255,255,255,0.07);

    /* Macro colors (handoff palette) */
    --m-cal:      #F59E0B;  --m-cal-soft:      rgba(245, 158, 11, 0.16);
    --m-protein:  #F43F5E;  --m-protein-soft:  rgba(244, 63, 94, 0.16);
    --m-carbs:    #0EA5E9;  --m-carbs-soft:    rgba(14, 165, 233, 0.16);
    --m-fat:      #A855F7;  --m-fat-soft:      rgba(168, 85, 247, 0.16);
    --m-fiber:    #14B8A6;  --m-fiber-soft:    rgba(20, 184, 166, 0.16);

    /* Split soft tints */
    --push:    #FCA5A5;
    --pull:    #93C5FD;
    --legs:    #FCD34D;
    --full:    #C4B5FD;
    --cardio:  #6EE7B7;
    --core:    #67E8F9;
    --stretch: #FDA4AF;
    --custom:  #10B981;
    --rest:    #52525B;
    --full-soft: rgba(196, 181, 253, 0.14);
    --soft-push:    rgba(252, 165, 165, 0.14);
    --soft-pull:    rgba(147, 197, 253, 0.14);
    --soft-legs:    rgba(252, 211, 77, 0.14);
    --soft-full:    rgba(196, 181, 253, 0.14);
    --soft-cardio:  rgba(110, 231, 183, 0.14);
    --soft-core:    rgba(103, 232, 249, 0.14);
    --soft-stretch: rgba(253, 164, 175, 0.14);
    --soft-rest:    rgba(82, 82, 91, 0.18);
  }

  /* Typography utilities */
  .eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-3);
  }
  .h-display {
    font-size: 34px; font-weight: 800;
    letter-spacing: -0.025em; line-height: 1.05;
  }
  .h-title {
    font-size: 22px; font-weight: 700; letter-spacing: -0.018em;
  }
  .h-section {
    font-size: 17px; font-weight: 700; letter-spacing: -0.015em;
  }
  .tabnum { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }
  .press {
    transition: transform .15s cubic-bezier(.34, 1.56, .64, 1), background .15s ease, opacity .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .press:active { transform: scale(0.96); }

  /* Hero workout card */
  .hero-workout {
    position: relative; overflow: hidden;
    border-radius: 20px;
    padding: 18px 18px 16px;
  }
  .hero-workout .glow {
    position: absolute; right: -40px; top: -40px;
    width: 200px; height: 200px; border-radius: 50%;
    pointer-events: none;
  }
  .hero-workout .start-btn {
    --btn-color: var(--green, #34D399);
    --btn-glow:  var(--green-glow, rgba(52,211,153,.22));
    width: 100%; height: 48px; border-radius: 14px;
    background: linear-gradient(135deg, var(--btn-glow), transparent);
    border: 1px solid var(--btn-glow);
    color: var(--btn-color);
    font-weight: 700; font-size: 15px; letter-spacing: -.015em;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform .12s var(--ease-spring), box-shadow .2s;
  }
  .hero-workout .start-btn:active { transform: scale(0.97); }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .55; transform: scale(.8); } }

  /* Week strip day dots */
  .week-strip {
    display: flex; gap: 6px;
    background: var(--surface);
    border-radius: 18px; padding: 14px;
  }
  .week-strip .day {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 10px 0 8px; border-radius: 12px;
    background: transparent;
    border: 1px solid transparent;
  }
  .week-strip .day.today {
    background: rgba(52, 211, 153, .10);
    border-color: var(--green);
  }
  .week-strip .day .day-letter {
    font-size: 10px; color: var(--text-3); font-weight: 700; letter-spacing: .06em;
  }
  .week-strip .day .dot {
    width: 22px; height: 22px; border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
  }
  .week-strip .day .split-label {
    font-size: 8.5px; font-weight: 800; letter-spacing: .06em;
  }

  /* Stats grid card */
  .stat-card {
    background: var(--surface); border-radius: 16px;
    padding: 16px; border: 1px solid var(--hairline);
  }
  .stat-badge {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }

  /* Activity row */
  .activity-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--hairline);
    border-radius: 14px; padding: 14px;
  }
  .activity-row .badge {
    width: 36px; height: 36px; border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* === BLOCK CARDS — bold colored macro cards with dark text === */
  .block-card {
    border-radius: 24px;
    padding: 1.125rem 1.25rem 1.25rem;
    color: #0A0A0C;
    position: relative;
    overflow: hidden;
  }
  .block-card .block-label { font-size: .9375rem; font-weight: 700; letter-spacing: -.01em; }
  .block-card .block-value {
    font-weight: 800; letter-spacing: -.025em; line-height: 1; font-variant-numeric: tabular-nums;
  }
  .block-card .block-sub { font-size: .75rem; font-weight: 600; opacity: .7; }
  .block-card .block-icon {
    position: absolute; top: .875rem; right: 1rem;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(10,10,12,.10); display: flex; align-items: center; justify-content: center;
  }
  .block-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: .625rem;
  }
  @media (max-width: 380px) {
    .block-card { border-radius: 22px; padding: 1rem; }
  }

  /* === CIRCULAR DIAL (calories) === */
  .cal-dial-wrap {
    position: relative;
    width: 220px; height: 220px;
    margin: 0 auto;
  }
  .cal-dial-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .cal-dial-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .cal-dial-center .cal-num {
    font-size: 2.625rem; font-weight: 800; line-height: 1; letter-spacing: -.03em;
    color: #0A0A0C; font-variant-numeric: tabular-nums;
  }
  .cal-dial-center .cal-lbl { font-size: .8125rem; font-weight: 600; color: #0A0A0C; opacity: .65; margin-top: .25rem; }

  /* === DAY-OF-WEEK STRIP === */
  .day-strip {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: .25rem;
    background: var(--bg-card);
    border-radius: 24px;
    padding: .375rem;
    box-shadow: var(--shadow-1);
  }
  .day-strip .day-cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: .5rem .25rem;
    border-radius: 18px;
    color: var(--text-secondary);
    font-size: .6875rem; font-weight: 600; letter-spacing: .04em;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background .15s, color .15s;
  }
  .day-strip .day-cell .day-num {
    font-size: 1.0625rem; font-weight: 700; margin-top: .125rem;
    color: var(--text); letter-spacing: -.02em;
  }
  .day-strip .day-cell.today {
    background: var(--c-calories);
    color: #0A0A0C;
  }
  .day-strip .day-cell.today .day-num { color: #0A0A0C; }

  /* Big number display class for hero numbers (workouts, weight) */
  .hero-num {
    font-weight: 800;
    font-size: clamp(2.25rem, 8vw, 3.25rem);
    line-height: 1;
    letter-spacing: -.03em;
    font-variant-numeric: tabular-nums;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    /* Native-feel additions */
    -webkit-user-select: none;       /* no text-selection highlight on tap (web-app tell) */
    user-select: none;
    -webkit-tap-highlight-color: transparent;  /* no blue/grey flash on tap */
    -webkit-touch-callout: none;     /* no long-press menu on links / images */
    overscroll-behavior: none;       /* no bounce / pull-to-refresh */
    overflow-x: hidden;
  }
  /* Allow text selection in inputs and chat messages — for usability */
  input, textarea, [contenteditable], .chat-msg, .selectable, .chat-content {
    -webkit-user-select: text;
    user-select: text;
  }
  /* Safe-area insets for notch / dynamic island / home indicator */
  #app {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
    min-height: 100dvh;  /* dynamic viewport — accounts for browser chrome animations */
  }
  /* Bottom nav lifts above the home indicator */
  .bottom-nav, .tab-bar, #bottomNav, [data-bottom-nav] {
    padding-bottom: env(safe-area-inset-bottom);
  }
  /* Fixed headers respect status bar */
  .top-header, header, [data-header] {
    padding-top: env(safe-area-inset-top);
  }
  /* Stop iOS auto-zoom when focusing inputs (font-size>=16px prevents it) */
  input, select, textarea { font-size: 16px; }
  /* Hide scrollbars on all platforms. */
  * { scrollbar-width: none; -ms-overflow-style: none; }
  ::-webkit-scrollbar { display: none; width:0; height:0; }
  /* Smooth momentum scrolling on inner containers */
  .scroll, .scroll-y { -webkit-overflow-scrolling: touch; }
  /* Disable selection highlight ring on buttons */
  button, .btn, [role=button] { -webkit-user-select: none; }

  * { box-sizing: border-box; }


  /* ===== BUTTONS — Apple/Claude sleek ===== */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:.5rem;
    padding:.8125rem 1.25rem; border-radius:14px;
    font-weight:600; font-size:.9375rem; letter-spacing:-.011em;
    transition: transform .15s var(--ease-spring), background .2s var(--ease-out), box-shadow .2s, opacity .2s;
    cursor:pointer; border:0; white-space:nowrap;
  }
  .btn:active:not(:disabled) { transform:scale(0.96); }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  /* Translucent glass button (matches the AI scan button). Default tone is green.
     Add a btn-tone-* class or inline --tone-color/--tone-glow vars to recolor. */
  .btn-primary {
    --tone-color: #34D399;
    --tone-glow:  rgba(16,185,129,.18);
    background: linear-gradient(135deg, var(--tone-glow), transparent);
    border: 1px solid var(--tone-glow);
    color: var(--tone-color);
    font-weight: 700;
    box-shadow: 0 2px 10px rgba(0,0,0,.18);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, var(--tone-glow), rgba(255,255,255,.04));
    box-shadow: 0 4px 18px rgba(0,0,0,.22);
  }
  .btn-tone-coral  { --tone-color: #FDBA74; --tone-glow: rgba(251,146,60,.18); }
  .btn-tone-rose   { --tone-color: #FCA5A5; --tone-glow: rgba(244,63,94,.18); }
  .btn-tone-sky    { --tone-color: #93C5FD; --tone-glow: rgba(14,165,233,.18); }
  .btn-tone-violet { --tone-color: #C4B5FD; --tone-glow: rgba(168,85,247,.18); }
  .btn-tone-amber  { --tone-color: #FCD34D; --tone-glow: rgba(245,158,11,.18); }
  .btn-tone-teal   { --tone-color: #5EEAD4; --tone-glow: rgba(20,184,166,.18); }
  .btn-tone-mint   { --tone-color: #86EFAC; --tone-glow: rgba(16,185,129,.18); }
  .btn-ghost {
    background: var(--bg-elevated);
    color: var(--text);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-1);
  }
  .btn-ghost:hover:not(:disabled) {
    background: var(--bg-card);
    border-color: var(--border-strong);
  }
  .btn-danger {
    background: var(--danger-bg);
    color: var(--danger);
    border: 1px solid rgba(239,68,68,.2);
  }
  .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,.18); }

  /* ===== CARDS — soft elevated surface, no harsh border ===== */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 18px;
    padding: 1.25rem;
    box-shadow: var(--shadow-1);
    transition: box-shadow .2s var(--ease-out), transform .2s var(--ease-out);
  }
  .card.is-interactive { cursor: pointer; }
  .card.is-interactive:active { transform: scale(0.99); box-shadow: var(--shadow-1); }
  .card.is-interactive:hover { box-shadow: var(--shadow-2); }

  /* ===== INPUTS — friendly fill, gentle focus ===== */
  .input {
    width:100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .875rem 1rem;
    color: var(--text);
    font-size: 1rem;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .input::placeholder { color: var(--text-muted); }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-card);
    box-shadow: 0 0 0 4px var(--accent-dim);
  }

  /* ===== LABELS ===== */
  .label {
    font-size: .8125rem; font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: .4375rem;
    display: block; letter-spacing: -.005em;
  }

  /* ===== TYPOGRAPHY refinements ===== */
  h1, h2, h3, h4 { letter-spacing: -.022em; color: var(--text); }
  h1 { font-weight: 700; }
  h2 { font-weight: 600; }

  /* ===== CHIPS ===== */
  .chip { display:inline-flex; align-items:center; padding:.25rem .625rem; border-radius:999px; font-size:.6875rem; font-weight:600; letter-spacing:0.02em; text-transform:uppercase; border:1px solid transparent; }
  .slot-push, .slot-upper   { color:#fca5a5; background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.2); }
  .slot-pull              { color:#93c5fd; background:rgba(59,130,246,.12); border-color:rgba(59,130,246,.2); }
  .slot-legs, .slot-lower   { color:#fcd34d; background:rgba(234,179,8,.12); border-color:rgba(234,179,8,.2); }
  .slot-full              { color:#c4b5fd; background:rgba(139,92,246,.12); border-color:rgba(139,92,246,.2); }
  .slot-cardio            { color:#6ee7b7; background:rgba(16,185,129,.12); border-color:rgba(16,185,129,.2); }
  .slot-rest              { color:#71717a; background:rgba(113,113,122,.08); border-color:rgba(113,113,122,.15); }
  .slot-custom            { color:#e5e5e5; background:rgba(229,229,229,.08); border-color:rgba(229,229,229,.12); }
  .slot-core              { color:#f9a8d4; background:rgba(236,72,153,.12); border-color:rgba(236,72,153,.2); }
  .slot-stretching        { color:#a5f3fc; background:rgba(34,211,238,.12); border-color:rgba(34,211,238,.2); }
  .slot-abs               { color:#fdba74; background:rgba(251,146,60,.12); border-color:rgba(251,146,60,.2); }

  /* ===== SUB-SPLITS ===== */
  .sub-split-row { display:flex; align-items:center; gap:.5rem; padding:.5rem .625rem; margin-top:.375rem; background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:var(--radius-xs); }
  .sub-split-section { margin-top:.625rem; padding-left:1rem; border-left:2px solid var(--border); }
  .sub-split-add { font-size:.8125rem; color:var(--accent); cursor:pointer; margin-top:.5rem; padding:.25rem 0; font-weight:500; }
  .sub-split-add:hover { color:var(--accent-hover); }
  .sub-split-remove { color:var(--text-muted); cursor:pointer; font-size:1rem; line-height:1; padding:0 .25rem; }
  .sub-split-remove:hover { color:var(--danger); }

    /* ===== PROGRESS TABS ===== */
  .prog-tabs { display:flex; gap:.4rem; padding:0; margin:.1rem 0 .3rem; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .prog-tabs::-webkit-scrollbar { display:none; }
  .prog-tab { flex-shrink:0; text-align:center; padding:.55rem .95rem; border-radius:999px; font-size:.82rem; font-weight:700; color:var(--text-secondary); text-decoration:none; transition:background .18s,color .18s,transform .12s; background:var(--bg-card); border:1px solid var(--border); -webkit-tap-highlight-color:transparent; }
  .prog-tab.active { background:var(--text); color:var(--bg); border-color:var(--text); }
  .prog-tab:active { transform:scale(0.96); }

  /* ===== EXERCISE EDIT ROWS (plan editor + onboarding) ===== */
  .ex-edit-row {
    display:grid;
    grid-template-columns: 24px 1fr 64px 90px 36px;
    gap:.5rem;
    align-items:center;
    padding:.5rem 0;
    border-bottom:1px solid rgba(39,39,42,.5);
  }
  .ex-edit-row.sortable-ghost { opacity:.4; background:rgba(16,185,129,.08); }
  .ex-edit-row.sortable-chosen { box-shadow:0 0 0 1px var(--accent); }
  .ex-edit-row:last-child { border-bottom:0; }
  .ex-edit-row .exName  { width:100%; }
  .ex-edit-row .exSets, .ex-edit-row .exReps { width:100%; padding:.5rem .5rem; text-align:center; }
  .ex-edit-row .exDel  {
    width:36px; height:36px; border-radius:.5rem; border:0;
    background:transparent; color:var(--text-muted); cursor:pointer;
    font-size:1.125rem; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center;
  }
  .ex-edit-row .exDel:hover { background:rgba(239,68,68,.12); color:var(--danger); }
  @media (max-width: 480px) {
    .ex-edit-row {
      grid-template-columns: 24px 1fr 36px;
      grid-template-areas:
        "drag name name"
        "drag sets reps"
        "drag del  del";
      gap:.375rem;
    }
    .ex-edit-row .exDrag { grid-area:drag; align-self:start; padding-top:.625rem; }
    .ex-edit-row .exName { grid-area:name; }
    .ex-edit-row .exSets { grid-area:sets; }
    .ex-edit-row .exReps { grid-area:reps; }
    .ex-edit-row .exDel  { grid-area:del; min-height:44px; height:44px; justify-self:end; }
  }

  /* ===== Plan editor — align with app design system ===== */
  .plan-editor select.input, .plan-editor input.input {
    background: var(--surface, var(--bg-elevated));
    border: 1px solid var(--hairline);
    border-radius: 12px;
  }
  .plan-editor select.input {
    -webkit-appearance: none; appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23a1a1aa' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
    background-repeat: no-repeat;
    background-position: right .8rem center;
    padding-right: 2.4rem;
  }
  .plan-editor select.input:focus { border-color: var(--accent); }
  .plan-editor .ex-edit-row {
    background: var(--bg-elevated);
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: .5rem .55rem;
    margin-bottom: .5rem;
    border-bottom: 1px solid var(--hairline);
  }
  .plan-editor .ex-edit-row:last-child { margin-bottom: 0; }
  .plan-editor .ex-edit-row .exName, .plan-editor .ex-edit-row .exSets, .plan-editor .ex-edit-row .exReps {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 10px;
  }
  .plan-editor .ss-fields input.input, .plan-editor .ss-fields select.input { border-radius: 10px; }
  /* tidy the day cards + section spacing */
  .plan-editor .pe-day-card { border-radius: 16px; padding: 14px; }


  /* ===== SUB-TASK NUMERIC GRID ===== */
  .ss-fields { gap:.375rem; }
  @media (max-width: 480px) {
    .ss-fields { grid-template-columns:repeat(2, minmax(0, 1fr)) !important; }
    .ss-fields > input:nth-child(3) { grid-column: span 2; }
  }

  /* ===== SET LOG ROWS ===== */
  .set-log-row {
    display:grid;
    grid-template-columns: 32px 1fr 1fr 28px 36px;
    gap:.375rem;
    align-items:center;
    padding:.375rem 0;
  }
  .set-log-row .set-num { text-align:center; color:var(--text-muted); font-size:.8125rem; font-variant-numeric:tabular-nums; }
  .set-log-row .setWt, .set-log-row .setReps { width:100%; padding:.5rem; text-align:center; }
  .set-log-row .setDel {
    width:36px; height:36px; border-radius:.5rem; border:0;
    background:transparent; color:var(--danger); cursor:pointer;
    font-size:1.125rem; line-height:1; padding:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:700;
  }
  .set-log-row .setDel:hover { background:rgba(239,68,68,.12); }

  /* ===== INPUT OVERFLOW GUARDS ===== */
  /* iOS Safari has an intrinsic min-width on input[type=date]/[type=number] etc.
     When these sit in a grid/flex 1fr column on narrow screens, they overflow
     because the wrapping element refuses to shrink below the input's content width.
     min-width:0 on grid items lets them shrink properly. */
  .form-grid { display:grid; gap:.5rem; min-width:0; }
  .form-grid > div, .form-grid > .form-cell { min-width:0; }
  .form-grid input, .form-grid select, .form-grid textarea { min-width:0; max-width:100%; box-sizing:border-box; }
  @media (max-width: 480px) {
    .form-grid.cols-2-on-desktop { grid-template-columns:1fr !important; }
  }
  /* default desktop = 2 cols when class adds .cols-2 */
  @media (min-width: 481px) {
    .form-grid.cols-2-on-desktop { grid-template-columns:1fr 1fr; }
  }
  /* Always-2-cols variant (kept for cases where space allows on small screens too). */
  .form-grid.cols-2-tight { grid-template-columns:1fr 1fr; }
  .form-grid.cols-2-tight > div { min-width:0; }

  /* Date inputs: prevent default Safari styling oddities. */
  input[type=date].input {
    -webkit-appearance:none;
    appearance:none;
    min-width:0;
    width:100%;
    box-sizing:border-box;
  }

  /* ===== UI POLISH ===== */
  /* Tabular numerics on grids/stats */
  .exercise-meta, .ex-edit-row .exSets, .ex-edit-row .exReps,
  .set-log-row .setWt, .set-log-row .setReps, .set-log-row .set-num { font-variant-numeric: tabular-nums; }
  h1.text-3xl { letter-spacing:-.024em; }

  /* ===== BOTTOM NAV: highlight Chat tab ===== */
  .bottom-nav a[href="#/chat"] {
    position:relative;
    transform:translateY(-9px);
    flex: 1 1 0;
    z-index: 2;
  }
  .bottom-nav a[href="#/chat"] svg {
    background: var(--accent);
    color: #000;
    width: 44px; height: 44px;
    padding: 10px;
    border-radius: 50%;
    box-shadow: 0 8px 20px var(--accent-dim), 0 0 0 3px rgba(20,20,22,.78);
    transition: transform .15s var(--ease-spring), box-shadow .2s;
  }
  .bottom-nav a[href="#/chat"]:active svg { transform: scale(0.93); }
  .bottom-nav a[href="#/chat"].active svg {
    box-shadow: 0 10px 30px var(--accent-dim), 0 0 0 5px var(--bg-glass);
  }
  .bottom-nav a[href="#/chat"] span {
    color:var(--accent);
    margin-top:.125rem;
    font-weight:600;
  }
  /* tighten width slightly to fit 7 tabs on phone */
  @media (max-width: 768px) {
    .bottom-nav a {
      padding:.375rem .125rem;
      min-width:0;
      flex:1;
    }
    .bottom-nav a span {
      font-size:.6875rem;
      letter-spacing:0;
      white-space:nowrap;
    }
  }
  @media (max-width: 380px) {
    .bottom-nav a span { font-size:.5rem; }
    .bottom-nav a:not([href="#/chat"]) svg { width:20px; height:20px; }
  }

  /* ===== VOICE CHAT ===== */
  #chatMicBtn { background:var(--bg-elevated) !important; color:var(--text-secondary) !important; border:1px solid var(--border) !important; }
  #chatMicBtn:hover { background:var(--border) !important; color:var(--text) !important; }
  #chatMicBtn.listening { background:#dc2626 !important; color:#fff !important; border-color:#dc2626 !important; animation:micPulse 1.4s ease-in-out infinite; }
  @keyframes micPulse {
    0%, 100% { box-shadow:0 0 0 0 rgba(220,38,38,.55); }
    70% { box-shadow:0 0 0 14px rgba(220,38,38,0); }
  }
  #chatTTSBtn { background:none; border:0; color:var(--text-muted); cursor:pointer; padding:.25rem; }
  #chatTTSBtn.on { color:var(--accent); }
  .voice-status-bar { padding:.375rem 1rem; background:rgba(220,38,38,.12); border-top:1px solid rgba(220,38,38,.3); color:#fca5a5; font-size:.8125rem; display:flex; align-items:center; gap:.5rem; }
  .voice-status-bar.tts { background:rgba(16,185,129,.12); border-top-color:rgba(16,185,129,.3); color:#6ee7b7; }
  .voice-status-bar .vs-dot { width:.5rem; height:.5rem; border-radius:50%; background:currentColor; animation:micPulse 1s infinite; }
  .speaking-indicator { display:inline-flex; gap:2px; margin-left:.375rem; }
  .speaking-indicator span { width:3px; height:10px; background:currentColor; border-radius:2px; animation:speakBar 1s ease-in-out infinite; }
  .speaking-indicator span:nth-child(2) { animation-delay:.15s; }
  .speaking-indicator span:nth-child(3) { animation-delay:.3s; }
  @keyframes speakBar { 0%,100%{height:4px} 50%{height:14px} }

  /* ===== CONVERSATION MODE BUTTON ===== */
  #chatConvoBtn { position:relative; }
  #chatConvoBtn.on { color:var(--accent); }
  #chatConvoBtn.on::after {
    content:''; position:absolute; right:.125rem; top:.125rem; width:.5rem; height:.5rem;
    border-radius:50%; background:var(--accent); box-shadow:0 0 0 0 rgba(16,185,129,.6);
    animation:micPulse 1.4s ease-in-out infinite;
  }
  body.convo-mode { /* visible cue: subtle accent glow at edges of chat page */ }
  body.convo-mode .chat-page { box-shadow:inset 0 0 0 2px rgba(16,185,129,.45); }

  /* ===== MOBILE FIT PASS ===== */
  @media (max-width: 480px) {
    main { padding-left:.875rem !important; padding-right:.875rem !important; }
    .card { padding:.875rem; border-radius:.75rem; }
    h1 { font-size:1.5rem !important; line-height:1.15 !important; letter-spacing:-0.02em; }
    h1.text-2xl, h1.text-3xl { font-size:1.5rem !important; }
    .section-label { font-size:.65rem; margin-bottom:.5rem; }
    .form-grid { gap:.5rem !important; }
    .input { padding:.625rem .75rem; font-size:16px; min-height:44px; }
    .btn { padding:.625rem .875rem; font-size:.9375rem; min-height:44px; }
    .chip { font-size:.625rem; padding:.2rem .5rem; }
    .week-grid { gap:.25rem; }
    .week-day { padding:.5rem .25rem; min-height:4rem; border-radius:.5rem; }
    .day-label { font-size:.625rem; }
    .exercise-row { padding:.625rem 0; }
    .set-log-row { gap:.25rem; }
    .set-log-row .setWt, .set-log-row .setReps { padding:.4rem; font-size:15px; }
    .prog-tabs { padding:0; gap:.35rem; }
    .prog-tab { padding:.48rem .85rem; font-size:.78rem; }
    /* Chat header gets cramped with 6 things — tighten button padding */
    .chat-header { padding:calc(.5rem + var(--safe-top)) .625rem .5rem; gap:.375rem; }
    .chat-header h2 { font-size:.9375rem; }
    .chat-header button { padding:.125rem !important; }

    .addTypePick { font-size:.7rem !important; padding:.375rem .25rem !important; min-width:0; }
    /* Bottom-nav is already adjusted; just verify chat tab still floats correctly. */
  }
  @media (max-width: 380px) {
    .card { padding:.75rem; }
    h1 { font-size:1.375rem !important; }
    .input { padding:.5rem .625rem; }
    .btn { padding:.5rem .625rem; font-size:.875rem; }
    .week-day { min-height:3.5rem; padding:.375rem .125rem; }
    .week-day .chip { font-size:.5625rem; padding:.125rem .375rem; }

  /* === LOG WORKOUT CARD: drag visual + tighter mobile layout === */
  .log-ex-card.sortable-ghost { opacity:.45; background:rgba(16,185,129,.06); }
  .log-ex-card.sortable-chosen { box-shadow:0 0 0 2px var(--accent); }

/* ===== UTILITIES ===== */
  .hide { display:none !important; }
  .scroll-smooth { scroll-behavior:smooth; }
  ::-webkit-scrollbar { width:0; height:0; display:none; }
  ::-webkit-scrollbar-thumb, ::-webkit-scrollbar-track { background:transparent; }

  /* ===== BOTTOM NAV (mobile) ===== */
  .bottom-nav { display:none; }

  @media (max-width: 768px) {
    .bottom-nav {
      display: flex; position: fixed;
      bottom: calc(4px + var(--safe-bottom)); left: 14px; right: 14px;

      -webkit-backdrop-filter: blur(20px) saturate(180%);

      padding:.25rem 0; border-radius:.625rem; color:var(--text-muted);

  /* MLKit live barcode scanner — when active, camera is shown behind the WebView.
     Every layer (html, body, #app) must be transparent so the camera preview shows through.
     ion-app / app-root added for belt + suspenders in case host structure changes. */
  html.barcode-scanner-active,
  body.barcode-scanner-active,
  body.barcode-scanner-active #app,
  body.barcode-scanner-active ion-app,
  body.barcode-scanner-active app-root { background: transparent !important; }
  body.barcode-scanner-active #app > *,
  body.barcode-scanner-active .chat-page,
  body.barcode-scanner-active .chat-bubble,
  body.barcode-scanner-active .bottom-nav,
  body.barcode-scanner-active .tab-bar,
  body.barcode-scanner-active #bottomNav { visibility: hidden !important; }
  .barcode-scanner-overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; }
  .barcode-scanner-overlay .bs-status {
    position: absolute; top: calc(2rem + var(--safe-top)); left: 0; right: 0;
    text-align: center; color: #fafafa; font-weight: 600; font-size: .9375rem;
    text-shadow: 0 1px 4px rgba(0,0,0,.7); pointer-events: none;
  }
  .barcode-scanner-overlay .bs-cancel {
    position: absolute; bottom: calc(2.5rem + var(--safe-bottom)); left: 50%;
    transform: translateX(-50%); padding: .75rem 1.5rem;
    background: rgba(0,0,0,.65); color: #fafafa; border: 1px solid rgba(255,255,255,.3);
    border-radius: 999px; font-weight: 600; font-size: .875rem; pointer-events: auto;
    cursor: pointer; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
  }
  .barcode-scanner-overlay .bs-corner {
    position: absolute; width: 2.5rem; height: 2.5rem; border-color: #10b981; border-style: solid; border-width: 0;
  }
  .barcode-scanner-overlay .bs-tl { top: 30%; left: 12%; border-top-width: 3px; border-left-width: 3px; border-top-left-radius: .5rem; }
  .barcode-scanner-overlay .bs-tr { top: 30%; right: 12%; border-top-width: 3px; border-right-width: 3px; border-top-right-radius: .5rem; }
  .barcode-scanner-overlay .bs-bl { bottom: 30%; left: 12%; border-bottom-width: 3px; border-left-width: 3px; border-bottom-left-radius: .5rem; }
  .barcode-scanner-overlay .bs-br { bottom: 30%; right: 12%; border-bottom-width: 3px; border-right-width: 3px; border-bottom-right-radius: .5rem; }

async function syncSubscriptionFromRC() {
  try {
    const P = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Purchases;
    if (!P) return;
    const info = await P.getCustomerInfo();
    const ci = info && info.customerInfo;
    if (!ci) return;
    const ent = ci.entitlements && ci.entitlements.active && ci.entitlements.active[ENTITLEMENT_ID];
    const isActive = !!ent;
    const upd = {};
    if (isActive) {
      const inTrial = ent.periodType === 'trial' || ent.periodType === 'TRIAL';
      const isLifetime = ent.productIdentifier === PRODUCT_LIFETIME ||
                         ent.productIdentifier === 'Liftly_pro_Lifetime' ||
                         ent.productIdentifier === 'workout_pro_lifetime' ||
                         (ent.willRenew === false && !ent.expirationDate);
      upd.subscription_status = isLifetime ? 'lifetime' : (inTrial ? 'trial' : 'active');
      upd.subscription_product_id = ent.productIdentifier || null;
      upd.subscription_expires_at = ent.expirationDate || null;
      upd.subscription_source = 'apple';
      upd.rc_user_id = ci.originalAppUserId || null;
    } else {
      // Don't clobber 'comped' (manual self-comp) when RC reports inactive
      if (state.profile && (state.profile.subscription_status === 'comped' || state.profile.subscription_status === 'lifetime')) return;
      upd.subscription_status = 'free';

      Object.assign(state.profile || {}, upd);

// One-time URL key intake: ?_groqkey=gsk_... or ?_hfkey=hf_... lets us hand off
// keys from another tab/page (e.g. Groq Console, HF Settings) without pasting.
// Cleans the URL after reading so the keys don't sit in browser history.
(() => {
  try {
    const url = new URL(location.href);
    const sp = url.searchParams;
    let saved = [];
    const grk = sp.get('_groqkey');
    if (grk && /^gsk_[A-Za-z0-9_]{20,}/.test(grk)) {
      localStorage.setItem('GROQ_API_KEY', grk);
      saved.push('Groq');
      sp.delete('_groqkey');
    }
    const hfk = sp.get('_hfkey');
    if (hfk && /^hf_[A-Za-z0-9]{20,}/.test(hfk)) {
      localStorage.setItem('HF_API_KEY', hfk);
      saved.push('HuggingFace');
      sp.delete('_hfkey');
    }
    if (saved.length) {
      history.replaceState({}, '', url.pathname + (sp.toString() ? '?' + sp.toString() : '') + url.hash);
      // Schedule a profile sync once the session is loaded (boot does this elsewhere)
      localStorage.setItem('_KEYS_PENDING_SYNC', '1');
      window._pendingKeySync = true;
      // Defer toast until after app render
      setTimeout(() => { try { toast('Saved ' + saved.join(' + ') + ' API key' + (saved.length>1?'s':'')); } catch {} }, 1200);
    }
  } catch {}
})();

// All known exercise names across slots + meta, deduped.
function allCatalogExercises() {
  const seen = new Set();
  const out = [];
  // Pull from EXERCISE_LIBRARY across all slots, dedupe by name.
  Object.values(EXERCISE_LIBRARY).forEach(arr => (arr || []).forEach(ex => {
    if (!ex || !ex.name || seen.has(ex.name)) return;
    seen.add(ex.name);
    const meta = EXERCISE_META[ex.name] || { muscle:'Mixed', equipment:'Free weight' };
    out.push({ name: ex.name, muscle: meta.muscle, equipment: meta.equipment, target_sets: ex.target_sets, target_reps: ex.target_reps });
  }));
  // Also surface any meta entries that aren't in the library (so we don't lose them).
  Object.entries(EXERCISE_META).forEach(([name, meta]) => {
    if (seen.has(name)) return;
    seen.add(name);
    out.push({ name, muscle: meta.muscle, equipment: meta.equipment, target_sets: 3, target_reps: '8-12' });
  });
  return out;
}

const $ = id => document.getElementById(id);
// MacroWidgetBridge is a local (non-pod) Capacitor plugin. Without a bundler we don't
// import @capacitor/core, so window.Capacitor.registerPlugin isn't available. Instead we
// call the native side through the low-level nativePromise escape hatch — the bridge
// just needs the plugin registered natively, which the CAP_PLUGIN macro handles.
function _getMacroWidgetBridge() {
  if (typeof window === 'undefined' || !window.Capacitor) return null;
  if (window._macroWidgetBridgeProxy) return window._macroWidgetBridgeProxy;
  // Preferred: high-level Plugins.X if Capacitor exposed it via PluginHeaders.
  const direct = window.Capacitor.Plugins && window.Capacitor.Plugins.MacroWidgetBridge;
  if (direct && typeof direct.setMacros === 'function') {
    window._macroWidgetBridgeProxy = direct;
    return direct;
  }
  // Try registerPlugin if available (bundler builds).
  if (typeof window.Capacitor.registerPlugin === 'function') {
    try {
      const proxy = window.Capacitor.registerPlugin('MacroWidgetBridge');
      if (proxy) { window._macroWidgetBridgeProxy = proxy; return proxy; }
    } catch(_) {}
  }
  // Final fallback: low-level nativePromise. This works on native iOS regardless of headers.
  if (typeof window.Capacitor.nativePromise === 'function') {
    const proxy = {
      setMacros: (opts) => window.Capacitor.nativePromise('MacroWidgetBridge', 'setMacros', opts || {}),
    };
    window._macroWidgetBridgeProxy = proxy;
    return proxy;
  }
  return null;
}

// Push today's macros snapshot to the iOS home-screen widget. Verbose logging so
// we can see in the Xcode console exactly where the chain breaks.
async function pushMacrosToWidget(tot, tg) {
  try {
    if (typeof window === 'undefined') { console.log('[widget] no window'); return; }
    if (!window.Capacitor) { console.log('[widget] no Capacitor (web mode)'); return; }
    const Bridge = _getMacroWidgetBridge();
    if (!Bridge) {
      const Plugins = window.Capacitor.Plugins || {};
      console.warn('[widget] MacroWidgetBridge could not be obtained. Available plugins:',
        Object.keys(Plugins).join(', '));
      return;
    }
    if (typeof Bridge.setMacros !== 'function') {
      console.warn('[widget] Bridge.setMacros is not a function. Plugin methods:',
        Object.keys(Bridge).join(', '));
      return;
    }
    const payload = {
      kcal: Math.round(Number(tot.kcal) || 0),
      kcal_target: Math.round(Number(tg.kcal_target) || 0),
      protein: Math.round(Number(tot.p) || 0),
      protein_target: Math.round(Number(tg.protein_target_g) || 0),
      carbs: Math.round(Number(tot.c) || 0),
      carbs_target: Math.round(Number(tg.carbs_target_g) || 0),
      fat: Math.round(Number(tot.f) || 0),
      fat_target: Math.round(Number(tg.fat_target_g) || 0),
      fiber: Math.round(Number(tot.fib) || 0),
      fiber_target: Math.round(Number(tg.fiber_target_g) || 0),
      updated_at: new Date().toISOString(),
    };
    console.log('[widget] pushing macros:', JSON.stringify(payload));
    window._lastWidgetPush = { ok: false, at: new Date().toISOString(), payload, error: null };
    try {
      const res = await Bridge.setMacros({ json: JSON.stringify(payload) });
      console.log('[widget] setMacros result:', JSON.stringify(res));
      window._lastWidgetPush.ok = !!(res && res.ok);
    } catch (e) {
      window._lastWidgetPush.error = e && e.message || String(e);
      throw e;
    }
  } catch (e) {
    console.warn('[widget] push failed:', e && e.message || e);
    if (window._lastWidgetPush) window._lastWidgetPush.error = e && e.message || String(e);
  }
}

// Push today's workout summary to the iOS workout widget (no-op on web).
// payload schema: { slot_type, title, exercise_count, est_minutes, updated_at }
async function pushTodayWorkoutToWidget(payload) {
  try {
    if (typeof window === 'undefined' || !window.Capacitor) return;
    const Bridge = (typeof _getMacroWidgetBridge === 'function') ? _getMacroWidgetBridge() : null;
    if (!Bridge) return;
    const fn = (typeof Bridge.setTodayWorkout === 'function')
      ? (opts) => Bridge.setTodayWorkout(opts)
      : ((typeof window.Capacitor.nativePromise === 'function')
          ? (opts) => window.Capacitor.nativePromise('MacroWidgetBridge', 'setTodayWorkout', opts || {})
          : null);
    if (!fn) return;
    const out = {
      slot_type: String(payload.slot_type || 'rest').toLowerCase(),
      title: String(payload.title || ''),
      exercise_count: Math.max(0, Number(payload.exercise_count) || 0),
      est_minutes: Math.max(0, Number(payload.est_minutes) || 0),
      updated_at: new Date().toISOString(),
    };
    await fn({ json: JSON.stringify(out) });
  } catch (e) { console.warn('[widget] pushTodayWorkout failed', e); }
}

// Independent widget refresh — fetches today's food logs + targets, calls pushMacrosToWidget.
// Use this from contexts that mutate food/macros but don't re-render the dashboard.
async function refreshWidgetNow() {
  try {
    if (typeof window === 'undefined' || !window.Capacitor) return;
    if (!state?.session?.user?.id) return;
    const today = localDateISO();
    const logs = (typeof qFoodLogsForDate === 'function' ? await qFoodLogsForDate(today) : []) || [];
    const tot = logs.reduce((a, l) => ({
      kcal: a.kcal + Number(l.calories || 0),
      p:    a.p    + Number(l.protein_g || 0),
      c:    a.c    + Number(l.carbs_g || 0),
      f:    a.f    + Number(l.fat_g || 0),
      fib:  a.fib  + Number(l.fiber_g || 0),
    }), { kcal: 0, p: 0, c: 0, f: 0, fib: 0 });
    const tg = state.profile || {};
    await pushMacrosToWidget(tot, tg);
  } catch (e) { console.warn('[widget] refreshWidgetNow failed', e); }
}

// Push on app resume (background -> foreground).
(function wireWidgetOnResume() {
  if (typeof document === 'undefined') return;
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      refreshWidgetNow();
    }
  });
  // Capacitor's native app resume event fires more reliably than visibilitychange on iOS.
  try {
    const App = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App;
    if (App && typeof App.addListener === 'function') {
      App.addListener('appStateChange', (state) => {
        if (state?.isActive) refreshWidgetNow();
        if (state?.isActive) { try { if (typeof kickAppleGoals === 'function') kickAppleGoals(); } catch (_) {} }
        // Re-render the Log screen on resume so sets logged externally (Claude MCP
        // merges them into the active draft) land in the screen state before the
        // next auto-save rewrites the draft's set_logs.
        if (state?.isActive) { try { const h = (location.hash || '').split('?')[0]; if (h === '#/log' && typeof route === 'function') route(); } catch (_) {} }
      });
    }
  } catch(_) {}
})();

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
// Returns an <a> that on mobile tries to open the YouTube app first (youtube:// scheme),
// falling back to the web if the app isn't installed. On desktop it just opens the
// search URL in a new tab. The web URL is the actual href so right-click + share + middle-click
// still work as expected.
const ytLink = (name) => {
  const safe = String(name || '').replace(/'/g, '&#39;');
  const q = encodeURIComponent('How to ' + name);
  return `<a href="https://www.youtube.com/results?search_query=${q}" data-yt-q="${q}" data-yt-name="${esc(safe)}" rel="noopener" class="ytLink hover:text-emerald-400 hover:underline underline-offset-2 decoration-zinc-700">${esc(name)}</a>`;
};

// === Editable exercise display name (preserves history) ===
// Canonical exercise_name is what stats / PRs / volume queries use. Users can override
// the *display* freely without losing tracking.
const EX_NAME_LS_KEY = 'bm.exNameOverrides.v1';
function getExNameOverrides() {
  try { return JSON.parse(localStorage.getItem(EX_NAME_LS_KEY) || '{}') || {}; }
  catch(_) { return {}; }
}
function setExNameOverride(canonical, display) {
  if (!canonical) return;
  const map = getExNameOverrides();
  const d = String(display || '').trim();
  if (!d || d === canonical) { delete map[canonical]; }
  else { map[canonical] = d; }
  try { localStorage.setItem(EX_NAME_LS_KEY, JSON.stringify(map)); } catch(_) {}
}
function displayExName(canonical) {
  if (!canonical) return '';
  const map = getExNameOverrides();
  return map[canonical] || canonical;
}
// ytLink with display-name override. Search query still uses the canonical name
// so the YouTube results stay accurate even if the user renames the exercise.
const ytLinkDisplay = (canonical) => {
  const shown = displayExName(canonical);
  const safe = String(canonical || '').replace(/'/g, '&#39;');
  const q = encodeURIComponent('How to ' + canonical);
  return `<a href="https://www.youtube.com/results?search_query=${q}" data-yt-q="${q}" data-yt-name="${esc(safe)}" rel="noopener" class="ytLink hover:text-emerald-400 hover:underline underline-offset-2 decoration-zinc-700">${esc(shown)}</a>`;
};

// Single delegated click handler — prefers the YouTube app on mobile.
function _openYouTubeFor(query) {
  const ua = (navigator.userAgent || '');
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);
  const webUrl = 'https://www.youtube.com/results?search_query=' + query;

  if (!isIOS && !isAndroid) {
    window.open(webUrl, '_blank', 'noopener');
    return;
  }

  let appOpened = false;
  const onHidden = () => { if (document.hidden) appOpened = true; };
  document.addEventListener('visibilitychange', onHidden);

  const fallback = () => {
    document.removeEventListener('visibilitychange', onHidden);
    if (!appOpened) {
      window.open(webUrl, '_blank', 'noopener');
    }
  };

  if (isAndroid) {
    const intent = 'intent://www.youtube.com/results?search_query=' + query +
                   '#Intent;scheme=https;package=com.google.android.youtube;S.browser_fallback_url=' +
                   encodeURIComponent(webUrl) + ';end';
    window.location.href = intent;
    setTimeout(fallback, 1200);
    return;
  }

  // iOS
  window.location.href = 'youtube://www.youtube.com/results?search_query=' + query;
  setTimeout(fallback, 1200);
}

// Plan tab per-exercise remove (x) delegation — works regardless of when renderPlan ran.
document.addEventListener('click', (e) => {
  const rm = e.target && e.target.closest && e.target.closest('.planRmEx');
  if (!rm) return;
  e.preventDefault();
  const id = rm.dataset.id;
  const name = rm.dataset.name || 'this exercise';
  (async () => {
    if (!id) { toast && toast('Could not identify exercise', 'error'); return; }
    if (!(await appConfirm({ title: 'Remove exercise?', message: 'Remove ' + name + ' from this day?', confirmLabel: 'Remove', danger: true }))) return;
    try {
      const planId = state.plan && state.plan.id;
      const { error } = await sb.from('plan_exercises').delete().eq('id', id).eq('plan_id', planId);
      if (error) throw error;
      state.plan.exercises = (state.plan.exercises || []).filter(x => x.id !== id);
      toast(name + ' removed');
      if (typeof renderPlan === 'function') renderPlan();

function wireSheetSwipeClose(handleEl, sheetEl, onClose) {
  if (!handleEl || !sheetEl || typeof onClose !== 'function') return;
  if (handleEl.dataset.swipeWired) return;
  handleEl.dataset.swipeWired = '1';
  handleEl.style.touchAction = 'none';
  // Tap the handle to close.
  handleEl.addEventListener('click', (e) => { e.stopPropagation(); onClose(); });
  // Drag to dismiss.
  let sy = 0, dy = 0, dragging = false, baseTransition = '';
  handleEl.addEventListener('touchstart', (e) => {
    if (!e.touches[0]) return;
    sy = e.touches[0].clientY; dy = 0; dragging = true;
    baseTransition = sheetEl.style.transition || '';
    sheetEl.style.transition = 'none';
  }, { passive: true });
  handleEl.addEventListener('touchmove', (e) => {
    if (!dragging || !e.touches[0]) return;
    dy = Math.max(0, e.touches[0].clientY - sy);
    sheetEl.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  const finish = () => {
    if (!dragging) return;
    dragging = false;
    sheetEl.style.transition = baseTransition || 'transform .22s cubic-bezier(.34,1.56,.64,1)';
    if (dy > 80) { onClose(); }
    else { sheetEl.style.transform = 'translateY(0)'; }
  };
  handleEl.addEventListener('touchend',    finish);
  handleEl.addEventListener('touchcancel', finish);
}

// Macro unit helpers. Macros are stored in grams. Allow oz input on forms.
const OZ_PER_GRAM = 0.035274;
const GRAM_PER_OZ = 28.3495;
function macroUnitToggle(targetInputId, initialUnit) {
  // Renders a small g | oz pill toggle. The handler converts the value in the
  // bound input on switch and updates a data-unit attribute that the save path
  // checks before persisting (always converts to grams).

  return `<div class="macro-unit" data-for="${targetInputId}" data-unit="${u}" style="display:inline-flex;background:var(--bg-elevated);border:1px solid var(--border);border-radius:999px;padding:2px;font-size:.65rem;font-weight:700;">
    <button type="button" data-u="g" style="padding:2px 9px;border-radius:999px;border:0;background:${u==='g'?'var(--accent)':'transparent'};color:${u==='g'?'#000':'var(--text-muted)'};font-weight:700;cursor:pointer;">g</button>
    <button type="button" data-u="oz" style="padding:2px 9px;border-radius:999px;border:0;background:${u==='oz'?'var(--accent)':'transparent'};color:${u==='oz'?'#000':'var(--text-muted)'};font-weight:700;cursor:pointer;">oz</button>
  </div>`;
}
function wireMacroUnitToggles(scope) {
  const root = scope || document;
  root.querySelectorAll('.macro-unit').forEach(toggle => {
    if (toggle.dataset.wired) return;
    toggle.dataset.wired = '1';
    toggle.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
      const u = btn.dataset.u;
      const oldU = toggle.dataset.unit;
      if (u === oldU) return;
      toggle.dataset.unit = u;
      // Update visual state
      toggle.querySelectorAll('button').forEach(b => {
        const isCur = b.dataset.u === u;
        b.style.background = isCur ? 'var(--accent)' : 'transparent';
        b.style.color = isCur ? '#000' : 'var(--text-muted)';
      });
      const inp = document.getElementById(toggle.dataset.for);
      if (inp && inp.value !== '' && inp.value != null) {
        const v = Number(inp.value);
        if (Number.isFinite(v)) {
          inp.value = (u === 'oz') ? (v * OZ_PER_GRAM).toFixed(2) : (v * GRAM_PER_OZ).toFixed(1);
        }
      }
    }));
  });
}
// Resolve a macro field input to its stored-as-grams numeric value.
function macroFieldToGrams(inputId) {
  const inp = document.getElementById(inputId);
  if (!inp) return null;
  const raw = inp.value;
  if (raw === '' || raw == null) return null;
  const n = Number(raw);
  if (!Number.isFinite(n)) return null;
  const toggle = document.querySelector(`.macro-unit[data-for="${inputId}"]`);
  const unit = toggle?.dataset?.unit || 'g';
  return unit === 'oz' ? n * GRAM_PER_OZ : n;
}

// Local-date helper: returns YYYY-MM-DD in the user's timezone. Replaces the

const localDateISO = (d) => {

};

// Persist the user's IANA timezone (e.g. America/New_York) to their profile so

// Each workout day owns its own exercise list, addressed by slot_key.
// slot_type stays purely for color/label/category. Key: "<slot_type>-<day_of_week>".
function dayKeyFor(d) {
  if (!d) return null;
  const st = d.slot_type;
  if (!st || st === 'rest') return null;
  return d.slot_key || (st + '-' + d.day_of_week);
}
function slotTypeOfKey(key) {

}

async function qActivePlan() {
  const { data: plans, error } = await sb.from('plans').select('*')
    .eq('is_active', true).order('created_at', { ascending: false }).limit(1);
  if (error) { console.error(error); return null; }
  if (!plans || plans.length === 0) return null;
  const plan = plans[0];
  const [dRes, eRes] = await Promise.all([
    sb.from('plan_days').select('*').eq('plan_id', plan.id).order('day_of_week'),
    sb.from('plan_exercises').select('*').eq('plan_id', plan.id).order('order_idx'),
  ]);
  const days = dRes.data || [];
  let exercises = eRes.data || [];
  // Ensure every workout day carries a stable per-day slot_key.
  days.forEach(d => {
    if (!d.slot_key && d.slot_type && d.slot_type !== 'rest') d.slot_key = d.slot_type + '-' + d.day_of_week;
  });
  // Legacy plans stored exercises by slot_type only (one shared list per type).
  // Expand into an independent per-day list so each day can diverge.
  const hasKeys = exercises.some(e => e.slot_key);
  if (!hasKeys && exercises.length) {
    const bySlot = {};
    exercises.forEach(e => { (bySlot[e.slot_type] = bySlot[e.slot_type] || []).push(e); });
    const expanded = [];
    days.forEach(d => {
      if (!d.slot_type || d.slot_type === 'rest' || d.slot_type === 'cardio') return;
      const key = d.slot_type + '-' + d.day_of_week;
      (bySlot[d.slot_type] || []).forEach(e => expanded.push({ ...e, slot_key: key }));
    });
    if (expanded.length) exercises = expanded;
  }
  return { ...plan, days, exercises };
}

async function qAutoSave(logState) {
  if (!logState || !logState.slot_type) return;
  const uid = state.session.user.id;
  const setsToSave = (logState.rows || [])
    .filter(r => r.weight_lbs !== '' || r.reps !== '')
    .map(r => ({
      exercise_name: r.exercise_name,
      set_number: r.set_number,
      reps: r.reps === '' ? null : Number(r.reps),
      weight_lbs: r.weight_lbs === '' ? null : Number(r.weight_lbs),
    }));

  try {
    if (_currentSessionId) {
      // Update existing session
      const { error } = await sb.from('sessions').update({
        notes: logState.notes || null,
        cardio_type: logState.cardio_type || null,
        cardio_duration_min: logState.cardio_duration_min || null,
      }).eq('id', _currentSessionId);
      if (error) throw error;
      // Replace set_logs
      await sb.from('set_logs').delete().eq('session_id', _currentSessionId);
      if (setsToSave.length) {
        const rows = setsToSave.map(s => ({ session_id: _currentSessionId, ...s }));
        const { error: eS } = await sb.from('set_logs').insert(rows);
        if (eS) throw eS;
      }
    } else {
      // Create new session (first auto-save)
      const { data: session, error } = await sb.from('sessions').insert({
        user_id: uid,
        slot_type: logState.slot_type,
        session_date: logState.session_date || today(),
        notes: logState.notes || null,
        cardio_type: logState.cardio_type || null,
        cardio_duration_min: logState.cardio_duration_min || null,
        is_draft: true,
      }).select().single();
      if (error) throw error;
      _currentSessionId = session.id;
      if (setsToSave.length) {
        const rows = setsToSave.map(s => ({ session_id: _currentSessionId, ...s }));
        const { error: eS } = await sb.from('set_logs').insert(rows);
        if (eS) throw eS;
      }
    }
    // Show subtle save indicator
    const ind = document.getElementById('autoSaveInd');
    if (ind) { ind.textContent = 'Saved'; ind.style.opacity = '1'; setTimeout(() => { ind.style.opacity = '0'; }, 1200); }
  } catch (e) {
    console.error('Auto-save error:', e);
    const ind = document.getElementById('autoSaveInd');
    if (ind) { ind.textContent = 'Save error'; ind.style.opacity = '1'; }
  }
}

    .select('created_at, set_logs(exercise_name,set_number,reps,weight_lbs)')
    .eq('session_date', date)

/* =========================================================
   LOCAL DRAFT (mid-workout state survives nav-away even if
   no values are entered yet, and preserves preset structure
   + mid-session add/remove decisions).

function _localDraftKey(slot_type) {
  const uid = state.session && state.session.user && state.session.user.id || 'anon';
  return 'workout_draft__' + uid + '__' + today() + '__' + slot_type;
}
function saveLocalDraft(slot_type, logState) {
  try {
    const key = _localDraftKey(slot_type);
    const payload = {
      slot_type,
      saved_at: new Date().toISOString(),
      session_date: logState.session_date || today(),
      startedAt: logState.startedAt || null,
      activeIdx: (typeof logState.activeIdx === 'number') ? logState.activeIdx : 0,
      notes: logState.notes || '',
      cardio_type: logState.cardio_type || null,
      cardio_duration_min: logState.cardio_duration_min || null,
      exercises: (logState.exercises || []).map(e => ({
        exercise_name: e.exercise_name,
        target_sets: e.target_sets,
        target_reps: e.target_reps,
        ad_hoc_type: e.ad_hoc_type || null,
      })),
      rows: (logState.rows || []).map(r => ({
        exercise_name: r.exercise_name,
        set_number: r.set_number,
        reps: r.reps,
        weight_lbs: r.weight_lbs,
      })),
    };
    localStorage.setItem(key, JSON.stringify(payload));
  } catch (e) { console.warn('saveLocalDraft failed', e); }
}
function loadLocalDraft(slot_type) {
  try {
    const raw = localStorage.getItem(_localDraftKey(slot_type));
    if (!raw) return null;
    const d = JSON.parse(raw);
    // Only honour drafts from today
    if (d.session_date && d.session_date !== today()) return null;
    return d;
  } catch (e) { return null; }
}
function clearLocalDraft(slot_type) {
  try { localStorage.removeItem(_localDraftKey(slot_type)); } catch (e) {}
}
// Sweep yesterday-and-older drafts on each load (cheap, bounds the keyspace).
function pruneOldLocalDrafts() {
  try {
    const t = today();
    const toRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('workout_draft__')) {
        const parts = k.split('__');
        if (parts.length >= 4 && parts[2] !== t) toRemove.push(k);
      }
    }
    toRemove.forEach(k => localStorage.removeItem(k));
  } catch (e) {}
}

// Returns { lastHeaviest, lifetimePR } for an exercise.
// lastHeaviest = the single heaviest set from the most-recent SESSION that included this exercise
//                (NOT just the most-recent set logged, which could be a drop-set).
// lifetimePR   = all-time heaviest: max weight, tie-break by reps.
// Compute per-exercise { lastHeaviest, lifetimePR } for ALL exercises in one pass
// using the cached qAllSetLogs(). Hugely faster than N parallel queries.
let _exerciseStatsMapCache = null;
let _exerciseStatsMapAt = 0;
async function qAllExerciseStatsMap() {
  const now = Date.now();
  if (_exerciseStatsMapCache && (now - _exerciseStatsMapAt) < 300000) return _exerciseStatsMapCache;
  const sets = await qAllSetLogs();
  const map = {};
  for (const r of sets) {
    const ex = r.exercise_name; if (!ex) continue;
    const w = Number(r.weight_lbs); if (!Number.isFinite(w) || w <= 0) continue;
    const reps = Number(r.reps) || 0;
    const d = r.sessions?.session_date || '';
    const bucket = map[ex] || (map[ex] = { lastHeaviest: null, lifetimePR: null, _lastDate: null });
    // Lifetime PR: pure heaviest by weight, tie-break reps.
    if (!bucket.lifetimePR
        || w > Number(bucket.lifetimePR.weight_lbs)
        || (w === Number(bucket.lifetimePR.weight_lbs) && reps > Number(bucket.lifetimePR.reps || 0))) {
      bucket.lifetimePR = { weight_lbs: w, reps, weight: w };
    }
    // Heaviest within the most recent session date for this exercise.
    if (!bucket._lastDate || d > bucket._lastDate) {
      bucket._lastDate = d;
      bucket.lastHeaviest = { weight_lbs: w, reps, weight: w };
    } else if (d === bucket._lastDate) {
      const cur = bucket.lastHeaviest;
      if (!cur || w > Number(cur.weight_lbs)
          || (w === Number(cur.weight_lbs) && reps > Number(cur.reps || 0))) {
        bucket.lastHeaviest = { weight_lbs: w, reps, weight: w };
      }
    }
  }
  _exerciseStatsMapCache = map;
  _exerciseStatsMapAt = Date.now();
  return map;
}
function invalidateExerciseStatsMap() { _exerciseStatsMapCache = null; _exerciseStatsMapAt = 0; }

async function qExerciseStats(exerciseName) {
  const uid = state.session?.user?.id;
  if (!uid) return { lastHeaviest: null, lifetimePR: null };
  // Pull a reasonable history window. 500 sets per exercise is plenty for personal use.
  const { data, error } = await sb.from('set_logs')
    .select('weight_lbs, reps, sessions!inner(session_date, user_id)')
    .eq('exercise_name', exerciseName)
    .eq('sessions.user_id', uid)
    .not('weight_lbs', 'is', null)
    .order('created_at', { ascending: false })
    .limit(500);
  if (error) { console.warn('qExerciseStats failed', error); return { lastHeaviest: null, lifetimePR: null }; }
  const rows = (data || []).filter(r => Number(r.weight_lbs) > 0);
  if (rows.length === 0) return { lastHeaviest: null, lifetimePR: null };

  // Find the most recent session_date that has this exercise
  let lastDate = null;
  for (const r of rows) {
    const d = r.sessions?.session_date;
    if (d && (!lastDate || d > lastDate)) lastDate = d;
  }

  // Walk once: compute lifetime PR + heaviest within lastDate.
  let lifetimePR = null;
  let lastHeaviest = null;
  const better = (a, b) => {
    if (!a) return true;
    if (b.weight > a.weight) return true;
    if (b.weight === a.weight && b.reps > a.reps) return true;
    return false;
  };
  for (const r of rows) {
    const w = Number(r.weight_lbs) || 0;
    const reps = Number(r.reps) || 0;
    const cand = { weight: w, reps, date: r.sessions?.session_date };
    if (better(lifetimePR, cand)) lifetimePR = cand;
    if (lastDate && r.sessions?.session_date === lastDate && better(lastHeaviest, cand)) {
      lastHeaviest = cand;
    }
  }
  return { lastHeaviest, lifetimePR };
}

function subSplitsUI(dayIndex, subSplits, context) {
  if (!subSplits) subSplits = [];

  subSplits.forEach(ss => {

    ).join('');

function wireSubSplits(getMeta, rerenderFn) {
  // type change
  document.querySelectorAll('.ssType').forEach(el => el.addEventListener('change', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const meta = getMeta(i);
    const ss = meta.subSplits[si];
    ss.type = e.target.value;
    // wipe everything when type changes (different fields apply)
    ss.name = ''; ss.customMode = false;
    ['sets','reps','duration','distance','speed','incline','level','notes'].forEach(k => ss[k] = null);
    rerenderFn();
  }));

  // cardio name dropdown
  document.querySelectorAll('.ssCardioSel').forEach(el => el.addEventListener('change', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const ss = getMeta(i).subSplits[si];
    if (e.target.value === CARDIO_CUSTOM) {
      ss.customMode = true;
      ss.name = '';
    } else {
      ss.customMode = false;
      ss.name = e.target.value;
    }
    // wipe field values that may not apply to the new selection
    ['sets','reps','duration','distance','speed','incline','level'].forEach(k => ss[k] = null);
    rerenderFn();
  }));

  // free-text name (cardio custom OR core/stretching)
  document.querySelectorAll('.ssCustomName, input.ssName').forEach(el => el.addEventListener('input', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    getMeta(i).subSplits[si].name = e.target.value;
  }));

  // numeric/text fields by data-key
  document.querySelectorAll('.ssField').forEach(el => el.addEventListener('input', e => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    const k = el.dataset.key;
    const ss = getMeta(i).subSplits[si];
    if (FIELD_META[k]?.text) {
      ss[k] = e.target.value;
    } else {
      ss[k] = e.target.value === '' ? null : Number(e.target.value);
    }
  }));

  // remove
  document.querySelectorAll('.ssRemove').forEach(el => el.addEventListener('click', () => {
    const i = Number(el.dataset.day), si = Number(el.dataset.si);
    getMeta(i).subSplits.splice(si, 1);
    rerenderFn();
  }));

  // add
  document.querySelectorAll('.ssAdd').forEach(el => el.addEventListener('click', () => {
    const i = Number(el.dataset.day);
    const meta = getMeta(i);
    if (!meta.subSplits) meta.subSplits = [];
    meta.subSplits.push({ type:'', name:'', customMode:false, sets:null, reps:'', duration:null, distance:null, speed:null, incline:null, level:null, notes:'' });
    rerenderFn();
  }));
}

  const oauthRedirect = IS_NATIVE ? 'workout://callback' : (window.location.origin + window.location.pathname);

        provider: 'apple',
        options: { redirectTo: oauthRedirect, scopes: 'email name' },
      });

      // OAuth opens external browser; control returns via deep link
    } catch (e) {
      btnApple.disabled = false;
      toast(e.message || 'Apple sign in failed. Provider may not be configured yet.', 'error');

  });

      });

      toast(e.message || 'Google sign in failed. Provider may not be configured yet.', 'error');

  });

  const tabMagicEl = document.getElementById('tabMagic');

    if (!tabPwdEl) return;
    tabPwdEl.style.borderColor = m === 'password' ? 'var(--accent)' : 'var(--border)';
    tabPwdEl.style.color = m === 'password' ? 'var(--text)' : 'var(--text-muted)';
    tabMagicEl.style.borderColor = m === 'magic' ? 'var(--accent)' : 'var(--border)';
    tabMagicEl.style.color = m === 'magic' ? 'var(--text)' : 'var(--text-muted)';
    document.getElementById('pwdIn').style.display = m === 'password' ? 'block' : 'none';
    document.getElementById('btnSignIn').style.display = m === 'password' ? 'block' : 'none';
    document.getElementById('btnMagic').style.display = m === 'magic' ? 'block' : 'none';
    document.getElementById('btnReset').style.display = m === 'password' ? 'block' : 'none';
    document.getElementById('btnSignUp').style.display = 'none';
  };
  if (tabPwdEl) tabPwdEl.addEventListener('click', () => setMode('password'));
  if (tabMagicEl) tabMagicEl.addEventListener('click', () => setMode('magic'));

  const btnSignIn = document.getElementById('btnSignIn');

    btnSignIn.disabled = true; btnSignIn.textContent = 'Signing in…';

      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    } catch (e) {
      toast(e.message || 'Sign in failed', 'error');
      btnSignIn.disabled = false; btnSignIn.textContent = 'Sign in';
    }
  });

  // Persist the promo code as the user types so it survives the OAuth redirect / sign-in flow
  const loginPromoIn = document.getElementById('loginPromoIn');
  const savedPromo = localStorage.getItem('_PENDING_PROMO');
  if (loginPromoIn) {
    if (savedPromo) loginPromoIn.value = savedPromo;
    loginPromoIn.addEventListener('input', (e) => {
      const v = (e.target.value || '').trim().toUpperCase();
      if (v) localStorage.setItem('_PENDING_PROMO', v);
      else localStorage.removeItem('_PENDING_PROMO');
    });
  }

  const lnkSignup = document.getElementById('lnkSignup');
  if (lnkSignup) lnkSignup.addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById('btnSignIn').style.display = 'none';
    document.getElementById('btnSignUp').style.display = 'block';
  });
  const btnSignUp = document.getElementById('btnSignUp');
  if (btnSignUp) btnSignUp.addEventListener('click', async () => {
    const email = $('emailIn').value.trim();
    const password = $('pwdIn').value;
    if (!email || password.length < 6) { toast('Email + 6+ char password required.', 'error'); return; }
    btnSignUp.disabled = true; btnSignUp.textContent = 'Creating…';
    try {
      const { error } = await sb.auth.signUp({
        email, password,
        options: { emailRedirectTo: IS_NATIVE ? 'workout://callback' : (window.location.origin + window.location.pathname) },
      });
      if (error) throw error;
      toast('Account created.');
    } catch (e) {
      toast(e.message || 'Sign up failed', 'error');
      btnSignUp.disabled = false; btnSignUp.textContent = 'Create account';
    }
  });

  const btnReset = document.getElementById('btnReset');
  if (btnReset) btnReset.addEventListener('click', async () => {
    const email = $('emailIn').value.trim();
    if (!email) { toast('Enter your email first.', 'error'); return; }
    try {
      await sb.auth.resetPasswordForEmail(email, { redirectTo: IS_NATIVE ? 'workout://callback' : (window.location.origin + window.location.pathname) });
      toast('Password reset email sent.');
    } catch (e) { toast(e.message || 'Reset failed', 'error'); }
  });

  $('btnMagic').addEventListener('click', async () => {
    const email = $('emailIn').value.trim();
    if (!email) { toast('Enter an email.', 'error'); return; }
    const btn = $('btnMagic'); btn.disabled = true; btn.textContent = 'Sending...';
    try {
      // Honor native vs web source: magic link from native iOS opens app via workout://callback,
      // magic link from web opens the web app's origin.
      const redirectTo = IS_NATIVE ? 'workout://callback' : (window.location.origin + window.location.pathname);
      const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
      if (error) throw error;
      const msg = $('magicMsg');
      msg.classList.remove('hidden');
      msg.className = 'text-sm text-emerald-400 mt-3';
      msg.textContent = 'Check your email. Click the link and you are in.';
      btn.textContent = 'Sent';
    } catch (e) {
      console.error(e);
      toast(e.message || 'Could not send magic link', 'error');
      btn.disabled = false; btn.textContent = 'Send magic link';
    }
  });
  $('emailIn').addEventListener('keydown', e => { if (e.key === 'Enter') $('btnMagic').click(); });
}
